代えて電磁的方法により提供することはできない。","Ａは、住宅販売瑕疵担保保証金の供託をする場合、当該住宅の最寄りの供託所へ住宅販売瑕疵担保保証金の供託をしなければならない。","ＡＢ間の売買契約において、当該住宅の構造耐力上主要な部分に瑕疵があってもＡが瑕疵担保責任を負わない旨の特約があった場合においても、Ａは住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。"],"answer":4},{"id":"R5-46","year":"R5","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、子どもを育成する家庭又は高齢者の家庭（単身の世帯を含む。）に適した良好な居住性能及び居住環境を有する賃貸住宅の建設に必要な資金の貸付けを業務として行っている。","機構は、証券化支援事業（買取型）において、新築住宅に対する貸付債権のみを買取りの対象としている。","機構は、証券化支援事業（買取型）において、ＺＥＨ（ネット・ゼロ・エネルギーハウス）及び省エネルギー性、耐震性、バリアフリー性、耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。","機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"],"answer":2},{"id":"R5-47","year":"R5","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。","choices":["実際には取引する意思がない物件であっても実在するものであれば、当該物件を広告に掲載しても不当表示に問われることはない。","直線距離で50m以内に街道が存在する場合、物件名に当該街道の名称を用いることができる。","物件の近隣に所在するスーパーマーケットを表示する場合は、物件からの自転車による所要時間を明示しておくことで、徒歩による所要時間を明示する必要がなくなる。","一棟リノベーションマンションについては、一般消費者に対し、初めて購入の申込みの勧誘を行う場合であっても、「新発売」との表示を行うことはできない。"],"answer":2},{"id":"R5-48","year":"R5","q":48,"category":"免除科目","question":"次の記述のうち、誤っているものはどれか。","choices":["令和3年度宅地建物取引業法の施行状況調査（令和4年9月公表）によれば、令和4年3月末における宅地建物取引業者の全事業者数は14万業者を超え、8年連続で増加した。","令和5年地価公示（令和5年3月公表）によれば、令和4年1月以降の1年間の地価について、地方圏平均では、全用途平均、住宅地、商業地のいずれも2年連続で上昇し、工業地は6年連続で上昇した。","建築着工統計調査報告（令和4年計。令和5年1月公表）によれば、令和4年の民間非居住建築物の着工床面積は、前年と比較すると、工場及び倉庫は増加したが、事務所及び店舗が減少したため、全体で減少となった。","年次別法人企業統計調査（令和3年度。令和4年9月公表）によれば、令和3年度における不動産業の売上高営業利益率は11.1％と2年連続で前年度と比べ上昇し、売上高経常利益率も12.5％と2年連続で前年度と比べ上昇した。"],"answer":1},{"id":"R5-49","year":"R5","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["自然堤防の後背湿地側の縁は、砂が緩く堆積していて、地下水位も浅いため、地震時に液状化被害が生じやすい地盤である。","谷底低地に軟弱層が厚く堆積している所では、地震動が凝縮されて、震動が小さくなる。","1923年の関東地震の際には、東京の谷底低地で多くの水道管や建物が被害を受けた。","大都市の近郊の丘陵地では、丘を削り谷部に盛土し造成宅地が造られたが、盛土造成に際しては、地下水位を下げるため排水施設を設け、締め固める等の必要がある。"],"answer":2},{"id":"R5-50","year":"R5","q":50,"category":"免除科目","question":"建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。","choices":["鉄筋コンクリート構造は、地震や風の力を受けても、躯体の変形は比較的小さく、耐火性にも富んでいる。","鉄筋コンクリート構造は、躯体の断面が大きく、材料の質量が大きいので、建物の自重が大きくなる。","鉄筋コンクリート構造では、鉄筋とコンクリートを一体化するには、断面が円形の棒鋼である丸鋼の方が表面に突起をつけた棒鋼である異形棒鋼より、優れている。","鉄筋コンクリート構造は、コンクリートが固まって所定の強度が得られるまでに日数がかかり、現場での施工も多いので、工事期間が長くなる。"],"answer":3},{"id":"R6-01","year":"R6","q":1,"category":"権利関係","question":"法律行為に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["営業を許された未成年者が、その営業に関する意思表示をした時に意思能力を有しなかった場合は、その法律行為は無効である。","公の秩序に反する法律行為であっても、当事者が納得して合意した場合には、その法律行為は有効である。","詐欺による意思表示は取り消すことによって初めから無効であったとみなされるのに対し、強迫による意思表示は取り消すまでもなく無効である。","他人が所有している土地を目的物にした売買契約は無効であるが、当該他人がその売買契約を追認した場合にはその売買契約は有効となる。"],"answer":1},{"id":"R6-02","year":"R6","q":2,"category":"権利関係","question":"委任契約・準委任契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["売主が、売買契約の付随義務として、買主に対して、マンション専有部分内の防火戸の操作方法につき説明義務を負う場合、業務において密接な関係にある売主から委託を受け、売主と一体となって当該マンションの販売に関する一切の事務を行っていた宅地建物取引業者も、買主に対して、防火戸の操作方法について説明する信義則上の義務を負うことがある。","受任者は、委任者の許諾を得たとき、又はやむを得ない事由があるときでなければ、復受任者を選任することができない。","委任契約で本人が死亡しても代理権が消滅しない旨を合意して代理人に代理権を与えた場合、本人が死亡しても代理権は消滅しない。","委任は、当事者の一方が仕事を完成することを相手方に約し、相手方がその仕事の結果に対しその報酬を支払うことを約さなければ、その効力を生じない。"],"answer":4},{"id":"R6-03","year":"R6","q":3,"category":"権利関係","question":"甲土地につき、Ａ、Ｂ、Ｃ、Ｄの4人がそれぞれ4分の1の共有持分を有していて、Ａ、Ｂ、ＣのいずれもＤの所在を知ることができない場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、Ｄの共有持分は、相続財産には属していないものとする。","choices":["甲土地に、その形状又は効用の著しい変更を伴う変更を加える場合には、共有者の過半数の同意が必要であり、本件ではＡ、Ｂ、Ｃ3人の同意が必要となる。","甲土地の所有 権の登記名義人となっている者が所有者ではないＥである場合、持分に基づいてＥに対して登記の抹消を求めるためには、所在が判明しているＡ、Ｂ、Ｃのうち2人の同意が必要である。","Ａ、Ｂ、Ｃ3人の同意があれば、甲土地を資材置場として賃借したいＦとの間で期間を3年とする賃貸借契約を締結することができる。","Ａが裁判所に請求して、裁判所がＤの持分をＡに取得させる旨の決定をした場合、Ｄは、その決定から3年以内に限り、Ａが取得したＤの共有持分の時価相当額をＡに対して支払うよう請求することができる。"],"answer":3},{"id":"R6-04","year":"R6","q":4,"category":"権利関係","question":"Ａを売主、Ｂを買主として甲土地の売買契約（以下この問において「本件契約」という。）が締結された直後にＡが死亡し、ＣがＡを単独相続した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["売買代金を受領したＣが甲土地の引渡しを拒絶する意思を明確に表示したとしても、Ｂは、Ｃに対して相当の期間を定めた催告をしなければ、本件契約を解除することができない。","Ｂが期日までに売買代金を支払わない場合であっても、本件契約の解除権はＡの一身に専属した権利であるため、Ｃは本件契約を解除することはできない。","Ｂは、売買代金が支払い済みだったとしても、甲土地の所有権登記を備えなければ、Ｃに対して甲土地の引渡しを請求することはできない。","本件契約が、Ａの詐欺により締結されたものである場合、ＢはＣに対して、本件契約の取消しを主張することができる。"],"answer":4},{"id":"R6-05","year":"R6","q":5,"category":"権利関係","question":"履行遅滞に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["不法行為の加害者は、不法行為に基づく損害賠償債務について、履行の請求を受けた時から遅滞の責任を負う。","善意の受益者は、その不当利得返還債務について、履行の請求を受けた時から遅滞の責任を負う。","請負人の報酬債権に対して、注文者がこれと同時履行の関係にある目的物の瑕疵修補に代わる損害賠償債権を自働債権とする相殺の意思表示をした場合、注文者は、請負人に対する相殺後の報酬残債務について、当該残債務の履行の請求を受けた時から遅滞の責任を負う。","債務の履行について不確定期限があるときは、債務者は、その期限の到来したことを知った後に履行の請求を受けた時から遅滞の責任を負う。"],"answer":2},{"id":"R6-06","year":"R6","q":6,"category":"権利関係","question":"Ａの所有する甲土地にＢを地上権者とする地上権（以下この問において「本件地上権」という。）が設定され、その旨の登記がされた後に、甲土地にＣを抵当権者とする抵当権が設定され、その旨の登記がされた場合における次の記述のうち、民法の規定によれば、正しいものはいくつあるか。\nア ＢがＡとの売買契約に基づき、甲土地の所有権を取得したときは、本件地上権は消滅する。\nイ Ａが死亡してＢがＡを単独相続し、甲土地の所有権を取得したときは、本件地上権は消滅する。\nウ ＢがＡとの代物弁済契約に基づき、甲土地の所有権を取得したときは、本件地上権は消滅する。\nエ ＢがＡとの贈与契約に基づき、甲土地の所有権を取得したときは、本件地上権は消滅する。","choices":["一つ","二つ","三つ","なし"],"answer":4},{"id":"R6-07","year":"R6","q":7,"category":"権利関係","question":"Ａを貸主、Ｂを借主として甲建物の賃貸借契約（以下この問において「本件契約」という。）が締結され、Ｂが甲建物の引渡しを受けた場合における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["ＣがＢに対し甲建物をＡから買受けたとの虚偽の話をしたので、これを信じたＢが甲建物の占有を任意にＣに移転した場合、ＡはＣに対して、占有回収の訴えにより甲建物の返還を請求することはできない。","Ｂが、Ａの甲建物への立ち入りを建物入り口を閉ざして拒んだときは、Ａは甲建物の間接占有が侵奪されたものとして、Ｂに対して、占有回収の訴えにより甲建物の返還を請求することができる。","Ｂが死亡して、ＤがＢを単独相続した場合、Ｄは相続開始を知るまでは、Ｂによる甲建物の占有を承継しない。","ＡとＢのいずれもが死亡した場合、本件契約は当然に終了する。"],"answer":1},{"id":"R6-08","year":"R6","q":8,"category":"権利関係","question":"次の記述のうち、民法の条文として規定されていないものはどれか。","choices":["隔地者間の契約は、承諾の通知を発した時に成立する。","無効な行為に基づく債務の履行として給付を受けた者は、相手方を原状に復させる義務を負う。","代理人が自己又は第三者の利益を図る目的で代理権の範囲内の行為をした場合において、相手方がその目的を知り、又は知ることができたときは、その行為は、代理権を有しない者がした行為とみなす。","未成年者が法律行為をするには、その法定代理人の同意を得なければならない。ただし、単に権利を得、又は義務を免れる法律行為については、この限りでない。"],"answer":1},{"id":"R6-09","year":"R6","q":9,"category":"権利関係","question":"承諾に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["第三者が債務者との間で、債務者の債務につき免責的債務引受契約をする場合、債権者の承諾は不要である。","第三者が債務者との間で、債務者の債務につき併存的債務引受契約をした場合、債権者が第三者に承諾をした時点で、その効力が生ずる。","第三者が債権者との間で、債務者の債務につき併存的債務引受契約をした場合、債務者が第三者に承諾をした時点で、その効力が生ずる。","賃借人が賃貸借契約の目的物を第三者に転貸する場合、賃貸人の承諾は不要である。"],"answer":2},{"id":"R6-10","year":"R6","q":10,"category":"権利関係","question":"売買契約の目的物が品質に関して契約の内容に適合しない場合において、当該契約不適合が売主及び買主のいずれの責めにも帰することができない事由によるものであるとき、履行の追完請求権、代金の減額請求権、損害賠償請求権及び契約の解除権のうち、民法の規定によれば、買主が行使することができない権利のみを掲げたものとして正しいものは次の記述のうちどれか。なお、上記帰責性以外の点について、権利の行使を妨げる事情はないものとする。","choices":["履行の追完請求権、損害賠償請求権、契約の解除権","代金の減額請求権、損害賠償請求権、契約の解除権","履行の追完請求権、代金の減額請求権","損害賠償請求権"],"answer":4},{"id":"R6-11","year":"R6","q":11,"category":"権利関係","question":"建物の所有を目的とする土地の賃貸借契約（一時使用目的の借地契約を除く。）に関する次の記述のうち、借地借家法の規定によれば、正しいものはどれか。","choices":["専ら事業の用に供する建物（居住の用に供するものを除く。）の所有を目的とし、存続期間を20年として借地権を設定する場合、建物買取請求権の規定は適用されず、また、その契約は、公正証書による等書面によってしなければならない。","居住の用に供する建物の所有を目的として借地権を設定する場合において、借地権を消滅させる目的で、その設定後30年を経過した日に借地権の目的である土地の上の建物を借地権設定者に相当の対価で譲渡する旨の特約を定めても、この特約は無効である。","借地権を設定する場合において、存続期間を定めなかったときは、その期間は30年となる。","当事者が借地権の設定後に最初に借地契約を更新する場合において、存続期間を定めなかったときは、その期間は更新の日から10年となる。"],"answer":3},{"id":"R6-12","year":"R6","q":12,"category":"権利関係","question":"賃貸人Ａと賃借人Ｂとが、居住目的で期間を3年として、借地借家法第38条の定期建物賃貸借契約（以下この問において「契約①」という。）を締結した場合と、定期建物賃貸借契約でも一時使用目的の賃貸借契約でもない普通建物賃貸借契約（以下この問において「契約②」という。）を締結した場合とに関する次の記述のうち、借地借家法の規定によれば、正しいものはどれか。","choices":["Ｂが建物の引渡しを受けた後にＡが建物をＣに売却して建物所有者がＣに変わった場合、Ｂは、契約①の場合ではＣに対して賃借人であることを主張できるが、契約②の場合ではＣに対して賃借人であることを主張できない。","契約期間中は賃料の改定を行わない旨の特約を契約において定めていても、契約期間中に賃料が不相当になったと考えるに至ったＢは、契約①の場合も契約②の場合も、借地借家法第32条に基づく賃料減額請求をすることができる。","Ｂが契約期間中に相続人なしで死亡した場合において、婚姻はしていないが事実上夫婦と同様の関係にあった同居者Ｄがあるときは、契約①の場合も契約②の場合も、Ａに反対の意思表示をしないＤは、建物の賃貸借契約に関し、Ｂの権利義務を承継する。","契約①の場合、公正証書によって契約をするときに限り契約の更新がないことを有効に定めることができ、契約②の場合、書面で契約し、かつ、Ａに正当な理由がない限り、Ａは契約の更新を拒絶することができなくなる。"],"answer":3},{"id":"R6-13","year":"R6","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。","choices":["各共有者の共用部分の持分は、規約に別段の定めがない限り、共有者数で等分することとされている。","規約及び集会の決議は、区分所有者の特定承継人に対しても、その効力を生ずる。","管理者は、集会において、毎年1回一定の時期に、その事務に関する報告をしなければならない。","集会の招集の通知は、区分所有者が管理者に対して通知を受けるべき場所を通知しなかったときは区分所有者の所有する専有部分が所在する場所にあててすれば足りる。この場合には、集会の招集の通知は、通常それが到達すべき時に到達したものとみなされる。"],"answer":1},{"id":"R6-14","year":"R6","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。","choices":["買戻しの特約に関する登記がされている場合において、契約の日から10年を経過したときは、登記権利者は、単独で当該登記の抹消を申請することができる。","不動産の収用による所有権の移転の登記は、起業者が単独で申請することができる。","相続人ではない者に対する遺贈による所有権の移転の登記は、登記権利者が単独で申請することができる。","登記名義人の住所についての変更の登記は、登記名義人が単独で申請することができる。"],"answer":3},{"id":"R6-15","year":"R6","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、誤っているものはどれか。","choices":["都市計画区域外においても、特に必要があるときは、都市施設に関する都市計画を定めることができる。","準都市計画区域については、用途地域が定められている土地の区域であっても、市街地開発事業に関する都市計画を定めることができない。","用途地域の一つである準住居地域は、道路の沿道としての地域の特性にふさわしい業務の利便の増進を図りつつ、これと調和した住居の環境を保護するために定める地域である。","地区計画は、用途地域が定められている土地の区域についてのみ都市計画に定められるものであり、また、地区計画に関する都市計画を定めるに当たっては、地区整備計画を都市計画に定めなければならない。"],"answer":4},{"id":"R6-16","year":"R6","q":16,"category":"法令上の制限","question":"都市計画法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["市街化区域内において行う、医療法に規定する病院を建築するための1,000m2の開発行為については、法第29条に基づく都道府県知事の許可を得る必要がある。","市街化区域内において行う、開発行為を伴わない建築物の建築で、当該建築物の床面積が1,000m2以上のものについては、法第29条に基づく都道府県知事の許可を得る必要がある。","市街化調整区域内において行う、都市計画事業の施行のための開発行為については、法第29条に基づく都道府県知事の許可を得る必要がある。","法第29条に基づく許可を受けた者は、当該許可に係る土地についての一定の事項を開発登録簿に登録しなければならない。"],"answer":1},{"id":"R6-17","year":"R6","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、誤っているものはどれか。なお、建築副主事の確認にあっては、建築基準法に定める大規模建築物以外の建築物に限るものとする。","choices":["高さ25mの建築物には、周囲の状況によって安全上支障がない場合を除き、有効に避雷設備を設けなければならない。","特定行政庁は、建築基準法の規定に違反した建築物（国、都道府県又は建築主事を置く市町村の建築物を除く。）の所有者に対して、緊急の必要があり、仮に当該建築物の使用禁止又は使用制限の命令をする場合であっても、意見書の提出先等を記載した通知書の交付等の手続をとらなければならない。","防火地域内に存在する共同住宅（その用途に供する部分の床面積の合計が300m2）を増築する場合、その増築に係る部分の床面積の合計が10m2以内であっても、建築主事、建築副主事又は指定確認検査機関の確認を受ける必要がある。","劇場の用途に供する建築物を映画館（その用途に供する部分の床面積の合計が500m2）に用途変更する場合、建築主事、建築副主事又は指定確認検査機関の確認を受ける必要はない。"],"answer":2},{"id":"R6-18","year":"R6","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法の規定によれば、正しいものはどれか。","choices":["客席部分の床面積の合計が300m2の映画館については、第二種住居地域内において建築することはできないが、準住居地域内においては建築することができる。","特定用途誘導地区内において、都市計画で建築物の高さの最高限度が定められていたとしても、特定行政庁が用途上又は構造上やむを得ないと認めて許可したものについては、当該最高限度を超えてよい。","計画しようとする建築物の天空率が、道路斜線制限、隣地斜線制限又は北側斜線制限に適合する建築物の天空率未満であれば、これらの制限は適用されない。","都市計画で建率の限度が80％に指定されている区域かつ防火地域内にある耐火建築物について、建率の限度を超えるためには、特定行政庁による許可を得る必要がある。"],"answer":2},{"id":"R6-19","year":"R6","q":19,"category":"法令上の制限","question":"宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市及び中核市にあってはその長をいうものとし、地方自治法に基づく施行時特例市に係る経過措置については考慮しないものとする。","choices":["都道府県知事は、基礎調査のために他人の占有する土地に立ち入って測量又は調査を行う必要があるときは、その必要の限度において、当該土地に、自ら立ち入り、又はその命じた者若しくは委任した者に立ち入らせることができ、当該土地の占有者は、正当な理由がない限り、その立入りを拒み、又は妨げてはならない。","都道府県知事は、宅地造成等工事規制区域内の土地について、宅地造成等に伴う災害を防止するために必要があると認める場合には、その土地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。","工事主は、宅地造成等工事規制区域において行われる宅地造成等に関する工事について、工事着手後2週間以内に、宅地造成等に関する工事の施行に係る土地の周辺地域の住民に対し、説明会の開催その他の当該宅地造成等に関する工事の内容を周知させるため必要な措置を講じなければならない。","特定盛土等規制区域内において行われる特定盛土等又は土石の堆積に関する工事については、工事主は、当該工事に着手する日の30日前までに、主務省令で定めるところにより、当該工事の計画を都道府県知事に届け出なければならない。ただし、特定盛土等又は土石の堆積に伴う災害の発生のおそれがないと認められるものとして政令で定める工事については、この限りでない。"],"answer":3},{"id":"R6-20","year":"R6","q":20,"category":"法令上の制限","question":"土地区画整理法に関する次の記述のうち、誤っているものはどれか。なお、この問において、同法第136条の3による大都市等の特例及び条例で定める事務処理の特例は考慮しないものとする。","choices":["仮換地が指定された場合においては、従前の宅地について権原に基づき使用し、又は収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地又は仮換地について仮に使用し、若しくは収益することができる権利の目的となるべき宅地若しくはその部分について、従前の宅地について有する権利の内容である使用又は収益と同じ使用又は収益をすることができる。","市町村施行の土地区画整理事業において、市町村は、換地処分をした場合においては、その旨を公告しなければならない。","換地計画において定められた保留地は、換地処分の公告があった日の翌日において、施行者が取得する。","施行者は、仮換地を指定した場合において、特別の事情があるときは、その仮換地について使用又は収益を開始することができる日を仮換地の指定の効力発生の日と別に定めることができる。"],"answer":2},{"id":"R6-21","year":"R6","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。","choices":["法第3条第1項の許可があったときは所有権が移転する旨の停止条件付売買契約を原因とする所有権移転の仮登記の申請を行う場合にも、農業委員会の許可が必要である。","法第5条第1項の許可申請書の提出において、法ではその申請に係る権利の設定又は移転に関し民事調停法により調停が成立した場合など一定の場合を除き、当事者は連署した申請書を提出しなければならないとされている。","法では、農地の賃貸借で期間の定めがあるものについては、一定の場合を除き、期間満了の1年前から6か月前までの間に更新拒絶の通知をしないと従前の賃貸借と同一の条件で更に賃貸借したものとみなされる。","法では、農地の賃貸借の当事者は、当該賃貸借の合意による解約が民事調停法による農事調停によって行われる場合など一定の場合を除き、知事の許可を受けなければ、当該賃貸借について、解除、解約の申入れ、合意解約、更新拒絶の通知をしてはならないとされている。"],"answer":1},{"id":"R6-22","year":"R6","q":22,"category":"法令上の制限","question":"国土利用計画法（以下この問において「法」という。）第23条の届出（以下この問において「事後届出」という。）及び法第27条の7の監視区域内の届出（以下この問において「事前届出」という。）に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。","choices":["Ａが所有する市街化区域以外の都市計画区域内の4,000m2の土地について、宅地建物取引業者Ｂが地上権の設定を受ける契約を締結した場合、Ｂは事後届出を行わなければならない。","宅地建物取引業者Ｃが所有する市街化区域内の3,000m2の土地と宅地建物取引業者Ｄが所有する都市計画区域外に所在する12,000m2の土地を金銭の授受を伴わずに交換する契約を締結した場合、Ｃ及びＤはともに事後届出を行う必要はない。","事前届出又は事後届出が必要な土地について、売買契約を締結したにもかかわらず所定の期間内に当該届出をしなかった者は都道府県知事からの勧告を受けることがあるが、罰則の適用を受けることはない。","監視区域に指定された市街化区域内に所在する土地2,500m2について売買契約を締結しようとする当事者は、契約締結の少なくとも6週間前までに事前届出を行わなければならない。"],"answer":4},{"id":"R6-23","year":"R6","q":23,"category":"税・その他","question":"住宅借入金等を有する場合の所得税額の特別控除（以下この問において「住宅ローン控除」という。）に関する次の記述のうち、正しいものはどれか。なお、以下の居住用家屋は、令和5年に建築基準法第6条第1項の確認（建築確認）を受けたものとする。","choices":["令和6年中に居住用家屋を居住の用に供した場合において、その前年において居住用財産を譲渡した場合の軽減税率の特例の適用を受けているときであっても、令和6年分以後の所得税について住宅ローン控除の適用を受けることができる。","令和6年中に居住用家屋を居住の用に供した場合において、その前年において居住用財産の買換え等の場合の譲渡損失の損益通算の適用を受けているときであっても、令和6年分以後の所得税について住宅ローン控除の適用を受けることができる。","令和5年中に居住用家屋の敷地の用に供するための土地を取得した場合において、令和6年中に居住用家屋を新築して居住の用に供したときは、令和5年分の所得税について住宅ローン控除の適用を受けることができる。","令和6年中に居住用家屋を居住の用に供した場合において、その居住用家屋の取得に係る住宅借入金等の償還期間等が契約において3年とされているときは、令和6年以後3年間の所得税について住宅ローン控除の適用を受けることができる。"],"answer":2},{"id":"R6-24","year":"R6","q":24,"category":"税・その他","question":"不動産取得税に関する次の記述のうち、正しいものはどれか。","choices":["不動産取得税の課税標準は、不動産を取得した時における当該不動産の売買価格であるから、固定資産税の課税標準である固定資産の評価額とは異なるものである。","不動産取得税の課税標準となるべき額が、土地の取得にあっては10万円、家屋の取得のうち建築に係るものにあっては1戸につき23万円、その他のものにあっては1戸につき12万円に満たない場合においては、不動産取得税が課されない。","不動産取得税は、不動産の取得に対して課される税であるので、法人の合併により不動産を取得した場合においても、不動産取得税が課される。","令和6年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3％であるが、住宅以外の家屋及び土地に係る不動産取得税の税率は4％である。"],"answer":2},{"id":"R6-25","year":"R6","q":25,"category":"税・その他","question":"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。","choices":["同一需給圏とは、一般に対象不動産と代替関係が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいう。","対象不動産について、依頼目的に応じ対象不動産に係る価格形成要因のうち地域要因又は個別的要因について想定上の条件を設定する場合がある。","不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、これを適合の原則という。","収益還元法は、対象不動産が将来生み出すであろうと期待される純収益の現在価値の総和を求めることにより対象不動産の試算価格を求める手法であり、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効である。"],"answer":3},{"id":"R6-26","year":"R6","q":26,"category":"宅建業法","question":"宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア ガス配管設備等に関して、住宅の売買後においても宅地内のガスの配管設備等の所有権が家庭用プロパンガス販売会社にあるものとする場合には、その旨を説明しなければならない。\nイ 重要事項の説明を行う宅地建物取引士は専任の宅地建物取引士でなくてもよいが、書面に記名する宅地建物取引士は専任の宅地建物取引士でなければならない。\nウ 区分所有建物である事務所ビルの一室の売買の媒介を行う場合、当該1棟の建物及びその敷地の管理が委託されているときは、その委託を受けている者の氏名（法人にあっては、その商号又は名称）及び住所（法人にあっては、その主たる事務所の所在地）を説明しなければならない。\nエ 区分所有建物である中古マンションの一室の売買の媒介を行う場合、当該1棟の建物の計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容及び既に積み立てられている額について説明しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R6-27","year":"R6","q":27,"category":"宅建業法","question":"宅地建物取引業者Ａに関する次の記述のうち、正しいものはどれか。なお、Ａは宅地建物取引業保証協会の社員ではないものとする。","choices":["Ａが主たる事務所を移転したことにより、その最寄りの供託所が変更した場合において、金銭のみをもって営業保証金を供託しているときは、遅滞なく営業保証金を移転後の主たる事務所の最寄りの供託所に新たに供託しなければならない。","Ａの従業員が運転する車両で現地案内を受けた者が、Ａの従業員の過失による交通事故でケガをした場合に取得する損害賠償請求権は、Ａが供託した営業保証金の還付の対象債権となる。","Ａは、金銭と有価証券を併用して供託することができ、有価証券のみで供託する場合の当該有価証券の価額は、国債証券の場合はその額面金額の100分の90、地方債証券の場合はその額面金額の100分の80である。","Ａは甲県内にある主たる事務所とは別に、乙県内に新たに従たる事務所を設置したときは、営業保証金を主たる事務所の最寄りの供託所に供託しなければならない。"],"answer":4},{"id":"R6-28","year":"R6","q":28,"category":"宅建業法","question":"宅地建物取引業者Ａ（消費税課税事業者）及び宅地建物取引業者Ｂ（消費税免税事業者）が受領した報酬に関するアからウの記述のうち、宅地建物取引業法の規定に違反しないものの組合せは1から4のうちどれか。なお、代理、媒介に当たり、広告の依頼は行われていないものとする。\nア 居住用建物（1か月の借賃12万円。消費税等相当額を含まない。）について、Ａは貸主から代理を依頼され、Ｂは借主から媒介を依頼され、Ａは貸主から6.7万円、Ｂは借主から6.5万円を報酬として受領した。なお、Ｂは、媒介の依頼を受けるに当たって、報酬について借主から特段の承諾を得ていない。\nイ Ｂは、事業用建物について、貸主と借主双方から媒介を依頼され、借賃1か月分10万円（消費税等相当額を含まない。）、権利金90万円（権利設定の対価として支払われる金銭であって返還されないもので、消費税等相当額を含まない。）の賃貸借契約を成立させ、貸主と借主からそれぞれ5万円を報酬として受領した。\nウ Ａは、土地付建物について、売主と買主双方から媒介を依頼され、代金3,500万円（消費税等相当額を含み、土地代金は2,400万円である。）の売買契約を成立させ、売主と買主からそれぞれ110万円を報酬として受領したほか、売主の特別の依頼に基づき行った遠隔地への現地調査に要した実費の費用について、売主が事前に負担を承諾していたので、売主から9万円を受領した。","choices":["ア、イ","イ、ウ","ア、ウ","ア、イ、ウ"],"answer":2},{"id":"R6-29","year":"R6","q":29,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["宅地建物取引士資格試験に合格した者は、宅地又は建物の取引に関する実務の経験期間が2年に満たない場合であっても、試験に合格した日から1年以内に登録を受けようとするときには、都道府県知事が指定する講習を受講することにより、宅地建物取引士の登録を受けることができる。","宅地建物取引士証は、更新を受けることなくその有効期間が経過した場合、その効力を失うが、当該宅地建物取引士証を都道府県知事に返納する必要はない。","宅地建物取引士は、他人に自己の名義の使用を許し、当該他人がその名義で宅地建物取引士である旨の表示をしたときは、法第68条の規定に基づく処分の対象となるが、当該他人が宅地建物取引士の登録を受けた者であるときはこの限りでない。","宅地建物取引業者は、その事務所唯一の専任の宅地建物取引士が宅地建物取引士証の有効期間の経過により効力を失い宅地建物取引士でなくなったときは、2週間以内に法第31条の3第1項の規定に適合させるため必要な措置を執らなければならない。"],"answer":4},{"id":"R6-30","year":"R6","q":30,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない個人Ｂとの間で宅地の売買契約を締結し、手付金を支払ったＢが、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフにより、当該売買契約を契約締結の日の翌日に解除しようとしている。この場合に関する次の記述のうち、誤っているものはどれか。","choices":["Ａがクーリング・オフについて告げるときに交付すべき書面には、Ａの商号又は名称及び住所並びに免許証番号の記載は必要であるが、Ａの宅地建物取引士の記名は必要ない。","Ｂが、自らの申出により、Ｂの勤務する会社の事務所において、宅地の買受けの申込み及びＡとの売買契約の締結をした場合、Ｂは、クーリング・オフによる当該売買契約の解除を行うことができない。","Ｂが、自らの申出により、喫茶店において、宅地の買受けの申込み及びＡとの売買契約の締結をした場合、Ｂは、クーリング・オフによる当該売買契約の解除を行うことができる。","Ｂは、自らの申出により、Ｂが融資を受ける銀行（宅地建物取引業者ではない。）において、宅地の買受けの申込み及びＡとの売買契約の締結をした場合、クーリング・オフによる当該売買契約の解除を行うことができない。"],"answer":4},{"id":"R6-31","year":"R6","q":31,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["国土交通大臣又は都道府県知事は、その免許を受けた宅地建物取引業者が法第65条第1項の規定による指示に従わない場合、その業務の全部又は一部の停止を命ずることができ、業務の停止の処分に違反した場合、免許を取り消さなければならない。","国土交通大臣又は都道府県知事は、その免許を受けた宅地建物取引業者の事務所の所在地を確知できないときは、その事実を公告し、その公告の日から2週間を経過しても当該宅地建物取引業者から申出がないときは、免許を取り消すことができる。","国土交通大臣又は都道府県知事は、法第66条の規定による免許の取消しの処分をしようとするときは、聴聞を行わなければならないが、当該聴聞は、公開することが相当と認められる場合を除き、公開されない。","国土交通大臣又は都道府県知事は、法第66条の規定による免許の取消しの処分をしたときはその旨を公告しなければならないが、法第65条第2項の規定による業務の停止の処分をしたときはその旨の公告はしなくともよい。"],"answer":1},{"id":"R6-32","year":"R6","q":32,"category":"宅建業法","question":"宅地建物取引業者Ａが、ＢからＢ所有の中古住宅の売却の依頼を受け、Ｂと専任媒介契約（専属専任媒介契約ではないものとする。）を締結した。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["Ａは当該中古住宅の売買契約が成立しても、当該中古住宅の引渡しが完了していなければ、売買契約が成立した旨を指定流通機構に通知する必要はない。","Ｂが宅地建物取引業者である場合は、当該契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第34条の2第1項に規定する書面に記載する必要はない。","Ａに対して当該中古住宅について買受けの申込みがなかった場合でも、ＡはＢに対して、当該契約に係る業務の処理状況を2週間に1回以上報告しなければならないが、その報告は必ずしも書面で行う必要はない。","Ｂが当該中古住宅について、法第34条の2第1項第4号に規定する建物状況調査を実施する者のあっせんを希望しなかった場合は、Ａは同項に規定する書面に同調査を実施する者のあっせんに関する事項を記載する必要はない。"],"answer":3},{"id":"R6-33","year":"R6","q":33,"category":"宅建業法","question":"宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。","choices":["宅地の販売に関する広告をインターネットで行った場合において、当該宅地の売買契約が成立した後も継続して広告を掲載していた場合、当該広告を掲載し続けることは法第32条の規定に違反する。","建物の所有者と賃貸借契約を締結し、当該建物を自らが貸主となって貸借（転貸）するための広告をする場合においては、自らが契約の当事者となって貸借を成立させる旨を当該広告に明示しなくても、法第34条の規定に違反しない。","造成工事に必要とされる法令に基づく許可等の処分があった宅地について、工事完了前に当該宅地の販売に関する広告をするときは、法令に基づく許可等の処分があったことを明示すれば、取引態様の別について明示する必要はない。","複数の区画がある分譲地の売買について、数回に分けて広告をする場合は、最初に行う広告だけではなく、次回以降の広告の都度取引態様の別を明示しなければならない。"],"answer":3},{"id":"R6-34","year":"R6","q":34,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない個人Ｂとの間で、土地付建物を4,000万円で売却する売買契約（所有権の登記は当該土地付建物の引渡し時に行うものとする。）を締結する場合における宅地建物取引業法（以下この問において「法」という。）第41条又は第41条の2の規定に基づく手付金等の保全措置（以下この問において「保全措置」という。）に関する次の記述のうち、誤っているものはどれか。","choices":["Ａが、保全措置を講じずにＢから手付金100万円を受領する場合、その旨を、法第35条の規定に基づく重要事項説明書に記載する必要があるが、法第37条の規定により交付する書面に記載する必要はない。","当該建物が建築工事の完了後の建物である場合、ＡがＢから手付金100万円を受領する際には保全措置は不要であるが、その後、当該土地付建物を引き渡す前に中間金400万円を受領するためには、手付金100万円と合わせて保全措置を講じた後でなければ、その中間金を受領することができない。","当該建物が建築工事の完了前の建物である場合において、Ａは、保全措置を講じずに、Ｂから手付金300万円を受領することができる。","当該土地付建物の引渡し前に、ＢはＡに対して2,000万円を中間金として支払う契約になっていたが、Ａがその中間金について保全措置を講じていないときは、Ｂはこの中間金の支払いを拒むことができる。"],"answer":3},{"id":"R6-35","year":"R6","q":35,"category":"宅建業法","question":"宅地建物取引業者Ａが宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に記載すべき事項を電磁的方法により提供すること（以下この問において「37条書面の電磁的方法による提供」という。）に関する次の記述のうち、正しいものはどれか。","choices":["Ａが自ら売主として締結する宅地の売買契約において、37条書面の電磁的方法による提供を行う場合、当該契約の相手方に対し、あらかじめ、電磁的方法による提供に用いる電磁的方法の種類及び内容を宅地建物取引士に説明させなければならない。","Ａが媒介業者として関与する建物賃貸借契約において、37条書面の電磁的方法による提供を行う場合、その方法は37条書面の交付に係る宅地建物取引士が明示されるものでなければならない。","Ａが自ら売主として締結する宅地の売買契約において、契約の相手方から37条書面の電磁的方法による提供を行うことについて書面により承諾を得た場合は、その後に当該契約の相手方から書面で電磁的方法による提供を受けない旨の申出があったときでも、37条書面の電磁的方法による提供をすることができる。","Ａが媒介業者として関与する宅地の売買契約において、37条書面の電磁的方法による提供を行う場合であっても、提供後速やかに37条書面を交付しなければならない。"],"answer":2},{"id":"R6-36","year":"R6","q":36,"category":"宅建業法","question":"営業保証金及び宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["宅地建物取引業者で保証協会に加入しようとする者は、その加入しようとする日までに、政令で定める額の弁済業務保証金分担金を当該保証協会に納付しなければならない。","保証協会の社員と宅地建物取引業に関し取引をした者（宅地建物取引業者に該当する者を除く。）は、その取引により生じた債権に関し、当該社員が社員ではないとしたならばその者が供託すべき営業保証金の額に相当する額の範囲内で弁済を受ける権利を有する。","宅地建物取引業者は、保証協会の社員の地位を失ったときは、保証協会が弁済業務保証金の還付請求権者に対し、一定期間内に宅地建物取引業法第64条の8第2項の規定による認証を受けるため申し出るべき旨の公告をした後でなければ、弁済業務保証金分担金の返還を受けることができない。","宅地建物取引業者は、一部の事務所を廃止し営業保証金を取り戻そうとする場合には、供託した営業保証金につき還付を請求する権利を有する者に対し、公告をすることなく営業保証金を取り戻すことができる。"],"answer":4},{"id":"R6-37","year":"R6","q":37,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア 建物の貸借の媒介を行う場合、水防法施行規則第11条第1号の規定により市町村の長が提供する水害ハザードマップに当該建物の位置が含まれているときは、その所在地を示して説明しなければならない。\nイ 既存住宅の売買を行う場合、宅地建物取引業法第34条の2第1項第4号に規定する建物状況調査の実施後、1年を経過していないものについては、建物状況調査の実施の有無、実施している場合の結果の概要について説明しなければならない。\nウ 宅地の売買を行う場合、宅地の造成に関する工事の完了前のものであるときは、完了時における当該宅地に接する道路の構造及び幅員を説明しなければならない。\nエ 建物の貸借の媒介を行う場合、私道に関する負担の有無や内容を事前に調査し、説明しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R6-38","year":"R6","q":38,"category":"宅建業法","question":"宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者Ａが、免許の更新の申請をした場合において、従前の免許の有効期間の満了の日までに、その申請について処分がなされないときは、従前の免許は、有効期間の満了後その効力を失う。","宅地建物取引業者Ｂが宅地建物取引業者Ｃに自己の名義をもって宅地建物取引業を営ませる行為は、Ｂが名義の使用を書面で指示している場合であれば、宅地建物取引業法に違反しない。","宅地建物取引業者Ｄ（甲県知事免許）は、国土交通大臣に免許換えの申請をし、その免許を受けなければ、乙県所在の宅地の売買の媒介をすることはできない。","宅地建物取引業者Ｅ（丙県知事免許）の免許の更新に当たって、丙県知事は宅地建物取引業法第3条の2に基づき条件を付すことができ、Ｅが免許の更新に当たって付された条件に違反したときは、丙県知事はＥの免許を取り消すことができる。"],"answer":4},{"id":"R6-39","year":"R6","q":39,"category":"宅建業法","question":"宅地建物取引業法第50条第2項の届出をすべき場所に関する次の記述のうち、誤っているものはどれか。なお、これらの場所では、宅地若しくは建物の売買若しくは交換の契約（予約を含む。）若しくは宅地若しくは建物の売買、交換若しくは貸借の代理若しくは媒介の契約を締結し、又はこれらの契約の申込みを受けるものとする。","choices":["届出をすべき場所として、継続的に業務を行うことができる施設を有する場合で事務所以外のものが定められているが、当該場所には1名以上の成年者である専任の宅地建物取引士を置かなければならない。","届出をすべき場所として、宅地建物取引業者が10区画以上の一団の宅地又は10戸以上の一団の建物の分譲（以下この問において「一団の宅地建物の分譲」という。）をする場合に設置する案内所が定められているが、当該案内所が土地に定着する建物内に設けられる場合、クーリング・オフ制度の適用が除外される。","届出をすべき場所として、他の宅地建物取引業者が行う一団の宅地建物の分譲の代理又は媒介をする場合に設置する案内所が定められており、この場合は、代理又は媒介を行う宅地建物取引業者が届出をするが、売主業者自身も当該案内所で売買契約の申込みを受ける場合は、売主業者も届出をする。","届出をすべき場所として、宅地建物取引業者が業務に関し展示会その他これに類する催しを実施する場所が定められているが、その催しを開始する10日前までに、実施場所を管轄する都道府県知事に届け出なければならず、免許を受けた国土交通大臣又は都道府県知事に届け出る必要はない。"],"answer":4},{"id":"R6-40","year":"R6","q":40,"category":"宅建業法","question":"宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合、宅地建物取引業法第37条の規定により当該貸借の契約当事者に対して交付すべき書面に必ず記載しなければならない事項の組合せとして正しいものは次の1から4のうちどれか。\nア 当該建物に係る租税その他の公課の負担\nイ 敷金や共益費など借賃以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的\nウ 損害賠償額の予定又は違約金に関する定めがあるときは、その内容\nエ 建物の構造耐力上主要な部分又は雨水の侵入を防止する部分として国土交通省令で定めるものの状況","choices":["ア、イ","イ、ウ","ウ、エ","ア、エ"],"answer":2},{"id":"R6-41","year":"R6","q":41,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア 中古マンションの一室の売買の媒介を行う場合、抵当権が設定されていても、契約日までにその登記が抹消される予定であるときは、当該抵当権の内容について説明しなくてもよい。\nイ 宅地の貸借の媒介を行う場合、借地権の存続期間を50年とする賃貸借契約において、当該契約終了時における当該宅地の上の建物の取壊しに関する事項を定めようとするときは、その内容を説明しなければならない。\nウ 建物の貸借の媒介を行う場合、当該建物が住宅の品質確保の促進等に関する法律第5条第1項に規定する住宅性能評価を受けた新築住宅であるときは、その旨を説明しなければならない。\nエ 宅地の売買の媒介を行う場合、当該宅地が急傾斜地の崩壊による災害の防止に関する法律第3条の規定に基づく急傾斜地崩壊危険区域内にあることは説明しなければならないが、当該区域内における行為の制限の概要については説明しなくてもよい。","choices":["一つ","二つ","三つ","なし"],"answer":1},{"id":"R6-42","year":"R6","q":42,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定及び「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、誤っているものはどれか。","choices":["宅地建物取引業者は、宅地建物取引業に係る契約の締結の勧誘をするに際し、宅地建物取引業者の相手方等に対し、利益を生ずることが確実であると誤解させるべき断定的判断を提供する行為をしてはならない。","宅地建物取引業者は、宅地又は建物の売買の契約の締結の勧誘をするに際し、宅地建物取引業者の相手方等に対し、宅地又は建物の引渡しの時期について故意に不実のことを告げた場合であっても、契約が成立したときに宅地建物取引業法第37条の規定により交付すべき書面に当該事項を正確に記載すればよい。","「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、売買取引の対象となる居住用不動産において、自然死や日常生活の中での不慮の死が発生した場合であっても、過去に人が死亡し、長期間にわたって人知れず放置されたこと等に伴ういわゆる特殊清掃や大規模リフォーム等が行われていなければ、宅地建物取引業者は、原則として、買主に対してこれを告げなくてもよい。","「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、賃貸借取引の対象となる居住用不動産において、自然死や日常生活の中での不慮の死以外の死が発生した場合であっても、特段の事情がない限り、当該死が発覚してから概ね3年間を経過した後は、宅地建物取引業者は、原則として、借主に対してこれを告げなくてもよい。"],"answer":2},{"id":"R6-43","year":"R6","q":43,"category":"宅建業法","question":"宅地建物取引士の登録及び宅地建物取引士証に関する次の記述のうち、誤っているものはどれか。","choices":["宅地建物取引士の登録を受けている者は、宅地建物取引士証の交付を受けていない場合でも、その住所に変更があれば、登録を受けている都道府県知事に変更の登録を申請しなければならない。","宅地建物取引士は、宅地建物取引士の信用又は品位を害するような行為をしてはならず、この行為には宅地建物取引士としての職務に必ずしも直接関係しない行為や私的な行為も含まれる。","宅地建物取引士は、取引の関係者から請求があったときは、宅地建物取引士証を提示しなければならないが、その際、個人情報保護の観点から宅地建物取引士証の住所欄にシールを貼った上で提示することが認められている。","宅地建物取引士証に記載される宅地建物取引士の氏名については現姓を用いなければならず、旧姓を併記することは認められていない。"],"answer":4},{"id":"R6-44","year":"R6","q":44,"category":"宅建業法","question":"宅地建物取引業者Ａが宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。","choices":["Ａは、建築工事完了前の建物の売買契約を媒介したときに、37条書面に記載する当該建物を特定するために必要な表示について、宅地建物取引業法第35条の規定に基づく重要事項の説明において使用した図書を交付することによって行った。","Ａは、貸主Ｂと借主Ｃとの間で締結された建物の賃貸借契約を媒介したときに、借賃の額、支払時期及び支払方法について定められていたが、ＢとＣの承諾を得たので、37条書面に記載しなかった。","Ａは、宅地建物取引業者Ｄと宅地建物取引業者Ｅとの間で締結された宅地の売買契約を媒介したときに、37条書面に当該宅地の引渡しの時期を記載しなかった。","Ａが建物の売買契約を買主として締結した場合に、売主Ｆに承諾を得たので、37条書面をＦに交付しなかった。"],"answer":1},{"id":"R6-45","year":"R6","q":45,"category":"宅建業法","question":"特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金（以下この問において「保証金」という。）の供託又は住宅販売瑕疵担保責任保険契約（以下この問において「保険契約」という。）の締結に関する次の記述のうち、正しいものはどれか。","choices":["自ら売主として宅地建物取引業者ではない買主に引き渡した新築住宅の戸数が、基準日前10年間に10戸あるが、当該基準日前1年間は0戸である場合、当該売主である宅地建物取引業者は、当該基準日に係る保証金の供託又は保険契約の締結の状況について届出を行う必要はない。","自ら売主として新築住宅を宅地建物取引業者ではない買主に引き渡した宅地建物取引業者は、基準日に係る保証金の供託及び保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して50日を経過した日以後においては、新たに自ら売主となる新築住宅の売買契約を締結してはならない。","保険契約は、新築住宅の引渡し時から有効でなければならないが、買主が当該住宅の引渡し時から10年以内に当該住宅を転売した場合、当該保険契約は解除される。","自ら売主として宅地建物取引業者ではない買主に新築住宅を引き渡した宅地建物取引業者が、保証金を供託する場合、当該住宅の床面積が25m2以下であるときは、新築住宅の合計戸数の算定に当たって、3戸をもって1戸と数えることになる。"],"answer":2},{"id":"R6-46","year":"R6","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。","choices":["証券化支援業務（買取型）において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する当該住宅の改良に必要な資金は含まれない。","機構は、地震に対する安全性の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。","機構は、民間金融機関による住宅資金の供給を支援するため、民間金融機関が貸し付けた住宅ローンについて、住宅融資保険を引き受けている。","機構は、住宅のエネルギー消費性能（建築物のエネルギー消費性能の向上等に関する法律第2条第1項第2号に規定するエネルギー消費性能をいう。）の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。"],"answer":1},{"id":"R6-47","year":"R6","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。","choices":["新築分譲住宅の予告広告（価格が確定していないため、直ちに取引することができない物件について、取引開始時期をあらかじめ告知する広告）を新聞折込チラシを用いて行った場合は、本広告を新聞折込チラシ以外の媒体を用いて行ってはならない。","土地取引において、当該土地上に廃屋が存在するとき、実際の土地を見れば廃屋が存在することは明らかであるため、廃屋が存在する旨を明示する必要はない。","交通の利便性について、電車、バス等の交通機関の所要時間を表示する場合は、朝の通勤ラッシュ時の所要時間ではなく、平常時の所要時間を明示しなければならない。","居住の用に供されたことはないが建築後1年以上経過した一戸建て住宅について、新築である旨を表示することはできない。"],"answer":4},{"id":"R6-48","year":"R6","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["令和6年地価公示（令和6年3月公表）によれば、令和5年1月以降の1年間の地価の動向は、三大都市圏・地方圏ともに、全用途平均・住宅地・商業地のいずれも3年連続で上昇した。","令和4年度宅地建物取引業法の施行状況調査（令和5年10月公表）によれば、令和5年3月末における宅地建物取引士の総登録者数は、200万人を超えている。","令和5年住宅・土地統計調査住宅数概数集計（速報集計）結果（令和6年4月公表）によれば、令和5年10月1日現在における賃貸・売却用及び二次的住宅（別荘など）を除く空き家は、900万戸に達している。","建築着工統計（令和6年1月公表）によれば、令和5年の新設住宅着工戸数は90万戸を超え、3年連続で増加した。"],"answer":1},{"id":"R6-49","year":"R6","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["30度以上の角度をなす斜面を背後に控える宅地は、崖面への保護対策を講じるか、擁壁を設けるなどの必要がある。","高さ2m以下の擁壁であれば、水抜き孔を有しなくても、地震による被害が生じることはない。","重力式擁壁は、擁壁の自重により、背面からの土圧に抵抗するコンクリート構造物である。","工場跡地や埋立地などでは、重金属や揮発性有機化合物などによる土壌汚染が問題となることがある。"],"answer":2},{"id":"R6-50","year":"R6","q":50,"category":"免除科目","question":"建物の構造に関する次の記述のうち、最も不適当なものはどれか。","choices":["ラーメン構造は、柱を鉛直方向、梁を水平方向に配置し、接合部を強く固めた構造である。","ブレース構造は、柱や梁などで構成された四角形の対角線上に部材を入れた構造である。","ブレース構造は、骨組全てに用いることが多く、ラーメン構造など他の構造と併用することはない。","壁式構造は、板状の壁と床を箱形に組み、建物とする構造で、原則として、柱や梁は用いない。"],"answer":3},{"id":"R7-01","year":"R7","q":1,"category":"権利関係","question":"所有者ＡがＢに甲土地を売却し、その後にＢがＣに甲土地を売却した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、この問において、Ｃは背信的悪意者ではないものとする。","choices":["甲土地の所有権登記がＡの名義のままであったとしても、Ｂは、Ｃに甲土地を売却した後は、Ａに対して自己に甲土地の所有権移転登記をするよう請求することはできない。","Ｃは、甲土地の所有権移転登記を備えなければ、Ａに対して自己が所有者であることを主張することができない。","ＡＢ間の売買契約が、ＢＣ間の売買契約締結よりも前にＡにより解除されていた場合、又は、ＢＣ間の売買契約締結後にＡにより解除された場合のいずれの場合であっても、Ｃは、甲土地の所有権移転登記を備えれば、Ａに対して自己の所有権を主張することができる。","ＡＢ間の売買契約が、ＢＣ間の売買契約よりも前にＢの強迫を理由として取り消されていた場合、又は、ＢＣ間の売買契約締結後にＢの強迫を理由として取り消された場合のいずれの場合であっても、Ｃは、Ｂの強迫につき善意でかつ過失がなければ、Ａに対して自己の所有権を主張することができる。"],"answer":3},{"id":"R7-02","year":"R7","q":2,"category":"権利関係","question":"個人であるＡが、①賃貸人Ｂと賃借人Ｃとの間の期間を2 年とする居住用甲建物の賃貸借契約に基づくＣの一切の債務の連帯保証契約をＢと締結した場合、②売主Ｄと買主Ｅとの間の居住用乙建物の売買契約に基づく代金支払債務の保証契約をＤと締結した場合、に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["①の連帯保証契約は書面によってしなければ無効であるのに対し、②の保証契約は書面によらず、口頭で契約を締結しても有効である。","①のＢがＡに対して連帯保証債務の履行を請求してきた場合には、ＡはまずＣに請求するように主張できるのに対し、②のＤがＡに対して保証債務の履行を請求してきた場合には、ＡはまずＥに請求するように主張することはできない。","①の連帯保証契約は保証の限度額である極度額を定めなければ無効であるのに対し、②の保証契約は極度額を定める必要はない。","①も②もＡが主たる債務者Ｃ及びＥの委託を受けて保証した場合において、Ａが債権者Ｂ及びＤに対して主たる債務の履行状況に関する情報を提供するよう請求したときは、①のＢは、これらの情報を、遅滞なく、Ａに提供しなければならないのに対し、②のＤは、守秘義務を理由にこれらの情報の提供を拒否することができる。"],"answer":3},{"id":"R7-03","year":"R7","q":3,"category":"権利関係","question":"意思表示に関する次の記述のうち、民法の規定によれば、誤っているものはいくつあるか。\nア 表意者が真意でないことを知ってした意思表示は無効であるが、相手方がその意思表示が表意者の真意ではないことを知らなければ、知らないことにつき過失があっても、当該意思表示は有効となる。\nイ 相手方と通じてした虚偽の意思表示は無効であり、第三者がその虚偽表示につき善意であっても、過失があれば、当該第三者にその無効を対抗することができる。\nウ 意思表示は、当該意思表示に対応する意思を欠く錯誤に基づくものであって、その錯誤が法律行為の目的及び取引上の社会通念に照らして重要なものであるときは、無効であるが、その錯誤につき善意でかつ過失がない第三者には、その無効を対抗することができない。\nエ 詐欺による意思表示は取り消すことができるが、その詐欺につき善意でかつ過失がない取消し前の第三者には、その取消しを対抗することができない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R7-04","year":"R7","q":4,"category":"権利関係","question":"ＡがＢから弁済の期限の定めなく金1,000万円を借り入れる金銭消費貸借契約（以下この問において「本件契約」という。）における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["Ａは、本件契約におけるＡの債務を担保するために、Ａが所有する不動産に対し、Ｂのために、抵当権を設定することはできるが、質権を設定することはできない。","Ａが本件契約に基づく債務の弁済を怠ったときに、ＢがＡから預かっている動産を占有している場合には、Ｂは当該動産の返還時期が到来しても弁済を受けるまでその動産に関して留置権を行使することができる。","Ａが本件契約に基づく債務の弁済を怠った場合には、ＢはＡの総財産に対して先取特権を行使することができる。","Ａが、期限が到来しているＢの悪意による不法行為に基づく金1,000万円の損害賠償請求債権をＢに対して有している場合、Ａは本件契約に基づく返還債務をＢに対する当該損害賠償請求債権で相殺することができる。"],"answer":4},{"id":"R7-05","year":"R7","q":5,"category":"権利関係","question":"Ａの子がＢであり、Ｂの子がＣであり、ＣがＡの直系卑属である場合において、民法の規定によれば、次のアからエまでの記述のうち、Ａが死亡した際にＣがＢを代襲してＡの相続人となるときを全て掲げたものはどれか。\nア Ａが死亡する以前にＢが死亡したとき\nイ Ｂが相続に関するＡの遺言書を偽造して相続権を失ったとき\nウ ＢがＡによって相続人から廃除されて相続権を失ったとき\nエ Ｂが相続放棄をしたとき","choices":["ア、エ","イ、ウ","ア、ウ、エ","ア、イ、ウ"],"answer":4},{"id":"R7-06","year":"R7","q":6,"category":"権利関係","question":"Ａが所有している甲土地についての物権変動に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["Ｂが甲土地をＡに無断でＣに売却し、その後、ＢがＡから甲土地を購入した場合、Ｃは、Ｂから甲土地を購入した時点にって甲土地の所有権を取得する。","Ｄが甲土地につき、Ａに無断でＤへの虚偽の所有権の移転の登記をした上で、甲土地をＥに売却してその旨の登記をした場合において、その後、ＡがＦに甲土地を売却したときは、Ｆは、Ｅに対し、甲土地の所有権を主張することができる。","Ｇが甲土地の所有権を時効取得した場合、Ｇはその後にＡを単独相続したＨに対して、登記を備えていなくても、甲土地の所有権を主張することができる。","Ａが甲土地上の立木の所有権を留保して甲土地をＪに売却し、その後、ＪがＫに甲土地及びその上の立木を売却した場合には、Ａは、Ｋに対し、立木の所有権の留保につき登記又は明認方法を備えない限り、立木の所有権を主張することができない。"],"answer":1},{"id":"R7-07","year":"R7","q":7,"category":"権利関係","question":"Ａは自己の所有する甲建物を事務所としてＢに賃貸し（以下この問において「本件契約」という。）、その後、本件契約の期間中に甲建物の屋根に雨漏りが生じたため、ＣがＢから甲建物の屋根の修理を請け負い、Ｃによる修理が完了した。この場合における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["ＢがＣに修理代金を支払わないまま無資力となり、賃料を滞納して本件契約が解除されたことにより甲建物はＡに明け渡された。この場合、ＣはＡに対して、事務管理に基づいて修理費用相当額の支払を求めることはできない。","ＢがＣに修理代金を支払ったとしても、本件契約において、Ａの負担に属するとされる甲建物の屋根の修理費用について直ちに償還請求することができる旨の特約がない限り、契約終了時でなければ、ＢはＡに対して償還を求めることはできない。","ＢがＣに修理代金を支払わない場合、Ｃは、Ｂが占有する甲建物につき、当然に不動産工事の先取特権を行使することができる。","ＢがＣに修理代金を支払わないまま無資力となり、賃料を滞納して本件契約が解除されたことにより甲建物はＡに明け渡された。本件契約において、ＢがＡに権利金を支払わないことの代償として、甲建物の修理費用をＢの負担とする旨の特約が存し、当該屋根の修理費用と権利金が相応していたときであっても、ＣはＡに対して、不当利得に基づいて修理費用相当額の支払を求めることができる。"],"answer":1},{"id":"R7-08","year":"R7","q":8,"category":"権利関係","question":"Ａ、Ｂ及びＣがそれぞれ 3 分の 1 の持分の割合で甲土地を共有している場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、甲土地を分割しない旨の契約は存在しないものとする。","choices":["甲土地につき無権利のＤが、自己への虚偽の所有権移転登記をした場合には、Ａは、単独で、Ｄに対し、その所有権移転登記の抹消を求めることができる。","Ａが甲土地についての自己の持分を放棄した場合には、その持分は国庫に帰属する。","Ａが死亡し、Ｅ及びＦが相続した場合には、Ｂ及びＣは、Ａの遺産についての遺産分割がされる前であっても、Ｅ及びＦに対して共有物分割の訴えを提起することができる。","ＡがＢ及びＣに無断で甲土地を占有している場合であっても、Ｂは、Ａに対し、当然には自己に甲土地を明け渡すように求めることができない。"],"answer":2},{"id":"R7-09","year":"R7","q":9,"category":"権利関係","question":"連帯債務者の一人について生じた次の事由のうち、民法の規定によれば、他の連帯債務者に対して効力が生じないものとして正しいものはどれか。なお、この問において、連帯債務者の一人について生じた事由が他の連帯債務者に対して効力が生じる旨の別段の意思表示はないものとする。","choices":["債権者がした連帯債務者の一人に対する履行の請求","連帯債務者の一人と債権者との間の混同","連帯債務者の一人が債権者に対して債権を有する場合において、その連帯債務者がした相殺の援用","連帯債務者の一人と債権者との間の更改"],"answer":1},{"id":"R7-10","year":"R7","q":10,"category":"権利関係","question":"Ａを売主、Ｂを買主とする甲土地の売買契約による甲土地の引渡し後に、目的物の品質に関して契約の内容に適合しない土壌汚染が見つかった場合の売主の担保の責任（以下この問において「契約不適合責任」という。）に基づく損害賠償に関する次の記述のうち、民法の規定、宅地建物取引業法の規定及び判例によれば、誤っているものはどれか。","choices":["Ｂは、甲土地の引渡しの日から11年が経過した時点で甲土地の土壌汚染を発見し、発見した時点から 1 年以内にＡに通知した。Ａが当該土壌汚染があることを重大な過失なく知らなかった場合、Ａが宅地建物取引業者であるか否かにかかわらず、Ｂは損害賠償を請求することはできない。","甲土地の引渡しの日から 3 年以内に契約不適合の通知をしなければ売主は契約不適合責任を負わない旨の特約があり、Ｂが引渡しの日から 4 年が経過した時点で土壌汚染を発見して直ちにＡに通知した。Ａが当該土壌汚染があることを重大な過失なく知らなかった場合、Ａが宅地建物取引業者であるか否かにかかわらず、Ｂは損害賠償を請求することはできない。","甲土地の引渡しの日から 1 年以内に契約不適合の通知をしなければ売主は契約不適合責任を負わない旨の特約があり、Ａは甲土地に土壌汚染があることを売買契約締結時点で知っていて告げていなかった。Ｂが引渡しの日から 3 年が経過した時点で当該土壌汚染を発見して直ちにＡに通知した場合、Ａが宅地建物取引業者であるか否かによって、Ｂが損害賠償を請求できるか否かの結論が異なる。","売主は契約不適合責任を一切負わない旨の特約があり、Ｂは引渡しの日から1 年が経過した時点で土壌汚染を発見して直ちにＡに通知した。Ａが当該土壌汚染があることを重大な過失なく知らなかった場合、Ａが宅地建物取引業者であるか否かによって、Ｂが損害賠償を請求できるか否かの結論が異なる。"],"answer":3},{"id":"R7-11","year":"R7","q":11,"category":"権利関係","question":"ＡがＢとの間で、Ａ所有の甲土地につき建物の所有を目的として一時使用目的ではない賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。","choices":["甲土地にＢが賃借権の登記をしなくても、Ｂの配偶者であるＣを所有者として登記されている建物が甲土地上に存在する場合には、甲土地がＡからＤに売却されても、ＢはＤに対して甲土地に賃借権を有していることを主張できる。","本件契約の存続期間が50年であり、契約の更新及び建物の築造による存続期間の延長がない旨を定める場合、一定期間地代を減額せず、その期間は地代の減額請求ができない旨の特約を有効に定めることができる。","本件契約が専らＢの事業の用に供する建物の所有を目的とし、存続期間が50年である場合、契約の更新及び建物の築造による存続期間の延長がない旨、並びにＢが借地借家法第13条の規定による建物の買取りの請求をしない旨の特約を書面で有効に定めることができる。","本件契約が公正証書によって行われていれば、専らＢの居住の用に供する建物の所有を目的とし、存続期間を20年と定めていても、Ａは正当事由があれば、20年が経過した時点で遅滞なく異議を述べて更新を拒絶することができる。"],"answer":3},{"id":"R7-12","year":"R7","q":12,"category":"権利関係","question":"Ａを賃貸人、Ｂを賃借人とする甲建物の賃貸借契約（定期建物賃貸借契約及び一時使用目的の建物の賃貸借契約を除く。以下この問において「本件契約」という。）に関する次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか。","choices":["本件契約が期間の定めがないものである場合において、Ａ又はＢから相手方に対して解約の申入れをしたときは、当該申入れの日から 6 か月を経過することによって、本件契約は終了する。","本件契約が期間を 2 年とするものである場合において、Ａ及びＢのいずれも期間の満了の1 年前から 6 か月前までの間に相手方に対して更新をしない旨の通知をしなかったときは、本件契約は、期間を 2 年として、従前の契約と同一の条件で更新されたものとみなされる。","ＡＢ間において、造作買取請求権は行使しない旨の特約があった場合、この特約は有効である。","本件契約が借地借家法第39条に規定する取壊し予定の建物の賃貸借であり、甲建物を取り壊すこととなる時に本件契約が終了する旨の特約を定める場合、本件契約は、公正証書によってしなければならない。"],"answer":3},{"id":"R7-13","year":"R7","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。","choices":["共用部分は、原則として区分所有者全員の共有に属するが、規約で別段の定めをすることを妨げず、管理者であっても、規約に特別の定めがあるときは、共用部分を所有することができる。","共用部分の持分の割合について、各共有者の共用部分の持分は、規約で別段の定めをしない限り、その有する専有部分の床面積の割合による。","集会の議事については、議長は、書面又は電磁的記録により、議事録を作成しなければならず、当該議事録には議事の経過の要領及びその結果を記載し、又は記録しなければならないとされているが、当該議事録が書面で作成されているときは、議長及び集会に出席した区分所有者全員がこれに署名しなければならない。","区分所有者が、建物の保存に有害な行為その他建物の管理又は使用に関し区分所有者の共同の利益に反する行為をした場合又はその行為をするおそれがある場合には、他の区分所有者の全員又は管理組合法人は、区分所有者の共同の利益のため、その行為を停止し、その行為の結果を除去し、又はその行為を予防するため必要な措置を執ることを請求することができる。"],"answer":3},{"id":"R7-14","year":"R7","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。","choices":["登記官は、一筆の土地の一部が別の地目となったときであっても、職権でその土地の分筆の登記をすることができない。","登記事項証明書の交付の請求は、請求情報を電子情報処理組織を使用して登記所に提供する方法によりすることができる。","権利に関する登記の申請は、法令に別段の定めがある場合を除き、登記権利者及び登記義務者が共同してしなければならない。","建物の合併の登記は、表題部所有者又は所有権の登記名義人以外の者は、申請することができない。"],"answer":1},{"id":"R7-15","year":"R7","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、誤っているものはどれか。","choices":["風致地区は、都市の風致を維持するため定める地区であり、当該地区内における建築物の建築について、政令の定める基準に従い、地方公共団体の条例で、都市の風致を維持するため必要な規制をすることができる。","特定街区は、市街地の整備改善を図るため街区の整備又は造成が行われる地区について、その街区内における建築物の容積率並びに建築物の高さの最高限度及び壁面の位置の制限を定める街区である。","近隣商業地域は、近隣の住宅地の住民に対する日用品の供給を行うことを主たる内容とする商業その他の業務の利便を増進するため定める地域である。","生産緑地地区は、農業の利便の増進を図りつつ、これと調和した低層住宅に係る良好な住居の環境を保護するため定める地区である。"],"answer":4},{"id":"R7-16","year":"R7","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["市街化調整区域のうち開発許可を受けた開発区域以外の区域において行う、学校教育法に規定する学校の新築については、都道府県知事の許可が不要である。","開発行為とは、主として建築物の建築又は特定工作物の建設の用に供する目的で行う土地の区画形質の変更をいい、ゴルフコースの建設は開発行為にはあたらない。","区域区分が定められていない都市計画区域において、商業施設の建築の用に供する目的で行う4,000 m2の開発行為は都道府県知事の許可が不要である。","自己の居住の用に供する住宅の建築を目的として行う開発行為以外の開発行為にあっては、原則として開発区域内に建築基準法に規定する災害危険区域内の土地を含んではならない。"],"answer":4},{"id":"R7-17","year":"R7","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、誤っているものはどれか。","choices":["建築主は、建築確認が必要な建築物を建築しようとする場合は、当該建築物の計画を建築基準法令の規定に適合させるだけでなく、建築基準法令の規定以外の宅地造成及び特定盛土等規制法などの建築基準関係規定にも適合するものであることについて確認を受ける必要がある。","建築主は、 2 階建ての木造住宅を新築しようとする場合は、当該工事に着手する前に、その計画が建築基準関係規定に適合するものであることについて、確認を受け、確認済証の交付を受ける措置が必要となるが、当該住宅の大規模の修繕をしようとする場合には、当該措置は不要である。","延べ面積が1,000 m2を超える木造建築物は、その外壁及び軒裏で延焼のおそれのある部分を防火構造としなければならない。","高さ 1m以下の階段の部分には、手すりを設けなくてもよい。"],"answer":2},{"id":"R7-18","year":"R7","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["都市再生特別地区内においては、建築物の容積率、建率及び建築面積は当該地区に関する都市計画において定められた内容に適合するものでなければならないが、その高さは法第56条の高さの制限に関する規定に適合させる必要がある。","2 階建てかつ床面積1,000 m2の飲食店は、第一種低層住居専用地域、第二種低層住居専用地域、第一種中高層住居専用地域、工業専用地域及び田園住居地域に建築することができない。","特定行政庁による認可を受けて公告された建築協定は、その後、当該協定の土地の所有者等の全員で合意したときに限り、その公告のあった日以後において当該建築協定区域内の土地の所有者等となった者に対しても効力が及ぶこととなる。","建築物のエネルギー消費性能の向上のため必要な外壁等に関する工事を行う場合、公益性が高いことから特定行政庁の許可を受けることなく、法第52条の規定による容積率の限度を超えることができる。"],"answer":2},{"id":"R7-19","year":"R7","q":19,"category":"法令上の制限","question":"宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市及び中核市にあってはその長をいうものとし、地方自治法に基づく施行時特例市に係る経過措置については考慮しないものとする。","choices":["工事主は、特定盛土等規制区域内において行われる特定盛土等又は土石の堆積に関する政令で定める規模の工事の許可の申請をするときは、あらかじめ、主務省令で定めるところにより、特定盛土等又は土石の堆積に関する工事の施行に係る土地の周辺地域の住民に対し、説明会の開催その他の当該特定盛土等又は土石の堆積に関する工事の内容を周知させるため必要な措置を講じなければならない。","宅地造成等工事規制区域内の土地の工事主又は工事施行者は、宅地造成等に伴う災害が生じないよう、その土地を常時安全な状態に維持するように努めなければならない。","都道府県知事は、宅地造成等工事規制区域内の土地について、宅地造成等に伴う災害の防止のために必要があると認める場合においては、その土地の所有者、管理者、占有者、工事主又は工事施行者に対して、擁壁等の設置等の必要な措置をとることを勧告することができる。","宅地造成等工事規制区域内において行われる宅地造成等に関する工事の許可を受けた工事主は、当該許可に係る土地の見やすい場所に、主務省令で定めるところにより、氏名又は名称その他の主務省令で定める事項を記載した標識を掲げなければならない。"],"answer":2},{"id":"R7-20","year":"R7","q":20,"category":"法令上の制限","question":"土地区画整理法に関する次の記述のうち、誤っているものはどれか。","choices":["個人施行者は、その者以外に換地計画に係る区域内の宅地を所有する者（当該宅地の所有権について施行者に対抗することができない者を除く。）がある場合においては、換地計画について認可を申請しようとするときは、これらの者の同意を得なければならない。","国又は地方公共団体の所有する土地以外であって道路の用に供している土地については、土地区画整理事業の施行により当該道路に代わるべき道路が設置され、その結果、当該道路が廃止される場合等においては、換地計画において、当該土地について換地を定めないことができる。","従前の宅地の所有者及びその宅地について使用収益権を有する者が、仮換地について使用又は収益を開始することができる日を別に定められたため、従前の宅地について使用し、又は収益することができなくなったことにより損失を受けた場合においては、施行者は、その損失を受けた者に対して、通常生ずべき損失を補償しなければならない。","仮換地の指定があった日後、土地区画整理事業の施行による施行地区内の土地及び建物の変動に係る登記がされるまでの間は、登記の申請人が確定日付のある書類によりその指定前に登記原因が生じたことを証明した場合を除き、施行地区内の土地及び建物に関しては他の登記をすることができない。"],"answer":4},{"id":"R7-21","year":"R7","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。","choices":["市街化区域外にある農地の転用の申請に係る事業が住宅の用に供される土地の造成だけを目的としている場合、申請に係る農地の全てを住宅の用に供することが確実と認められないときには、法第 4 条第 1 項又は法第 5 条第 1 項の許可を受けることができない。","仮設工作物を設置するため、市街化区域外にある農地の所有権を取得しようとする場合には、法第 5 条第 1 項の許可を受けることができない。","農地の賃貸借は、その登記がなくても、農地の引渡しがあったときは、これをもってその後その農地について所有権を取得した第三者に対抗することができる。","法人の代表者が、その法人の業務に関し、法第4 条第 1 項又は法第 5 条第 1 項の規定に違反して農地の転用をした場合には、その代表者が罰せられるほか、その法人も300万円以下の罰金刑が科せられる。"],"answer":4},{"id":"R7-22","year":"R7","q":22,"category":"法令上の制限","question":"国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。","choices":["市街化区域内においてＡが所有する面積3,500 m2の土地について、Ｂが2,000 m2、Ｃが1,500 m2とそれぞれ分割して購入した場合、Ｂ及びＣはともに事後届出を行わなければならない。","都市計画区域外においてＤが所有する面積12,000 m2の土地について、Ｅが担保権の実行による競売を通じて所有権を取得した場合、Ｅは事後届出を行わなければならない。","Ｆが、自ら所有する市街化調整区域内の7,000 m2の土地について、宅地建物取引業者Ｇと売買契約を締結した場合には、Ｇは契約を締結した日から 1 か月以内に事後届出を行う必要がある。","市街化区域内に所在する一団の土地である甲土地（面積1,200 m2）と乙土地（面積1,300 m2）について、甲土地については売買によって所有権を取得し、乙土地については対価の授受を伴わず賃借権の設定を受けたＨは、事後届出を行う必要はない。"],"answer":4},{"id":"R7-23","year":"R7","q":23,"category":"税・その他","question":"土地の売買による所有権の移転登記等に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。","choices":["この税率の軽減措置は、地目が雑種地となっている土地の売買による所有権の移転登記についても適用される。","この税率の軽減措置の適用対象となる土地は、その価額が1,000万円未満のものに限られる。","この税率の軽減措置は、法人が土地の売買による所有権の移転登記を受ける場合には適用されない。","この税率の軽減措置の適用対象となる土地は、その面積が1,000 m2未満のものに限られる。"],"answer":1},{"id":"R7-24","year":"R7","q":24,"category":"税・その他","question":"固定資産税に関する次の記述のうち、正しいものはどれか。","choices":["住宅用地のうち小規模住宅用地（200 m2以下）に対して課する固定資産税の課税標準は、当該小規模住宅用地に係る固定資産税の課税標準となるべき価格の 3 分の 1 の額である。","市町村長は、納税義務者等の求めに応じ、法令で定めるところにより固定資産課税台帳を閲覧に供しなければならない。ただし、当該部分に記載されている住所が明らかにされることにより人の生命又は身体に危害を及ぼすおそれがある場合、当該住所を削除する等の措置を講じたもの又はその写しを閲覧に供することができる。","市町村は、土地、家屋又は償却資産に対して課する固定資産税額が、土地にあっては30万円、家屋にあっては20万円、償却資産にあっては150万円に満たない場合においては、原則として固定資産税を課することができない。","固定資産税は、固定資産の所有者として、登記簿又は土地補充課税台帳若しくは家屋補充課税台帳に所有者として登記又は登録されている者に対して課されるため、所有者として登記又は登録されている個人が賦課期日前に死亡している場合、固定資産課税台帳に新たな所有者が登録されていなければ何人に対しても固定資産税を課することはできない。"],"answer":2},{"id":"R7-25","year":"R7","q":25,"category":"税・その他","question":"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。","choices":["価格形成要因のうち個別的要因とは、一般経済社会における不動産のあり方及びその価格の水準に影響を与える要因をいい、自然的要因、社会的要因、経済的要因及び行政的要因に大別される。","収益還元法は、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効な手段であり、自用の不動産であっても賃貸を想定することにより適用される。","原価法における減価修正の方法としては、耐用年数に基づく方法と、観察減価法の2 つの方法があり、これらは併用するものとする。","対象建築物に関する工事が完了していない場合でも、当該工事の完了を前提として鑑定評価を行うことがある。"],"answer":1},{"id":"R7-26","year":"R7","q":26,"category":"宅建業法","question":"宅地建物取引業者Ａ（消費税課税事業者）及び宅地建物取引業者Ｂ（消費税課税事業者）が受領した報酬に関するアからウの記述のうち、宅地建物取引業法の規定によれば、誤っているものを全て掲げたものは 1 から 4 のうちどれか。なお、代理、媒介に当たり、広告の依頼は行われていないものとする。\nア Ａが単独で貸主と借主の双方から店舗用建物の貸借の媒介の依頼を受け、 1 か月の借賃24万円（消費税等相当額を含まない。）、権利金1,400万円（権利設定の対価として支払われるもので、返還されないものをいい、消費税等相当額を含まない。）の賃貸借契約を成立させ、依頼者の双方からそれぞれ52万8,000円を報酬として受領したことは、宅地建物取引業法に違反する。\nイ 現に長期間にわたって居住の用、事業の用その他の用途に供されておらず、かつ将来にわたり居住の用、事業の用その他の用途に供される見込みがない宅地（1 か月の借賃 5 万円。消費税等相当額を含まない。）について、Ａは貸主から代理を依頼され、Ｂは借主から代理を依頼され、賃貸借契約が成立したので、Ａは貸主から 4 万円を、Ｂは、代理の依頼を受けるに当たって、報酬が借賃の1.1か月分を超えることについて借主から承諾を得たうえで、借主から 7 万円を報酬として受領したことは、宅地建物取引業法に違反しない。\nウ Ａは売主から媒介の依頼を、Ｂは買主から媒介の依頼を、それぞれ受けて、代金200万円（消費税等相当額を含み、土地代金は90万円である。）の土地付建物の売買契約を成立させた場合に、依頼者と宅地建物取引業者との間であらかじめ報酬の額を定めていなかったときは、売主はＡに対して少なくとも10万4,500円、買主はＢに対して少なくとも10万4,500円を支払わなければならない。","choices":["ア、イ","イ、ウ","ア、ウ","ア、イ、ウ"],"answer":4},{"id":"R7-27","year":"R7","q":27,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明及び重要事項説明書の交付に関する次の記述のうち、正しいものはどれか。ただし、説明の相手方は宅地建物取引業者ではないものとする。","choices":["宅地建物取引業者は、区分所有建物の売買の媒介を行う場合に、当該一棟の建物及びその敷地の管理が法人に委託されているときは、その委託を受けている法人の商号又は名称及び主たる事務所の所在地を説明しなければならない。","宅地建物取引業者は、自身が売主となる場合に、重要事項説明書の交付に当たり、専任の宅地建物取引士をして当該書面に記名させなければならず、また、買主にも当該書面に記名させなければならない。","宅地建物取引業者は、重要事項を説明する際には、宅地建物取引業者の事務所において行わなければならない。","宅地建物取引業者は、自身が売主となる場合であっても、買主に対して、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容を説明しなければならない。"],"answer":1},{"id":"R7-28","year":"R7","q":28,"category":"宅建業法","question":"宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。\nア 自ら売主として販売する宅地又は建物の広告に取引態様の別を明示しなかった場合は、罰則の対象とはならないが監督処分の対象となり、宅地又は建物の規模について著しく事実に相違する表示をした場合は、罰則の対象にも監督処分の対象にもなる。\nイ 自ら売主として土地付建物の売買契約を締結しようとする場合、当該土地上に建てようとする建物が建築確認申請前であっても、広告することはできるが、建築確認を受けるまで、契約を締結することはできない。\nウ 宅地建物取引業者は、自ら売主として、宅地建物取引業者である買主との間で、自ら所有しない造成前の宅地の売買契約を締結するためには、法第41条の規定による手付金等の保全措置を講じ、かつ、売主である宅地建物取引業者が当該宅地を取得する契約を締結しなければならない。\nエ 宅地建物取引業者は、宅地の売買の専属専任媒介契約を締結した場合、当該媒介契約締結の日から 5 日以内（休業日を除く。）に、当該宅地について指定流通機構に所定の事項を登録しなければならない。","choices":["一つ","二つ","三つ","なし"],"answer":2},{"id":"R7-29","year":"R7","q":29,"category":"宅建業法","question":"宅地建物取引業者Ａが宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。","choices":["Ａが媒介により事業用宅地の賃貸借契約を成立させた場合、37条書面を交付しなければならないが、契約の当事者Ｂが宅地建物取引業者であるときは、交付する必要はない。","Ａが自ら売主としてＣと既存の建物の売買契約を締結した場合、建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を37条書面に記載しなければならない。","ＡがＤを売主としＥを買主とする宅地の売買契約を媒介した場合、天災その他不可抗力による損害の負担に関する定めがないときは、定めがない旨を37条書面に記載しなければならない。","Ａが自ら売主としてＦと建物の売買契約を締結した場合、代金についての金銭の貸借のあっせんに関する定めがある場合における当該あっせんに係る金銭の貸借が成立しないときの措置については、37条書面に記載する必要はない。"],"answer":2},{"id":"R7-30","year":"R7","q":30,"category":"宅建業法","question":"いずれも宅地建物取引業者であるＡ社、Ｂ社及びＣ社（以下この問において「売主ら」という。）が、分譲マンションを共同で建築、販売することとなり、建築確認を受けた後、工事完了前にその一室を5,000万円で宅地建物取引業者ではない個人である買主に売却しようとする場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）に違反するものはいくつあるか。\nア 売主らは、共同する全社が各個に重要事項説明を実施すると、かえって買主を混乱させると考え、買主の了解を得た上で、Ａ社 1 社を幹事社とし、Ａ社の宅地建物取引士が単独で重要事項説明書に記名のうえ、買主に交付し説明を行った。\nイ 売主らは、Ａ社の事務所において買主から買受けの申込みを受け、売買契約を締結したが、売主らは当該売買契約には法第37条の 2 の規定に基づくいわゆるクーリング・オフの適用はないと判断し、クーリング・オフについて買主に告げる書面の交付は行わなかった。\nウ 売主らは、当該物件については、重要事項説明の時点では共用部分に関する規約が案であるので、買主の了解を得た上で、契約締結後に決定した規約を交付することとし、重要事項説明書への記載は省略した。\nエ 売主らは買主から手付金500万円を受領することとしたが、手付金の保全措置を講じる必要はないと判断し、手付金保全措置の概要について重要事項説明書への記載は省略した。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R7-31","year":"R7","q":31,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法により禁止されている行為が含まれているものはいくつあるか。\nア 宅地建物取引士が、マンション販売の勧誘を電話で行うにあたり、まず、契約締結について勧誘する目的である旨を告げたうえで、自分の名前は名乗らず、自身の勤務する宅地建物取引業者の名称及び免許番号を伝えたうえで勧誘を行った。\nイ 宅地建物取引業者が、賃貸マンションの媒介で入居申込者から申込みを受け付けたところ、当該マンションのオーナーからの審査回答待ちとなった。その後、入居申込者が、申込みを撤回したい旨電話で伝えたところ、当該宅地建物取引業者の従業員から声を荒げ「撤回をするなら、とりあえず事務所まで来てくれないと困る」と怒鳴られ、面会を強要された。申込者はその言動に不安を覚えたため、事務所に赴いて、申込みの撤回を申し出たところ、申込みの撤回が了承された。\nウ 宅地建物取引業者が、一時的にアルバイトを雇って、マンション販売の広告チラシの配布を行わせることとしたほか、契約書の作成業務も補助的に行わせるため、従業者証明書をその者に発行し、それらの業務を行わせた。ただし、そのアルバイトはマンション販売の広告チラシの配布の際には、従業者証明書を携帯していなかった。\nエ マンションの販売の勧誘における説明において、宅地建物取引士は、日当たりのよいマンションの購入希望者に対して、「マンション南側の月極駐車場は出来たばかりであり、将来にわたりそこにマンションなどの高層の建物が建つ予定は全くない」と説明し、購入希望者から購入申込みを受け付けた。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R7-32","year":"R7","q":32,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではないＢとの間でマンション（代金4,000万円）の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反しないものはどれか。","choices":["Ａは、建築工事完了前のマンションの売買契約を締結する際にＢから手付金200万円を受領し、さらに建築工事中に200万円を中間金として受領した後、当該手付金と中間金について法第41条に定める保全措置を講じた。","Ａは、建築工事完了後のマンションの売買契約を締結する際に、法第41条の 2 に定める保全措置を講じることなくＢから手付金400万円を受領した。","Ａは、建築工事完了前のマンションの売買契約を締結する際にＢから手付金500万円を受領したが、Ｂに債務不履行がないにもかかわらず当該手付金500万円を返還して、契約を一方的に解除した。","Ａは、建築工事完了後のマンションの売買契約を締結する際に、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を1,000万円とする特約を定めた。"],"answer":2},{"id":"R7-33","year":"R7","q":33,"category":"宅建業法","question":"宅地建物取引業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定により交付すべき書面をいうものとする。\nア 建物の賃貸借の媒介をするＡは、当該建物の引渡しの時期について、重要事項説明書に記載して説明する必要はないが、37条書面には記載しなければならない。\nイ Ａは、自ら売主として建物を売却する場合、重要事項説明書に記載しなければならない契約の解除に関する事項については、契約に定めがなくても37条書面に全て記載しなければならない。\nウ Ａは、売主を代理して、抵当権が登記されている建物を売却する場合、買主に交付する37条書面だけでなく、売主に交付する37条書面についても、当該抵当権の内容を記載しなければならない。\nエ 建物の賃貸借の媒介をするＡは、37条書面を交付するに当たり、宅地建物取引士をして、その内容を説明させなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R7-34","year":"R7","q":34,"category":"宅建業法","question":"宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア Ａ社の政令で定める使用人Ｂは、刑法第234条（威力業務妨害）の罪により、懲役 2 年、執行猶予 2 年の刑に処せられた後、Ａ社を退任し、新たにＣ社の政令で定める使用人に就任した。Ｂの執行猶予期間が満了していない場合に、Ｃ社が免許を申請しても、免許を受けることができない。\nイ Ｄ社は、不正の手段により免許を取得したことによる免許の取消処分に係る聴聞の期日及び場所が公示された日から当該処分がなされるまでの間に、宅地建物取引業法第11条の規定による廃業の届出をした。その廃業に相当の理由がなかった場合、当該公示の日の40日前にＤ社の取締役を退任したＥは、当該届出から 5 年経過しなければ、免許を申請しても免許を受けることができない。\nウ 営業に関し成年者と同一の行為能力を有しない未成年者であるＦの法定代理人であるＧが、刑法第206条（現場助勢）の罪により罰金の刑に処せられていた場合、その刑の執行が終わった日から 5 年を経過していなくても、Ｆは免許を申請すれば免許を受けることができる。\nエ Ｈ社の政令で定める使用人Ｊは、裁判所へＪ自身の破産申し立てを行った後、Ｈ社を退任し、裁判所から破産手続の開始決定を受けるまでの間に、新たにＫ社の政令で定める使用人に就任した。その後、Ｊが復権を得た場合、その日から 5 年を経過しなくても、Ｋ社が免許を申請すれば、免許を受けることができる。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R7-35","year":"R7","q":35,"category":"宅建業法","question":"宅地建物取引業者Ａ（甲県知事免許）の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、Ａは宅地建物取引業保証協会の社員ではないものとする。","choices":["免許の有効期間満了の際、Ａが営業保証金を取り戻そうとする場合には、供託した営業保証金につき還付を受ける権利を有する者に対し、 6 か月を下らない一定期間内に申し出るべき旨を官報に公告しなければならない。","Ａが営業保証金を供託する場合において、金銭と有価証券を併用して供託することができるが、従たる事務所を設置したときの営業保証金については、金銭のみをもって供託しなければならない。","Ａは、事業の開始後新たに乙県に従たる事務所を設置したときは、従たる事務所の最寄りの供託所に営業保証金を供託し、その供託物受入の記載のある供託書の写しを添付して、その旨を甲県知事に届け出なければならない。","Ａの設置した支店においてＡと宅地建物取引業に関する取引をした者は、その取引により生じた債権に関し、500万円を限度としてその債権の弁済を受ける権利を有する。"],"answer":1},{"id":"R7-36","year":"R7","q":36,"category":"宅建業法","question":"宅地建物取引業者Ａの業務に関する次の記述のうち、宅地建物取引業法の規定によれば、禁止されているものはいくつあるか。\nア Ａの従業者は、電話によりＢに投資用マンションの購入の勧誘を行った際、Ｂから「Ａから購入する意思は一切無いので、今後電話を含め勧誘はしないでほしい。」と告げられたが、その翌日、Ｂに対し、再度の勧誘を行った。\nイ 建物の購入希望者から「契約の締結についてしばらく考えさせてほしい。」という申し出があったので、Ａの従業者は、他に買い手がいないにもかかわらず、「他に買い手がいるので、今日中しか契約の締結はできない。」と当該購入希望者に告げた。\nウ Ａの従業者は、建物の購入希望者に対して、長時間にわたり契約の締結をするための勧誘を行い、当該購入希望者を困惑させた。\nエ 建物の売買を媒介しているＡの従業者は、手持ち資金がない購入希望者に対して「手付金は当社が貸し付けるので後から返してくれれば構わない。」と告げて、契約の締結を誘引したが、契約には至らなかった。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R7-37","year":"R7","q":37,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。","choices":["建物の貸借の媒介を行う場合、当該建物が都市計画法の準防火地域内にあり、建築基準法第61条第 1 項に基づく建物の構造に係る制限があるときは、その概要を説明しなければならない。","マンションの分譲を行う場合、建物の区分所有等に関する法律第2 条第 3 項に規定する専用部分の用途その他の利用の制限に関する規約の定めが案の段階であるときは、説明する必要はない。","建物の貸借の媒介を行う場合、借賃以外に授受される金銭の額、授受の目的及び保管方法を説明しなければならない。","鉄筋コンクリート造の既存の共同住宅の販売を行う場合、宅地建物取引業法第34条の 2第 1 項第 4 号に規定する建物状況調査を 1 年 6 か月前に実施したときは、建物状況調査を実施したこと、その結果の概要について説明しなくてはならない。"],"answer":4},{"id":"R7-38","year":"R7","q":38,"category":"宅建業法","question":"宅地建物取引業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。\nア Ａは、宅地又は建物の売買に関する広告をする際に取引態様の別を明示した場合、当該広告を見た者から売買に関する注文を受けたときは、改めて取引態様の別を明示する必要はない。\nイ Ａは、宅地の売買に関する広告をするに当たり、当該宅地の形質について、実際のものよりも著しく優良であると人を誤認させる表示をした場合、当該宅地に関する注文がなく、売買が成立しなかったときであっても、監督処分及び罰則の対象となる。\nウ Ａは、複数の区画がある宅地の売買について、数回に分けて広告をする予定でいる場合、最初に行う広告に取引態様の別を明示すれば足り、それ以降は明示する必要はない。\nエ Ａは、建物の貸借の媒介において、依頼者の依頼によらない広告をした場合、国土交通大臣の定める報酬限度額となる媒介報酬のほか、当該広告の料金に相当する額を受領できる。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R7-39","year":"R7","q":39,"category":"宅建業法","question":"宅地建物取引業者Ａが、ＢからＢ所有の中古住宅の売却について媒介の依頼を受けた場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["ＡがＢとの間で専属専任媒介契約を締結し、Ｂから「売り出し中であることを秘密にしておきたいので指定流通機構への登録はしないでほしい」旨の申出があった場合、Ａは、そのことを理由に登録をしなかったとしても法に違反しない。","Ａは、Ｂとの間で有効期間を 1 か月とする専属専任媒介契約を締結する際、「Ｂが媒介契約を更新する旨を申し出ない場合は、有効期間満了により自動更新するものとする」旨の特約は有効である。","ＡがＢと一般媒介契約を締結したときは、法第34条の 2 第 1 項の規定に基づき交付すべき書面に、宅地建物取引士をして記名させなければならない。","ＡがＢとの間で専属専任媒介契約を締結した場合、Ａは、当該中古住宅の取引の申込みの受付に関する状況を指定流通機構に登録しなければならない。"],"answer":4},{"id":"R7-40","year":"R7","q":40,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者Ｂの媒介により、宅地建物取引業者ではない買主Ｃとの間で宅地の売買契約を締結した場合、宅地建物取引業法第37条の 2 の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはいくつあるか。\nア Ｃは、Ｂの事務所で買受けの申込みを行い、その3 日後に、Ｃの自宅近くの喫茶店で売買契約を締結した場合、クーリング・オフによる契約の解除はできない。\nイ ＡとＣの間で、クーリング・オフによる契約の解除に関し、Ｃは契約の解除の書面をクーリング・オフの告知の日から起算して 8 日以内にＡに到達させなければ契約を解除することができない旨の特約を定めた場合、当該特約は無効である。\nウ Ｃは、Ｂからの提案によりＣの自宅で買受けの申込みを行ったが、クーリング・オフについては告げられず、その10日後に、Ａの事務所で売買契約を締結した場合、クーリング・オフによる契約の解除はできない。\nエ クーリング・オフについてＣに告げる書面には、Ａの商号又は名称及び住所並びに免許証番号を記載しなければならないが、Ｂの商号又は名称及び住所並びに免許証番号の記載は必要ない。","choices":["一つ","二つ","三つ","なし"],"answer":3},{"id":"R7-41","year":"R7","q":41,"category":"宅建業法","question":"宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者Ａ（甲県知事免許）が免許を受けてから1 年以内に事業を開始しないときは、甲県知事は免許を取り消さなければならない。","宅地建物取引業者Ｂ（甲県知事免許）が株主総会の決議により解散した場合、Ｂを代表する役員であった者は、その旨を当該解散の日から60日以内に甲県知事に届け出なければならない。","宅地建物取引業者ではないＣが甲県に本店を、乙県に支店をそれぞれ有する場合で、乙県の支店のみで新たに宅地建物取引業を営もうとするときは、Ｃは乙県知事の免許を受けなければならない。","宅地建物取引業者Ｄ（甲県知事免許）は、甲県の事務所を廃止し、乙県内で新たに事務所を設置して宅地建物取引業を営もうとする場合、甲県知事へ廃業の届出を行うとともに、乙県知事への免許換えの申請を行わなければならない。"],"answer":1},{"id":"R7-42","year":"R7","q":42,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において、宅地建物取引士は、事務の禁止の処分を受けていないものとする。\nア 二つ以上の都道府県において宅地建物取引士資格試験に合格した者は、当該試験を行った都道府県のうち試験日が遅い都道府県知事の登録以外を受けることができない。\nイ 宅地建物取引士は、その登録している勤務先の名称に変更があった場合、登録を受けている都道府県知事に、変更の登録の申請とあわせて、宅地建物取引士証の書換え交付を申請しなければならない。\nウ 宅地建物取引士は、宅地建物取引士証が効力を失ったときは、速やかに、宅地建物取引士証をその交付を受けた都道府県知事に返納しなければならない。\nエ 宅地建物取引士は、登録を受けている都道府県知事の管轄する都道府県以外の都道府県に所在する宅地建物取引業者の事務所の業務に従事しているときは、登録の移転の申請をすることができる。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R7-43","year":"R7","q":43,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア 自らを委託者とする宅地又は建物に係る信託の受益権の売主となる場合、相手方に金融商品取引法第 2 条第10項に規定する目論見書を交付し、宅地建物取引業法第35条第 3 項の規定に基づき説明すべき事項のすべてが当該目論見書に記載されているときは、重要事項説明書の交付及び説明を省略することができる。\nイ 建物の貸借の媒介を行う場合、当該建物が建築工事の完了前のものであるときは、その完了時における当該建物の主要構造部、内装及び外装の構造又は仕上げ並びに設備の設置及び構造について説明しなければならない。\nウ 建物の貸借の媒介を行う場合、敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項を説明しなければならない。\nエ 宅地の売買の媒介を行う場合、当該宅地が津波防災地域づくりに関する法律第21条第 1項により指定された津波防護施設区域内にあるときは、同法第23条第 1 項の規定による制限の概要について説明しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R7-44","year":"R7","q":44,"category":"宅建業法","question":"宅地建物取引業者は、犯罪による収益の移転防止に関する法律第2 条第 2 項の特定事業者に該当するが、宅地建物取引業者Ａの行為に関する次の記述のうち、同法に違反するものはどれか。","choices":["Ａは、土地付建物の売買を行うに際して、当該売買契約の相手方である買主が自然人であったので、氏名、住居、生年月日、取引を行う目的及び職業について、確認した。","Ａは、価額が5,000万円の土地付建物の売買を行ったとき、直ちに、一定の方法により、当該売買契約の相手方である買主の確認記録を検索するための事項、当該取引の期日及び内容その他の事項に関する記録を作成して保存していたが、当該取引の行われた日から 5 年経過したので、当年度末に当該記録を廃棄した。","Ａは、土地付建物の売買契約の相手方である買主から収受した代金について犯罪により得た収益であるとの疑いがあったので、速やかに、所定の事項を行政庁に届け出た。","Ａは、取引時確認、取引記録等の保存、疑わしい取引の届出等の措置を的確に行うため、顧客と実際に接する営業担当者に対する教育訓練を実施した。"],"answer":2},{"id":"R7-45","year":"R7","q":45,"category":"宅建業法","question":"特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金（以下この問において「保証金」という。）の供託又は住宅販売瑕疵担保責任保険契約（以下この問において「保険契約」という。）の締結に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者は、基準日から 3 週間を経過する日までの間において、当該基準日前15年間に自ら売主となる売買契約に基づき宅地建物取引業者ではない買主に引き渡した新築住宅（保険契約に係る新築住宅を除く。）について、保証金の供託をしていなければならない。","宅地建物取引業者は、自ら売主となる売買契約に基づき新築住宅を引き渡す場合だけでなく、新築住宅の売買の媒介をする場合においても、保証金の供託又は保険契約の締結をしなければならない。","保険契約を締結している宅地建物取引業者は、新築住宅を引き渡した時から10年間、構造耐力上主要な部分の瑕疵によって生じた損害についてのみ当該保険契約に係る保険金を請求することができる。","保険契約を締結している宅地建物取引業者及び当該業者が売主となっている新築住宅の買主は、指定住宅紛争処理機関に特別住宅紛争処理の申請をすることにより、当該新築住宅の売買契約に関する宅地建物取引業者と買主との間の紛争について、あっせん、調停又は仲裁を受けることができる。以下の【問 46】から【問 50】までについては、登録講習修了者としての受験申込みを受理された方は、免除となりますので、解答しないでください。"],"answer":4},{"id":"R7-46","year":"R7","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構（以下この問において「機構」という。）に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、災害により住宅が滅失した場合におけるその住宅に代わるべき住宅の建設又は購入に係る貸付金について、一定の元金返済の据置期間を設けることができる。","機構は、証券化支援事業（買取型）において、債務者又は債務者の親族が居住する住宅のみならず、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権についても譲受けの対象としている。","機構は、高齢者が自ら居住する住宅に対して行うバリアフリー工事に係る貸付けについて、貸付金の償還を高齢者の死亡時に一括して行うという制度を設けている。","機構は、市街地の土地の合理的な利用に寄与する一定の建築物の建設に必要な資金の貸付けを業務として行っている。"],"answer":2},{"id":"R7-47","year":"R7","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法（不動産の表示に関する公正競争規約を含む。）の規定によれば、正しいものはどれか。","choices":["団地（一団の宅地又は建物をいう。）と駅との間の道路距離は、取引する区画のうち駅から最も近い区画（マンション及びアパートにあっては、駅から最も近い建物の出入口）を起点として算出した数値又は駅から最も遠い区画（マンション及びアパートにあっては、駅から最も遠い建物の出入口）を起点として算出した数値のいずれかを表示しなければならない。","新築分譲マンションを販売するに当たり、住戸により管理費の額が異なる場合であって、その全ての住宅の管理費を表示することが困難であるときは、最高額のみで表示することができる。","物件の近くに新設される予定の駅等又はバスの停留所については、当該路線の運行主体が公表していれば、現に利用できるものではなくても新設予定時期を明示して表示することができる。","道路距離80 mにつき 1 分間を要するものとして、賃貸物件から最寄りの駅までの徒歩による所要時間を算出したところ15分50秒であった。この場合、当該所要時間を15分と表示してよい。"],"answer":3},{"id":"R7-48","year":"R7","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["年次別法人企業統計調査（令和 5 年度。令和 6 年 9 月公表）によれば、令和 5 年度における不動産業の営業利益は 7 兆円を超えているが、前年度に比べ減少した。","建築着工統計調査報告（令和 6 年計。令和 7 年 1 月公表）によれば、令和 6 年の新設住宅着工戸数は、持家、分譲住宅のいずれにおいても前年に比べ減少した。","令和 7 年地価公示（令和 7 年 3 月公表）によれば、令和 6 年 1 月以降の 1 年間の地価変動率は、三大都市圏平均では住宅地、商業地ともに上昇となったものの、地方圏平均では住宅地、商業地ともに下落となった。","令和 7 年版土地白書（令和 7 年 5 月公表）によれば、土地取引について、売買による所有権の移転登記の件数でその動向を見ると、令和 6 年の全国の土地取引件数は200万件を超えており、前年に比べ大きく増加した。"],"answer":2},{"id":"R7-49","year":"R7","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["川沿いの低地に堆積している川が運んだ土砂は、重い構造物を支持できる。","砂州や砂丘には、粒径のそろった砂が堆積しており、地下水位が浅い箇所では、液状化しやすくなる。","丘陵地は、山地ほど斜面の勾配がきつくなく、山地に比べ斜面崩壊は生じ難いといえる。","台地は低地より古い時代に形成された地盤であり、一般に構造物を支持できる強度を有している。"],"answer":1},{"id":"R7-50","year":"R7","q":50,"category":"免除科目","question":"建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。","choices":["鋼材の素材の鋼は、鉄や炭素などの成分を含んでおり、炭素量が多いものほど、軟質で強度が小さい。","鋼材は、熱に弱く、さびやすいので、耐火や防の処理を施す必要がある。","鋼材は、強度が高く、粘りがあり、比較的小さな断面部材で荷重に耐えることができる。","鋼材の素材の鋼の密度は、木材やコンクリートに比べて大きい。"],"answer":1}];
const EXPLANATIONS = {"R2A-01":"正解1。共有物の分割によって公道に通じない土地が生じた場合、袋地の所有者は「他の分割者の所有地のみ」を無償で通行できる(213条)。この囲繞地通行権は袋地の譲受人にも認められる。自動車通行の可否は必要性と周囲の損害を比較して判断される(判例・肢2関連)。","R2A-02":"正解4。事業用融資の借入債務を主債務とする個人保証(ケース①)では、契約締結前1か月以内に公正証書で保証意思を表示しなければ無効(465条の6)。賃借人の債務の個人根保証(ケース②)は公正証書不要だが極度額の定めが必要。保証契約はいずれも書面が必要(肢1参照)。","R2A-03":"正解2が誤り。解除に債務者の帰責事由は不要(2020年改正の重要ポイント)。債務者に帰責事由がなくても債権者は催告解除・無催告解除ができる(541条・542条)。付随的義務の不履行では原則解除できない(肢1・判例)。全部の履行拒絶の明確な意思表示があれば無催告解除可(肢4)。","R2A-04":"正解3。敷金返還債務と建物明渡債務では、明渡しが先履行(622条の2)。賃貸人は明渡しを受けるまで敷金の返還を拒める。通常損耗・経年変化は原状回復義務の対象外(肢1参照)。賃借人の側から敷金を未払賃料に充当するよう請求することはできない(肢4参照)。","R2A-05":"正解1。委任者の責めに帰すべき事由により履行の途中で委任が終了した場合、受任者は報酬「全額」を請求できる(民法536条2項の類推・648条3項との対比)。受任者は善管注意義務を負う(自己の財産と同一の注意ではない・肢2参照)。受任者の帰責事由で終了しても履行割合に応じた報酬は請求できる(肢3参照)。","R2A-06":"正解3。動機の錯誤ではなく表示内容の錯誤の問題。肢3は「贋作である」という認識を相手方に表示して契約しており(動機が表示され法律行為の基礎とされた)、かつ双方が同じ誤認をしているため取消しが認められる。肢1は重大な過失があるため原則取消し不可。肢2は単なる評価の誤りで基礎事情の表示なし。","R2A-07":"正解2が誤り。保証契約締結「後」に主たる債務が加重されても、保証人の負担は加重されない(448条2項)。特定物売買の売主の保証人は解除による原状回復義務(代金返還義務)についても責任を負う(判例・肢1)。","R2A-08":"正解2が誤り。子の代襲相続には再代襲がある(孫が死亡していればひ孫が再代襲する・887条3項)。再代襲がないのは「兄弟姉妹」の代襲(甥・姪まで)。相続回復請求権は侵害を知った時から5年(肢1)。直系尊属は親等の近い者が優先(肢3)。","R2A-09":"正解3。負担付贈与の贈与者は、その負担の限度において売主と同様の担保責任を負う(551条2項)。書面によらない贈与は履行の終わった部分については解除できず、引渡し「又は」登記のいずれかがあれば履行が終わったものとされる(判例・肢2参照)。負担付贈与では受贈者が負担を履行しない場合、贈与者は解除できる(肢4関連)。","R2A-10":"正解2が誤り。取得時効の起算点は「占有開始時」に固定され、占有者が任意に起算点を選択したり時効完成時期を later にずらすことはできない(判例)。占有の承継人は前主の占有を併せて主張できる(肢1・187条)。所有権自体は消滅時効にかからない(肢4)。","R2A-11":"正解4。借地契約の最初の更新後の存続期間は20年が最低であり、15年と定めても20年となる(借地借家法4条)。不減額特約があっても減額請求は可能(肢2関連)。債務不履行解除の場合には建物買取請求権は認められない(判例・肢3関連)。","R2A-12":"正解3。定期建物賃貸借では、床面積200㎡未満の居住用建物について、転勤・療養・親族の介護等やむを得ない事情で生活の本拠として使用困難となったときは、賃借人から中途解約の申入れができる(申入れから1か月で終了・38条7項)。賃料改定特約がない定期借家では借賃増減請求権が適用される(肢2関連)。","R2A-13":"正解4。一部共用部分は原則としてこれを共用すべき区分所有者の共有に属するが、規約で別段の定め(区分所有者全員の共有とする等)ができる。共用部分の重大変更は区分所有者及び議決権の各4分の3以上(区分所有者の定数のみ規約で過半数まで減可・肢1参照)。管理費用は持分(床面積割合)に応じて負担(肢2参照)。保存行為は各共有者が単独で可(肢3参照)。","R2A-14":"正解1。敷地権付き区分建物の表題部所有者から所有権を取得した者が保存登記(74条2項)をするには、敷地権の登記名義人の承諾が必要。仮登記に基づく本登記は利害関係第三者の承諾が必要(肢2参照)。代位申請の場合は債権者に登記識別情報は通知されない(肢3関連)。配偶者居住権は登記できる権利(肢4参照)。","R2A-15":"正解4。市街化調整区域における地区計画は、市街化区域における市街化の状況等を勘案して、地区計画の区域の周辺における市街化を促進することがない等、当該都市計画区域の計画的な市街化を図る上で支障がないように定める。事業地内の土地建物の有償譲渡には施行者への届出が必要(事前届出・肢2関連)。","R2A-16":"正解2が誤り。都市計画事業の施行として行う建築行為には、市街化調整区域内の建築制限(43条)は適用されない(開発許可制度の適用除外)。公共施設管理者との協議・同意(肢1)、公共施設の市町村帰属(肢3)、開発許可に基づく地位の承継の承認(肢4)は規定どおり。","R2A-17":"正解1。階数2・延べ面積200㎡の鉄骨造(非木造で階数2以上又は延べ200㎡超=旧3号建築物)の大規模の修繕には建築確認が必要(出題当時の規定)。天井高さが異なる場合は平均の高さによる(肢2参照)。防火壁で区画が必要なのは延べ1,000㎡超の耐火・準耐火建築物「以外」(肢3参照)。非常用昇降機は高さ31m超(肢4参照)。","R2A-18":"正解3。容積率の算定上、老人ホーム等の共用の廊下・階段の用に供する部分の床面積は延べ面積に算入しない(共同住宅と同様)。公衆便所・巡査派出所でも道路への突出建築には特定行政庁の許可が必要(肢1参照)。近隣商業地域に映画館は建築可能(肢2参照)。日影規制の測定は冬至日の午前8時〜午後4時(肢4参照)。","R2A-19":"正解3が誤り(旧宅造法)。宅地以外の土地を宅地に転用する行為自体ではなく、「切土・盛土等の宅地造成工事」を行う場合に許可が必要。造成工事を伴わない転用には許可は不要。宅地を宅地以外にする行為は宅地造成に該当しない(肢2は正しい)。工事施行者の変更は遅滞なく届出(肢4)。","R2A-20":"正解2。組合の総会の会議は、定款に特別の定めがある場合を除き、組合員の半数以上の出席がなければ開けない。設立認可申請には宅地の所有権者・借地権者それぞれの3分の2以上の同意が必要で、未登記借地権者の同意も必要(肢1参照)。賦課金は宅地の地積等を考慮して公平に定める(肢3参照)。","R2A-21":"正解1。農地法3条の許可を受けない売買契約は、所有権移転の効力を生じない(無効)。市街化区域内の転用の届出は「あらかじめ」行う必要がある(肢2は「転用した後」が誤り)。相続による取得は3条許可不要(遅滞なく届出・肢3参照)。抵当権設定は権利移動に当たらず許可不要(肢4参照)。","R2A-22":"正解1。市街化区域の事後届出の対象は2,000㎡以上であり、1,500㎡の購入には届出不要。届出期限は契約締結日から起算して2週間以内で、登記や引渡しとは無関係(肢2関連)。贈与は対価がなく届出不要(肢3参照)。","R2A-23":"正解3。国等と私人が共同作成した文書は、私人が保存する文書は国等が作成したものとみなされ非課税、国が保存する文書(私人作成とみなす)に課税。つまりC社保存分は非課税・国保存分は課税。交換契約書は高い方の価額が記載金額(肢2関連)。土地賃貸借の記載金額は権利金の額(肢4関連)。","R2A-24":"正解4。共有物の分割による不動産の取得は、分割前の持分割合を超えない限り非課税(形式的な権利移転)。税率は住宅3%・土地3%(住宅用以外の土地も3%)(肢1参照)。免税点制度はあるが「狭小な土地は課税できない」という規定ではない(肢2参照)。改築により価格が増加すれば課税される(肢3参照)。","R2A-25":"正解4が誤り。原価法は再調達原価の把握及び減価修正を適切に行える場合に有効であり、対象不動産が「土地のみ」である場合でも、造成地・埋立地など再調達原価を適切に求められるときは適用できる。「土地のみの場合には適用できない」が誤り。最有効使用の原則(肢1)、未完成建物の鑑定評価(肢2)、特殊価格(肢3)は基準どおり。","R2A-26":"正解3。個人Ｃが転売目的で競売取得した宅地を多数に分割し、代理人(業者Ｄ)を通じて不特定多数に分譲する行為は、自ら売買を業として行うものであり免許が必要(代理人を使っても本人に免許必要)。合併による免許承継はできない(肢1参照)。信託会社は免許不要(届出で足りる)(肢2参照)。同一県内の複数事務所は知事免許のまま(肢4参照)。","R2A-27":"正解2(正しいのはア・イの二つ)。ア:広告時に加え、注文を受けたら遅滞なく取引態様を明らかにする義務があり正しい。イ:誇大広告の方法に限定はなく、利用制限の一部を表示しない方法での誤認も禁止で正しい。ウ:広告の都度明示が必要なので正しい…ではなく本問では広告の都度の明示は当然で、エの「申請をした後であれば広告できる」が誤り(許可等の処分「後」でなければ広告不可)。正しいのはア・イ。","R2A-28":"正解3。重要事項説明の際は、相手方の請求がなくても宅建士証を提示しなければならない(違反は10万円以下の過料)。試験合格は一生有効で10年の期限はない(肢1参照)。宅建士証の更新に申請期間の定めはない(肢2参照)。登録移転に伴う宅建士証の交付は法定講習不要(肢4参照)。","R2A-29":"正解3(正しいのはア・イ・ウの三つ)。ア:指定流通機構への登録を証する書面は遅滞なく依頼者に引き渡す。イ:標準媒介契約約款に基づくか否かの別は媒介契約書面の記載事項。ウ:有効期間の自動更新特約は依頼者の要望に基づく場合でも不可(更新は申出による)…正しくは「自動更新特約はできない」。エ:専属専任の報告は1週間に1回以上だが、本問の記述は internal で誤りを含む。正解は三つ。","R2A-30":"正解4。事務所用建物の貸借の媒介では、双方から受ける報酬の合計が借賃1.1か月分以内であれば、依頼者それぞれからの受領割合に制限はない。居住用建物は承諾がない限り一方から0.55か月分まで(肢2関連)。店舗用で権利金330万円(税抜300万円)があれば売買代金とみなして計算できる(肢3関連)。","R2A-31":"正解1。損害賠償額の予定又は違約金に関する事項は、売買でも貸借でも定めがあれば説明が必要な重要事項。石綿の調査結果の記録は「記録されているとき」にその内容を説明すればよく、自ら調査を実施する義務はない(肢2関連)。建物状況調査は実施後1年以内のものが説明対象(肢3関連)。","R2A-32":"正解1。買主Ｂが履行に着手した後は、売主Ａからの手付倍返しによる解除はできない(買主の着手後は不可、売主自身の着手前でも同じ)。クーリング・オフの効力を制限する特約は買主に不利で無効(肢2参照)。割賦金不払いには30日以上の期間を定めた書面催告が必要(肢3参照)。完成前5,000万円の物件の保全不要枠は250万円まで(肢4関連)。","R2A-33":"正解1。貸借の媒介でも、借賃の額・支払時期・支払方法は37条書面の必要的記載事項。引渡し時期は重説書面に記載しても37条書面への記載は省略できない(肢2参照)。買主が宅建業者でも宅建士の記名は必要(肢3参照)。金銭貸借あっせんの定めがあるときは不成立時の措置を記載(肢4参照)。","R2A-34":"正解4。登録の移転とともに宅建士証の交付を申請した場合、新しい宅建士証は「従前の宅建士証の有効期間の残存期間」を期間として交付される(移転先知事による交付・法定講習不要)。合格後1年超の登録申請には登録実務講習ではなく法定講習…正しくは:1年以内なら宅建士証交付時の法定講習が免除される(肢1関連)。住所変更は変更の登録が必要(肢2参照)。","R2A-35":"正解3。還付により営業保証金に不足が生じた場合、免許権者から不足通知を受けた日から2週間以内に不足額を供託し、供託した日から2週間以内に届け出る。建設業者の請負代金債権は宅建業の取引による債権ではなく還付対象外(肢1参照)。支店новых設置分も「本店最寄りの供託所」に供託(肢2は正しい内容だが供託額・場所に注意)。本店+支店2つ=1,000万+500万×2=2,000万円(肢4関連)。","R2A-36":"正解4。保証協会は、弁済業務保証金の還付があったときは、還付額に相当する弁済業務保証金を(国土交通大臣の通知から2週間以内に)供託しなければならない。還付限度額は「営業保証金に相当する額」の範囲内(肢1関連)。還付を受けるには保証協会の認証が必要(肢2関連)。還付充当金の納付通知は社員に対して行う(肢3関連)。","R2A-37":"正解1(正しいのはウの一つ)。ア:37条書面に説明義務はなく、専任宅建士による説明も不要なので誤り。イ:供託所等に関する事項は35条の2の説明事項で37条書面の記載事項ではないので誤り。ウ:買主が宅建業者でも37条書面は遅滞なく交付しなければならず正しい。エ:引渡し時期・移転登記申請時期は必要的記載事項で業者間でも省略不可なので誤り。","R2A-38":"正解4。媒介契約の有効期間及び解除に関する事項は、一般媒介契約でも媒介契約書面の必要的記載事項。書面への記名押印は「宅建業者」のものであり宅建士のものではない(肢1参照)。価額への意見の根拠明示は口頭でも可(肢2参照)。一般媒介に指定流通機構への登録義務はない(肢3参照)。","R2A-39":"正解2。従業者証明書は業務に従事するすべての者に携帯させる義務があり、宅建士証の提示では代替できない。従業者名簿の閲覧は「取引の関係者」からの請求に応じるもの(肢1参照)。退職者の事項も最終記載から10年間保存(肢3関連)。非常勤・単に一時的に事務補助する者にも携帯させる(肢4参照)。","R2A-40":"正解2(解除できるのはア・イの二つ)。ア:喫茶店での申込み+告知日から起算して8日目に解除書面を「発送」→発信時に効力が生じるため解除できる(8日目発送はぎりぎり有効…告知日を1日目として8日以内の発信で有効)。イ:業者が履行に着手していてもクーリング・オフは可能。ウ:解除しない旨の合意は買主に不利な特約で無効だが、その場では「解除できる」。エ:専任宅建士設置の継続的業務施設は事務所等に当たり解除不可。","R2A-41":"正解3。宅建士証を亡失した者は、再交付を受けるまで重要事項説明ができない(提示すべき宅建士証がないため)。重説書面には宅建士の記名が必要で代表者名では代替不可(肢1参照)。記名する宅建士も説明する宅建士も専任である必要はない(肢2参照)。重説の場所に制限はない(肢4参照)。","R2A-42":"公式発表による複数解(1又は4のいずれも正解扱い)。肢1:種類・品質の契約不適合責任の通知期間を「引渡しから2年以上」とする特約は有効だが、本肢の「不適合を知った時から2年」とする特約は民法(知った時から1年)より買主に有利であり有効と解される。肢4:担保責任を全部免除する特約は無効となり、民法の原則に戻る(「引渡しから2年」になるのではない)。出題の文言に複数の解釈が生じたため1・4の複数解とされた。","R2A-43":"正解2。個人業者Ｂが死亡した場合、相続人Ｃは、Ｂが締結した契約に基づく取引を結了する目的の範囲内で宅建業者とみなされ、引渡し等を完了できる。執行猶予期間が満了すれば直ちに免許可(5年不要・肢1参照)。法人の破産の届出は破産管財人が行い、免許は届出時に失効(肢3参照)。復権を得れば直ちに免許可(肢4参照)。","R2A-44":"正解4が誤り。修繕積立金に関する規約の定め(案を含む)があるときは、その内容に加えて「既に積み立てられている額」も説明しなければならない。昭和56年5月末以前着工の建物は耐震診断を受けていればその内容を説明(肢1)。信託受益権の売買では相手方が宅建業者でも説明が必要な場合がある(肢3関連)。","R2A-45":"正解2。供託額が基準日において基礎額を超えることとなったときは、免許権者の「承認」を受けて超過額を取り戻すことができる。資力確保義務は売主業者自身が負い、媒介業者や買主の保険では代替できない(肢1参照)。届出は基準日から3週間以内(肢3は50日が誤り)。買主が宅建業者なら義務なし(肢4参照)。","R2A-46":"正解2が誤り。災害関連の貸付金について、機構は元金据置期間を設けることや償還期間の延長ができ、「据置期間を設けることができない」わけではない。MBSの発行による資金調達(肢1)、賃貸住宅建設・購入資金は買取型の対象外(肢3)、団信(肢4)はいずれも正しい。","R2A-47":"正解1。路地状部分の面積が土地面積の概ね30%以上を占める場合は、路地状部分を含む旨と割合又は面積を明示しなければならない。徒歩所要時間は実測ではなく道路距離80m=1分で計算(肢2参照)。予告広告は要件を満たせば可能(肢3関連)。管理費が異なる場合は最低額・最高額表示可(肢4関連)。","R2A-48":"正解3。建築着工統計(令和2年1月公表)によれば、令和元年の持家・分譲住宅の着工戸数はいずれも前年比増だった(貸家は減少)。※統計問題の数値は出題当時のもの。学習上は「最新年の統計を直前に確認する」練習問題として使うこと。","R2A-49":"正解4が最も不適当。宅地選定に当たり、地形・地質だけでなく、過去の災害履歴など「周辺住民からの情報・意見」も有用であり、聴かなくてよいとは言えない。都市化による雨水流出増(肢1)、周辺の地形・防災施設への留意(肢2)、古地図による液状化リスク確認(肢3)は適当。","R2A-50":"正解3が最も不適当。独立基礎は柱の下、「布基礎(連続基礎)」が壁体等の下、べた基礎は建物の底部全体に設けるもの。記述は布基礎とべた基礎の説明が混同されている。基礎構造=地業+基礎盤(肢1)、直接基礎と杭基礎(肢2)、主要構造と仕上げ(肢4)は適当。","R2B-01":"正解3が誤り。責任無能力者の監督義務者責任(714条)について、判例(JR東海事件)は、同居していない親族等が当然に監督義務者に当たるわけではないとした。「当然に賠償責任を負う」とはいえない。建物の基本的安全性を欠く設計・施工者の不法行為責任(肢1・判例)、人身損害の時効5年(肢4)は正しい。","R2B-02":"正解1。代理権の濫用(自己又は第三者の利益を図る目的)の場合、相手方がその目的を知り又は知ることができたときは無権代理行為とみなされる(107条)。自己契約・双方代理も無権代理とみなされるが本人の許諾があれば有効(肢2関連)。","R2B-03":"正解4。夫婦のいずれに属するか明らかでない財産は、夫婦の共有に属するものと「推定」される(762条2項)。姻族関係は離婚では当然終了するが、死亡の場合は生存配偶者の終了の意思表示が必要(肢1参照)。財産分与は相手方の有責性がなくても請求できる(肢2参照)。","R2B-04":"正解2が誤り。特定物の引渡債務で債権者が受領を理由なく拒んだ場合(受領遅滞)、債務者の保存義務は「自己の財産に対するのと同一の注意」に軽減される(413条1項)。善管注意義務のままではない。原始的不能でも契約は有効で損害賠償請求が可能(412条の2第2項・肢4)。","R2B-05":"正解2が誤り。裁判上の請求を途中で取り下げた場合でも、その終了から「6か月間」は時効の完成が猶予される(147条1項かっこ書)。取下げにより猶予の効果が直ちに消えるのではない。承認による更新は処分能力・権限不要(肢3)。夫婦間の権利の時効猶予(肢4)は159条どおり。","R2B-06":"正解1。賃貸借を合意解除しても、その解除は転借人に対抗できない(613条3項)。ただし解除当時、賃貸人が債務不履行による解除権を有していたときは対抗できる。転借人は賃借人の債務の範囲を限度に賃貸人に直接履行義務を負う(肢4関連)。建物譲渡により賃貸人の地位は原則当然に移転(肢3関連)。","R2B-07":"正解2。債務不履行(引渡し不能)がＡの責めに帰すべき事由によるものでなくても、Ｂは契約を解除できる(改正法・解除に帰責事由不要)。数量不足の場合の代金減額請求(肢1関連)。重大な過失による錯誤でも相手方が悪意・重過失等なら取消し可、原則は取消し不可(肢4関連)。","R2B-08":"正解3(イ・ウが正しい組合せ)。法定相続分:配偶者なし・子の代襲相続人(孫Ｂ・Ｃ)と子Ｄが相続人の場合、Ｂ・Ｃは死亡した親の相続分(2分の1)を分けて各3,000万円、Ｄは6,000万円(イ正しい)。直系尊属のみが相続人の場合は頭数で等分し、祖父母Ｅ・Ｆ・Ｇは各4,000万円(ウ正しい)。","R2B-09":"正解1が誤り…ではなく本問は「誤っているものはどれか」で正解1。地役権は「継続的に行使され、かつ、外形上認識することができるもの」に限り時効取得できる(283条)。記述は「又は」としている点が誤り(両方満たす必要がある)。承役地所有者の工作物設置義務の特定承継人への承継(肢3)は正しい。","R2B-10":"正解4が誤り。共有者の一人が死亡して相続人がないときは、その持分は特別縁故者への分与の対象となり、それもなければ「他の共有者」に帰属する(255条)。国庫に帰属するのではない。持分の平等推定(肢1)、変更への全員同意(肢2)、保存行為の単独性(肢3)は正しい。","R2B-11":"正解4。借地権者所有の数棟の建物が「一筆の土地」上にある場合、そのうち一棟について登記があれば、借地権の対抗力は当該一筆の土地全部に及ぶ。借地上建物の登記は表示の登記でもよいが、配偶者など他人名義の建物登記では対抗できない(肢1関連・判例)。滅失後の掲示による対抗は2年間(肢2関連)。","R2B-12":"正解3。期間の定めのある建物賃貸借を書面(公正証書に限らない)で契約し、「あらかじめ更新がなく期間満了により終了する旨を記載した書面を交付して説明」すれば定期建物賃貸借となる。無断転貸でも背信行為と認めるに足りない特段の事情があれば解除できない(肢2・判例)。内縁の同居者の承継(肢4・36条)。","R2B-13":"正解3が誤り。規約及び集会の決議は、区分所有者の特定承継人(中古で買った者等)に対しても効力を生ずる(46条)。規約の保管場所の掲示義務(肢1)、規約による管理者の共用部分所有=管理所有(肢2)、集会決議による管理者の解任(肢4)は正しい。","R2B-14":"正解2が誤り。所有権の登記以外の権利(抵当権等)の登記がある土地でも、分筆の登記は「できる」(権利の登記は分筆後の各土地に転写される)。合筆には制限があるが分筆は可能、という対比がポイント。申請書の閲覧は利害関係部分に限る(肢4・出題当時)。","R2B-15":"正解2。市街化調整区域内では、都市計画に市街地開発事業を定めることができない(市街化を抑制する区域のため)。道路・公園・下水道を必ず定めるのは市街化区域と区域区分未設定区域…正しくは市街化区域(肢1関連)。都市計画区域の指定は原則都道府県(肢3参照)。準都市計画区域には高度地区を定められる(肢4参照)。","R2B-16":"正解2。公民館(社会教育法)など公益上必要な建築物の建築目的の開発行為は、区域・規模を問わず開発許可不要。非常災害の応急措置としての開発行為も許可不要(肢1参照・「正しいものはどれか」の問なので肢1は「許可必要」等の誤り記述)。市街化調整区域では自己居住用でも開発許可が必要(肢4関連)。","R2B-17":"正解1が誤り。建築物が防火地域と準防火地域にわたる場合は、原則としてその「全部」について規制の厳しい「防火地域」の規定を適用する。「敷地の属する地域」で決まるのではない。3階以上の倉庫部分500㎡以上は耐火建築物等に(肢2関連)。避雷設備は高さ20m超(肢3)。手すりは高さ1m以下の階段は不要(肢4)。","R2B-18":"正解4が誤り。北側斜線制限(56条1項3号)は、低層住居専用地域(一低・二低)・田園住居地域と中高層住居専用地域(一中高・二中高)に適用される。「田園住居地域には適用されない」は誤り(適用される)。建蔽率8/10の防火地域内耐火建築物は建蔽率無制限(肢3関連)。","R2B-19":"正解1が誤り(旧宅造法)。宅地造成工事規制区域は「市街地又は市街地となろうとする土地の区域」だけでなく、集落の区域なども含めて指定できる…正確には「宅地造成に伴い災害が生ずるおそれが大きい市街地又は市街地となろうとする土地の区域」であり、記述には限定の誤りが含まれる。規制区域の指定は関係市町村長の意見聴取が不要な点も確認(現行盛土規制法では基礎調査を踏まえて指定)。","R2B-20":"正解3。換地計画で換地を定める場合は、換地及び従前の宅地の位置・地積・土質・水利・利用状況・環境等が照応するように定めなければならない(照応の原則・89条)。清算金の徴収・交付は換地処分の公告後(肢2参照)。保留地は組合施行では総会の同意等の制約はあるが災害防止目的等の要件は公的施行の場合(肢4関連)。","R2B-21":"正解3。競売による農地の取得も「権利移動」であり、耕作目的なら農地法3条の許可が必要(競売でも許可は不要にならない)。農地かどうかは現況で判断し、登記地目は関係ない(肢1参照)。親子間の贈与でも3条許可必要(肢2参照)。4haを超える転用も現在は都道府県知事等の許可(大臣許可は廃止・肢4参照)。","R2B-22":"正解4。都市計画区域外では10,000㎡以上の一団の土地の取引が事後届出の対象。11,000㎡の土地の売買予約(対価性のある契約)をした権利取得者Ｃは届出が必要。国・地方公共団体との取引は届出不要(肢3参照)。届出対象事項の勧告は利用目的のみで、対価の額は勧告対象外(肢1参照)。","R2B-23":"正解1。住宅用家屋の税率軽減の適用を受けるには、やむを得ない事情がある場合を除き、新築又は取得後「1年以内」に登記を受けなければならない。相続による取得は対象外(売買・競落のみ・肢2参照)。課税標準は固定資産課税台帳の登録価格(肢3参照)。再適用も可能(回数制限なし・肢4参照)。","R2B-24":"正解3。固定資産税の納期は4月・7月・12月・2月中において市町村の条例で定める(特別の事情があれば異なる納期も可)。年度途中で譲渡しても1月1日の所有者が全額納税義務を負い還付されない(肢1参照)。標準税率1.4%に上限の定めはない(1.7%制限は廃止済み・肢2参照)。小規模住宅用地の課税標準は6分の1(肢4参照)。","R2B-25":"正解1。標準地は、地上権その他の権利が存する土地であっても選定できる(正常な価格はこれらの権利が存しないものとして判定する)。鑑定評価は2人以上の不動産鑑定士に求める(肢2は「正しい」内容に見えるが、正解1の問題として他肢には細部の誤りがある)。公示価格は標準地の単位面積当たりの価格として公示される。","R2B-26":"正解2。宅建士は、自ら役員を務める宅建業者が不正行為等により免許取消処分を受けた場合、その聴聞の期日・場所の公示日前60日以内に役員であった者として、登録消除の対象となり得る(宅建士の欠格と業者役員の関係)。買主として貸借契約を締結する行為は宅建業に当たらない(肢3関連)。","R2B-27":"正解3。宅地の造成工事完了前は、開発許可など法令に基づく必要な許可等の処分があった「後」でなければ広告できず、処分後であれば完了前でも広告できる。誤認させる表示は実害・注文がなくても違反(肢1参照)。「建築確認申請中」と明示しても広告不可(肢2参照)。広告媒体を問わず規制対象(肢4参照)。","R2B-28":"正解1(正しいのは一つ=イ)。ア:専任媒介の指定流通機構への登録は依頼者の要望があっても省略できない(登録しない特約は無効)ので誤り。イ:…正しくは専任媒介の報告は2週間に1回以上であり「1週間に1回以上の報告」は専属専任。本問で正しい記述は一つのみ(登録期間7日・休業日除く等の正確な記述)。細かな数字(7日/5日、2週間/1週間)の入替えに注意。","R2B-29":"正解3。宅建士は登録した都道府県以外の場所(乙県)での取引においても宅建士として事務を行うことができる(登録は全国で有効)。事務所新設による免許換えは乙県ではなく国土交通大臣免許への切替え(肢1関連)。業務従事地が変わっても登録移転は任意(肢2関連)。案内所の届出は免許権者と所在地管轄知事の両方(肢4関連)。","R2B-30":"正解2。保証協会から還付充当金を納付すべき旨の通知を受けた社員(又は社員であった者)は、通知を受けた日から2週間以内に納付しなければならない。分担金は主たる事務所60万円+従たる事務所30万円×3=150万円(肢1関連)。複数の保証協会への重複加入は不可(肢3参照)。","R2B-31":"正解3。免許権者は免許に条件を付することができ、更新時にも付することができる(3条の2)。免許取消し後5年の欠格は「不正手段・業務停止対象行為で情状が特に重い・業務停止処分違反」の三大取消事由の場合に限られ、事業未開始による取消しは該当しない(肢1参照)。復権を得れば直ちに適格(肢2参照)。役員の住所変更は届出不要(肢4参照)。","R2B-32":"正解4(すべて正しい)。ア:急傾斜地崩壊危険区域内の制限の概要は宅地売買で説明必要。イ:土砂災害警戒区域内にある旨は貸借でも説明必要。ウ:重要文化財等の制限は宅地貸借でも…(文化財保護法の制限は売買では説明対象)。エ:津波防護施設区域内の制限は説明必要。災害系の区域指定はいずれも重要事項になる、と整理して覚える。","R2B-33":"正解4。免許を受けた日から3か月以内に営業保証金を供託した旨の届出がないときは、免許権者は催告しなければならず、催告到達から1か月以内に届出がないときは免許を取り消すことができる。従たる事務所新設分も本店最寄りの供託所に供託(肢1参照)。金銭のみ供託時の保管替え請求(肢2関連)。免許失効時の取戻しには公告必要(肢3参照)。","R2B-34":"正解4が誤り。依頼者の依頼によらない通常の広告の料金は、報酬とは別に受領できず、報酬額に合算して受領することもできない(受領できるのは依頼に基づく特別の広告料金のみ)。上限を超える報酬の約定は承諾があっても違反(肢1)。不当に高額の報酬の「要求」自体が違反(肢2)。","R2B-35":"正解3(正しいのは三つ)。ア:37条書面の交付は宅建士でない従業者が行ってもよい(記名は宅建士)。イ:貸借でも引渡し時期・賃借権設定登記申請の時期は必要的記載事項で、当事者が業者でも省略不可。ウ:天災その他不可抗力による損害負担の定めがあるときはその内容を記載。数字や記名・交付の役割分担を正確に。","R2B-36":"正解3。裁判の証人として証言を求められた場合は「正当な理由」があるため、取り扱った宅建取引に関する秘密事項を証言できる(守秘義務違反にならない)。本人の承諾があれば秘密を開示できる(肢1参照)。廃業後も守秘義務は続く(肢2参照)。重要事項に該当する事実は売主の希望があっても買主に説明しなければならない(肢4参照)。","R2B-37":"正解1。既存建物の売買では「構造耐力上主要な部分等の状況について当事者双方が確認した事項」が必要的記載事項であり、確認した事項が「ない」場合には、ない旨を37条書面に記載しなければならない。金銭貸借あっせん・損害賠償予定・租税公課の定めは「定めがない場合には記載不要」(肢2〜4参照)との対比がポイント。","R2B-38":"正解1(正しいのは一つ)。唯一の専任宅建士が欠けたら「2週間以内」に補充の措置をとり、変更の届出は30日以内(アは30日で補充としている点が誤り)。未成年者は法定代理人の同意だけでは専任宅建士になれない(営業許可等が必要・イ参照)。重説時の宅建士証提示は相手が業者でも請求不要で必要…相手が業者なら重説自体不要だが提示義務の記述に注意(ウ参照)。成年被後見人・被保佐人は一律欠格ではなくなった(エ参照・令和元年改正)。","R2B-39":"正解1。仮設テント張りの案内所は「事務所等」に該当しないため、そこで買受けの申込みをした場合、その後Ａの事務所で契約を締結しても、クーリング・オフによる解除ができる(申込場所基準)。買主自らの希望による喫茶店はやはり事務所等ではないため解除可能(肢2は解除できない趣旨なら誤り)。買主が指定した自宅・勤務先での申込みは解除不可(肢4関連)。","R2B-40":"正解4。相手方が金銭的に不安を述べたため売買代金を引き下げて勧誘することは、値引き提案であり禁止行為に当たらない。購入拒否後の勧誘継続(肢1)、手付の貸付け(後で償還されても行為時点で違反・肢2)、判断時間を与えることの拒否(肢3)はいずれも禁止行為。","R2B-41":"正解2。帳簿には、取引のあったつど、年月日・宅地建物の所在及び面積その他国土交通省令で定める事項(報酬額等)を記載しなければならない。帳簿は「事務所ごと」に備付け(肢1参照)。保存は閉鎖後5年(自ら売主の新築住宅は10年)(肢3は正しい内容に見えるが「売買の媒介」を含めている点が誤り)。電磁的記録での保存は可能(肢4参照)。","R2B-42":"正解1が誤り。歴史的風致形成建造物の増築等の「届出制」(歴史まちづくり法)の制限は、建物の「貸借」の媒介では説明不要(貸借で説明すべき法令制限は限定的)。建築確認済証が紛失していればその旨…保存状況として説明(肢2参照)。維持修繕の実施状況が記録されているときはその内容(肢3参照)。設備の整備状況は貸借で説明必要(肢4参照)。","R2B-43":"正解4。脅迫罪の罰金刑により登録が消除された場合、再登録できるのは「刑の執行を終わり又は執行を受けることがなくなった日から5年」を経過してから。精神機能の障害関係は届出制(肢1関連)。登録移転とともに交付される宅建士証は残存期間(肢2関連)。事務禁止処分での提出を怠ると10万円以下の「過料」(50万円以下の罰金ではない・肢3関連)。","R2B-44":"正解2(正しいのはア・ウの二つ)。ア:宅地には将来建物の敷地に供する目的で取引される土地も含まれるので正しい。イ:用途地域内の農地は宅地に該当するので誤り。ウ:用途地域外でも建物の敷地に供せられる土地は宅地なので正しい。エ:用途地域内でも道路・公園・河川等の公共施設用地は宅地から除かれるので誤り。","R2B-45":"正解4。住宅販売瑕疵担保責任保険契約は、売主である宅建業者が保険料を支払い、瑕疵担保責任の履行によって生じた損害を填補するもの(買主が保険料を負担するものではない)。床面積55㎡以下の住宅は2戸をもって1戸と数える特例がある(肢1関連)。保険の説明は供託の場合の供託所説明と異なる(肢2関連)。保険期間は10年以上(肢3関連)。","R2B-46":"正解4が誤り。証券化支援業務(買取型)の譲受け対象となる貸付債権には、住宅の購入に付随する土地・借地権の取得資金や改良資金も含まれる(「含まれない」とする記述は誤り)。耐震改良資金の貸付け(肢1)、金利は金融機関ごとに異なる(肢2)、高齢者向け返済特例(肢3)は正しい。","R2B-47":"正解2。取引態様は「売主」「貸主」「代理」「媒介(仲介)」の別をこれらの文言を用いて表示しなければならず、「直販」「委託」等の他の文言による表示は認められない。セットバック部分はその旨と面積(概ね10%以上の場合)を明示(肢1関連)。成約済み物件の掲載継続はおとり広告(肢3参照)。予告広告は所定要件で可能(肢4参照)。","R2B-48":"正解2。令和2年版国土交通白書によれば、平成31年3月末の宅地建物取引業者数は約12万4千業者で、5年連続の増加となった。※統計問題の数値は出題当時のもの。業者数(約13万で微増傾向)・地価・着工戸数の傾向は受験年の最新データで確認を。","R2B-49":"正解3が最も不適当。埋立地は海面に対して数mの比高(かさ上げ)を持つため、海面より低いことが多い干拓地に「比べれば」自然災害に対して危険度は低いとされる。「干拓地より危険」としている点が逆。山地の急峻さ(肢1)、低地の脆弱性(肢2)、台地の安全性(肢4)は適当。","R2B-50":"正解3が最も不適当。鉄骨造は不燃構造ではあるが、熱に弱く錆びやすいため、耐火被覆や防錆処理が「必要」。靭性が大きいことは防錆不要の理由にならない。基礎と上部構造の緊結(肢1)、建物形態の単純化による耐震・耐風性向上(肢2)、RC造の超高層共同住宅(肢4)は適当。","R3A-01":"正解1。判決文の趣旨:賃借人の明渡債務が先履行であり、敷金返還請求権は明渡し「後」に発生する。したがって賃借人は敷金返還との同時履行の抗弁を主張できず、敷金返還請求権を被担保債権とする留置権も成立しない。明渡しと敷金返還は1個の双務契約から生じた対価関係にはない。","R3A-02":"正解2。連帯債務者Ｂが債権者Ｄに反対債権を持つのに相殺を援用しない間は、他の連帯債務者ＡはＢの負担部分(100万円)の限度で履行を拒むことができる(民法439条2項)。裁判上の請求(肢1)や免除(肢3)は相対的効力にとどまり、更改(肢4)は絶対的効力で全員のために債権が消滅する。","R3A-03":"正解4(すべて誤り)。ア:準委任契約は当事者の死亡により終了するため(653条)、相続人は清掃業務の義務を負わない。イ:賃貸人の死亡では賃貸借は終了せず、相続人が賃貸人の地位を承継するだけで解除はできない。ウ:売主死亡でも売買契約は無効にならず、相続人が義務を承継する。エ:使用貸借は「借主」の死亡により終了するため、相続人は借主の地位を承継できない。","R3A-04":"正解1。配偶者居住権の存続期間を20年と定めた場合、期間満了により消滅し、延長や更新はできない。第三者に使用収益させるには所有者の承諾が必要(肢2参照)。配偶者居住権は譲渡できず、配偶者の死亡により消滅し相続もされない(肢3参照)。登記を備えれば第三者に対抗できる(肢4関連)。","R3A-05":"正解4。意思能力を有しない状態で行った契約は、後見開始の審判の有無にかかわらず無効(3条の2)。令和3年4月時点の成年年齢はまだ20歳(引下げは令和4年4月施行)(肢1参照)。営業を許された未成年者が成年者と同一の行為能力を持つのは「その営業に関する」行為に限られる(肢3参照)。","R3A-06":"正解2が誤り。債権譲渡は、その意思表示の時に債権が現に発生していなくても有効であり(将来債権譲渡・466条の6)、譲受人は発生した債権を当然に取得する。譲渡制限特約付き債権の譲渡も有効で、悪意・重過失の譲受人に対しては債務者が履行を拒める(肢1・3参照)。","R3A-07":"正解3が誤り。代金減額請求は、原則として相当の期間を定めて履行の追完の催告をし、その期間内に追完がないときに初めてできる(563条1項)。修理可能かどうかを問わず「直ちに」減額請求できるわけではない(追完不能等の場合の無催告減額は例外)。","R3A-08":"正解1。土地工作物責任(717条):建物の占有者(賃借人Ａ)は損害発生防止に必要な注意をしたことを証明すれば免責されるが、その場合は所有者が無過失責任を負う。人身損害の不法行為による損害賠償請求権の消滅時効は、損害及び加害者を知った時から5年(724条の2)・不法行為時から20年。","R3A-09":"正解1。Ｄの相続人は、配偶者Ａ(2分の1)とＤの子であるＦ・Ｇ(各4分の1)。ＣはＡの連れ子でありＤと養子縁組をしていない限りＤの相続人にはならない。親権の所在(ＦはＥが親権者)は相続権に影響しない。","R3A-10":"正解2。選択債権で選択権者が選択の意思表示をした後は、相手方の承諾を得なければ撤回できない(407条2項)。特段の合意がなければ選択権は債務者に属する(406条)。第三者が選択できず又は選択を欲しないときは、選択権は債務者に移転する(409条2項)。","R3A-11":"正解3。存続期間50年以上の一般定期借地権であれば、居住用建物の所有目的でも、書面(公正証書に限らない)で更新なし・建物買取請求なし等の特約を有効に定められる。事業用定期借地権は10年以上50年未満で公正証書が必須、かつ居住用は不可(肢1・2参照)。一時使用目的の借地権には存続期間等の規定が適用されない(肢4参照)。","R3A-12":"正解2。建物の引渡し後に所有権が移転して賃貸人の地位がＣに移転すると、敷金関係(未返還分)も新賃貸人Ｃに承継される(605条の2第4項)。期間の定めのない建物賃貸借で賃貸人からの解約申入れには正当事由が必要(肢1参照)。適法な転貸借では、期間満了・解約申入れによる終了を転借人に通知しないと対抗できず、通知から6か月で終了(肢3参照)。","R3A-13":"正解4が誤り。共用部分の持分は専有部分の床面積の割合によるが、この床面積は壁その他の区画の「内側線」で囲まれた部分の水平投影面積(内法)で算定する。決議には集会招集が原則だが、区分所有者全員の書面同意があれば書面決議ができる(肢1関連)。重大変更は4分の3以上の多数決(区分所有者の定数は規約で過半数まで減可)(肢2)。","R3A-14":"正解3。法人の合併による権利移転登記は、包括承継のため登記権利者(存続会社等)が単独で申請できる。申請代理人の権限は本人の死亡によっても消滅しない(不登法17条・肢2参照)。信託の登記は受託者が単独申請できる(肢4参照)。","R3A-15":"正解3が誤り。市街化区域と市街化調整区域との区分(区域区分)の決定の有無は、都市計画区域の整備・開発・保全の方針で定めるものであり、地区整備計画に定める事項ではない。地区整備計画には建蔽率の最高限度等を定めることができる(肢4)。","R3A-16":"正解2。首都圏整備法の既成市街地など三大都市圏の一定区域内の市街化区域では、開発許可が必要となる規模は500㎡以上に引き下げられており、800㎡の住宅目的の開発行為は許可が必要。公園施設(肢1)や土地区画整理事業の施行として行う開発行為(肢4)は許可不要。準都市計画区域は3,000㎡未満なら許可不要(肢3参照)。","R3A-17":"正解4。特定行政庁等が安全上・防火上・避難上支障がないと認めたときは、検査済証の交付前でも仮に建築物を使用できる(仮使用認定)。ホルムアルデヒド発散建材は使用禁止ではなく使用面積の制限等の規制(肢1参照)。防火地域内で隣地境界線に接して設けられるのは外壁が「耐火構造」の場合(肢3参照)。","R3A-18":"正解2が誤り。集落地区計画の区域内では、市町村は条例で用途地域の用途制限を「緩和」することができる(国土交通大臣の承認)のであって、補完(強化)する条例を定めるものではない。建蔽率6/10の近隣商業地域で準防火地域内の耐火建築物等には建蔽率緩和がある(肢1関連)。","R3A-19":"正解4が誤り。造成宅地防災区域は、宅地造成工事規制区域「外」の区域について指定するものであり、規制区域「内」で指定することはできない。両区域は重複しない、という超頻出ポイント。切土500㎡・崖の高さ等の許可要否基準(肢1)も併せて確認。","R3A-20":"正解3が誤り。組合設立認可の公告日後から換地処分の公告日までの間に、施行地区内で事業の障害となるおそれのある建築等を行うには「都道府県知事(市の区域内は市長)」の許可が必要であり、許可不要とはならない。参加組合員に与えるべき宅地は換地処分公告日の翌日に参加組合員が取得する(肢1)。","R3A-21":"正解3が誤り。砂利採取のために農地を一時的に借り受ける場合も「転用目的の権利取得」として農地法5条の許可が必要であり、砂利採取法の認可があっても許可は不要にならない。遺産分割による取得は3条許可不要(届出は必要)(肢1)。都道府県が病院建設のため農地取得する場合は知事等との協議成立で許可みなし(肢4)。","R3A-22":"正解4。当事者の一方が地方公共団体(Ｂ市)の部分は届出不要だが、業者Ｃは準都市計画区域(=都市計画区域外の基準10,000㎡)で10,000㎡を取得するため事後届出が必要。届出期限は契約日から起算して2週間以内(肢1は3週間が誤り)。知事の助言は「利用目的」について(肢2参照)。届出をしない者には罰則がある(肢3参照)。","R3A-23":"正解1。譲渡所得の特別控除50万円は、まず短期譲渡(取得後5年以内の政令対象外のもの)の譲渡益から控除し、残りを長期譲渡益から控除する。取得費には購入代金・手数料のほか設備費・改良費も含まれる(肢2参照)。権利金が土地価額の2分の1超なら譲渡所得として課税(肢3参照)。2分の1課税は長期譲渡所得のみ(肢4参照)。","R3A-24":"正解1。一定の既存(中古)住宅を個人が自己居住用に取得した場合、新築時期に応じた額(平成9年4月以降新築なら1,200万円)が課税標準から控除される(床面積50㎡以上240㎡以下が要件、210㎡は該当)。家屋の新築後、6か月(宅建業者が売主の場合等は1年)使用・譲渡がないときはその時点の所有者に課税(肢2参照)。","R3A-25":"正解3が誤り。取引事例に特殊な事情が含まれ価格に影響している場合でも、その事情を適切に「事情補正」できるものであれば取引事例として採用できる。補正できても採用できない、というのは誤り。再調達原価の定義(肢2)、正常賃料・継続賃料(肢4)は基準どおり。","R3A-26":"正解2。代金以外に授受される金銭(手付金・固定資産税清算金等)については、その「額」だけでなく「授受の目的」も重要事項として説明しなければならない。説明する宅建士は専任である必要はない(肢1参照)。移転登記の申請時期(肢3)や引渡し時期(肢4)は重説事項ではなく37条書面の記載事項。","R3A-27":"正解4。役員が宅建業法違反による罰金刑に処せられても、刑の執行が終わってから5年を経過していれば欠格事由に該当せず、Ｅ社は免許を受けられる。破産者は復権を得れば直ちに免許可(肢2参照)。刑が確定していない(控訴中等)場合は欠格に当たらない(肢3関連)。","R3A-28":"正解4。宅建士の登録は「合格した試験を行った都道府県知事」に申請するものであり、転勤で他県に移っても登録先は変わらない(登録の移転は業務従事地が変わった場合に「できる」任意の制度)。勤務先業者の変更は遅滞なく変更の登録を申請(肢3参照)。","R3A-29":"正解4。事務所以外の継続的に業務を行える施設を有する場所であっても、そこで契約締結・申込み受付を行わないのであれば、専任宅建士の設置や50条2項の届出は不要(標識の掲示は必要)。契約を行う案内所に必要な専任宅建士は成年者1名以上で足りる(肢3関連)。","R3A-30":"正解2(正しいのはア・エの二つ)。ア:宅地の将来の利用制限について著しく事実に相違する表示は誇大広告として禁止。イ:広告料金を報酬と別に受領できるのは「依頼者の依頼」による広告に限るので誤り。ウ:数回に分けて広告するときはそのたびごとに取引態様の別を明示するので誤り。エ:建築確認申請中の建物は貸借の媒介の広告もできない。","R3A-31":"正解3が誤り。弁済業務保証金から還付を受けようとする者は、保証協会の「認証」を受けた上で、供託所に対して還付請求をする(保証協会に直接請求するのではない)。社員となる前の取引から生じた債権も還付対象(肢1)。社員が地位を失ったときは保証協会が直ちに免許権者に報告(肢4)。","R3A-32":"正解1。ソーラーパネル設置目的の土地は、建物の敷地に供する目的の土地ではなく用途地域外なので「宅地」に当たらず、その売買を業として行っても免許不要。換地の住宅用地としての分譲(肢2)、農協による宅地売却の代理(肢3)、地方公共団体所有地の売却代理(肢4)はいずれも免許が必要。","R3A-33":"正解1。水害ハザードマップの説明では、市町村が提供する図面に宅地建物の位置が表示されているときは、図面における当該宅地建物の「所在地」を示して説明しなければならない。洪水・雨水出水(内水)・高潮の各ハザードマップが作成されていればそれぞれ説明(肢2関連)。マップを添付するだけでは足りない(肢4参照)。","R3A-34":"正解2。営業保証金の還付を受けられるのは宅建業に関する取引により生じた債権を有する者だが、令和3年改正により「宅地建物取引業者」は還付請求権者から除外された。供託した旨は業者自身が免許権者に届け出る必要がある(肢1参照)。金銭と有価証券の併用供託は可能(肢3参照)。国債は額面の100%、地方債は90%で評価(肢4参照)。","R3A-35":"正解3(正しいのはア・イ・エの三つ)。ア:事務禁止処分を受けたら宅建士証を交付知事に速やかに提出、怠ると10万円以下の過料。イ:事務禁止期間中に本人申請で登録消除された者は、期間満了まで他県でも再登録不可。ウ:住所の変更は登録移転の事由にならない(移転は業務従事地の変更の場合)ので誤り。エ:本籍の変更は遅滞なく変更の登録を申請。","R3A-36":"正解1。建物の「貸借」の媒介では、都市計画法の開発許可制限など法令上の制限の説明は原則不要(貸借で必要なのは新住宅市街地開発法等の使用制限など限定的)。石綿調査結果の記録(肢2)、設備の整備状況(肢3)、宅地貸借での契約終了時の金銭精算事項(肢4)は説明が必要。","R3A-37":"正解3。契約不適合責任の履行に関する保証保険契約の締結などの措置を講ずるかどうか・その概要は重要事項として説明し、定めがあれば37条書面にも記載する。区分所有建物の貸借でも専有部分の用途制限規約の内容は説明必要(肢1参照)。手付金等の保全措置の概要は重説事項であって37条書面の記載事項ではない(肢2参照)。自ら貸主となる取引には宅建業法は適用されない(肢4参照)。","R3A-38":"正解4(すべて違反しない)。一般媒介契約には、①有効期間の3か月制限、②業務処理状況の定期報告義務、③指定流通機構への登録義務がいずれも適用されない(これらは専任・専属専任媒介の規制)。また貸借の媒介契約には34条の2(媒介契約書面等)自体が適用されないため、有効期間を定めなくても違反ではない。","R3A-39":"正解1。クーリング・オフの告知書面には、買受けの申込みの撤回等があったときは、業者は速やかに手付金その他の金銭を返還すること等を記載しなければならない。解除の書面は「発信した時」に効力を生じる(到達時ではない)(肢3参照)。書面に記載するのは売主Ａの商号・住所・免許証番号で、媒介業者Ｂのものは不要(肢4参照)。","R3A-40":"正解3。一団の宅地建物の分譲をする場合、物件の所在する場所に国土交通省令で定める標識を掲げなければならない。帳簿には取引年月日・物件の所在・面積のほか報酬の額など省令で定める事項の記載が必要(肢1関連)。税務署職員の質問検査権
