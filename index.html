<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>宅建パス | 過去問トレーニング</title>
<meta name="description" content="宅建士試験 過去問演習アプリ。分野別演習・弱点克服・本試験形式の模擬試験で着実に合格へ。">
<style>
:root{
  --primary:#0f766e; --primary-dark:#115e59; --primary-light:#ccfbf1;
  --accent:#f59e0b; --accent-light:#fef3c7;
  --danger:#dc2626; --danger-light:#fee2e2;
  --ok:#16a34a; --ok-light:#dcfce7;
  --bg:#f4f7f6; --card:#ffffff; --text:#1f2937; --sub:#6b7280; --line:#e5e7eb;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","BIZ UDPGothic","Yu Gothic UI",Meiryo,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.65;font-size:15px;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));}
.wrap{max-width:640px;margin:0 auto;padding:12px 14px 24px}
header.app{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
  padding:14px 18px 12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header.app h1{font-size:17px;font-weight:700;letter-spacing:.02em}
header.app .sub{font-size:11px;opacity:.85}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-size:15px}
.btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;font-weight:700;
  text-align:center;transition:opacity .15s}
.btn:active{opacity:.8}
.btn.ghost{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
.btn.warn{background:var(--accent)}
.btn.gray{background:#e5e7eb;color:var(--text)}
.btn.sm{padding:9px 12px;font-size:13px;width:auto;display:inline-block;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--primary-light);border-radius:12px;padding:10px;text-align:center}
.stat .v{font-size:22px;font-weight:800;color:var(--primary-dark)}
.stat .l{font-size:11px;color:var(--sub)}
.bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:4px}
.bar>i{display:block;height:100%;background:var(--primary);border-radius:4px;transition:width .4s}
.bar>i.low{background:var(--danger)} .bar>i.mid{background:var(--accent)}
.catrow{padding:9px 0;border-bottom:1px solid var(--line)}
.catrow:last-child{border-bottom:none}
.catrow .t{display:flex;justify-content:space-between;font-size:13px}
.catrow .t b{font-size:13.5px}
.catrow .t span{color:var(--sub);font-size:12px}
.chip{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11.5px;font-weight:700}
.chip.cat{background:var(--primary-light);color:var(--primary-dark)}
.chip.year{background:#e0e7ff;color:#3730a3}
.chip.weak{background:var(--danger-light);color:var(--danger)}
.chip.ok{background:var(--ok-light);color:var(--ok)}
/* tabbar */
nav.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
  display:flex;z-index:60;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;background:none;padding:8px 0 6px;font-size:10.5px;color:var(--sub);
  display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:0}
nav.tabs button .ic{font-size:20px;line-height:1}
nav.tabs button.on{color:var(--primary);font-weight:700}
/* question */
.qtext{font-size:15px;white-space:pre-wrap;margin-bottom:14px}
.choice{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:#fff;
  border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;font-size:14.5px;
  line-height:1.6;transition:border-color .1s}
.choice .n{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.choice.sel{border-color:var(--primary);background:var(--primary-light)}
.choice.sel .n{background:var(--primary);color:#fff}
.choice.correct{border-color:var(--ok);background:var(--ok-light)}
.choice.correct .n{background:var(--ok);color:#fff}
.choice.wrong{border-color:var(--danger);background:var(--danger-light)}
.choice.wrong .n{background:var(--danger);color:#fff}
.choice:disabled{cursor:default;opacity:1;color:var(--text)}
.judge{font-size:40px;font-weight:800;text-align:center;margin:6px 0}
.judge.ok{color:var(--ok)} .judge.ng{color:var(--danger)}
.qhead{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.qhead .sp{flex:1}
.bmbtn{background:none;font-size:22px;padding:2px 6px;filter:grayscale(1);opacity:.45}
.bmbtn.on{filter:none;opacity:1}
.pbar{height:5px;background:var(--line);border-radius:3px;margin-bottom:12px;overflow:hidden}
.pbar>i{display:block;height:100%;background:var(--accent)}
/* mock */
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:16px;color:var(--primary-dark)}
.timer.low{color:var(--danger);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
.qgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.qgrid button{aspect-ratio:1;border-radius:8px;background:var(--bg);font-size:11.5px;font-weight:600;
  border:1.5px solid var(--line);position:relative}
.qgrid button.done{background:var(--primary-light);border-color:var(--primary)}
.qgrid button.now{outline:2px solid var(--accent)}
.qgrid button.flag::after{content:"⚑";position:absolute;top:-4px;right:-1px;font-size:9px;color:var(--accent)}
.qgrid button.right{background:var(--ok-light);border-color:var(--ok)}
.qgrid button.miss{background:var(--danger-light);border-color:var(--danger)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:640px;max-height:80vh;overflow-y:auto}
.score-big{text-align:center;padding:8px 0 4px}
.score-big .n{font-size:52px;font-weight:800;color:var(--primary-dark)}
.score-big .d{font-size:14px;color:var(--sub)}
.passband{text-align:center;border-radius:12px;padding:10px;font-weight:800;font-size:17px;margin:10px 0}
.passband.pass{background:var(--ok-light);color:var(--ok)}
.passband.fail{background:var(--danger-light);color:var(--danger)}
.rvrow{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--line);
  width:100%;background:none;text-align:left;font-size:13px;border-radius:0}
.rvrow .m{font-weight:800;width:20px;text-align:center}
.rvrow .m.o{color:var(--ok)} .rvrow .m.x{color:var(--danger)}
.rvrow .txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sub)}
.note{font-size:12px;color:var(--sub);margin-top:8px}
.expbox{background:#f0fdfa;border-left:4px solid var(--primary);padding:10px 12px;border-radius:0 10px 10px 0;
  font-size:13.5px;line-height:1.7;margin:4px 0 12px;white-space:pre-wrap}
.hist{font-size:13px;padding:8px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.hist:last-child{border-bottom:none}
.empty{text-align:center;color:var(--sub);font-size:13px;padding:24px 0}
h3.sec{font-size:13px;color:var(--sub);margin:16px 2px 8px;font-weight:600}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.topbar .sp{flex:1}
.iconbtn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--text)}
</style>
</head>
<body>
<header class="app">
  <h1>🏡 宅建パス</h1>
  <div class="sub">宅地建物取引士試験 過去問トレーニング(令和2〜7年度・全400問解説付き)</div>
</header>

<div class="wrap" id="view"></div>

<nav class="tabs" id="tabs">
  <button data-tab="home"><span class="ic">🏠</span>ホーム</button>
  <button data-tab="genre"><span class="ic">📚</span>分野別</button>
  <button data-tab="weak"><span class="ic">🎯</span>弱点克服</button>
  <button data-tab="mock"><span class="ic">📝</span>模擬試験</button>
</nav>

<script>
const QUESTIONS = [{"id":"R4-01","year":"R4","q":1,"category":"権利関係","question":"次の1から4までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。(判決文)所有者甲から乙が不動産を買い受け、その登記が未了の間に、丙が当該不動産を甲から二重に買い受け、更に丙から転得者丁が買い受けて登記を完了した場合に、たとい丙が背信的悪意者に当たるとしても、丁は、乙に対する関係で丁自身が背信的悪意者と評価されるのでない限り、当該不動産の所有権取得をもって乙に対抗することができるものと解するのが相当である。","choices":["所有者AからBが不動産を買い受け、その登記が未了の間に、Cが当該不動産をAから二重に買い受けて登記を完了した場合、Cは、自らが背信的悪意者に該当するときであっても、当該不動産の所有権取得をもってBに対抗することができる。","所有者AからBが不動産を買い受け、その登記が未了の間に、背信的悪意者ではないCが当該不動産をAから二重に買い受けた場合、先に買い受けたBは登記が未了であっても当該不動産の所有権取得をもってCに対抗することができる。","所有者AからBが不動産を買い受け、その登記が未了の間に、背信的悪意者であるCが当該不動産をAから二重に買い受け、更にCから転得者Dが買い受けて登記を完了した場合、DもBに対する関係で背信的悪意者に該当するときには、Dは当該不動産の所有権取得をもってBに対抗することができない。","所有者AからBが不動産を買い受け、その登記が未了の間に、Cが当該不動産をAから二重に買い受け登記を完了した場合、Cが背信的悪意者に該当しなくてもBが登記未了であることにつき悪意であるときには、Cは当該不動産の所有権取得をもってBに対抗することができない。"],"answer":3},{"id":"R4-02","year":"R4","q":2,"category":"権利関係","question":"相続に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["被相続人の生前においては、相続人は、家庭裁判所の許可を受けることにより、遺留分を放棄することができる。","家庭裁判所への相続放棄の申述は、被相続人の生前には行うことができない。","相続人が遺留分の放棄について家庭裁判所の許可を受けると、当該相続人は、被相続人の遺産を相続する権利を失う。","相続人が被相続人の兄弟姉妹である場合、当該相続人には遺留分がない。"],"answer":3},{"id":"R4-03","year":"R4","q":3,"category":"権利関係","question":"制限行為能力者に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["成年後見人は、後見監督人がいる場合には、後見監督人の同意を得なければ、成年被後見人の法律行為を取り消すことができない。","相続の放棄は相手方のない単独行為であるから、成年後見人が成年被後見人に代わってこれを行っても、利益相反行為となることはない。","成年後見人は成年被後見人の法定代理人である一方、保佐人は被保佐人の行為に対する同意権と取消権を有するが、代理権力附与されることはない。","令和4年4月1日からは、成年年齢が18歳となったため、18歳の者は、年齢を理由とする後見人の欠格事由に該当しない。"],"answer":4},{"id":"R4-04","year":"R4","q":4,"category":"権利関係","question":"A所有の甲土地にBのCに対する債務を担保するためにCの抵当権(以下この問において「本件抵当権」という。)が設定され、その旨の登記がなされた場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["Aから甲土地を買い受けたDが、Cの請求に応じてその代価を弁済したときは、本件抵当権はDのために消減する。","Cに対抗することができない賃貸借により甲土地を競売手続の開始前から使用するEは、甲土地の競売における買受人Fの買受けの時から6か月を経過するまでは、甲土地をFに引き渡すことを要しない。","本件抵当権設定登記後に、甲土地上に乙建物が築造された場合、Cが本件抵当権の実行として競売を申し立てるときには、甲土地とともに乙建物の競売も申し立てなければならない。","BがAから甲土地を買い受けた場合、Bは抵当不動産の第三取得者として、本件抵当権について、Cに対して抵当権消減請求をすることができる。"],"answer":1},{"id":"R4-05","year":"R4","q":5,"category":"権利関係","question":"期間の計算に関する次の記述のうち、民法の規定によれば、正しいものはどれか。なお、明記された日付は、日曜日、国民の祝日に関する法律に規定する休日その他の休日には当たらないものとする。","choices":["令和4年10月17日午前10時に、引渡日を契約締結日から1年後とする不動産の売買契約を締結した場合、令和5年10月16日が引渡日である。","令和4年8月31日午前10時に、弁済期限を契約締結日から1か月後とする金銭消費貸借契約を締結した場合、令和4年9月30日の終了をもって弁済期限となる。","期間の末日が日曜日、国民の祝日に関する法律に規定する休日その他の休日に当たるときは、その日に取引をしない慣習がある場合に限り、期間はその前日に満了する。","令和4年5月30日午前10時に、代金の支払期限を契約締結日から1か月後とする動産の売買契約を締結した場合、令和4年7月1日の終了をもって支払期限となる。"],"answer":2},{"id":"R4-06","year":"R4","q":6,"category":"権利関係","question":"Aを貸主、Bを借主として、A所有の甲土地につき、資材置場とする目的で期間を2年として、AB間で、①賃貸借契約を締結した場合と、②使用貸借契約を締結した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["Aは、甲土地をBに引き渡す前であれば、①では口頭での契約の場合に限り自由に解除できるのに対し、②では書面で契約を締結している場合も自由に解除できる。","Bは、①ではAの承諾がなければ甲土地を適法に転貸することはできないが、②ではAの承諾がなくても甲土地を適法に転貸することができる。","Bは、①では期間内に解約する権利を留保しているときには期間内に解約の申入れをし解約することができ、②では期間内に解除する権利を留保していなくてもいつでも解除することができる。","甲土地について契約の本旨に反するBの使用によって生じた損害がある場合に、Aが損害賠償を請求するときは、①では甲土地の返還を受けた時から5年以内に請求しなければならないのに対し、②では甲土地の返還を受けた時から1年以内に請求しなければならない。"],"answer":3},{"id":"R4-07","year":"R4","q":7,"category":"権利関係","question":"不在者Aが、家庭裁判所から失踪宣告を受けた。Aを単独相続したBは相続財産である甲土地をCに売却(以下この問において「本件売買契約」という。)して登記も移転したが、その後、生存していたAの請求によって当該失踪宣告が取り消された。本件売買契約当時に、Aの生存について、(ア)Bが善意でCが善意、(イ)Bが悪意でCが善意、(ウ)Bが善意でCが悪意、(エ)Bが悪意でCが悪意、の4つの場合があり得るが、これらのうち、民法の規定及び判例によれば、Cが本件売買契約に基づき取得した甲土地の所有権をAに対抗できる場合を全て掲げたものとして正しいものはどれか。","choices":["(ア)、(イ)、(ウ)","(ア)、(イ)","(ア)、(ウ)","(ア)"],"answer":4},{"id":"R4-08","year":"R4","q":8,"category":"権利関係","question":"AがB所有の甲土地を建物所有目的でなく利用するための権原が、①地上権である場合と②賃借権である場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、AもBも対抗要件を備えているものとする。","choices":["①でも②でも、特約がなくても、BはAに対して、甲土地の使用及び収益に必要な修繕をする義務を負う。","CがBに無断でAから当該権原を譲り受け、甲土地を使用しているときは、①でも②でも、BはCに対して、甲土地の明渡しを請求することができる。","①では、Aは当該権原を目的とする抵当権を設定することができるが、②では、Aは当該権原を目的とする抵当権を設定することはできない。","Dが甲土地を不法占拠してAの土地利用を妨害している場合、①では、Aは当該権原に基づく妨害排除請求権を行使してDの妨害の排除を求めることができるが、②では、AはDの妨害の排除を求めることはできない。"],"answer":3},{"id":"R4-09","year":"R4","q":9,"category":"権利関係","question":"辞任に関する次の記述のうち、民法の規定によれば、正しいものはいくつあるか。\nア委任によって代理権を授与された者は、報酬を受ける約東をしている場合であっても、いつでも委任契約を解除して代理権を消減させて、代理人を辞することができる。\nイ親権者は、やむを得ない事由があるときは、法務局に届出を行うことによって、親権を辞することができる。\nウ後見人は、正当な事由があるときは、後見監督人の許可を得て、その任務を辞することができる。\nエ遺言執行者は、正当な事由があるときは、相続人の許可を得て、その任務を辞することができる。","choices":["一つ","二つ","三つ","四つ"],"answer":1},{"id":"R4-10","year":"R4","q":10,"category":"権利関係","question":"AはBに対し、自己所有の甲土地を売却し、代金と引換えにBに甲土地を引き渡したが、その後にCに対しても甲土地を売却し、代金と引換えにCに甲土地の所有権登記を移転した。この場合におけるBによる甲土地の所有権の時効取得に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["Bが甲土地をDに賃貸し、引き渡したときは、Bは甲土地の占有を失うので、甲土地の所有権を時効取得することはできない。","Bが、時効の完成前に甲土地の占有をEに奪われたとしても、Eに対して占有回収の訴えを提起して占有を回復した場合には、Eに占有を奪われていた期間も時効期間に算入される。","Bが、甲土地の引渡しを受けた時点で所有の意思を有していたとしても、AC間の売買及びCに対する登記の移転を知ったときは、その時点で所有の意思が認められなくなるので、Bは甲土地を時効により取得することはできない。","Bが甲土地の所有権を時効取得した場合、Bは登記を備えなければ、その所有権を時効完成時において所有者であったCに対抗することはできない。"],"answer":2},{"id":"R4-11","year":"R4","q":11,"category":"権利関係","question":"建物の所有を目的とする土地の賃貸借契約(定期借地権及び一時使用目的の借地権となる契約を除く。)に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。","choices":["借地権の存続期間が満了する前に建物の滅失があった場合において、借地権者が借地権の残存期間を超えて存続すべき建物を築造したときは、その建物を築造することにつき借地権設定者の承諾がない場合でも、借地権の期間の延長の効果が生ずる。","転借地権が設定されている場合において、転借地上の建物が滅失したときは、転借地権は消滅し、転借地権者(転借人)は建物を再築することができない。","借地上の建物が減失し、借地権設定者の承諾を得て借地権者が新たに建物を築造するに当たり、借地権設定者が存続期間満了の際における借地の返還確保の目的で、残存期間を超えて存続する建物を築造しない旨の特約を借地権者と結んだとしても、この特約は無効である。","借地上の建物所有者が借地権設定者に建物買取請求権を適法に行使した場合、買取代金の支払があるまでは建物の引渡しを拒み得るとともに、これに基づく敷地の占有についても、賃料相当額を支払う必要はない。"],"answer":3},{"id":"R4-12","year":"R4","q":12,"category":"権利関係","question":"Aは、B所有の甲建物(床面積100m2)につき、居住を目的として、期間2年、賃料月額10万円と定めた賃貸借契約(以下この問において「本件契約」という。)をBと締結してその日に引渡しを受けた。この場合における次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。","choices":["BはAに対して、本件契約締結前に、契約の更新がなく、期間の満了により賃貸借が終了する旨を記載した賃貸借契約書を交付して説明すれば、本件契約を借地借家法第38条に規定する定期建物賃貸借契約として締結することができる。","本件契約が借地借家法第38条に規定する定期建物賃貸借契約であるか否かにかかわらず、Aは、甲建物の引渡しを受けてから1年後に甲建物をBから購入したCに対して、賃借人であることを主張できる。","本件契約が借地借家法第38条に規定する定期建物賃貸借契約である場合、Aの中途解約を禁止する特約があっても、やむを得ない事情によって甲建物を自己の生活の本拠として使用することが困難になったときは、Aは本件契約の解約の申入れをすることができる。","AがBに対して敷金を差し入れている場合、本件契約が期間満了で終了するに当たり、Bは甲建物の返還を受けるまでは、Aに対して敷金を返還する必要はない。"],"answer":1},{"id":"R4-13","year":"R4","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["管理者は、規約により、その職務に関し、区分所有者のために、原告又は被告となったときは、その旨を各区分所有者に通知しなくてよい。","管理者がないときは、区分所有者の5分の1以上で議決権の5分の1以上を有するものは、集会を招集することができる。ただし、この定数は、規約で減ずることができる。","集会において、管理者の選任を行う場合、規約に別段の定めがない限り、区分所有者及び一三ロ義決権の各過半数で決する。","管理組合(法第3条に規定する区分所有者の団体をいう。)は、区分所有者及び議決権の各4分の3以上の多数による集会の決議で法人となる旨並びにその名称及び事務所を定め、かっ、その主たる事務所の所在地において登記をすることによって法人となる。"],"answer":1},{"id":"R4-14","year":"R4","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、誤っているものはどれか。","choices":["所有権の移転の登記の申請をする場合には、申請人は、法令に別段の定めがある場合を除き、その申請情報と併せて登記原因を証する情報を提供しなければならない。","所有権の移転の登記の申請をする場合において、当該申請を登記の申請の代理を業とすることができる代理人によってするときは、登記識別情報を提供することができないことにつき正当な理由があるとみなされるため、登記義務者の登記識別情報を提供することを要しな","所有権の移転の登記の申請をする場合において、登記権利者が登記識別情報の通知を希望しない旨の申出をしたときは、当該登記に係る登記識別情報は通知されない。","所有権の移転の登記の申請をする場合において、その登記が完了した際に交付される登記完了証を送付の方法により交付することを求めるときは、その旨及び送付先の住所を申請情報の内容としなければならない。"],"answer":2},{"id":"R4-15","year":"R4","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、誤っているものはどれか。","choices":["市街化区域については、都市計画に、少なくとも用途地域を定めるものとされている。","準都市計画区域については、都市計画に、特別用途地区を定めることができる。","高度地区については、都市計画に、建築物の容積率の最高限度又は最低限度を定めるものとされている。","工業地域は、主として工業の利便を増進するため定める地域とされている。"],"answer":3},{"id":"R4-16","year":"R4","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["市街化区域内において、市街地再開発事業の施行として行うlhaの開発行為を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。","区域区分が定められていない都市計画区域内において、博物館法に規定する博物館の建築を目的とした8,000m2の開発行為を行おうとする者は、都道府県知事の許可を受けなくてよい。","自己の業務の用に供する施設の建築の用に供する目的で行う開発行為にあっては、開発区域内に土砂災害警戒区域等における土砂災害防止対策の推進に関する法律に規定する土砂災害警戒区域内の土地を含んではならない。","市街化調整区域内における開発行為について、当該開発行為が開発区域の周辺における市街化を促進するおそれがあるかどうかにかかわらず、都道府県知事は、開発審査会の議を経て開発許可をすることができる。"],"answer":2},{"id":"R4-17","year":"R4","q":17,"category":"法令上の制限","question":"建築基準法(以下この問において「法」という。)に関する次の記述のうち、正しいものはどれか。","choices":["法の改正により、現に存する建築物が改正後の法の規定に適合しなくなった場合には、当該建築物は違反建築物となり、速やかに改正後の法の規定に適合させなければならない。","延べ面積が500m2を超える建築物について、大規模な修繕をしようとする場合、都市計画区域外であれば建築確認を受ける必要はない。","地方公共団体は、条例で、建築物の敷地、構造又は建築設備に関して安全上、防火上又は衛生上必要な制限を附加することができる。","地方公共団体が、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定した場合には、災害危険区域内における住居の用に供する建築物の建築は一律に禁止されることとなる。"],"answer":3},{"id":"R4-18","year":"R4","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["第一種低層住居専用地域内においては、神社、寺院、教会を建築することはできない。","その敷地内に一定の空地を有し、かっ、その敷地面積が一定規模以上である建築物で、特定行政庁が交通上、安全上、防火上及び衛生上支障がなく、かっ、その建蔽率、容積率及び各部分の高さについて総合的な配慮がなされていることにより市街地の環境の整備改善に資すると認めて許可したものの建蔽率、容積率又は各部分の高さは、その許可の範囲内において、関係規定による限度を超えるものとすることができる。","法第3章の規定が適用されるに至った際、現に建築物が立ち並んでいる幅員1.8m未満の道で、あらかじめ、建築審査会の同意を得て特定行政庁が指定したものは、同章の規定における道路とみなされる。","第一種住居地域内においては、建築物の高さは、10m又は12mのうち当該地域に関する都市計画において定められた建築物の高さの限度を超えてはならない。"],"answer":3},{"id":"R4-19","year":"R4","q":19,"category":"法令上の制限","question":"宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、の問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["宅地造成工事規制区域内において、雨水その他の地表水又は地下水を排除するためのお冰施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となる。","宅地造成工事規制区域内において、森林を宅地にするために行う切土であって、高さ3mの崖を生ずることとなるものに関する工事については、造成主は、都市計画法第29条第1項又は第2項の許可を受けて行われる当該許可の内容に適合した工事を除き、工事に着手する前に、都道府県知事の許可を受けなければならない。","宅地造成工事規制区域内で過去に宅地造成に関する工事が行われ、現在は造成主とは異なる者がその工事が行われた宅地を所有している場合において、当該宅地の所有者は宅地造成に伴う災害が生じないよう、その宅地を常時安全な状態に維持するよう努めなければならな","宅地造成工事規制区域外に盛土によって造成された一団の造成宅地の区域において、造成された盛土の高さが5m未満の場合は、都道府県知事は、当該区域を造成宅地防災区域として指定することができない。"],"answer":4},{"id":"R4-20","year":"R4","q":20,"category":"法令上の制限","question":"次の記述のうち、土地区画整理法の規定及び判例によれば、誤っているものはどれか。","choices":["土地区画整理組合の設立の認可の公告があった日以後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある建築物の新築を行おうとする者は、土地区画整理組合の許可を受けなければならない。","土地区画整理組合は、定款に別段の定めがある場合においては、換地計画に係る区域の全部について工事が完了する以前においても換地処分をすることができる。","仮換地を指定したことにより、使用し、又は収益することができる者のなくなった従前の宅地については、当該宅地を使用し、又は収益することができる者のなくなった時から換地処分の公告がある日までは、施行者が当該宅地を管理する。","清算金の徴収又は交付に関する権利義務は、換地処分の公告によって換地についての所有権が確定することと併せて、施行者と換地処分時点の換地所有者との間に確定的に発生するものであり、換地処分後に行われた当該換地の所有権の移転に伴い当然に移転する性質を有するものではない。"],"answer":1},{"id":"R4-21","year":"R4","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["農地の賃貸借及び使用貸借は、その登記がなくても農地の引渡しがあったときは、これをもってその後にその農地について所有権を取得した第三者に対抗することができる。","法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。","法第4条第1項、第5条第1項の違反について原状回復等の措置に係る命令の対象となる者(違反転用者等)には、当該規定に違反した者又はその一般承継人は含まれるが、当該違反に係る土地について工事を請け負った者は含まれない。","法の適用については、土地の面積は、登記簿の地積によることとしているが、登記簿の地積が著しく事実と相違する場合及び登記簿の地積がない場合には、実測に基づき農業委員会が認定したところによる。"],"answer":4},{"id":"R4-22","year":"R4","q":22,"category":"法令上の制限","question":"国土利用計画法第23条の届出(以下この問において「事後届出」という。)に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。","choices":["都市計画区域外において、A市が所有する面積15,000m2の土地を宅地建物取引業者Bが購入した場合、Bは事後届出を行らなければならない。","事後届出において、土地売買等の契約に係る土地の土地に関する権利の移転又は設定の対価の額については届出事項ではない。","市街化区域を除く都市計画区域内において、一団の土地である甲土地(C所有、面積3,500(2)と乙土地(D所有、面積2,500m2)を宅地建物取引業者Eが購入した場合、Eは事後届出を行わなければならない。","都道府県知事は、土地利用審査会の意見を聴いて、事後届出をした者に対し、当該事後届出に係る土地の利用目的について必要な変更をすべきことを勧告することができ、勧告を受けた者がその勧告に従わない場合、その勧告に反する土地売買等の契約を取り消すことができる。"],"answer":3},{"id":"R4-23","year":"R4","q":23,"category":"税・その他","question":"印紙税に関する次の記述のうち、正しいものはどれか。なお、以下の覚書又は契約書はいずれも書面により作成されたものとする。","choices":["土地を8,000万円で譲渡することを証した覚書を売主Aと買主Bが作成した場合、本契約書を後日作成することを文書上で明らかにしていれば、当該覚書には印紙税が課されない。","一の契約書に甲土地の譲渡契約(譲渡金額6,000万円)と、乙建物の譲渡契約(譲渡金額3,000万円)をそれぞれ区分して記載した場合、印紙税の課税標準となる当該契約書の記載金額は、6,000万円である。","当初作成した土地の賃貸借契約書において「契約期間は5年とする」旨の記載がされていた契約期間を変更するために、「契約期間は10年とする」旨を記載した覚書を貸主Cと借主Dが作成した場合、当該覚書には印紙税が課される。","駐車場経営者Eと車両所有者Fが、Fの所有する車両を駐車場としての設備のある土地の特定の区画に駐車させる旨の賃貸借契約書を作成した場合、土地の賃借権の設定に関する契約書として印紙税が課される。"],"answer":3},{"id":"R4-24","year":"R4","q":24,"category":"税・その他","question":"固定資産税に関する次の記述のうち、正しいものはどれか。","choices":["固定資産税の徴収については、特別徴収の方法によらなければならない。","土地価格等縦覧帳簿及び家屋価格等縦覧帳簿の縦覧期間は、毎年4月1日から、4月・20日又は当該年度の最初の納期限の日のいずれか遅い日以後の日までの間である。","固定資産税の賦課期日は、市町村の条例で定めることとされている。","固定資産税は、固定資産の所有者に課するのが原則であるが、固定資産が賃借されている場合は、当該固定資産の賃借権者に対して課される。"],"answer":2},{"id":"R4-25","year":"R4","q":25,"category":"税・その他","question":"地価公示法に関する次の記述のうち、誤っているものはどれか。","choices":["土地鑑定委員会は、標準地の正常な価格を判定したときは、標準地の単位面積当たりの価格のほか、当該標準地の地積及び形状についても官報で公示しなければならない。","正常な価格とは、土地について、自由な取引が行われるとした場合におけるその取引(一定の場合を除く。)において通常成立すると認められる価格をいい、当該土地に建物がある場合には、当該建物が存するものとして通常成立すると認められる価格をいう。","公示区域内の土地について鑑定評価を行う場合において、当該土地の正常な価格を求めるときは、公示価格を規準とする必要があり、その際には、当該土地とこれに類似する利用価値を有すると認められる1又は2以上の標準地との位置、地積、環境等の土地の客観的価値に作用する諸要因についての比較を行い、その結果に基づき、当該標準地の公示価格と当該土地の価格との間に均衡を保たせる必要がある。","公示区域とは、都市計画法第4条第2項に規定する都市計画区域その他の土地取引が相当程度見込まれるものとして国土交通省令で定める区域のうち、国土利用計画法第12条第1項の規定により指定された規制区域を除いた区域をいう。"],"answer":2},{"id":"R4-26","year":"R4","q":26,"category":"宅建業法","question":"宅地建物取引業法第3条第1項に規定する事務所(以下この問において「事務所」という。)に関する次の記述のうち、正しいものはどれか。","choices":["事務所とは、契約締結権限を有する者を置き、継続的に業務を行うことができる施設を有する場所を指すものであるが、商業登記簿に登載されていない営業所又は支店は事務所には該当しない。","宅地建物取引業を営まず他の兼業業務のみを営んでいる支店は、事務所には該当しない。","宅地建物取引業者は、.主たる事務所については、免許証、標識及び国土交通大臣が定めた報酬の額を掲げ、従業者名簿及び帳簿を備え付ける義務を負う。","宅地建物取引業者は、その事務所ごとに一定の数の成年者である専任の宅地建物取引士を置かなければならないが、既存の事務所がこれを満たさなくなった場合は、30日以内に必要な措置を執らなければならない。"],"answer":2},{"id":"R4-27","year":"R4","q":27,"category":"宅建業法","question":"宅地建物取引業者A(消費税課税事業者)が受け取ることができる報酬についての次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["Aが、Bから売買の媒介を依頼され、Bからの特別の依頼に基づき、遠隔地への現地調査を実施した。その際、当該調査に要する特別の費用について、Bが負担することを事前に承諾していたので、Aは媒介報酬とは別に、当該調査に要した特別の費用相当額を受領することができる。","Aが、居住用建物について、貸主Bから貸借の媒介を依頼され、この媒介が使用貸借に係るものである場合は、当該建物の通常の借賃をもとに報酬の限度額が定まるが、その算定に当たっては、不動産鑑定業者の鑑定評価を求めなければならない。","Aが居住用建物の貸主B及び借主Cの双方から媒介の依頼を受けるに当たって、依頼者の一方から受けることのできる報酬の額は、借賃の1か月分の0.55倍に相当する金額以内である。ただし、媒介の依頼を受けるに当たって、依頼者から承諾を得ている場合はこの限りではなく、双方から受けることのできる報酬の合計額は借賃の1か月分の1.1倍に相当する金額を超えてもよい。","Aは、土地付建物について、売主Bから媒介を依頼され、代金.300万円(消費税等相当額を含み、土地代金は80万円である。)で契約を成立させた。現地調査等の費用については、通常の売買の媒介に比べ5万円(消費税等相当額を含まない。)多く要する旨、Bに対して説明し、合意の上、媒介契約を締結した。この場合、AがBから受領できる報酬の限度額は20万200円である。"],"answer":1},{"id":"R4-28","year":"R4","q":28,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者が、宅地建物取引業者ではない個人から媒介業者の仲介なしに土地付建物を購入する場合、買主である宅地建物取引業者は重要事項説明書を作成しなくても宅地建物取引業法違反とはならない。","宅地建物取引業者が、重要事項説明書を作成する際、調査不足のため、重要事項説明書に記載された内容が事実と異なるものとなったが、意図的に事実と異なる内容を記載したものではないため、宅地建物取引業法違反とはならない。","宅地建物取引業者は、土地売買の媒介を行う場合、宅地建物取引業者ではない売主に対して契約が成立する前までの間に、宅地建物取引士をして重要事項説明書を交付して説明をさせなければならない。","宅地又は建物の取引は権利関係や法令上の制限など取引条件に関する事項が複雑で多岐にわたるため、重要事項説明書は、宅地又は建物の取引の専門的知識を有する宅地建物取引士が作成しなければならない。"],"answer":1},{"id":"R4-29","year":"R4","q":29,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["宅地建物取引士は、禁錮以上の刑に処せられた場合、刑に処せられた日から30日以内に、その旨を宅地建物取引士の登録を受けた都道府県知事に届け出なければならない。","宅地建物取引士は、業務に関して事務禁止の処分を受けた場合、速やかに、宅地建物取引士証をその交付を受けた都道府県知事に提出しなければならず、これを怠った場合には罰則の適用を受けることがある。","宅地建物取引士は、有効期間の満了日が到来する宅地建物取引士証を更新する場合、国土交通大臣が指定する講習を受講しなければならず、また、当該宅地建物取引士証の有効期間は5年である。","宅地建物取引士は、宅地建物取引士の信用を害するような行為をしてはならず、信用を害するよめな行為には、宅地建物取引士の職務に必ずしも直接関係しない行為や私的な行為も含まれる。"],"answer":3},{"id":"R4-30","year":"R4","q":30,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法(以下この問において「法」という。)及び犯罪による収益の移転防止に関する法律の規定によれば、正しいものはいくつあるか。\nア法第35条第2項の規定による割賦販売とは、代金の全部又は一部について、目的物の引渡し後6か月以上の期間にわたり、かっ、2回以上に分割して受領することを条件として販売することをいう。\nイ罪による収益の移転防止に関する法律において、宅地建物取引業のうち、宅地若しくは建物の売買契約の締結又はその代理若しくは媒介が特定取引として規定されている。\nウ宅地建物取引業者は、その従業者に対し、その業務を適正に実施させるため、必要な教育を行うよう努めなければならないと法に定められている。\nエ宅地建物取引業者の使用人その他の従業者は、正当な理由がある場合でなければ,宅地建物取引業の業務を補助したことについて知り得た秘密を他に漏らしてはならないと法に定められている。","choices":["一つ","二つ","三つ","なし"],"answer":3},{"id":"R4-31","year":"R4","q":31,"category":"宅建業法","question":"宅地建物取引業者Aが、BからB所有の土地付建物の売却について媒介の依頼を受けた場合における次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["Aが、Bと一般媒介契約を締結した場合、AがBに対し当該土地付建物の価額について意見を述べるために行った価額の査定に要した費用をBに請求することはできない。","Aは、Bとの間で締結した媒介契約が一般媒介契約である場合には、専任媒介契約の場合とは異なり、法第34条の2第1項の規定に基づく書面に、売買すべき価額を記載する必要はない。","Aが、Bとの間で締結した専任媒介契約については、Bからの申出により更新することができ、その後の有効期間については、更新の時から3か月を超える内容に定めることができる。","Aが、当該土地付建物の購入の媒介をCから依頼され、Cとの間で一般媒介契約を締結した場合、Aは、買主であるCに対しては、必ずしも法第34条の2第1項の規定に基づく書面を交付しなくともよい。"],"answer":1},{"id":"R4-32","year":"R4","q":32,"category":"宅建業法","question":"宅地建物取引業法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["宅地建物取引業者である売主Aは、宅地建物取引業者であるBの媒介により、宅地建物取引業者ではないCと宅地の売買契約を令和4年4月1日に締結した。AとBが共同で作成した37条書面にBの宅地建物取引士の記名押印がなされていれば、Aは37条書面にAの宅地建物取引士をして記名押印をさせる必要はない。","宅地建物取引士は、37条書面を交付する際、買主から請求があったときは、宅地建物取引士証を提示しなければならない。","宅地建物取引業者である売主Dと宅地建物取引業者ではないEとの建物の売買契約において、手付金の保全措置を講ずる場合、Dはその保全措置の概要を、重要事項説明書に記載し説明する必要があるが、37条書面には記載する必要はない。","宅地建物取引業者である売主と宅地建物取引業者ではない個人との建物の売買において、建物の品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任について特約を定めたときは、37条書面にその内容を記載しなければならない。"],"answer":1},{"id":"R4-33","year":"R4","q":33,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア宅地建物取引士資格試験は未成年者でも受験することができるが、宅地建物取引士の登録は成年に達するまでいかなる場合にも受けることができない。\nイ甲県知事登録の宅地建物取引士が、宅地建物取引業者(乙県知事免許)の専任の宅地建物取引士に就任するためには、宅地建物取引士の登録を乙県に移転しなければならない。\nウ丙県知事登録の宅地建物取引士が、事務の禁止の処分を受けた場合、丁県に所在する宅地建物取引業者の事務所の業務に従事しようとするときでも、その禁止の期間が満了するまで、宅地建物取引士の登録の移転を丁県知事に申請することができない。\nエ戊県知事登録の宅地建物取引士が、己県へ登録の移転の申請とともに宅地建物取引士証の交付を申請した場合、己県知事が宅地建物取引士証を交付するときは、戊県で交付された宅地建物取引士証の有効期間が経過するまでの期間を有効期間とする宅地建物取引士証を交付しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R4-34","year":"R4","q":34,"category":"宅建業法","question":"宅地建物取引業者が建物の売買の媒介の際に行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。","choices":["当該建物が既存の建物であるときは、宅地建物取引業法第34条の2第1項第4号に規定する建物状況調査を過去1年以内に実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。","当該建物が宅地造成等規制法の規定により指定された造成宅地防災区域内にあるときは、その旨を説明しなければならない。","当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容を説明しなければならない。","当該建物(昭和56年5月31日以前に新築の工事に着手したもの)が指定確認検査機関、建築士、登録住宅性能評価機関又は地方公共団体による耐震診断を受けたものであるときは、その旨を説明しなければならない。"],"answer":4},{"id":"R4-35","year":"R4","q":35,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者の従業者である宅地建物取引士は、取引の関係者から事務所で従業者証明書の提示を求められたときは、この証明書に代えて従業者名簿又は宅地建物取引士証を提示することで足りる。","宅地建物取引業者Aが所有する甲建物を法人Bに売却するに当たり、Bが宅地建物取引業者であるか否かにかかわらず、AはBに対し、宅地建物取引士をして、法第35条の規定に基づく書面を交付し説明をさせなければならない。","法人Cが所有する乙建物の個人Dへの賃貸を宅地建物取引業者Eが媒介し、当該賃貸借契約が成立したときは、EはDに対し、宅地建物取引士をして、法第35条の規定に基づく書面を交付し説明をさせなければならない。","宅地建物取引業者Fが所有する丙宅地を法人Gに売却する契約を締結したとき、Gが宅地建物取引業者であるか否かにかかわらず、FはGに対し、法第37条の規定に基づく書面を交付しなければならない。"],"answer":4},{"id":"R4-36","year":"R4","q":36,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。","choices":["建物の売買の媒介を行う場合、当該建物が既存の住宅であるときは当該建物の検査済証(宅地建物取引業法施行規則第16条の2の3第2号に定めるもの)の保存の状況について説明しなければならず、当該検査済証が存在しない場合はその旨を説明しなければならない。","宅地の売買の媒介を行う場合、売買代金の額並びにその支払の時期及び方法について説明しなければならない。","建物の貸借の媒介を行う場合、当該建物が、水防法施行規則第11条第1号の規定により市町村(特別区を含む。)の長が提供する図面にその位置が表示されている場合には、当該図面が存在していることを説明すれば足りる。","自ら売主となって建物の売買契約を締結する場合、当該建物の引渡しの時期について説明しなければならない。"],"answer":1},{"id":"R4-37","year":"R4","q":37,"category":"宅建業法","question":"宅地建物取引業者Aがその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはいくつあるか。\nアAが未完成の建売住宅を販売する場合、建築基準法第6条第1項に基づく確認を受けた後、同項の変更の確認の申請書を提出している期間においては、変更の確認を受ける予定であることを表示し、かっ、当初の確認内容を合わせて表示すれば、変更の確認の内容を広告することができる。\nイAが新築住宅の売買に関する広告をインターネットで行った場合、実際のものより著しく優良又は有利であると人を誤認させるような表示を行ったが、当該広告について問合せや申込みがなかったときは、法第32条に定める誇大広告等の禁止の規定に違反しない。\nウAが一団の宅地の販売について、数回に分けて広告をするときは、そのたびごとに広告へ取引態様の別を明示しなければならず、当該広告を見た者から売買に関する注文を受けたときも、改めて取引態様の別を明示しなければならない。","choices":["一つ","二つ","三つ","なし"],"answer":2},{"id":"R4-38","year":"R4","q":38,"category":"宅建業法","question":"宅地建物取引業者が自ら売主となる宅地の売買契約について、買受けの申込みを喫茶店で行った場合における宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはどれか。","choices":["買受けの申込みをした者が、売買契約締結後、当該宅地の引渡しを受けた場合、クーリング。オフによる当該売買契約の解除を行うことができない。","買受けの申込みをした者が宅地建物取引業者であった場合、クーリング・オフについて告げられていなくても、申込みを行った日から起算して8日を経過するまでは、書面により買受けの申込みの撤回をすることができる。","売主業者の申出により、買受けの申込みをした者の勤務先で売買契約を行った場合、クーリング・オフによる当該売買契約の解除を行うことはできない。",".クーリング・オフによる売買契約の解除がなされた場合において、宅地建物取引業者は、買受けの申込みをした者に対し、速やかに、当該売買契約の締結に際し受領した手付金その他の金銭を返還しなければならない。"],"answer":4},{"id":"R4-39","year":"R4","q":39,"category":"宅建業法","question":"宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["保証協会は、弁済業務保証金について弁済を受ける権利を有する者から認証申出書の提出があり、認証に係る事務を処理する場合には、各月ごとに、認証申出書に記載された取引が成立した時期の順序に従ってしなければならない。","保証協会は、当該保証協会の社員から弁済業務保証金分担金の納付を受けたときは、その納付を受けた額に相当する額の弁済業務保証金を当該社員の主たる事務所の最寄りの供託所に供託しなければならない。","保証協会の社員が弁済業務保証金分担金を納付した後に、新たに事務所を設置したときは、その日から2週間以内に保証協会に納付すべき弁済業務保証金分担金について、国債証券をもって充てることができる。","宅地建物取引業者と宅地の売買契約を締結した買主(宅地建物取引業者ではない。)は、当該宅地建物取引業者が保証協会の社員となる前にその取引により生じた債権に関し、当該保証協会が供託した弁済業務保証金について弁済を受ける権利を有する。"],"answer":4},{"id":"R4-40","year":"R4","q":40,"category":"宅建業法","question":"建物の貸借の媒介を行う宅地建物取引業者が、その取引の相手方(宅地建物取引業者を除く。)に対して、次のアから工の発言に続けて宅地建物取引業法第35条の規定に基づく重要事項の説明を行った場合のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。\nア本日は重要事項の説明を行うためにお電話しました。お客様はIT環境をお持ちでなく映像を見ることができないとのことですので、宅地建物取引士である私が記名押印した重要事項説明書は現在お住まいの住所に郵送いたしました。このお電話にて重要事項の説明をさせていただきますので、お手元でご覧いただきながらお聞き願います。\nイ建物の貸主が宅地建物取引業者で、代表者が宅地建物取引士であり建物の事情に詳しいことから、その代表者カ材乍成し、記名押印した重要事項説明書がこちらになります。当社の宅地建物取引士は同席しますが、説明は貸主の代表者が担当します。\nウこの物件の担当である弊社の宅地建物取引士が本日急用のため対応できなくなりましたが、せつかくお越しいただきましたので、重要事項説明書にある宅地建物取引士欄を訂正の上、宅地建物取引士である私が記名押印をし、代わりに説明をいたします。私の宅地建物取引士正をお見せします。\nエ本日はお客様のご希望ですので、テレビ会議を用いて重要事項の説明を行います。当社の側の音声は聞こえていますでしようか。十分に聞き取れたとのお返事、こちらにも聞こえました。では、説明を担当する私の宅地建物取引士証をお示ししますので、画面上でご確認をいただき、私の名前を読み上げていただけますでしようか。そうです、読み方も間違いありません。それでは、双方音声・映像ともやりとりできる状況ですので、説明を始めます。事前にお送りした私が記名押印した重要事項説明書をお手元にご用意ください。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R4-41","year":"R4","q":41,"category":"宅建業法","question":"営業保証金及び宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。\nア宅地建物取引業者の代表者が、その業務に関し刑法第222条(脅迫)の罪により懲役の刑に処せられたことを理由に宅地建物取引業の免許を取り消された場合、当該宅地建物取引業者であった者は、当該刑の執行を終わった日から5年間は供託した営業保証金を取り戻すことができない。\nイ営業保証金の還付により、営業保証金が政令で定める額に不足することとなったため、国土交通大臣又は都道府県知事から不足額を供託すべき旨の通知書の送付を受けた宅地建物取引業者は、その送付を受けた日から2週間以内にその不足額を供託しなければならない。\nウ保証協会の社員は、自らが取り扱った宅地建物取引業に係る取引の相手方から当該取引に関する苦情について解決の申出が保証協会にあり、保証協会から関係する資料の提出を求められたときば、正当な理由がある場合でなければ、これを拒んではならない。\nエ保証協会の社員と宅地建物取引業に関し取引をした者は、その取引により生じた債権に関し、当該社員が納付した弁済業務保証金の額に相当する額の範囲内において弁済を受ける権利を有する。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R4-42","year":"R4","q":42,"category":"宅建業法","question":"宅地建物取引業者Aが、BからB所有の宅地の売却を依頼され、Bと専属専任媒介契約(以下この問において「本件媒介契約」という。)を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["AはBに対して、契約の相手方を探索するために行った措置など本件媒介契約に係る業務の処理状況を2週間に1回以上報告しなければならない。","AがBに対し当該宅地の価額又は評価額について意見を述べるときは、その根拠を明らかにしなければならないが、根拠の明示は口頭でも書面を用いてもどちらでもよい。","本件媒介契約の有効期間について、あらかじめBからの書面による申出があるときは、3か月を超える期間を定めることができる。","Aは所定の事項を指定流通機構に登録した場合、Bから引渡しの依頼がなければ、その登録を証する書面を・Bに引き渡さなくてもよい。"],"answer":2},{"id":"R4-43","year":"R4","q":43,"category":"宅建業法","question":"宅地建物取引業者Aが自ら売主として行う売買契約に関する次の記述のうち、、1三宅地建物取引業法の規定によれば、誤っているものはどれか。なお、買主は宅地建物取引業者ではないものとする。","choices":["Aが、宅地又は建物の売買契約に際して手付を受領した場合、その手付がいかなる性質のものであっても、Aが契約の履行に着手するまでの間、買主はその手付を放棄して契約の解除をすることができる。","Aが、土地付建物の売買契約を締結する場合において、買主との間で、「売主は、売買物件の引渡しの日から1年間に限り当該物件の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保する責任を負う」とする旨の特約を設けることができる。","販売代金2,500万円の宅地について、Aが売買契約の締結を行い、損害賠償の額の予定及び違約金の定めをする場合、その合計額を500万円と設定することができる。","Aが建物の割賦販売を行った場合、当該建物を買主に引き渡し、かっ、代金の額の10分の3を超える額の支払を受けた後は、担保の目的で当該建物を譲り受けてはならない。"],"answer":2},{"id":"R4-44","year":"R4","q":44,"category":"宅建業法","question":"宅地建物取引業法(以下この問において「法」という。)第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、宅地建物取引業者Aが法の規定に違反するものはどれか。","choices":["Aは、自ら売主として宅地建物取引業者ではないBとの間で宅地の売買契約を締結した。この際、当該買主の代理として宅地建物取引業者Cが関与していたことから、37条書面をBに加え、Cにも交付した。","Aは、その媒介により建物の貸借の契約を成立させ、37条書面を借主に交付するに当たり、37条書面に記名した宅地建物取引士が不在であったことから、宅地建物取引士ではないAの従業員に書面を交付させた。","Aは、その媒介により借主Dと建物の貸借の契約を成立させた。この際、借賃以外の金銭の授受に関する定めがあるので、その額や当該金銭の授受の時期だけでなく、当該金銭の授受の目的についても37条書面に記載し、Dに交付した。","Aは、自ら売主として宅地建物取引業者Eの媒介により、宅地建物取引業者Fと宅地の売買契約を締結した。37条書面については、A、E、Fの三者で内容を確認した上で各自作成し、交付せずにそれぞれ自ら作成した書類を保管した。"],"answer":4},{"id":"R4-45","year":"R4","q":45,"category":"宅建業法","question":"特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者は、自ら売主として宅地建物取引業者である買主との間で新築住宅の売買契約を締結し、その住宅を引き渡す場合、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。","住宅販売瑕疵担保責任保険契約は、新築住宅の引渡し時から10年以上有効でなければならないが、当該新築住宅の買主の承諾があれば、当該保険契約に係る保険期間を5年間に短縮することができる。","自ら売主として新築住宅を販売する宅地建物取引業者は、基準日から3週間を経過する日までの間において、当該基準日前10年間に自ら売主となる売買契約に基づき宅地建物取引業者ではない買主に引き渡した新築住宅(住宅販売瑕疵担保責任保険契約に係る新築住宅を除く。)について、住宅販売瑕疵担保保証金の供託をしていなければならない。かし","宅地建物取引業者が住宅販売瑕疵担保保証金の供託をし、その額が、基準日において、販売新築住宅の合計戸数を基礎として算定する基準額を超えることとなった場合、宅地建物取引業法の免許を受けた国土交通大臣又は都道府県知事の承認がなくても、その超過額を取り戻すことができる。"],"answer":3},{"id":"R4-46","year":"R4","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構(以下この問において「機構」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権の譲受けを業務として行っているが、当該住宅の建設又は購入に付随する土地又は借地権の取得に必要な資金については、譲受けの対象としていない。","機構は、団体信用生命保険業務において、貸付けを受けた者が死亡した場合のみならず、重度障害となった場合においても、支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当することができる。","証券化支援事業(買取型)において、機構による譲受けの対象となる貸付債権の償還方法には、元利均等の方法であるものに加え、元金均等の方法であるものもある。","機構は、証券化支援事業(買取型)において、MBS(資産担保証券)を発行することにより、債券市場(投資家)から資金を調達している。"],"answer":1},{"id":"R4-47","year":"R4","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。","choices":["物件からスーパーマーケット等の商業施設までの徒歩所要時間は、道路距離80mにつき1分間を要するものとして算出し、1分未満の端数が生じたときは、端数を切り捨てて表示しなければならない。","インターネット上に掲載した賃貸物件の広告について、掲載直前に契約済みとなっていたとしても、消費者からの問合せに対して既に契約済みであり取引できない旨を説明すれば、不当表示に問われることはない。","マンションの管理費について、住戸により管理費の額が異なる場合において、その全ての住宅の管理費を示すことが困難であるときは、最高額のみを表示すればよい。","建築条件付土地の取引の広告においては、当該条件の内容、当該条件が成就しなかったときの措置の内容だけでなく、そもそも当該取引の対象が土地であることも明らかにして表示しなければならない。"],"answer":4},{"id":"R4-48","year":"R4","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["建築着工統計調査報告(令和3年計。令和4年1月公表)によれば、令和3年の新設住宅の着工戸数のうち、持家は前年比で増加したが、貸家及び分譲住宅は前年比で減少した。","令和4年地価公示(令和4年3月公表)によれば、令和3年1月以降の1年間の住宅地の地価は、三大都市圏平均では下落したものの、それ以外の地方圏平均では上昇した。","令和4年版土地白書(令和4年6月公表)によれば、令和3年の全国の土地取引件数は約133万件となり、土地取引件数の対前年比は令和元年以降減少が続いている。","国土交通省の公表する不動産価格指数のうち、全国の商業用不動産総合の季節調整値は、2021年(令和3年)においては第1四半期から第4四半期まで連続で対前期比増となった。"],"answer":[1,2,3,4]},{"id":"R4-49","year":"R4","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["台地の上の浅い谷は、豪雨時には一時的に浸水することがあり、注意を要する。","低地は、一般に洪水や地震などに対して強く、防災的見地から住宅地として好ましい。","埋立地は、平均海面に対し4~5mの比高があり護岸が強固であれば、住宅地としても利用が可能である。","国土交通省が運営するハザードマップポータルサイトでは、洪水、土砂災害、高潮、津波のリスク情報などを地図や写真に重ねて表示できる。"],"answer":2},{"id":"R4-50","year":"R4","q":50,"category":"免除科目","question":"建築物の構造に関する次の記述のうち、最も不適当なものはどれか。","choices":["木構造は、主要構造を木質系材料で構成するものであり、在来軸組構法での主要構造は、一般に軸組、小屋組、床組からなる。","在来軸組構法の軸組は、通常、水平材である土台、桁、胴差と、垂直材の柱及び耐カ壁からなる。","小屋組は、屋根の骨組であり、小屋梁、小屋束、母屋、垂木等の部材を組み合わせた和小屋と、陸梁、束、方杖等の部材で形成するトラス構造の洋小屋がある。","軸組に仕上げを施した壁には、真壁と大壁があり、真壁のみで構成する洋風構造と、大壁のみで構成する和風構造があるが、これらを併用する場合はない。"],"answer":4},{"id":"R3A-01","year":"R3A","q":1,"category":"権利関係","question":"次の1から4までの記述のうち、民法の規定、判例及び下記判決文によれは、正しいものはどれか。(判決文)賃貸人は、特別の約定のないかぎり、賃借人から家屋明渡を受けた後に前記の敷金残額を返還すれば足りるものと解すべく、したがって、家屋明渡債務と敷金返還債務とは同時履行の関係にたつものではないと解するのが相当であり、このことは、賃貸借の終了原因が解除(解約)による場合であっても異なるところはないと解すべきである。","choices":["賃借人の家屋明渡債務が賃貸人の敷金返還債務に対し先履行の関係に立っと解すべき場合、賃借人は賃貸人に対し敷金返還請求権をもって家屋につき留置権を取得する余地はない。","賃貸借の終了に伴う賃借人の家屋明渡債務と賃貸人の敷金返還債務とは、1個の双務契約によって生じた対価的債務の関係にあるものといえる。","賃貸借における敷金は、賃貸借の終了時点までに生じた債権を担保するものであって、賃貸人は、賃貸借終了後賃借人の家屋の明渡しまでに生じた債権を敷金から控除することはできない。","賃貸借の終了に伴う賃借人の家屋明渡債務と賃貸人の敷金返還債務の間に同時履行の関係を肯定することは、家屋の明渡しまでに賃貸人が取得する一切の債権を担保することを目的とする敷金の性質にも適合する。"],"answer":1},{"id":"R3A-02","year":"R3A","q":2,"category":"権利関係","question":"債務者A、B、Cの3名が、令和3年7月1日に、内部的な負担部分の割合は等しいものとして合意したヒで、債権者Dに対して300万円の連帯債務を負った場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["DがAに対して裁判上の請求を行ったとしても、特段の合意がなければ、BとCがDに対して負う債務の消滅時効の完成には影響しない。","BがDに対して300万円の債権を有している場合、Bが相殺を援用しない間に300万円の支払の請求を受けたCは、BのDに対する債権で相殺する旨の意思表示をすることができる。","DがCに対して債務を免除した場合でも、特段の合意がなければ、DはAに対してもBに対しても、弁済期が到来した300万円全額の支払を請求することができる。","AとDとの間に更改があったときは、300万円の債権は、全ての連帯債務者の利益のために消滅する。"],"answer":2},{"id":"R3A-03","year":"R3A","q":3,"category":"権利関係","question":"個人として事業を営むAが死亡した場合に関する次の記述のうち、民法の規定によれば、誤っているものはいくつあるか。なお、いずれの契約も令和3年7月1日付けで締結されたものとする。\nアAがBとの間でB所有建物の清掃に関する準委任契約を締結していた場合、Aの相続人は、Bとの間で特段の合意をしなくても、当該準委任契約に基づく清掃業務を行う義務を負う。\nイAがA所有の建物について賃借人Cとの間で賃貸借契約を締結している期間中にAが死亡した場合、Aの相続人は、Cに賃貸借契約を継続するか否かを相当の期間を定めて催告し、期間内に返答がなければ賃貸借契約をAの死亡を理由に解除することができる。\nウAがA所有の土地について買主Dとの間で売買契約を締結し、当該土地の引渡しと残代金決済の前にAが死亡した場合、当該売買契約は原始的に履行が不能となって無効となる。\nエAがE所有の建物について貸主Eとの間で使用貸借契約を締結していた場合、Aの相続人は、Eとの間で特段の合意をしなくても、当該使用貸借契約の借主の地位を相続して当該建物を使用することができる。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R3A-04","year":"R3A","q":4,"category":"権利関係","question":"被相続人Aの配偶者Bが、A所有の建物に相続開始の時に居住していたため、遺産分割協議によって配偶者居住権を取得した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["遣産分割協議でBの配偶者居住権の存続期間を20年と定めた場合、存続期間が満了した時点で配偶者居住権は消滅し、配偶者居住権の延長や史新はできない。","Bは、配偶者居住権の存続期間内であれば、居住している建物の所有者の承諾を得ることなく、第三者に当該建物を賃貸することができる。","配偶者居住権の存続期間中にBが死亡した場合、Bの相続人CはBの有していた配偶者居住権を相続する。","Bか配偶者居住権に基づいて居住している建物が第三者Dに売却された場合、Bは、配偶者居住権の登記がなくてもDに対抗することができる。"],"answer":1},{"id":"R3A-05","year":"R3A","q":5,"category":"権利関係","question":"次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["令和3年4月1日において18歳の者は成年であるので、その時点で、携帯電話サービス・の契約や不動産の賃貸借契約を1人で締結することができる。","養育費は、子供が未成熟であって経済的に自立することを期待することができない期間を対象として支払われるものであるから、子供が成年に達したときは、当然に養育費の支払義務が終了する。","営業を許された未成年者が、その営業に関するか否かにかかわらず、第三者から法定代理人の同意なく負担付贈与を受けた場合には、法定代理人は当該行為を取り消すことができな","意思能力を有しないときに行った不動産の売買契約は、後見開始の審判を受けているか否かにかかわらず効力を有しない。"],"answer":4},{"id":"R3A-06","year":"R3A","q":6,"category":"権利関係","question":"売買代金債権(以下この問において「債権」という。)の譲渡(令和3年7月1日に譲渡契約が行われたもの)に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["譲渡制限の意思表示がされた債権が譲渡された場合、当該債権譲渡の効力は妨げられないが、債務者は、その債権の全額に相当する金銭を供託することができる。","債権が譲渡された場合、その意思表示の時に債権が現に発生していないときは、譲受人は、その後に発生した債権を取得できない。","譲渡制限の意思表示がされた債権の譲受人が、その意思表示がされていたことを知っていたときは、債務者は、その債務の履行を拒むことができ、かっ、譲渡人に対する弁済その他の債務を消滅させる事由をもって譲受人に対抗することができる。","債権の譲渡は、譲渡人が債務者に通知し、又は債務者が承諾をしなければ、債務者その他の第三者に対抗することができず、その譲渡の通知又は承諾は、確定日付のある証書によってしなければ、債務者以外の第三者に対抗することができない。"],"answer":2},{"id":"R3A-07","year":"R3A","q":7,"category":"権利関係","question":"Aを売主、Bを買主として、A所有の甲自動車を50万円で売却する契約(以下この問において「本件契約」という。)が令和3年7月1日に締結された場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["Bが甲自動車の引渡しを受けたが、甲自動車のエンジンに契約の内容に適合しない欠陥があることが判明した場合、BはAに対して、甲自動車の修理を請求することができる。","Bが甲自動車の引渡しを受けたか、甲自動車に契約の内容に適合しない修理不能な損傷があることが判明した場合、BはAに対して、売買代金の減額を請求することができる。","Bが引渡しを受けた甲自動車が故障を起こしたときは、修理が可能か否かにかかわらず、BはAに対して、修理を請求することなく、本件契約の解除をすることができる。","甲自動車について、第三者CがA所有ではなくC所有の自動車であると主張しており、Bが所有権を取得できないおそれがある場合、Aが相当の担保を供したときを除き、BはAに対して、売買代金の支払を拒絶することができる。"],"answer":3},{"id":"R3A-08","year":"R3A","q":8,"category":"権利関係","question":"Aが1人で居住する甲建物の保存に瑕疵があったため、令和3年7月1日に甲建物の壁が崩れて通行人Bがケガをした場合(以下この間において「本件事故」という。)における次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["Aが甲建物をCから賃借している場合、Aは甲建物の保存の瑕疵による損害の発生の防止に必要な注意をしなかったとしても、Bに対して不法行為責任を負わない。","Aが甲建物を所有している場合、Aは甲建物の保存の瑕疵による損害の発生の防止に必要な注意をしたとしても、Bに対して不法行為責任を負う。","本件事故について、AのBに対する不法行為責任が成立する場合、BのAに対する損害賠償請求権は、B又はBの法定代理人が損害又は加害者を知らないときでも、本件事故の時から20年間行使しないときには時効により消滅する。","本件事故について、AのBに対する不法行為責任が成立する場合、BのAに対する損害賠償請求権は、B又はBの法定代理人が損害及び加害者を知った時から5年間行使しないときには時効により消滅する。"],"answer":1},{"id":"R3A-09","year":"R3A","q":9,"category":"権利関係","question":"Aには死亡した夫Bとの間に子Cがおり、Dには離婚した前妻Eとの間に子F及び子Gがいる。Fの親権はEが有し、Gの親権はDが有している。AとDが婚姻した後にDが令和3年7月1日に死亡した場合における法定相続分として、民法の規定によれば、正しいものはどれか。","choices":["Aが2分の1、Fが4分の1、Gが4分の1","Aが2分の1、Cが6分の1、Fが6分の1、Gが6分の1","Aが2分の1、Gが2分の1","Aが2分の1、Cが4分の1、Gが4分の1"],"answer":1},{"id":"R3A-10","year":"R3A","q":10,"category":"権利関係","question":"AとBとの間で、Aを売主、Bを買主とする、等価値の美術品甲又は乙のいずれか選択によって定められる美術品の売買契約(以ドこの問において「本件契約」という。)が令和3年7月1日に締結された場合に関する次の記述のうち、民法の規定によれは、正しいものはどれか。","choices":["本件契約において、給付の目的を甲にするか乙にするかについて、第二者Cを選択権者とする合意がなされた場合、Cが選択をすることができないときは、選択権はBに移転する。","本件契約において、給付の目的を甲にするか乙にするかについて、Aを選択権者とする合意がなされた後に、Aの失火により甲が全焼したときは、給付の目的物は乙となる。","本件契約において、給付の目的を甲にするか乙にするかについての選択権に関する特段の合意がない場合、Bか選択権者となる。","本件契約において、給付の目的を甲にするか乙にするかについて、第三者Dを選択権者とする合意がなされた場合、Dが選択権を行使するときは、AとBの両者に対して意思表示をしなければならない。"],"answer":2},{"id":"R3A-11","year":"R3A","q":11,"category":"権利関係","question":"Aは、所有している甲土地につき、Bとの間で建物所有を目的とする賃貸借契約(以下この問において「借地契約」という。)を締結する予定であるが、期間が満了した時点で、確実に借地契約が終了するようにしたい。この場合に関する次の記述のうち、借地借家法の規定によれば、誤っているものはどれか。","choices":["事業の用に供する建物を所有する目的とし、期間を60年と定める場合には、契約の更新や建物の築造による存続期間の延長がない旨を書面で合意すれば、公正証書で合意しなくても、その旨を借地契約に定めることができる。","居住の用に供する建物を所有することを目的とする場合には、公正証書によって借地契約を締結するときであっても、期間を20年とし契約の更新や建物の築造による存続期間の延長がない旨を借地契約に定めることはできない。","居住の用に供する建物を所有することを目的とする場合には、借地契約を書面で行えば、借地権を消滅させるため、借地権の設定から20年が経過した日に甲土地上の建物の所有権を相当の対価でBからAに移転する旨の特約を有効に定めることができる。","借地契約がBの臨時設備の設置その他一時使用のためになされることが明らかである場合には、期間を5年と定め、契約の更新や建物の築造による存続期間の延長がない旨を借地契約に定めることができる。"],"answer":3},{"id":"R3A-12","year":"R3A","q":12,"category":"権利関係","question":"Aを賃貸人、Bを賃借人とする甲建物の賃貸借契約(以下この問において「本件契約」という。)が令和3年7月1日に締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。","choices":["本件契約について期間の定めをしなかった場合、AはBに対して、いつでも解約の申入れをすることができ、本件契約は、解約の申人れの日から3月を経過することによって終了する。","甲建物がBに引き渡された後、甲建物の所有権がAからCに移転した場合、本件契約の敷金は、他に特段の合意がない限り、BのAに対する未払賃料債務に充当され、残額がCに承継される。","甲建物が適法にBからDに転貸されている場合、AがDに対して本件契約が期間満了によって終了する旨の通知をしたときは、建物の転貸借は、その通知がされた日から3月を経過することによって終了する。","本件契約が借地借家法第38条の定期建物賃貸借契約で、期間を5年、契約の更新がない旨を定めた場合、Aは、期間満了の1年前から6月前までの間に、Bに対し賃貸借が終了する旨の通知をしなければ、従前の契約と同一条件で契約を更新したものとみなされる。"],"answer":2},{"id":"R3A-13","year":"R3A","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["法又は規約により集会において決議をすべき場合において、区分所有者が1人でも反対するときは、集会を開催せずに書面によって決議をすることはできない。","形状又は効用の著しい変更を伴う共用部分の変更については、区分所有者及び議決権の各4分の3以上の多数による集会の決議で決するものであるが、規約でこの区分所有者の定数を過半数まで減ずることができる。","敷地利用権が数人で有する所肩権その他の権利である場合には、規約に別段の定めがあるときを除いて、区分所有者は、その有する専有部分とその専有部分に係る敷地利用権とを分離して処分することができない。","各共有者の共用部分の持分は、規約に別段の定めがある場合を除いて、その有する専有部分の床面積の割合によるが、この床面積は壁その他の区画の中心線で囲まれた部分の水平投影面積である。"],"answer":4},{"id":"R3A-14","year":"R3A","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、正しいものはどれか。","choices":["所有権の登記の抹消は、所有権の移転の登記がある場合においても、所有権の登記名義人が単独で申請することができる。","登記の申請をする者の委任による代理人の権限は、本人の死亡によって消減する。","法人の合併による権利の移転の登記は、登記権利者が単独で申請することができる。","信託の登記は、受託者が単独で申請することができない。"],"answer":3},{"id":"R3A-15","year":"R3A","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、誤っているものはどれか。","choices":["地区計画については、都市計画に、当該地区計画の目標を定めるよう努めるものとされている。","地区計画については、都市計画に、区域の面積を定めるよう努めるものとされている。","地区整備計画においては、市街化区域と市街化調整区域との区分の決定の有無を定めることができる。","地区整備計画においては、建築物の建蔽率の最高限度を定めることができる。"],"answer":3},{"id":"R3A-16","year":"R3A","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["市街化区域において、都市公園法に規定する公園施設である建築物の建築を目的とした5,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。","首都圏整備法に規定する既成市街地内にある市街化区域において、住宅の建築を目的とした800m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。","準都市計画区域において、商業施設の建築を目的とした2,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。","区域区分が定められていない都市計画区域において、土地区画整理事業の施行として行う8,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"],"answer":2},{"id":"R3A-17","year":"R3A","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、正しいものはどれか。","choices":["居室の内装の仕上げには、ホルムアルデヒドを発散させる建築材料を使用することが認められていない。","4階建ての共同住宅の敷地内には、避難階に設けた屋外への出口から道又は公園、広場その他の空地に通ずる幅員が2m以上の通路を設けなければならない。","防火地域又は準防火地域内にある建築物で、外壁が防火構造であるものについては、その外壁を隣地境界線に接して設けることができる。","建築主は、3階建ての木造の共同住宅を新築する場合において、特定行政庁が、安全上、防火上及び避難上支障がないと認めたときは、検査済証の交付を受ける前においても、仮に当該共同住宅を使用することができる。"],"answer":4},{"id":"R3A-18","year":"R3A","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法の規定によれば、誤っているものはどれか。","choices":["都市計画により建蔽率の限度が10分の6と定められている近隣商業地域において、準防火地域内にある耐火建築物で、街区の角にある敷地又はこれに準ずる敷地で特定行政庁が指定するものの内にある建築物については、建蔽率の限度が10分の8となる。","市町村は、集落地区計画の区域において、用途地域における用途の制限を補完し、当該区域の特性にふさわしい土地利用の増進等の目的を達成するため必要と認める場合においては、国土交通大臣の承認を得て、当該区域における用途制限を緩和することができる。","居住環境向上用途誘導地区内においては、公益上必要な一定の建築物を除き、建築物の建蔽率は、居住環境向上用途誘導地区に関する都市計画において建築物の建蔽率の最高限度が定められたときは、当該最高限度以下でなければならない。","都市計画区域内のごみ焼却場の用途に供する建築物について、特定行政庁か建築基準法第51条に規定する都市計画審議会の議を経てその敷地の位置が都市計画上支障がないと認めて許可した場合においては、都市計画においてその敷地の位置が決定しているものでなくても、新築することができる。"],"answer":2},{"id":"R3A-19","year":"R3A","q":19,"category":"法令上の制限","question":"宅地造成等規制法(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["宅地造成工事規制区域内において、宅地を造成するために切上をする土地の面積が500m2であって盛土を生じない場合、切土をした部分に生じる崖の高さが1.5mであれば、都道府県知事の法第8条第1項本文の1:事の許可は不要である。","都道府県知事は、法第8条第1項本文の工事の許可の申請があった場合においては、遅滞なく、文書をもって許可又は不許可の処分を申請者に通知しなければならない。","都道府県知事は、一定の場合には都道府県(地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市)の規則で、宅地造成工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化し、又は付加することができる。","都道府県知事は、関係市町村長の意見を聴いて、宅地造成工事規制区域内で、宅地造成に伴う災害で相当数の居住者その他の者に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって一定の基準に該当するものを、造成宅地防災区域として指定することができる。"],"answer":4},{"id":"R3A-20","year":"R3A","q":20,"category":"法令上の制限","question":"土地区画整理法に関する次の記述のうち、誤っているものはどれか。","choices":["換地計画において参加組合員に対して与えるべきものとして定められた宅地は、換地処分の公告があった日の翌日において、当該宅地の所有者となるべきものとして換地計画において定められた参加組合員が取得する。","換地計画において換地を定める場合においては、換地及び従前の宅地の位置、地積、土質、水利、利用状況、環境等が照応するように定めなければならない。","土地区画整理組合の設立の認可の公告があった日後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、当該土地区画整理組合の許可を受けなければならない。","土地区画整理組合の組合員は、組合員の3分の1以上の連署をもって、その代表者から理由を記載した書面を土地区画整理組合に提出して、理事又は監事の解任を請求することができる。"],"answer":3},{"id":"R3A-21","year":"R3A","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。","choices":["遺産分割によって農地を取得する場合には、法第3条第1項の許可は不要であるが、農業委員会への届出が必要である。","法第3条第1項の許可を受けなければならない場合の売買については、その許可を受けずに農地の売買契約を締結しても、所有権移転の効力は生じない。","砂利採取法第16条の認可を受けて市街化調整区域内の農地を砂利採取のために一時的に借り受ける場合には、法第5条第1項の許可は不要である。","都道府県が市街化調整区域内の農地を取得して病院を建設する場合には、都道府県知事(法第4条第1項に規定する指定市町村の区域内にあってはその長)との協議が成立すれば、法第5条第1項の許可があったものとみなされる。"],"answer":3},{"id":"R3A-22","year":"R3A","q":22,"category":"法令上の制限","question":"国土利用計画法第23条の届出(以下この問において「事後届出」という。)に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。","choices":["土地売買等の契約を締結した場合には、当事者のうち当該契約による権利取得者は、その契約を締結した日の翌日から起算して3週間以内に、事後届出を行わなければならない。","都道府県知事は、事後届出をした者に対し、その届出に係る土地に関する権利の移転若しくは設定後における土地の利用目的又は土地に関する権利の移転若しくは設定の対価の額について、当該土地を含む周辺の地域の適正かっ合理的な土地利用を図るために必要な助言をすることができる。","事後届出か必要な土地売買等の契約を締結したにもかかわらず、所定の期間内に当該届出をしなかった者は、都道府県知事からの勧告を受けるが、罰則の適用はない。","宅地建物取引業者Aが所有する準都市計画区域内の20,000m2の土地について、10,000m2をB市に、10,000m2を宅地建物取引業者Cに売却する契約を締結した場合、B市は事後届出を行う必要はないが、Cは一定の場合を除き事後届出を行う必要がある。"],"answer":4},{"id":"R3A-23","year":"R3A","q":23,"category":"税・その他","question":"所得税法に関する次の記述のうち、正しいものはどれか。","choices":["譲渡所得の特別控除額(50万円)は、譲渡益のうち、まず、資産の取得の日以後5年以内にされた譲渡による所得で政令で定めるものに該当しないものに係る部分の金額から控除し、なお控除しきれない特別控除額がある場合には、それ以外の譲渡による所得に係る部分の金額から控除する。","譲渡所得の金額の計算上、資産の譲渡に係る総収入金額から控除する資産の取得費には、その資産の取得時に支出した購入代金や購入手数料の金額は含まれるが、その資産の取得後に支出した設備費及び改良費の額は含まれない。","建物の全部の所有を目的とする土地の賃借権の設定の対価として支払を受ける権利金の金額が、その士地の価額の10分の5に相当する金額を超えるときは、不動産所得として課税される。","居住者がその取得の日以後5年以内に固定資産を譲渡した場合には、譲渡益から譲渡所得の特別控除額(50万円)を控除した後の譲渡所得の金額の2分の1に相当する金額が課税標準とされる。"],"answer":1},{"id":"R3A-24","year":"R3A","q":24,"category":"税・その他","question":"不動産取得税に関する次の記述のうち、正しいものはどれか。","choices":["平成28年に新築された既存住宅(床面積210m2)を個人が自己の居住のために取得した場合、当該取得に係る不動産取得税の課税標準の算定については、当該住宅の価格から1,200万円が控除される。","家屋が新築された日から3年を経過して、なお、当該家屋について最初の使用又は譲渡が行われない場合においては、当該家屋が新築された日から3年を経過した日において家屋の取得がなされたものとみなし、当該家屋の所有者を取得者とみなして、これに対して不動産取得税を課する。","不動産取得税は、不動産の取得があった日の翌日から起算して2か月以内に当該不動産の所在する都道府県に申告納付しなければならない。","不動産取得税は、不動産を取得するという比較的担税力のある機会に相当の税負担を求める観点から創設されたものであるが、不動産取得税の税率は4%を超えることができない。"],"answer":1},{"id":"R3A-25","year":"R3A","q":25,"category":"税・その他","question":"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか","choices":["不動産鑑定士の通常の調査の範囲では、対象不動産の価格への影響の程度を判断するための事実の確認が困難な特定の価格形成要囚がある場合、鑑定評価書の利用者の利益を害するおそれがないと判断されるときに限り、当該価格形成要因について調査の範囲に係る条件を設定することができる。","対象不動産を価格時点において再調達することを想定した場合において必要とされる適正な原価の総額を再調達原価というが、建設資材、工法等の変遷により、対象不動産の再調達原価を求めることが困難な場合には、対象不動産と同等の有用性を持つものに置き換えて求めた原価を再調達原価とみなすものとする。","取引事例等に係る取引が特殊な事情を含み、これが当該取引事例等に係る価格等に影響を及ほしている場合に、適切に補正することを時点修正という。","不動産の鑑定評価によって求める賃料は、一般的には正常賃料又は継続賃料であるが、鑑定評価の依頼目的に対応した条件により限定賃料を求めることができる場合がある。"],"answer":3},{"id":"R3A-26","year":"R3A","q":26,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではない買主Bに対し建物の売却を行う場合における宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。","choices":["Aは、Bに対し、専任の宅地建物取引士をして説明をさせなければならない。","Aは、Bに対し代金以外に授受される金銭の額だけでなく、当該金銭の授受の目的についても説明しなければならない。","Aは、Bに対し、建物の上に存する登記された権利の種類及び内容だけでなく、移転登記の申請の時期についても説明しなければならない。","Aは、Bに対し、売買の対象となる建物の引渡しの時期について説明しなければならない。"],"answer":2},{"id":"R3A-27","year":"R3A","q":27,"category":"宅建業法","question":"宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["個人Aが不正の手段により免許を受けた後、免許を取り消され、その取消しの日から5年を経過した場合、その間に免許を受けることができない事由に該当することがなかったとしても、Aは冉び免許を受けることはできない。","免許を受けようとする個人Bが破産手続開始の決定を受けた後に復権を得た場合においても、Bは免許を受けることができない。","免許を受けようとするC社の役員Dか刑法第211条(業務ヒ過失致死傷等)の罪により地方裁判所で懲役1年の判決を言い渡された場合、当該判決に対してDが高等裁判所に控訴し裁判が係属中であっても、C社は免許を受けることができない。","免許を受けようとするE社の役員に、宅地建物取引業法の規定に違反したことにより罰金の刑に処せられた者がいる場合、その刑の執行か終わって5年を経過しなければ、E社は免許を受けることができない。"],"answer":4},{"id":"R3A-28","year":"R3A","q":28,"category":"宅建業法","question":"宅地建物取引士の登録(以下この問において「登録」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引士A(甲県知事登録)が、乙県に所在する宅地建物取引業者の事務所の業務に従事することとなったときは、Aは甲県知事を経由せずに、直接乙県知事に対して登録の移転を申請しなければならない。","甲県知事の登録を受けているが宅地建物取引士証の交付を受けていないBが、宅地建物取引士としてすべき事務を行った場合、情状のいかんを問わず、甲県知事はBの登録を消除しなければならない。","宅地建物取引上C(甲県知事登録)は、宅地建物取引業者D社を退職し、宅地建物取引業者E社に再就職したが、CはD社及びE社のいずれにおいても専任の宅地建物取引士ではないので、勤務先の変更の登録を申請しなくてもよい。","甲県で宅地建物取引十資格試験を受け、合格したFは、乙県に転勤することとなったとしても、登録は甲県知事に申請しなければならない。"],"answer":4},{"id":"R3A-29","year":"R3A","q":29,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者は、その事務所ごとに従業者の氏名、従業者証明書番号その他国土交通省令で定める事項を記載した従業者名簿を備えなければならす、当該名簿を最終の記載をした日から5年間保存しなければならない。","宅地建物取引業者は、一団の宅地の分譲を行う案内所において宅地の売買の契約の締結を行わない場合、その案内所には国土交通省令で定める標識を掲示しなくてもよい。","宅地建物取引業者が、団の宅地の分譲を行う案内所において宅地の売買の契約の締結を行う場合、その案内所には国土交通大臣が定めた報酬の額を掲示しなければならない。","宅地建物取引業者は、事務所以外の継続的に業務を行うことができる施設を有する場所であっても、契約(予約を含む。)を締結せず、かっ、その申込みを受けない場合、当該場所に専任の宅地建物取引をを置く必要はない。"],"answer":4},{"id":"R3A-30","year":"R3A","q":30,"category":"宅建業法","question":"宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア宅地の販売広告において、宅地に対する将来の利用の制限について、著しく事実に相違する表示をしてはならない。\nイ建物の貸借の媒介において広告を行った場合には、依頼者の依頼の有無にかかわらず、報酬の限度額を超えて、当該広告の料金に相当する額を受領することができる。\nウ複数の区画がある宅地の売買について、数回に分けて広告するときは、最初に行う広告に取引態様の別を明示すれば足り、それ以降は明示する必要はない。\nエ賃貸マンションの貸借に係る媒介の依頼を受け、媒介契約を締結した場合であっても、当該賃貸マンションが建築確認申請中であるときは広告をすることができない。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R3A-31","year":"R3A","q":31,"category":"宅建業法","question":"宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["保証協会は、当該保証協会の社員である宅地建物取引業者が社員となる前に当該宅地建物取引業者と宅地建物取引業に関し取引をした者の有するその取引により生じた債権に関し弁済業務保証金の還付が行われることにより弁済業務の円滑な運営に支障を生ずるおそれがあると認めるときは、当該社員に対し、担保の提供を求めることができる。","保証協会の社員である宅地建物取引業者は、取引の相手方から宅地建物取引業に係る取引に関する苦情について解決の申出が当該保証協会になされ、その解決のために当該保証協会から資料の提出の求めがあったときは、正当な理由がある場合でなければ、これを拒んではならない。","保証協会の社員である宅地建物取引業者は、当該宅地建物取引業者と宅地建物取引業に関し取引をした者の有するその取引により生じた債権に関し弁済業務保証金の還付がなされたときは、その日から2週間以内に還付充当金を保証協会に納付しなければならない。","還付充当金の未納により保証協会の社員がその地位を失ったときは、保証協会は、直ちにその旨を当該社員であった宅地建物取引業者が免許を受けた国交通大臣又は都道府県知事に報告しなければならない。"],"answer":3},{"id":"R3A-32","year":"R3A","q":32,"category":"宅建業法","question":"宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、いすれの場合も、その行為を業として営むものとする。","choices":["A社が、都市計画法に規定する用途地域外の土地であって、ソーラーパネルを設置するための上地の売買を媒介しようとする場合、免許は必要ない。","B社が、土地区画整理事業の換地処分により取得した換地を住宅用地として分譲しようとする場合、免許は必要ない。","農業協同組合Cが、組合員が所有する宅地の売却の代理をする場合、免許は必要ない。","D社が、地方公共団体が定住促進策としてその所有する土地について住宅を建築しようとする個人に売却する取引の媒介をしようとする場合、免許は必要ない。"],"answer":1},{"id":"R3A-33","year":"R3A","q":33,"category":"宅建業法","question":"宅地建物取引業法第35条に規定する重要事項の説明における水防法施行規則第","choices":["1条第I号の規定により市町村(特別区を含む。以下この問において同じ。)の長が提供する図面(以下この問において「水害ハザードマップ」という。)に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。1宅地建物取引業者は、市町村が、取引の対象となる宅地文は建物の位置を含む水害ハザードマップを作成せず、又は印刷物の配布若しくはホームページ等への掲載等をしていないことを確認できた場合は、重要事項説明書にその旨記載し、重要事項説明の際に提示すべき水害ハザードマップが存在しない旨を説明すればよい。","宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む「洪水」、「雨水出水(内水)」、「高潮」の水害ハザードマップを作成している場合、重要事項説明の際にいずれか1種類の水害ハザードマップを提示すればよい。","宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成している場合、売買又は交換の媒介のときは重要事項説明の際に水害ハザードマップを提示しなければならないが、貸借の媒介のときはその必要はない。","宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成している場合、重要事項説明書に水害ハザードマップを添付すれば足りる。"],"answer":1},{"id":"R3A-34","year":"R3A","q":34,"category":"宅建業法","question":"宅地建物取引業法の規定に基づく営業保証金に関する次の記述のうち、止しいものはどれか。","choices":["国土交通大臣から免許を受けた宅地建物取引業者が、営業保証金を主たる事務所のもよりの供託所に供託した場合、当該供託所から国土交通大臣にその旨が通知されるため、当該宅地建物取引業者は国土交通大臣にその旨を届け出る必要はない。","宅地建物取引業者と宅地建物取引業に関し取引をした者は、その取引により生じた債権に関し、当該宅地建物取引業者が供託した営業保証金について、その債権の弁済を受ける権利を有するが、取引をした者が宅地建物取引業者に該当する場合は、その権利を有しない。","営業保証金は、金銭による供託のほか、有価証券をもって供託することができるが、金銭と有価証券とを併用して供託することはできない。","有価証券を営業保証金に充てる場合における当該有価証券の価額は、国債証券の場合はその額面金額の100分の90、地方債証券の場合はその額面金額の100分の80である。"],"answer":2},{"id":"R3A-35","year":"R3A","q":35,"category":"宅建業法","question":"宅地建物取引士の登録(以下この問において「登録」という。)及び宅地建物取引士証に関する次の記述のうち、正しいものはいくつあるか。\nア宅地建物取引士(甲県知事登録)が事務禁止処分を受けた場合、宅地建物取引士証を甲県知事に速やかに提出しなければならず、速やかに提出しなかったときは10万円以下の過料に処せられることがある。\nイ宅地建物取引士(甲県知事登録)が宅地建物取引十としての事務禁止処分を受け、その禁止の期間中に本人の申請により登録が消除された場合は、その者が乙県で宅地建物取引士資格試験に合格したとしても、当該期間が満了していないときは、乙県知事の登録を受けることができない。\nウ宅地建物取引士(甲県知事登録)が甲県から乙県に住所を変更したときは、乙県知事に対し、登録の移転の申請をすることができる。\nエ宅地建物取引士(甲県知事登録)が本籍を変更した場合、遅滞なく、甲県知事に変更の登録を申請しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R3A-36","year":"R3A","q":36,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、同法の規定に少なくとも説明しなければならない事項として掲げられていないものはどれか。","choices":["建物の貸借の媒介を行う場合における、「都市計画法第29条第1項の規定に基づく制限」","建物の貸借の媒介を行う場合における、「当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容」","建物の貸借の媒介を行う場合における、「台所、浴室、便所その他の当該建物の設備の整備の状況」","宅地の貸借の媒介を行う場合における、「敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項」"],"answer":1},{"id":"R3A-37","year":"R3A","q":37,"category":"宅建業法","question":"宅地建物取引業法第35条の規定に基づく重要事項の説明及び同法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者は、媒介により区分所有建物の賃貸借契約を成立させた場合、専有部分の用途その他の利用の制限に関する規約においてペットの飼育が禁止されているときは、その旨を重要事項説明書に記載して説明し、37条書面にも記載しなければならない。","宅地建物取引業者は、自ら売主となる土地付建物の売買契約において、宅地建物取引業者ではない買主から保全措置を講ずる必要のない金額の手付金を受領する場合、手付金の保全措置を講じないことを、重要事項説明書に記載して説明し、37条書面にも記載しなければならない。","宅地建物取引業者は、媒介により建物の敷地に供せられる土地の売買契約を成立させた場合において、当該売買代金以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的を37条書面に記載しなければならない。","宅地建物取引業者は、自ら売キとなる土地付建物の売買契約及び自ら貸主となる土地付建物の賃貸借契約のいずれにおいても、37条書面を作成し、その取引の相手方に交付しなけれはならない。"],"answer":3},{"id":"R3A-38","year":"R3A","q":38,"category":"宅建業法","question":"宅地建物取引業者Aが、宅地建物取引業者BからB所有の建物の売却を依頼され、Bと一般嫌介契約(以下この問において「本件契約」という。)を締結した場合に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。\nア本件契約を締結する際に、Bから有効期間を6か月としたい旨の申出があったが、AとBが協議して、有効期間を3か月とした。\nイ当該物件に係る買受けの申込みはなかったが、AはBに対し本件契約に係る業務の処理状況の報告を口頭により14日に1回以上の頻度で行った。\nウAは本件契約を締結した後、所定の事項を遅滞なく指定流通機構に登録したが、その登録を証する書面を、登録してから14日後にBに交付した。\nエ本件契約締結後、1年を経過しても当該物件を売却できなかったため、Bは売却をあきらめ、当該物件を賃貸することにした。そこでBはAと当該物件の貸借に係る一般媒介契約を締結したが、当該契約の有効期間を定めなかった。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R3A-39","year":"R3A","q":39,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として、宅地建物取引業者Bの媒介により、宅地建物取引業者ではないCを買主とするマンションの売買契約を締結した場合における宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフについて告げるときに交付すべき書面(以下この問において「告知書面」という。)に関する次の記述のうち、正しいものはどれか。","choices":["告知書面には、クーリング・オフによる買受けの申込みの撤回又は売買契約の解除があったときは、Aは、その買受けの申込みの撤回又は売買契約の解除に伴う損害賠償又は違約金の支払を請求することができないことを記載しなければならない。","告知書面には、クーリング・オフについて告げられた日から起算して8日を経過するまでの間は、Cが当該マンションの引渡しを受け又は代金の全部を支払った場合を除き、書面によりクーリング・オフによる買受けの申込みの撤回又は売買契約の解除を行うことができることを記載しなければならない。","告知書面には、Cがクーリング・オフによる売買契約の解除をするときは、その旨を記載した書面がAに到達した時点で、その効力が発生することを記載しなければならない。","告知書面には、A及びBの商号又は名称及び住所並びに免許証番号を記載しなければならなし、。"],"answer":1},{"id":"R3A-40","year":"R3A","q":40,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者は、その業務に関する帳簿を備え、取引のあったつど、その年月日、その取引に係る宅地又は建物の所在及び面積その他国土交通省令で定める事項を記載しなければならないが、支店及び案内所には備え付ける必要はない。","成年である宅地建物取引業者は、宅地建物取引業の業務に関し行った行為について、行為能力の制限を理由に取り消すことができる。","宅地建物取引業者は、一団の宅地建物の分譲をする場合における当該宅地又は建物の所在する場所に国土交通省令で定める標識を掲示しなければならない。","宅地建物取引業者は、業務ヒ取り扱ったことについて知り得た秘密に関し、税務署の職員から質問検査権の規定に基づき質問を受けたときであっても、回答してはならない。"],"answer":3},{"id":"R3A-41","year":"R3A","q":41,"category":"宅建業法","question":"宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定により交付すべき書面をいうものとする。\nアAが自ら売主として建物を売却する場合、宅地建物取引業者Bに当該売却の媒介を依頼したときは、Bは宅地建物取引士をして37条書面に記名押印させなければならず、Aも宅地建物取引士をして37条書面に記名押印させなければならない。\nイAが自ら売主として建物を売却する場合、当該売買契約に際し、買主から支払われる手付金の額が売買代金の5%未満であるときは、当該手付金の額の記載があれば、授受の時期については37条書面に記載しなくてもよい。\nウAが売主を代理して建物を売却する場合、買主が宅地建物取引業者であるときは、37条書面を交付しなくてもよい。\nエAが売主を代理して抵当権が設定されている建物を売却する場合、当該抵当権の内容について37条書面に記載しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":1},{"id":"R3A-42","year":"R3A","q":42,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではないBを買主とする土地付建物の売買契約(代金3,200万円)を締結する場合に関する次の記述のうち、民法及び宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["割賦販売の契約を締結し、当該土地付建物を引き渡した場合、Aは、Bから800万円の賦払金の支払を受けるまでに、当該土地付建物に係る所有権の移転登記をしなければならない。","当該土地付建物の工事の完了前に契約を締結した場合、Aは、宅地建物取引業法第41条に定める手付金等の保全措置を講じなくても手付金100万円、中間金60万円を受領することができる。","当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を400万円とし、かつ、違約金の額を240万円とする特約を定めた場合、当該特約は無効となる。","当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を定めていない場合、債務の不履行による損害賠償の請求額は売買代金の額の10分の2を超えてはならない。"],"answer":2},{"id":"R3A-43","year":"R3A","q":43,"category":"宅建業法","question":"宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。アマンションの販売に際して、買主が手付として必要な額を持ち合わせていなかったため、手付を分割受領することにより、契約の締結を誘引した。\nイ宅地の売買に際して、相手方が「契約の締結をするかどうか明日まで考えさせてほしい」と申し出たのに対し、事実を歪めて「明日では契約締結できなくなるので、今日しか待てなゆがい」と告げた。ウマンション販売の勧誘を電話で行った際に、勧誘に先立って電話ロで宅地建物取引業者の商号又は名称を名乗らずに勧誘を行った。\nエ建物の貸借の媒介に際して、賃貸借契約の申込みをした者がその撤回を申し出たが、物件案内等に経費がかかったため、預り金を返還しなかった。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R3A-44","year":"R3A","q":44,"category":"宅建業法","question":"宅地建物取引業者A(消費税課税事業者)が受け取ることができる報酬額についての次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["居住の用に供する建物(1か月の借賃20万円。消費税等相当額を含まない。)の貸借であって100万円の権利金の授受があるものの媒介をする場合、依頼者双方から受領する報酬の合計額は11万円を超えてはならない。","宅地(代金1,000万円。消費税等相当額を含まない。)の売買について、売主から代理の依頼を受け、買主から媒介の依頼を受け、売買契約を成立させて買主から303,000円の報酬を受領する場合、売主からは489,000円を上限として報酬を受領することができる。","宅地(代金300万円。消費税等相当額を含まない。)の売買の媒介について、通常の媒介と比較して現地調査等の費用が6万円(消費税等相当額を含まない。)多く要した場合、依頼者双方から合計で44万円を上限として報酬を受領することができる。","店舗兼住宅(1か月の借賃20万円。消費税等相当額を含まない。)の貸借の媒介をする場合、依頼者の一方から受領する報酬は11万円を超えてはならない。"],"answer":2},{"id":"R3A-45","year":"R3A","q":45,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではない買主Bに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。","choices":["Bが建設業者である場合、Aは、Bに引き渡した新築住宅について、住宅販売瑕疵担保保一口正金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負わない。","Aが住宅販売瑕疵担保責任保険契約を締結する場合、当該契約は、BがAから当該新築住宅の引渡しを受けた時から2年以上の期間にわたって有効なものでなければならない。","Aが住宅販売瑕疵担保責任保険契約を締結した場合、A及びBは、指定住宅紛争処理機関に特別住宅紛争処理の申請をすることにより、当該新築住宅の瑕疵に関するAとBとの間の紛争について、あっせん、調停又は仲裁を受けることができる。","AB間の新築住宅の売買契約において、当該新築住宅の構造耐カヒ主要な部分に瑕疵があってもAが瑕疵担保責任を負わない旨の特約があった場合、住宅販売瑕疵担保保証金の供一三ロモ又は住宅販売瑕疵担保責任保険契約の締結を行う義務はない。"],"answer":3},{"id":"R3A-46","year":"R3A","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構(以下この問において「機構」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、証券化支援事業(買取型)において、賃貸住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権を譲受けの対象としている。","機構は、市街地の土地の合理的な利用に寄与する一定の建築物の建設に必要な資金の貸付けを業務として行っている。","機構は、証券化支援事業(買取型)において、省エネルギー性に優れた住宅を取得する場合について、貸付金の利率を定期間引きドげる制度を設けている。","機構は、経済事情の変動に伴い、貸付けを受けた者の住宅ローンの元利金の支払が著しく困難になった場合に、償還期間の延長等の貸付条件の変史を行っている。"],"answer":1},{"id":"R3A-47","year":"R3A","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正竸争規約を含む。)の規定によれば、正しいものはどれか。","choices":["住宅の居室の広さを畳数で表示する場合には、畳1枚当たりの広さにかかわらず、実際に当該居室に敷かれている畳の数を表示しなければならない。","団地(一団の宅地又は建物をいう。)と駅との間の距離は、駅から最も近い当該団地内の地点を起点又は着点として算出した数値を表示しなければならず、当該団地を数区に区分して取引するときは各区分ごとに距離を算出して表示しなければならない。","新築分譲マンションを完成予想図により表示する場合、完成予想図である旨を表示すれば、緑豊かな環境であることを訴求するために周囲に存在しない公園等を表示することができる。","新築分譲住宅の販売に当たって行う二重価格表示は、実際に過去において販売価格として公表していた価格を比較対照価格として用いて行うのであれば、値下げの時期から1年以内の期間は表示することができる。"],"answer":2},{"id":"R3A-48","year":"R3A","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["建築着工統計(令和3年1月公表)によれは、令和2年1月から令和2年12月までの新11一1設住宅着工戸数は約81.5万戸となり、4年ぶりに増加に転じた。","令和3年版土地白書(令和3年6月公表)によれば、土地取引について、売買による所有権移転登記の件数でその動向を見ると、令和2年の全国の土地取引件数は約128万件となり、5年連続の増加となっている。","令和3年地価公示(令和3年3月公表)によれば、令和2年1月以降の1年間の地価の変動を見ると、全国平均の用途別では、住宅地及び商業地は下落に転じたが、工業地は5年連続の上昇となっている。","年次別法人企業統計調査(令和元年度。令和2年10月公表)によれば、令和元年度における不動産業の営業利益は約5兆円を超え、前年度を上回った。"],"answer":3},{"id":"R3A-49","year":"R3A","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["森林は、木材資源としても重要で、水源涵養、洪水防止等の大きな役割を担っている。","活動度の高い火山の火山麓では、火山活動に伴う災害にも留意する必要がある。","林相は良好でも、破砕帯や崖錐等の上の杉の植林地は、豪雨に際して崩壊することがある。","崖錐や小河川の出口で堆積物の多い所等は、上石流の危険が少ない。"],"answer":4},{"id":"R3A-50","year":"R3A","q":50,"category":"免除科目","question":"建物の構造に関する次の記述のうち、最も不適当なものはどれか。","choices":["鉄骨構造は、主要構造の構造形式にトラス、ラーメン、アーチ等が用いられ、高層建築の骨組に適している。","鉄骨構造の床は既製気泡コンクリート板、プレキャストコンクリート板等でつくられる。","鉄骨構造は、耐火被覆や鋼材の加工性の問題があり、現在は住宅、店舗等の建物には用いられていない。","鉄骨構造は、工場、体育館、倉庫等の単層で大空間の建物に利用されている。"],"answer":3},{"id":"R3B-01","year":"R3B","q":1,"category":"権利関係","question":"次の1から4までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。(判決文)私力の行使は、原則として法の禁止するところであるが、法律に定める手続によったのでは、権利に対する違法な侵害に対抗して現状を維持することが不可能又は著しく困難であると認められる緊急やむを得ない特別の事情が存する場合においてのみ、その必要の限度を超えない範囲内で、例外的に許されるものと解することを妨げない。","choices":["権利に対する違法な侵害に対抗して法律に定める手続によらずに自力救済することは、その必要の限度を超えない範囲内であれば、事情のいかんにかかわらず許される。","建物賃貸借契約終了後に当該建物内に家財などの残置物がある場合には、賃貸人の権利に対する違法な侵害であり、賃貸人は賃借人の同意の有無にかかわらず、原則として裁判を行わずに当該残置物を建物内から撤去することができる。","建物賃貸借契約の賃借人が賃料を1年分以上滞納した場合には、賃貸人の権利を著しく侵害するため、原則として裁判を行わずに、賃貸人は賃借人の同意なく当該建物の鍵とシリンダーを交換して建物内に入れないようにすることができる。","裁判を行っていては権利に対する違法な侵害に対抗して現状を維持することが不可能又は著しく困難であると認められる緊急やむを得ない特別の事情が存する場合には、その必要の限度を超えない範囲内で例外的に私力の行使が許される。"],"answer":4},{"id":"R3B-02","year":"R3B","q":2,"category":"権利関係","question":"相隣関係に関する次の記述のうち、民法の規定によれば、誤っているものはどれ","choices":["土地の所有者は、隣地の所有者と共同の費用で、境界標を設けることができる。","隣接する土地の境界線上に設けた障壁は、相隣者の共有に属するものと推定される。","高地の所有者は、その高地が浸水した場合にこれを乾かすためであっても、公の水流又は下水道に至るまで、低地に水を通過させることはできない。","土地の所有者が直接に雨水を隣地に注ぐ構造の屋根を設けた場合、隣地所有者は、その所有権に基づいて妨害排除又は予防の請求をすることができる。"],"answer":3},{"id":"R3B-03","year":"R3B","q":3,"category":"権利関係","question":"成年後見人が、成年被後見人を代理して行う次に掲げる法律行為のうち、民法の規定によれば、家庭裁判所の許可を得なければ代理して行うことができないものはどれか。","choices":["成年被後見人が所有する乗用車の第三者への売却","成年被後見人が所有する成年被後見人の居住の用に供する建物への第三者の抵当権の設定","成年被後見人が所有するオフィスビルへの第三者の抵当権の設定","成年被後見人が所有する倉庫についての第三者との賃貸借契約の解除"],"answer":2},{"id":"R3B-04","year":"R3B","q":4,"category":"権利関係","question":"いずれも宅地建物取引業者ではない売主Aと買主Bとの間で令和3年7月1日に締結した売買契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["BがAに対して手付を交付した場合、Aは、目的物を引き渡すまではいつでも、手付の倍額を現実に提供して売買契約を解除することができる。","売買契約の締結と同時に、Aが目的物を買い戻すことができる旨の特約をする場合、買戻しについての期間の合意をしなければ、買戻しの特約自体が無効となる。","Bが購入した目的物が第三者Cの所有物であり、Aが売買契約締結時点でそのことを知らなかった場合には、Aは損害を賠償せずに売買契約を解除することができる。","目的物の引渡しの時点で目的物が品質に関して契約の内容に適合しないことをAが知っていた場合には、当該不適合に関する請求権が消減時効にかかっていない限り、BはAの担保責任を追及することができる。"],"answer":4},{"id":"R3B-05","year":"R3B","q":5,"category":"権利関係","question":"AがBの代理人として行った行為に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、いずれの行為もBの追認はないものとし、令和3年7月1日以降になされたものとする。","choices":["AがBの代理人として第三者の利益を図る目的で代理権の範囲内の行為をした場合、相手方Cがその目的を知っていたとしても、AC間の法律行為の効果はBに帰属する。","BがAに代理権を与えていないにもかかわらず代理権を与えた旨をCに表示し、Aが当該代理権の範囲内の行為をした場合、CがAに代理権がないことを知っていたとしても、Bはその責任を負わなければならない。","AがBから何ら代理権を与えられていないにもかかわらずBの代理人と詐称してCとの間で法律行為をし、CがAにBの代理権があると信じた場合であっても、原則としてその法律行為の効果はBに帰属しない。","BがAに与えた代理権が消滅した後にAが行った代理権の範囲内の行為について、相手方Cが過失によって代理権消滅の事実を知らなかった場合でも、Bはその責任を負わなければならない。"],"answer":3},{"id":"R3B-06","year":"R3B","q":6,"category":"権利関係","question":"不動産に関する物権変動の対抗要件に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["不動産の所有権がAからB、BからC、CからDと転々譲渡された場合、Aは、Dと対抗関係にある第三者に該当する。","土地の賃借人として当該土地上に登記ある建物を所有する者は、当該土地の所有権を新たに取得した者と対抗関係にある第三者に該当する。","第三者のなした登記後に時効が完成して不動産の所有権を取得した者は、当該第三者に対して、登記を備えなくても、時効取得をもって対抗することができる。","共同相続財産につき、相続人の一人から相続財産に属する不動産につき所有権の全部の譲渡を受けて移転登記を備えた第三者に対して、他の共同相続人は、自己の持分を登記なくして対抗することができる。"],"answer":1},{"id":"R3B-07","year":"R3B","q":7,"category":"権利関係","question":"令和3年7月1日になされた遺言に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["自筆証書によって遺言をする場合、遺言者は、その全文、日付及び氏名を自書して押印しなければならないが、これに添付する相続財産の目録については、遺言者が毎葉に署名押印すれば自書でないものも認められる。","公正証書遺言の作成には、証人2人以上の立会いが必要であるが、推定相続人は、未成年者でなくとも、証人となることができない。","船舶が遭難した場合、当該船舶中にいて死亡の危急に迫った者は、証人2人以上の立会いがあれば、口頭で遺言をすることができる。","遺贈義務者が、遺贈の義務を履行するため、受遺者に対し、相当の期間を定めて遺贈の承認をすべき旨の催告をした場合、受遺者がその期間内に意思表示をしないときは、遺贈を放棄したものとみなされる。"],"answer":4},{"id":"R3B-08","year":"R3B","q":8,"category":"権利関係","question":"AはBに対して、Aが所有する甲土地を1,000万円で売却したい旨の申込みを郵便で令和3年7月1日に発信した(以下この問において「本件申込み」という。)が、本件申込みがBに到達する前にAが死亡した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["Bが承諾の通知を発する前に、BがAの死亡を知ったとしても、本件申込みは効力を失わない。","Aが、本件申込みにおいて、自己が死亡した場合には申込みの効力を失う旨の意思表示をしていたときには、BがAの死亡を知らないとしても本件申込みは効力を失う。","本件申込みが効力を失わない場合、本件申込みに承諾をなすべき期間及び撤回をする権利についての記載がなかったときは、Aの相続人は、本件申込みをいつでも撤回することができる。","本件申込みが効力を失わない場合、Bが承諾の意思表示を発信した時点で甲土地の売買契約が成立する。"],"answer":2},{"id":"R3B-09","year":"R3B","q":9,"category":"権利関係","question":"AがBに対してA所有の甲建物を令和3年7月1日に①売却した場合と②賃貸した場合についての次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["①と②の契約が解除された場合、①ではBは甲建物を使用収益した利益をAに償還する必要があるのに対し、②では将来に向かって解除の効力が生じるのでAは解除までの期間の賃料をBに返還する必要はない。","①ではBはAの承諾を得ずにCに甲建物を賃貸することができ、②ではBはAの承諾を得なければ甲建物をCに転貸することはできない。","甲建物をDが不法占拠している場合、①ではBは甲建物の所有権移転登記を備えていなければ所有権をDに対抗できず、②ではBは甲建物につき賃借権の登記を備えていれば賃借権をDに対抗することができる。","①と②の契約締結後、甲建物の引渡し前に、甲建物がEの放火で全焼した場合、①ではBはAに対する売買代金の支払を拒むことができ、②ではBとAとの間の賃貸借契約は終了する。"],"answer":3},{"id":"R3B-10","year":"R3B","q":10,"category":"権利関係","question":"Aは、Bからの借入金の担保として、A所有の甲建物に第一順位の抵当権(以下この問において「本件抵当権」という。)を設定し、その登記を行った。AC間にCを賃借人とする甲建物の一時使用目的ではない賃貸借契約がある場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。","choices":["本件抵当権設定登記後にAC間の賃貸借契約が締結され、AのBに対する借入金の返済が債務不履行となった場合、Bは抵当権に基づき、AがCに対して有している賃料債権を差し押さえることができる。","Cが本件抵当権設定登記より前に賃貸借契約に基づき甲建物の引渡しを受けていたとしても、AC間の賃貸借契約の期間を定めていない場合には、Cの賃借権は甲建物の競売による買受人に対抗することができない。","本件抵当権設定登記後にAC間で賃貸借契約を締結し、その後抵当権に基づく競売手続による買受けがなされた場合、買受けから賃貸借契約の期間満了までの期間が1年であったときは、Cは甲建物の競売における買受人に対し、期間満了までは甲建物を引き渡す必要はな","Cが本件抵当権設定登記より前に賃貸借契約に基づき甲建物の引渡しを受けていたとしても、Cは、甲建物の競売による買受人に対し、買受人の買受けの時から1年を経過した時点で甲建物を買受人に引き渡さなければならない。"],"answer":1},{"id":"R3B-11","year":"R3B","q":11,"category":"権利関係","question":"次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。","choices":["借地権の存続期間を契約で30年と定めた場合には、当事者が借地契約を更新する際、その期間を更新の日から30年以下に定めることはできない。","借地権の存続期間が満了する場合、借地権者が契約の更新を請求したとき、その土地上に建物が存在する限り、借地権設定者は異議を述べることができない。","借地権者が借地上の建物にのみ登記をしている場合、当該借地権を第三者に対抗することができるのは、当該建物の敷地の表示として記載されている土地のみである。","借地権設定者は、弁済期の到来した最後の3年分の地代等について、借地権者がその土地において所有する建物の上に先取特権を有する。"],"answer":3},{"id":"R3B-12","year":"R3B","q":12,"category":"権利関係","question":"賃貸人Aと賃借人Bとの間で令和3年7月1日に締結した一時使用目的ではない建物賃貸借契約(以下この問において「本件契約」という。)の終了に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。","choices":["本件契約に期間を2年とする旨の定めがあり、AもBも更新拒絶の通知をしなかったために本件契約が借地借家法に基づき更新される場合、更新後の期間について特段の合意がなければ、更新後の契約期間は2年となる。","本件契約において期間の定めがない場合、借地借家法第28条に定める正当事由を備えてAが解約の申入れをしたときには、解約の申入れをした日から6月を経過した日に、本件契約は終了する。","建物の転貸借がされている場合において、本件契約がB(転貸人)の債務不履行によって解除されて終了するときは、Aが転借人に本件契約の終了を通知した日から6月を経過することによって、転貸借契約は終了する。","BがAの同意を得て建物に付加した造作がある場合であっても、本件契約終了時にAに対して借地借家法第33条の規定に基づく造作買取請求権を行使することはできない、という特約は無効である。"],"answer":2},{"id":"R3B-13","year":"R3B","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれ","choices":["区分所有者以外の者であって区分所有者の承諾を得て専有部分を占有する者は、会議の目的たる事項につき利害関係を有する場合には、集会に出席して議決権を行使することはできないが、意見を述べることはできる。","最初に建物の専有部分の全部を所有する者は、公正証書により、共用部分(数個の専有部分に通ずる廊下又は階段室その他構造上区分所有者の全員又はその一部の共用に供されるべき建物の部分)の規約を設定することができる。","共用部分は、区分所有者全員の共有に属するが、規約に特別の定めがあるときは、管理者を共用部分の所有者と定めることもできる。","管理組合法人を設立する場合は、理事を置かなければならず、理事が数人ある場合において、規約に別段の定めがないときは、管理組合法人の事務は、理事の過半数で決する。"],"answer":2},{"id":"R3B-14","year":"R3B","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。","choices":["表題登記がない土地の所有権を取得した者は、その所有権の取得の日から1月以内に、表題登記を申請しなければならない。","共用部分である旨の登記がある建物について、合併の登記をすることができる。","登記官は、表示に関する登記について申請があった場合において、必要があると認めるときは、当該不動産の表示に関する事項を調査することができる。","区分建物である建物を新築した場合において、その所有者について相続その他の一般承継があったときは、相続人その他の一般承継人も、被承継人を表題部所有者とする当該建物についての表題登記を申請することができる。"],"answer":2},{"id":"R3B-15","year":"R3B","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。","choices":["近隣商業地域は、主として商業その他の業務の利便の増進を図りつつ、これと調和した住居の環境を保護するため定める地域とする。","準工業地域は、主として環境の悪化をもたらすおそれのない工業の利便の増進を図りつつ、これと調和した住居の環境を保護するため定める地域とする。","第一種低層住居専用地域については、都市計画に特定用途制限地域を定めることができる場合がある。","第一種住居地域については、都市計画に高層住居誘導地区を定めることができる場合がある。"],"answer":4},{"id":"R3B-16","year":"R3B","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、誤っているものはどれか。ただし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["開発許可を受けようとする者は、開発行為に関する工事の請負人又は請負契約によらないで自らその工事を施行する者を記載した申請書を都道府県知事に提出しなければならない。","開発許可を受けた者は、開発行為に関する国土交通省令で定める軽微な変更をしたときは、遅滞なく、その旨を都道府県知事に届け出なければならない。","開発許可を受けた者は、開発行為に関する工事の廃止をしようとするときは、都道府県知事の許可を受けなければならない。","開発行為に同意していない土地の所有者は、当該開発行為に関する工事完了の公告前に、当該開発許可を受けた開発区域内において、その権利の行使として自己の土地に建築物を建築することができる。"],"answer":3},{"id":"R3B-17","year":"R3B","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、誤っているものはどれか。","choices":["4階建ての建築物の避難階以外の階を劇場の用途に供し、当該階に客席を有する場合には、当該階から避難階又は地上に通ずる2以上の直通階段を設けなければならない。","床面積の合計が500m2の映画館の用途に供する建築物を演芸場に用途変更する場合、建築主事又は指定確認検査機関の確認を受ける必要はない。","換気設備を設けていない居室には、換気のための窓その他の開口部を設け、その換気に有効な部分の面積は、その居室の床面積に対して10分の1以上としなければならない。","延べ面積が800m2の百貨店の階段の部分には、排煙設備を設けなくてもよい。"],"answer":3},{"id":"R3B-18","year":"R3B","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["法第68条の9第1項の規定に基づく条例の制定の際、現に建築物が立ち並んでいる道は、法上の道路とみなされる。","都市計画により、容積率の限度が10分の50とされている準工業地域内において、建築物の高さは、前面道路の反対側の境界線からの水平距離が35m以下の範囲内においては、当該部分から前面道路の反対側の境界線までの水平距離に、1.5を乗じて得た値以下でなければならない。","第一種住居地域においては、畜舎で、その用途に供する部分の床面積が4,000m2のものを建築することができる。","建築物の敷地が、法第53条第1項の規定に基づく建築物の建蔽率に関する制限を受ける地域又は区域の二以上にわたる場合においては、当該建築物の敷地の過半の属する地域又は区域における建蔽率に関する制限が、当該建築物に対して適用される。"],"answer":2},{"id":"R3B-19","year":"R3B","q":19,"category":"法令上の制限","question":"宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["宅地造成工事規制区域外において行われる宅地造成に関する工事について、造成主は、工事に着手する前に都道府県知事に届け出なければならない。","都道府県知事は、宅地造成工事規制区域内における宅地の所有者、管理者又は占有者に対して、当該宅地又は当該宅地において行われている工事の状況について報告を求めることができる。","宅地造成工事規制区域内において宅地造成に関する工事を行う場合、宅地造成に伴う災害を防止するために行う高さ5mを超える擁壁に係る工事については、政令で定める資格を有する者の設計によらなければならない。","都道府県知事は、偽りその他不正な手段によって宅地造成工事規制区域内において行われる宅地造成に関する工事の許可を受けた者に対して、その許可を取り消すことができる。"],"answer":1},{"id":"R3B-20","year":"R3B","q":20,"category":"法令上の制限","question":"土地区画整理法(以下この問において「法」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["土地区画整理組合が施行する土地区画整理事業に係る施行地区内の宅地について借地権のみを有する者は、その土地区画整理組合の組合員とはならない。","法において、「公共施設」とは、道路、公園、広場、河川その他政令で定める公共の用に供する施設をいう。","施行者は、換地処分の公告があった場合においては、直ちに、その旨を換地計画に係る区域を管轄する登記所に通知しなければならない。","市町村が施行する土地区画整理事業では、事業ごとに、市町村に土地区画整理審議会が設置され、換地計画、仮換地の指定及び減価補償金の交付に関する事項について法に定める権限を行使する。"],"answer":1},{"id":"R3B-21","year":"R3B","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["自己所有の農地に住宅を建設する資金を借り入れるため、当該農地に抵当権の設定をする場合には、法第3条第1項の許可を受ける必要がある。","農地の賃貸借の解除については、農地の所有者が、賃借人に対して一方的に解約の申入れを行う場合には、法第18条第1項の許可を受ける必要がない。","登記簿の地目が宅地となっている場合には、現況が農地であっても法の規制の対象とはならない。","市街化区域内の自己所有の農地を駐車場に転用するため、あらかじめ農業委員会に届け出た場合には、法第4条第1項の許可を受ける必要がない。"],"answer":4},{"id":"R3B-22","year":"R3B","q":22,"category":"法令上の制限","question":"国土利用計画法(以下この問において「法」という。)第23条の届出(以下この問において「事後届出」という。)及び法第29条の届出に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。","choices":["個人Aが所有する都市計画区域外の12,000m2の土地に、個人Bが地上権の設定を受ける契約を締結した場合、Bは一定の場合を除き事後届出を行う必要がある。","法第28条に基づく遊休土地に係る通知を受けた者は、その通知があった日から起算して1月以内に、その通知に係る遊休土地の利用又は処分に関する計画を、都道府県知事に届け出なければならない。","市街化調整区域において、宅地建物取引業者Cが所有する面積5,000m2の土地について、宅地建物取引業者Dが一定の計画に従って、2,000m2と3,000m2に分割して順次購入した場合、Dは事後届出を行う必要はない。","都道府県知事は、事後届出があった場合において、土地の利用目的に係る必要な勧告を行うことができ、その勧告を受けた者がその勧告に従わないときは、その旨及びその内容を公表しなければならない。"],"answer":1},{"id":"R3B-23","year":"R3B","q":23,"category":"税・その他","question":"住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。","choices":["この税率の軽減措置の適用対象となる住宅用家屋は、床面積が100m2以上で、その住宅用家屋を取得した個人の居住の用に供されるものに限られる。","この税率の軽減措置の適用対象となる住宅用家屋は、売買又は競落により取得したものに限られる。","この税率の軽減措置は、一定の要件を満たせばその住宅用家屋の敷地の用に供されている土地の所有権の移転登記についても適用される。","この税率の軽減措置の適用を受けるためには、登記の申請書に、一定の要件を満たす住宅用家屋であることの都道府県知事の証明書を添付しなければならない。"],"answer":2},{"id":"R3B-24","year":"R3B","q":24,"category":"税・その他","question":"固定資産税に関する次の記述のうち、正しいものはどれか。","choices":["市町村長は、固定資産課税台帳に登録された価格等に重大な錯誤があることを発見した場合においては、直ちに決定された価格等を修正して、これを固定資産課税台帳に登録しなければならない。","固定資産税の納税義務者は、その納付すべき当該年度の固定資産課税に係る固定資産について、固定資産課税台帳に登録された価格について不服があるときは、公示の日から納税通知書の交付を受けた日後1月を経過するまでの間において、文書をもって、固定資産評価審査委員会に審査の申出をすることができる。","年度の途中において家屋の売買が行われた場合、売主と買主は、当該年度の固定資産税を、固定資産課税台帳に所有者として登録されている日数で按分して納付しなければならない。","住宅用地のうち小規模住宅用地に対して課する固定資産税の課税標準は、当該小規模住宅用地に係る固定資産税の課税標準となるべき価格の3分の1の額である。"],"answer":1},{"id":"R3B-25","year":"R3B","q":25,"category":"税・その他","question":"地価公示法に関する次の記述のうち、誤っているものはどれか。","choices":["地価公示法の目的は、都市及びその周辺の地域等において、標準地を選定し、その正常な価格を公示することにより、一般の土地の取引価格に対して指標を与え、及び公共の利益となる事業の用に供する土地に対する適正な補償金の額の算定等に資し、もって適正な地価の形成に寄与することである。","不動産鑑定士は、公示区域内の土地について鑑定評価を行う場合において、当該土地の正常な価格を求めるときは、公示価格と実際の取引価格を規準としなければならない。","不動産鑑定士は、土地鑑定委員会の求めに応じて標準地の鑑定評価を行うに当たっては、近傍類地の取引価格から算定される推定の価格、近傍類地の地代等から算定される推定の価格及び同等の効用を有する土地の造成に要する推定の費用の額を勘案しなければならない。","関係市町村の長は、土地鑑定委員会が公示した事項のうち、当該市町村が属する都道府県に存する標準地に係る部分を記載した書面等を、当該市町村の事務所において一般の閲見に園と供しなければならない。"],"answer":2},{"id":"R3B-26","year":"R3B","q":26,"category":"宅建業法","question":"宅地建物取引業者が宅地建物取引業法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者は、その媒介により建物の売買の契約を成立させた場合において、当該建物の引渡しの時期又は移転登記の申請の時期のいずれかを37条書面に記載し、当該契約の各当事者に交付しなければならない。","宅地建物取引業者は、その媒介により建物の貸借の契約を成立させた場合において、当該建物が既存の建物であるときは、建物の構造耐カ上主要な部分等の状況について当事者の双方が確認した事項を37条書面に記載し、当該契約の各当事者に交付しなければならない。","宅地建物取引業者は、その媒介により建物の貸借の契約を成立させた場合において、借賃以外の金銭の授受に関する定めがあるときは、その額や当該金銭の授受の時期だけでなく、当該金銭の授受の目的についても37条書面に記載し、当該契約の各当事者に交付しなければならない。","宅地建物取引業者は、37条書面を交付するに当たり、宅地建物取引士をして、その書面に記名押印の上、その内容を説明させなければならない。"],"answer":3},{"id":"R3B-27","year":"R3B","q":27,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で建物の売買契約を締結する場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["AB間で建物の売買契約を締結する場合において、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の額についての特約を、代金の額の10分の2を超えて定めた場合、当該特約は全体として無効となる。","AB間で建築工事完了前の建物の売買契約を締結する場合において、AがBから保全措置が必要となる額の手付金を受領する場合、Aは、事前に、国土交通大臣が指定する指定保管機関と手付金等寄託契約を締結し、かっ、当該契約を証する書面を買主に交付した後でなければ、Bからその手付金を受領することができない。","AB間で建物の売買契約を締結する場合において、Aは、あらかじめBの承諾を書面で得た場合に限り、売買代金の額の10分の2を超える額の手付を受領することができる。","AB間で建築工事完了前の建物の売買契約を締結する場合において、売買代金の10分の2の額を手付金として定めた場合、Aが手付金の保全措置を講じていないときは、Bは手付金の支払を拒否することができる。"],"answer":4},{"id":"R3B-28","year":"R3B","q":28,"category":"宅建業法","question":"宅地建物取引業者A(甲県知事免許)に関する監督処分及び罰則に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはいくつあるか。\nアAが、不正の手段により甲県知事から免許を受けたとき、甲県知事はAに対して当該免許を取り消さなければならない。\nイAが、法第3条の2第1項の規定により付された条件に違反したときは、甲県知事はAの免許を取り消さなければならない。\nウAが、事務所の公衆の見やすい場所に国土交通大臣が定めた報酬の額を掲示しなかった場合、Aは甲県知事から指示処分を受けることはあるが、罰則の適用を受けることはない。\nエAの従業者名簿の作成に当たり、法第48条第3項の規定により記載しなければならない事項についてAの従業者Bが虚偽の記載をした場合、Bは罰則の適用を受けることはあるが、Aは罰則の適用を受けることはない。","choices":["一つ","二つ","三つ","四つ"],"answer":1},{"id":"R3B-29","year":"R3B","q":29,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["宅地建物取引業の免許の有効期間は5年であり、免許の更新の申請は、有効期間満了の日の90日前から30日前までの間に行わなければならない。","宅地建物取引業者から免許の更新の申請があった場合において、有効期間の満了の日までにその申請について処分がなされないときは、従前の免許は、有効期間の満了後もその処分がなされるまでの間は、なお効力を有する。","個人である宅地建物取引業者A(甲県知事免許)が死亡した場合、Aの相続人は、Aの死亡の日から30日以内に、その旨を甲県知事に届け出なければならない。","法人である宅地建物取引業者B(乙県知事免許)が合併により消減した場合、Bを代表する役員であった者は、その日から30日以内に、その旨を乙県知事に届け出なければならない。"],"answer":3},{"id":"R3B-30","year":"R3B","q":30,"category":"宅建業法","question":"宅地建物取引業者Aがその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["Aは、中古の建物の売買において、当該建物の所有者から媒介の依頼を受け、取引態様の別を明示せずに広告を掲載したものの、広告を見た者からの問合せはなく、契約成立には至らなかった場合には、当該広告は法第34条の規定に違反するものではない。","Aは、自ら売主として、建築基準法第6条第1項の確認の申請中である新築の分譲マンションについて「建築確認申請済」と明示した上で広告を行った。当該広告は、建築確認を終えたものと誤認させるものではないため、法第33条の規定に違反するものではない。","Aは、顧客を集めるために売る意思のない条件の良い物件を広告し、実際は他の物件を販売しようとしたが注文がなく、売買が成立しなかった場合であっても、監督処分の対象となる。","Aは、免許を受けた都道府県知事から宅地建物取引業の免許の取消しを受けたものの、当該免許の取消し前に建物の売買の広告をしていた場合、当該建物の売買契約を締結する目的の範囲内においては、なお宅地建物取引業者とみなされる。"],"answer":3},{"id":"R3B-31","year":"R3B","q":31,"category":"宅建業法","question":"宅地建物取引業者A(消費税課税事業者)が貸主Bから建物の貸借の代理の依頼を受け、宅地建物取引業者C(消費税課税事業者)が借主Dから媒介の依頼を受け、BとDとの間で賃貸借契約を成立させた場合における次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。なお、1か月分の借賃は8万円とし、借賃及び権利金(権利設定の対価として支払われる金銭であって返遠されないものをいう。)には、消費税等相当額を含まないものとする。\nア建物を住居として貸借する場合、Cは、媒介の依頼を受けるに当たってDから承諾を得ているときを除き、44,000円を超える報酬をDから受領することはできない。\nイ建物を店舗として貸借する場合、AがBから受領する報酬とCがDから受領する報酬の合旨ロt額は88,000円を超えてはならない。\nウ建物を店舗として貸借する場合、200万円の権利金の授受があるときは、A及びCが受領できる報酬の額の合計は、110,000円を超えてはならない。\nエAは、Bから媒介報酬の限度額まで受領する他に、Bの依頼によらない通常の広告の料金に相当する額を別途受領することができる。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R3B-32","year":"R3B","q":32,"category":"宅建業法","question":"宅地建物取引業法第35条の2に規定する供託所等に関する説明についての次の記述のうち、正しいものはどれか。なお、特に断りのない限り、宅地建物取引業者の相手方は宅地建物取引業者ではないものとする。","choices":["宅地建物取引業者は、宅地建物取引業者の相手方に対して供託所等の説明を行う際に書面を交付することは要求されていないが、重要事項説明書に記載して説明することが望ましい。","宅地建物取引業者は、宅地建物取引業者が取引の相手方の場合においても、供託所等に係る説明をしなければならない。","宅地建物取引業者は、売買、交換又は貸借の契約に際し、契約成立後、速やかに供託所等に係る説明をしなければならない。","宅地建物取引業者は、自らが宅地建物取引業保証協会の社員である場合、営業保証金を供託した主たる事務所の最寄りの供託所及び所在地の説明をしなければならない。"],"answer":1},{"id":"R3B-33","year":"R3B","q":33,"category":"宅建業法","question":"宅地建物取引業者Aは、BからB所有の宅地の売却について媒介の依頼を受けた。この場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「専任媒介契約」とは、専属専任媒介契約ではない専任媒介契約をいう。\nアAがBとの間で専任媒介契約を締結した場合、AはBに対して、当該専任媒介契約に係る業務の処理状況を1週間に1回以上報告しなければならない。\nイAがBとの間で専任媒介契約を締結した場合、Bの要望により当該宅地を指定流通機構に登録しない旨の特約をしているときを除き、Aは、当該専任媒介契約締結日から7日以内(休業日数を含まない。)に、指定流通機構に当該宅地の所在等を登録しなければならない。\nウAがBとの間で一般媒介契約を締結した場合、AはBに対して、遅滞なく、宅地建物取引業法第34条の2第1項の規定に基づく書面を交付しなければならない。\nエAがBとの間で一般媒介契約を締結した場合、AがBに対し当該宅地の価額又は評価額について意見を述べるときは、その根拠を明らかにしなければならないが、根拠の明示は口頭でも書面を用いてもよい。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R3B-34","year":"R3B","q":34,"category":"宅建業法","question":"宅地、建物に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地とは、建物の敷地に供せられる土地をいい、道路、公園、河川、広場及び水路に供せられているものは宅地には当たらない。","建物の一部の売買の代理を業として行う行為は、宅地建物取引業に当たらない。","建物とは、土地に定着する工作物のうち、屋根及び柱若しくは壁を有するものをいうが、学校、病院、官公庁施設等の公共的な施設は建物には当たらない。","宅地とは、現に建物の敷地に供せられている土地をいい、その地目、現況によって宅地に当たるか否かを判断する。"],"answer":1},{"id":"R3B-35","year":"R3B","q":35,"category":"宅建業法","question":"宅地建物取引業者が宅地及び建物の売買の媒介を行う場合における宅地建物取引業法第35条に規定する重要事項の説明及び重要事項説明書の交付に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引士は、テレビ会議等のITを活用して重要事項の説明を行うときは、相手方の承諾があれば宅地建物取引士証の提示を省略することができる。","宅地建物取引業者は、その媒介により売買契約が成立したときは、当該契約の各当事者に、遅滞なく、重要事項説明書を交付しなければならない。","宅地建物取引業者は、重要事項説明書の交付に当たり、専任の宅地建物取引士をして当該書面に記名押印させるとともに、売買契約の各当事者にも当該書面に記名押印させなければならない。","宅地建物取引業者は、買主が宅地建物取引業者であっても、重要事項説明書を交付しなければならない。"],"answer":4},{"id":"R3B-36","year":"R3B","q":36,"category":"宅建業法","question":"宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["法人である宅地建物取引業者A(甲県知事免許)について破産手続開始の決定があった場合、その日から30日以内に、Aを代表する役員Bは、その旨を、甲県知事に届け出なければならない。","宅地建物取引業者C(乙県知事免許)が国土交通大臣に免許換えの申請を行っているときは、Cは、取引の相手方に対し、重要事項説明書及び宅地建物取引業法第37条の規定により交付すべき書面を交付することができない。","宅地建物取引業者D(丙県知事免許)が、免許の更新の申請を怠り、その有効期間が満了した場合、Dは、遅滞なく、丙県知事に免許証を返納しなければならない。","宅地建物取引業者E(丁県知事免許)が引き続いて1年以上事業を休止したときは、丁県知事は免許を取り消さなければならない。"],"answer":4},{"id":"R3B-37","year":"R3B","q":37,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、この問において「登録」とは、宅地建物取引士の登録をいうものとする。","choices":["甲県知事の登録を受けている宅地建物取引士は、乙県に主たる事務所を置く宅地建物取引業者の専任の宅地建物取引士となる場合、乙県知事に登録の移転を申請しなければならない。","宅地建物取引士の氏名等が登載されている宅地建物取引士資格登録簿は一般の閲覧に供されることとはされていないが、専任の宅地建物取引士は、その氏名が宅地建物取引業
