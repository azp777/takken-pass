に応じて回答することは守秘義務違反にならない(肢4参照)。","R3A-41":"正解1(正しいのはアの一つ)。ア:売主Ａと媒介業者Ｂの双方が、それぞれ宅建士をして37条書面に記名させる義務を負うので正しい。イ:手付金は代金以外の金銭であり、定めがあれば額だけでなく授受の時期も37条書面に記載が必要なので誤り。ウ:買主が宅建業者でも37条書面の交付は省略できないので誤り。エ:抵当権の内容は重説事項であり37条書面の記載事項ではないので誤り。","R3A-42":"正解2。工事完了前の物件では代金の5%(3,200万円×5%=160万円)以下の手付金等なら保全措置不要。手付金100万円+中間金60万円=160万円はちょうど5%で「超えない」ため、保全措置なしで受領できる。割賦販売の登記留保は受領額が代金の10分の3(960万円)以下の間は可能(肢1参照)。損害賠償予定400万+違約金240万=640万円は代金の2割ちょうどで有効(肢3参照)。予定を定めなかった場合は2割の制限は適用されない(肢4参照)。","R3A-43":"正解4(すべて違反)。ア:手付の分割受領による契約締結の誘引は信用の供与として違反。イ:事実を歪めて契約を急がせる行為は違反。ウ:勧誘に先立って商号・名称、勧誘者氏名、勧誘目的を告げずに勧誘する行為は違反。エ:申込みの撤回に伴う預り金の返還拒否は違反(経費控除も不可)。","R3A-44":"正解2。代金1,000万円の基準報酬額は(1,000万×3%+6万)×1.10=39万6,000円。代理と媒介で双方から受ける場合も合計の上限は基準の2倍=79万2,000円であり、買主(媒介)から30万3,000円を受けるなら、売主(代理)からは79万2,000円-30万3,000円=48万9,000円が上限となる。居住用建物の貸借では権利金による計算特例は使えない(肢1参照)。","R3A-45":"正解3。住宅販売瑕疵担保責任保険契約が締結された新築住宅の瑕疵をめぐる紛争は、売主・買主のどちらからでも指定住宅紛争処理機関にあっせん・調停・仲裁を申請できる。買主が建設業者でも「宅建業者」でない限り資力確保義務はある(肢1参照)。保険期間は引渡しから10年以上(肢2参照)。責任免除特約は無効(肢4参照)。","R3A-46":"正解1が誤り。証券化支援事業(買取型)の対象は自己居住用(又は親族居住用)住宅の建設・購入資金であり、賃貸住宅の購入資金の貸付債権は譲受けの対象外。まちづくり融資(肢2)、省エネ住宅の金利引下げ(肢3)、経済事情変動時の償還条件変更(肢4)は機構の業務として正しい。","R3A-47":"正解2。団地(一団の宅地・建物)と駅等との間の道路距離は、駅から最も近い当該団地内の地点を起点又は着点として算出した数値を表示できる(出題当時の規約)。畳数表示は畳1枚1.62㎡以上が基準で、実際に敷かれた枚数によるのではない(肢1参照)。完成予想図でも周囲の状況について事実に相違する表示は不可(肢3参照)。","R3A-48":"正解3。令和3年地価公示では、コロナ禍の影響により全国平均で全用途・住宅地・商業地のいずれも下落に転じた(全用途平均は6年ぶりの下落)。※統計問題の数値は出題当時のもの。受験年の最新統計を直前に確認するのが鉄則。","R3A-49":"正解4が最も不適当。崖錐(がいすい)や小河川の出口で堆積物の多い場所は、土石流が堆積してできた地形であり、土石流の危険が「大きい」。森林の水源涵養・洪水防止機能(肢1)、破砕帯・崖錐上の植林地の崩壊リスク(肢3)は適当な記述。","R3A-50":"正解3が最も不適当。鉄骨構造は耐火被覆や加工性の課題はあるものの、現在では住宅・店舗等にも広く用いられている。「用いられていない」が誤り。トラス・ラーメン・アーチ等の構造形式で高層建築に適する(肢1)、工場・体育館等の大空間建物への利用(肢4)は適当。","R3B-01":"正解4。判決文の趣旨:自力救済は原則として法の禁止するところであり、法律の定める手続によったのでは権利の実現が不可能又は著しく困難と認められる「緊急やむを得ない特別の事情」がある場合にのみ、必要の限度を超えない範囲で例外的に許される。賃料滞納や残置物があっても賃貸人が実力で建物を取り戻すことは許されない。","R3B-02":"正解3が誤り。高地の所有者は、その高地が浸水した場合にこれを乾かすため、公の水流又は下水道に至るまで、低地に水を通過させることが「できる」(民法220条)。境界標の共同設置(肢1)、境界線上の障壁の共有推定(肢2)、雨水を直接隣地に注ぐ屋根への妨害排除(肢4)はいずれも規定どおり。","R3B-03":"正解2。成年後見人が、成年被後見人の「居住の用に供する建物又はその敷地」について売却・賃貸・抵当権設定等をするには家庭裁判所の許可が必要(859条の3)。居住用でない乗用車・オフィスビル・倉庫についての処分行為には許可は不要。","R3B-04":"正解4。売主が引渡し時に契約不適合を知っていた(悪意)場合には、買主が不適合を知った時から1年以内の通知を怠っても、売主は責任を免れない(566条ただし書)。手付倍返しによる解除は相手方が履行に着手するまでに限られる(肢1参照)。買戻期間は10年を超えられない(肢2関連)。","R3B-05":"正解3。無権代理人の責任(117条)は、相手方が無権代理であることを知っていたとき(悪意)には追及できない。代理権消滅後の表見代理(112条)の成立には相手方の善意「無過失」が必要で、過失があれば本人に効果帰属しない(肢4参照)。","R3B-06":"正解1が誤り。不動産がＡ→Ｂ→Ｃ→Ｄと転々譲渡された場合、ＡとＤは前主・後主の関係(当事者と同視)であり、対抗関係に立つ「第三者」ではない。ＤはＡに対して登記なくして所有権を主張できる。不法占拠者や背信的悪意者も「第三者」に当たらない点とセットで覚える。","R3B-07":"正解4が誤り。遺贈義務者が相当の期間を定めて受遺者に催告した場合、期間内に意思表示がないときは遺贈を「承認したものとみなす」(987条)。放棄とみなすのではない。公正証書遺言の証人に推定相続人はなれない(肢2関連)。","R3B-08":"正解2。申込者が「自己が死亡した場合には申込みの効力を失う」旨の意思表示をしていたときは、死亡により申込みは効力を失う(526条)。同条により、相手方が承諾の通知を発する前に申込者の死亡を知ったときも効力を失う(肢1は「失わない」が誤り)。承諾の効力発生・契約成立は到達時(97条1項)(肢4参照)。","R3B-09":"正解3が誤り。不法占拠者Ｄは民法177条の「第三者」に当たらないため、買主Ｂは所有権移転登記を備えていなくても所有権をＤに対抗し、明渡しを請求できる。売買では買主は目的物を自由に賃貸できるが、賃借人の転貸には賃貸人の承諾が必要(肢2)。","R3B-10":"正解1。抵当権者は、被担保債権に債務不履行があったときは、抵当不動産の賃料債権に物上代位して優先弁済を受けることができる(371条・304条)。抵当権設定登記「後」の賃借人は買受人に対抗できないが、建物使用者には買受けから6か月間の明渡猶予が認められる(肢3関連)。設定登記「前」に引渡しを受けた建物賃借人は対抗できる(肢2関連)。","R3B-11":"正解3。借地権者が借地上の建物に登記(自己名義)をしている場合に対抗力が及ぶのは、その建物が存する一筆の土地(敷地)についてのみ。数筆にまたがる借地では建物のない筆には対抗力が及ばない(判例)。更新後の期間は最初の更新が20年・以後10年(当事者がこれより長い期間を定めることは可能)(肢1関連)。","R3B-12":"正解2。期間の定めのない建物賃貸借では、賃貸人が正当事由を備えて解約申入れをすると、申入れの日から6か月を経過した時に契約が終了する(借地借家法27条)。法定更新後の契約は期間の定めのないものとなる(肢1参照)。転貸人の債務不履行により賃貸借が解除された場合、賃貸人が転借人に明渡しを請求した時に転貸借は終了する(肢3関連)。","R3B-13":"正解2が誤り。最初に専有部分の全部を所有する者が公正証書で設定できる規約は、①規約共用部分、②規約敷地、③専有部分と敷地利用権の分離処分の許可、④敷地利用権の割合の4つに限られる。廊下・階段室のような「法定共用部分」は当然に共用部分であり、公正証書規約で定めるものではない。","R3B-14":"正解2が誤り。共用部分である旨の登記がある建物については、合併の登記をすることができない(不登法56条)。表題登記のない土地の所有権取得者は取得日から1か月以内に表題登記を申請(肢1)。区分建物の表題登記は一般承継人も被承継人名義で申請できる(肢4)。","R3B-15":"正解4。高層住居誘導地区は、第一種・第二種住居地域、準住居地域、近隣商業地域、準工業地域のうち一定の容積率が定められた地域内で定めることができる。特定用途制限地域は用途地域が定められていない区域(市街化調整区域を除く)に定めるもので、第一種低層住居専用地域には定められない(肢3参照)。","R3B-16":"正解3が誤り。開発行為に関する工事を「廃止」したときは、遅滞なく都道府県知事に「届け出」ればよく、許可を受ける必要はない(38条)。軽微な変更も届出で足りる(肢2)。工事完了公告前でも、開発行為に同意していない土地所有者は自己の権利行使として建築物を建築できる(肢4)。","R3B-17":"正解3が誤り。換気のための開口部の換気に有効な部分の面積は、居室の床面積の「20分の1」以上(10分の1ではない。10分の1は…採光は7分の1)。劇場→演芸場のような類似用途相互間の用途変更には建築確認は不要(肢2)。階段の部分には排煙設備は不要(肢4)。","R3B-18":"正解2。道路斜線制限(前面道路の反対側の境界線からの斜線)の適用距離は、容積率の限度に応じて定められており、容積率500%の準工業地域では一定距離まで適用される、という趣旨の正しい記述。建蔽率の異なる地域にわたる場合は加重平均で計算する(肢4参照)。","R3B-19":"正解1が誤り(旧宅造法)。宅地造成工事規制区域「外」で行われる宅地造成工事には、届出も許可も必要ない(規制自体が及ばない)。規制区域内の宅地の所有者等への勧告(肢2)、不正手段による許可の取消し(肢4)は規定どおり。現行の盛土規制法では特定盛土等規制区域の枠組みが新設された点に注意。","R3B-20":"正解1が誤り。土地区画整理組合が設立されると、施行地区内の宅地について所有権「又は借地権」を有する者は、すべて組合員となる。借地権のみ有する者も組合員である。換地処分公告後は施行者が直ちに登記所に通知(肢3)。市町村施行では土地区画整理審議会が設置される(肢4)。","R3B-21":"正解4。市街化区域内の農地を転用する場合は、あらかじめ農業委員会に届け出れば4条・5条の許可は不要(市街化区域内特則)。抵当権の設定は権利移動に当たらず3条許可不要(肢1参照)。賃貸借の解約申入れ等には原則として知事の許可が必要(肢2参照)。農地かどうかは登記地目でなく現況で判断(肢3参照)。","R3B-22":"正解1。都市計画区域外では10,000㎡以上の一団の土地取引が事後届出の対象であり、12,000㎡の土地への地上権設定契約(対価あり)を受けたＢは届出が必要。遊休土地の通知を受けた者は6週間以内に利用・処分計画を届け出る(肢2参照)。当事者が宅建業者同士でも届出は必要(肢3参照)。勧告に従わないときの公表は「できる」規定(肢4参照)。","R3B-23":"正解2。住宅用家屋の所有権移転登記の税率軽減(0.3%)の適用対象は、「売買又は競落」により取得した場合に限られる(贈与・交換は対象外)。床面積要件は50㎡以上(肢1参照)。敷地(土地)には適用されない(肢3参照)。適用には市町村長の証明書を登記申請書に添付する(肢4関連)。","R3B-24":"正解1。市町村長は、固定資産課税台帳の登録価格等に重大な錯誤を発見した場合、直ちに登録価格等を修正して納税義務者に通知しなければならない。年度途中の売買でも納税義務者は1月1日現在の所有者(肢3参照)。小規模住宅用地(200㎡以下)の課税標準は価格の6分の1(肢4参照)。","R3B-25":"正解2が誤り。不動産鑑定士が公示区域内の土地の正常な価格を求めるときは、公示価格を「規準としなければならない」(義務)。参考にすれば足りるというものではない。標準地の鑑定評価では近傍類地の取引価格・地代等・造成費用を勘案(肢3)。市町村長は公示事項を記載した書面等を事務所に備え閲覧に供する(肢4)。","R3B-26":"正解3。借賃以外の金銭の授受に関する定めがあるときは、その額のほか「授受の時期」と「授受の目的」を37条書面に記載しなければならない。引渡し時期は貸借でも必要的記載事項(肢1参照)。建物状況調査関係の当事者確認事項は売買・交換のみ(肢2参照)。37条書面に説明義務はない(肢4参照)。","R3B-27":"正解4。工事完了前の物件で代金の10分の2の手付金を受領するには、(5%を超えるため)保全措置を講じた後でなければ受領できない。手付金の上限は代金の2割なので受領自体は可能。手付による解除に相手方の承諾は不要(肢3参照)。損害賠償額の予定は2割を超える部分が無効(全部無効ではない)(肢1関連)。","R3B-28":"正解1(正しいのはアの一つ)。ア:不正の手段による免許取得は必要的免許取消事由。イ:免許条件違反による取消しは「できる」(任意的)なので誤り。ウ:報酬額の掲示義務違反には罰則(50万円以下の罰金)もあるので誤り。エ:従業者の違反行為について両罰規定により業者Ａにも罰金刑が科され得るので誤り。","R3B-29":"正解3が誤り。個人業者が死亡した場合の届出義務者は相続人で、「相続人が死亡の事実を知った日」から30日以内に届け出る。死亡の日からではない。免許更新申請は有効期間満了の90日前から30日前まで(肢1)。期間満了までに処分がされない場合は従前免許が有効(肢2)。","R3B-30":"正解3。売る意思のない条件の良い物件を広告して顧客を集める「おとり広告」は、実際に売買が成立しなくても、広告を行ったこと自体が誇大広告等の禁止に違反する。取引態様の別の明示は媒介依頼を受けた広告でも必要(肢1参照)。建築確認申請中の物件は「申請中」と明示しても広告不可(肢2参照)。","R3B-31":"正解2(誤りはウとエの類型)。ア:居住用建物の媒介では承諾がない限り一方から借賃0.55か月分=44,000円が上限で正しい。イ:店舗(非居住用)でも代理+媒介の双方合計は借賃1.1か月分=88,000円以内で正しい。ウ:200万円の権利金があれば(200万×5%)×1.1=11万円を「各依頼者から」受領でき、合計22万円まで可能なので「合計11万円まで」は誤り。","R3B-32":"正解1。供託所等の説明(35条の2)は、重要事項説明と異なり書面の交付義務はなく、宅建士以外の者が行ってもよい。相手方が宅建業者の場合は説明不要(肢2参照)。説明の時期は「契約が成立するまでの間」(肢3参照)。保証協会の社員は、社員である旨・協会名称・事務所所在地・弁済業務保証金の供託所等を説明する(肢4関連)。","R3B-33":"正解2(正しいのは二つ)。ア:専任媒介契約の業務処理状況の報告義務は「2週間に1回以上」であり、1週間に1回以上が義務なのは専属専任なので誤り。イ:専任媒介の指定流通機構への登録は依頼者の要望があっても省略できない(登録しない特約は無効)ので誤り。ウ:一般媒介契約でも媒介契約書面(34条の2書面)の交付義務があるので正しい。","R3B-34":"正解1。「宅地」とは、①建物の敷地に供せられる土地(現に供されているものに加え、供される目的で取引される土地を含む)と、②用途地域内の土地をいい、用途地域内でも道路・公園・河川・広場・水路の用に供されている土地は除かれる。建物の一部の売買の代理も宅建業に当たる(肢2参照)。","R3B-35":"正解4。重要事項説明書(35条書面)は、買主が宅建業者であっても交付は必要(説明は省略可)。IT重説では宅建士証を提示し、相手方が画面上で視認できたことの確認が必要で、承諾があっても提示は省略できない(肢1参照)。重説は契約成立前に行う(肢2参照)。記名する宅建士は専任でなくてよい(肢3参照)。","R3B-36":"正解4。「引き続いて1年以上事業を休止したとき」は必要的免許取消事由であり、知事は免許を取り消さなければならない。法人の破産の届出義務者は「破産管財人」(肢1参照)。免許換え申請中も従前の免許は有効で業務を行える(肢2参照)。","R3B-37":"正解2。宅地建物取引士資格登録簿は一般の閲覧に供されないが、専任宅建士の氏名は宅建業者名簿に登載され、業者名簿は一般の閲覧に供される。傷害罪の罰金刑による登録消除の場合、再登録できないのは「刑の執行を終わった日から5年間」(肢3関連)。営業に関し成年者と同一の行為能力を有する未成年者は登録可(肢4参照)。","R3B-38":"正解3(違反しないのはイ・ウ)。ア:建築確認前は貸借の媒介でも「広告」はできないので違反。イ:契約締結時期の制限(36条)は売買・交換のみに適用され、貸借の代理による契約締結は違反ではない。ウ:買主が宅建業者なら他人物売買(予約)の制限は適用されず違反ではない。エ:農地法5条許可を停止条件とする取得契約では、非業者への他人物売買はできず違反。","R3B-39":"正解3が誤り。保証協会に加入しようとする者は、「加入しようとする日までに」弁済業務保証金分担金を納付しなければならない。加入した日から1週間以内ではない(1週間以内の納付は事務所を新設した場合)。名称・住所等の変更は事前届出(肢1)。新社員加入時は直ちに免許権者へ報告(肢2)。","R3B-40":"正解2。種類・品質に関する契約不適合を担保すべき責任について定めがあるときは、その内容を37条書面に記載しなければならない(媒介業者Ａの義務)。売主業者と媒介業者の双方が交付義務を負う(肢1参照)。自ら買主でも相手方への交付義務あり(肢3参照)。自ら貸主の場合は宅建業法の適用外(肢4参照)。","R3B-41":"正解1が誤り。契約の締結や申込みの受付を行わない案内所には、専任の宅地建物取引士を置く必要はない(標識の掲示は必要)。唯一の専任宅建士が退職したら2週間以内に補充等の措置(肢2)。申込みを受ける案内所には成年の専任宅建士1名以上(肢3)。","R3B-42":"正解3(記載事項はア・ウ・エの三つ)。ア:借賃以外の金銭の定めがあるときの額・授受の時期・目的、ウ:契約解除の定めの内容、エ:天災その他不可抗力による損害負担の定めの内容は、いずれも定めがあるとき貸借の37条書面に記載する。イ:建築・維持保全の状況に関する書面の保存状況は「重要事項説明」の事項(既存住宅の売買等)であり、37条書面の記載事項ではない。","R3B-43":"正解1。仮設テント張りの案内所は「事務所等」に当たらず、そこで買受けの申込みをした買主(非業者の法人Ｂも保護対象)は、クーリング・オフについて告げられていなければ、8日経過後・契約締結後であっても解除できる(告知がなければ8日間のカウントは始まらない)。事務所で申込みをした場合は解除不可(肢4参照)。","R3B-44":"公式発表による複数解(2と3のいずれも正解扱い)。設問文アに誤植(誤:第1項、正:第1号)があったため、アの正誤を問わないものとされた。内容面では、イ:既存住宅の貸借でも建物状況調査の実施の有無・結果の概要は説明事項。ウ:契約不適合責任の履行措置(保証保険等)を講ずるかどうか・その概要は売買の説明事項。アの水害ハザードマップの所在地説明も実務上は必要な説明である。","R3B-45":"正解4。保険契約が締結されている場合、売主Ａが相当の期間を経過しても瑕疵担保責任を履行しないときは、買主Ｂは保険法人に対して直接保険金を請求できる。買主の承諾があっても資力確保措置は免除されない(肢1参照)。届出をしないと基準日の翌日から起算して「50日」経過後に新規契約禁止(肢2参照)。保険金額は2,000万円以上(肢3参照)。","R3B-46":"正解1が誤り。機構は、子育て家庭・高齢者家庭に適した良好な居住性能・居住環境を有する「賃貸住宅」の建設・改良に必要な資金の貸付けを業務として行っている(サービス付き高齢者向け賃貸住宅等)。災害復興建築物の建設・購入資金貸付(肢2)、中古住宅を含む買取対象(肢3)、マンション共用部分改良資金(肢4)も機構の業務。","R3B-47":"正解4。修繕積立金が住戸により異なる場合、全住戸の金額を示すことが困難なときは、最低額と最高額のみで表示できる(管理費も同様)。商業施設は現に利用できるものを表示するのが原則で、工事中等の場合は整備予定時期を明示して表示(肢1参照)。物件名に旧跡名称を使えるのは直線距離300m以内等の基準(肢2関連)。","R3B-48":"正解4。建築着工統計によれば、令和2年のマンション着工戸数は三大都市圏計・その他の地域のいずれも前年を下回った。令和3年地価公示では工業地は上昇しており「いずれの用途も下落」ではない(肢2参照)。宅建業者数は約12万業者で10万を下回っていない(肢1参照)。※数値は出題当時のもの。","R3B-49":"正解2が最も不適当。花崗岩が風化してマサ土化したものは崩壊「しやすい」(まさ土は2018年広島豪雨災害でも問題となった崩壊しやすい土壌)。凝灰岩・頁岩も一般に風化しやすく崩壊リスクがある。津波対策の限界(肢1)、低地の利用状況(肢3)は適当な記述。","R3B-50":"正解4が最も不適当。補強コンクリートブロック造は壁式構造の一種で「壁量を多く必要とし」、住宅・小規模店舗など小規模の建物に広く「使用されている」。記述はどちらも逆。組積式構造の耐震性の弱さと遮音・断熱性(肢1)、開口部を避け壁厚を大きくする耐震化(肢2)は適当。","R4-01":"正解3。判決文の趣旨:背信的悪意者Ｃからの転得者Ｄは、Ｄ自身が背信的悪意者と評価されるのでない限り登記を備えれば保護されるが、Ｄ自身も背信的悪意者なら対抗できない。肢1:自らが背信的悪意者であるＣは登記を完了しても第一買主Ｂに対抗できない。肢2:単純悪意の第三者との関係は登記の先後で決まるため、登記未了のＢは対抗できない。","R4-02":"正解3が誤り。遺留分の放棄は「遺留分」を失うだけであり、相続権自体は失わない(放棄した者も相続はできる)。生前の遺留分放棄には家庭裁判所の許可が必要(肢1)。相続放棄は被相続人の生前にはできない(肢2)。兄弟姉妹に遺留分はない(肢4)。","R4-03":"正解4。成年年齢の引下げにより18歳は成年であり、「未成年者」という後見人の欠格事由には該当しない。成年後見人による取消しに後見監督人の同意は不要(肢1)。保佐人には家庭裁判所の審判により特定の法律行為の代理権を付与することもできる(肢3参照)。","R4-04":"正解1。代価弁済(民法378条):抵当不動産の所有権を買い受けた第三者Ｄが、抵当権者Ｃの「請求に応じて」代価を弁済したときは、抵当権はＤのために消滅する。主債務者Ｂや保証人は抵当権消滅請求ができない(肢4参照・第三取得者でも債務者は不可)。","R4-05":"正解2。期間計算は初日不算入が原則(140条)。8月31日契約で1か月後が期限なら9月1日から起算し、応当日の前日である9月30日の終了をもって満了する。期間の末日が休日でも「取引をしない慣習がある場合に限り」翌日に満了となる(142条・肢3参照)。","R4-06":"正解3。①賃貸借では期間内解約権を留保していれば中途解約でき(618条)、②使用貸借では借主はいつでも契約を解除できる(598条3項)。書面によらない使用貸借で引渡し前に解除できるのは「貸主」(肢1は逆)。転貸には①も②も貸主の承諾が必要(肢2参照)。用法違反による損害賠償はいずれも返還を受けた時から1年以内に請求(肢4参照)。","R4-07":"正解4((ア)のみ)。失踪宣告の取消しは「取消し前に善意でした行為」の効力に影響しないが(民法32条1項)、契約については当事者「双方」が善意であることが必要というのが判例・通説。よってＢ・Ｃともに善意の(ア)の場合のみ、Ｃは所有権をＡに対抗できる。","R4-08":"正解3。地上権(物権)は抵当権の目的にできるが(369条2項)、賃借権(債権)には抵当権を設定できない。修繕義務を負うのは賃貸借の賃貸人のみで、地上権設定者は負わない(肢1参照)。地上権は設定者の承諾なく譲渡できる(肢2参照)。対抗要件を備えた賃借権にも妨害排除請求が認められる(605条の4・肢4参照)。","R4-09":"正解1(正しいのはアの一つ)。ア:委任契約は各当事者がいつでも解除でき(651条)、報酬の約束があっても代理人を辞することができるので正しい。イ:親権の辞任は「家庭裁判所の許可」が必要で法務局への届出ではない。ウ:後見人の辞任は「家庭裁判所の許可」が必要で後見監督人の許可ではない。エ:遺言執行者の辞任も「家庭裁判所の許可」が必要で相続人の許可ではない。辞任系はすべて家庭裁判所と覚える。","R4-10":"正解2。占有を奪われても占有回収の訴えを提起して勝訴し現実に占有を回復すれば、占有は継続していたものと扱われ時効は中断しない(203条ただし書)。土地を賃貸しても間接占有により取得時効は進行する(肢1参照)。時効完成「前」に登記を得た者(Ｃ)に対しては登記なくして時効取得を対抗できる(肢4参照)。","R4-11":"正解3。借地権の存続期間満了前に建物が滅失し、借地権設定者の承諾を得て残存期間を超えて存続する建物を再築したときは、承諾日又は築造日のいずれか早い日から20年間借地権が存続する(借地借家法7条)。建物買取請求権を行使すると代金支払まで同時履行の抗弁により建物の引渡しを拒めるが、敷地の賃料相当額は不当利得として返還が必要(肢4関連)。","R4-12":"正解1。定期建物賃貸借では、契約書とは「別個独立の書面」を契約前に交付(又は電磁的提供)して、更新がなく期間満了により終了する旨を説明しなければならない(38条3項)。この事前説明を欠くと更新排除特約は無効となり普通借家契約になる。床面積200㎡未満の居住用建物では転勤・療養等やむを得ない事情があれば借主から中途解約できる(肢3関連)。","R4-13":"正解1が誤り。管理者は、規約により原告又は被告となったときは、遅滞なくその旨を各区分所有者に「通知しなければならない」(区分所有法26条5項)。管理者がないときは区分所有者の5分の1以上(議決権も)で集会を招集できる(肢2)。管理者の選任は普通決議(過半数)(肢3)。","R4-14":"正解2が誤り。資格者代理人(司法書士等)に申請を委任した場合でも、登記義務者の登記識別情報の提供は原則必要。提供できない場合に資格者代理人による本人確認情報の制度があるが、当然に不要となるわけではない。登記識別情報の通知は希望しない旨の申出ができる(肢3)。","R4-15":"正解3が誤り。高度地区は建築物の「高さ」の最高限度又は最低限度を定める地区。容積率の最高限度・最低限度等を定めるのは「高度利用地区」。名前が紛らわしい両者の定義の入れ替えは超頻出。市街化区域には少なくとも用途地域を定める(肢1)。","R4-16":"正解2。図書館・博物館・公民館等の公益上必要な建築物の建築目的の開発行為は、規模を問わず開発許可不要(29条1項3号)。市街地再開発事業の施行として行う開発行為も許可不要(肢1参照)。市街化調整区域の開発行為は「市街化を促進しない」だけでは足りず、法34条各号のいずれかに該当することも必要(肢4参照)。","R4-17":"正解3。地方公共団体は、条例で、建築物の敷地・構造・建築設備に関して安全上・防火上・衛生上必要な制限を「附加」することができる(法40条)。法改正で不適合となった既存建築物は違反建築物ではなく既存不適格建築物(肢1参照)。災害危険区域内の住居用建築物の建築禁止等は「条例」で定める(肢4参照)。","R4-18":"正解3。幅員1.8m未満の道を2項道路として指定するには、あらかじめ「建築審査会の同意」を得なければならない。神社・寺院・教会は全用途地域で建築可能(肢1参照)。絶対高さ制限(10m又は12m)があるのは低層住居専用地域と田園住居地域で、第一種住居地域にはない(肢4参照)。","R4-19":"正解4が誤り(旧宅造法での出題)。造成宅地防災区域の指定基準は「盛土の高さ5m以上」だけでなく、盛土をした面積が3,000㎡以上で地下水位が高い等の基準もあり、高さ5m未満でも指定され得る。現行の盛土規制法でも造成宅地防災区域の枠組みは同様に引き継がれている。","R4-20":"正解1が誤り。組合設立認可の公告日から換地処分の公告日まで、施行地区内で事業の障害となるおそれのある土地の形質変更・建築等を行うには「都道府県知事(市の区域内は市長)等」の許可が必要であり、組合の許可ではない。清算金の権利義務は換地処分公告の翌日に確定した所有者等に帰属する(肢4関連)。","R4-21":"正解4。農地法の適用上、土地の面積は登記簿の地積によるのが原則だが、地積が著しく事実と相違する場合や登記簿がない場合は実測等に基づき農業委員会が認定したところによる。引渡しによる対抗力(16条)が認められるのは農地の「賃貸借」のみで使用貸借には認められない(肢1参照)。農地所有適格法人でない株式会社も賃借(借入れ)は可能(肢2参照)。","R4-22":"正解3。事後届出の要否は権利取得者を基準に「一団の土地」の合計面積で判断する。市街化区域を除く都市計画区域内は5,000㎡以上が届出対象で、甲(3,500㎡)+乙(2,500㎡)=6,000㎡を一団として取得するＥは届出が必要。当事者の一方が市(地方公共団体)なら届出不要(肢1参照)。対価の額も届出事項(肢2参照)。勧告に従わなくても契約は取り消せない(肢4参照)。","R4-23":"正解3。契約期間という重要な事項を変更する覚書(5年→10年)は課税文書(土地賃貸借契約書)に該当し印紙税が課される。肢1:後日本契約書を作成する旨を明示していても、譲渡の事実を証する覚書自体が課税文書。肢2:同じ号(譲渡契約)同士を区分記載した場合の記載金額は合計額9,000万円。肢4:駐車場の特定区画に駐車させる契約は施設利用契約であり、土地賃借権設定契約書として課税されるものではない。","R4-24":"正解2。土地・家屋価格等縦覧帳簿の縦覧期間は、毎年4月1日から4月20日又は当該年度の最初の納期限の日のいずれか遅い日以後の日までの間。固定資産税の徴収は普通徴収(肢1参照)。賦課期日は法定(1月1日)で条例では定めない(肢3参照)。賃借人は納税義務者にならない(肢4参照)。","R4-25":"正解2が誤り。地価公示の「正常な価格」とは、土地に建物その他の定着物がある場合や地上権等が存する場合には、「これらが存しないものとして」(更地として)通常成立すると認められる価格をいう。現況を所与とするのではない点が誤り。公示区域内で鑑定評価により正常な価格を求めるときは公示価格を規準とする(肢3)。","R4-26":"正解2。宅地建物取引業を営まず他の兼業業務のみを営んでいる支店は「事務所」に該当しない(逆に、本店は宅建業を営まなくても支店で営んでいれば事務所になる点に注意)。事務所に掲げる義務があるのは標識と報酬額で、免許証の掲示義務はない(肢3参照)。専任宅建士は業務従事者5人に1人以上(肢4関連)。","R4-27":"正解1。依頼者からの特別の依頼に基づく遠隔地への現地調査費用など、依頼者の特別の依頼により支出を要する特別の費用で事前に依頼者の承諾があるものは、報酬とは別に実費を受領できる。使用貸借の媒介では「通常の借賃」を基準に報酬を算定できる(肢2参照)。低廉な空家等の特例による上限も要確認(肢4関連)。","R4-28":"正解1。重要事項説明は「物件を取得し又は借りようとする者」に対して行うもの。宅建業者が自ら買主となる場合、売主(非業者の個人)に対して重説を行う必要はなく、買主自身が業者なので誰にも重説義務が生じない。重説書面の記載に誤りがあれば、故意でなく調査不足でも業法違反となり得る(肢2関連)。","R4-29":"正解3が誤り。宅建士証の更新時に受講する法定講習は「都道府県知事が指定する講習」(交付申請前6か月以内に行われるもの)であり、国土交通大臣指定ではない。禁錮以上の刑に処せられたら30日以内に本人が届出(肢1)。事務禁止処分を受けたら宅建士証は交付知事に「提出」(肢2)。信用を害する行為には職務に必ずしも直接関係しない行為も含まれる(肢4)。","R4-30":"正解3(正しいのはイ・ウ・エの三つ)。ア:法35条2項の割賦販売とは、引渡し後「1年以上」の期間にわたり2回以上に分割して受領する条件の販売をいい、「6か月以上」は誤り。イ:犯収法では宅地建物の売買契約の締結・代理・媒介が特定取引。ウ:従業者への必要な教育を行う努力義務(31条の2)。エ:従業者の秘密保持義務(75条の3)は業務を補助した者にも及ぶ。","R4-31":"正解1。宅建業者が価額について意見を述べるために行った価額の査定等に要した費用は、依頼者に請求できない(通常の媒介業務の範囲内)。一般媒介契約でも媒介契約書面(34条の2書面)の交付義務はある(肢2参照)。専任媒介の有効期間は更新後も3か月が上限(肢3参照)。","R4-32":"正解1が誤り。37条書面の交付義務は、売主業者Ａと媒介業者Ｂの「それぞれ」が負う。媒介業者が交付するから売主は交付しなくてよい、ということにはならない(共同で1通を交付する運用は可能だが義務自体は各自にある)。37条書面交付時の宅建士証提示は請求があったときに必要(肢2)。","R4-33":"正解2(正しいのはウ・エの二つ)。ア:営業に関し成年者と同一の行為能力を有する未成年者は登録できるので「いかなる場合にも不可」は誤り。イ:登録の移転は任意であり、他県の専任宅建士に就任するために移転が義務となるわけではないので誤り。ウ:事務禁止処分の期間中は登録の移転を申請できない。エ:移転後に交付される宅建士証の有効期間は従前の宅建士証の残存期間となる。","R4-34":"正解4が誤り。昭和56年5月31日以前に新築工事に着手した建物(旧耐震)については、指定確認検査機関・建築士・登録住宅性能評価機関・地方公共団体による耐震診断を「受けたものであるとき」にその内容を説明すればよく、診断を受けていない場合に自ら診断を実施して説明する義務まではない。建物状況調査(過去1年以内)の有無・結果概要(肢1)、造成宅地防災区域内である旨(肢2)、石綿調査結果の記録(肢3)は説明事項。","R4-35":"正解4。帳簿には、取引のあったつど所定事項を記載する義務があり、相手方が宅建業者であっても同じ(業者間取引では報酬額等も記載)。従業者証明書の提示は宅建士証では代替できない(肢1参照)。買主が宅建業者なら重説は書面交付で足り説明不要(肢2関連)。","R4-36":"正解1。既存住宅の売買の媒介では、設計図書・点検記録その他の建物の建築及び維持保全の状況に関する書類(検査済証を含む)の保存の状況を説明し、保存されていなければその旨を説明する。売買代金の額・支払方法(肢2)、引渡し時期(肢4)は重説事項ではない。水害ハザードマップは図面上の所在地を示して説明する必要があり、存在を伝えるだけでは足りない(肢3参照)。","R4-37":"正解2(正しいのはア・ウの二つ)。ア:建築確認後の変更確認申請中は、変更の確認を受ける予定である旨を表示し当初の確認内容と合わせて表示すれば広告できる。イ:誇大広告は問合せや申込みがなくても表示した時点で違反となるので誤り。ウ:数回に分けた広告はそのたびごとに取引態様の別を明示し、注文を受けた際にも改めて明示しなければならない。","R4-38":"正解4。クーリング・オフによる解除があった場合、業者は速やかに手付金その他受領した金銭を全額返還しなければならず、損害賠償や違約金の請求もできない。喫茶店での申込みなら、引渡しを受けても「代金全部の支払」まで済んでいなければ解除可能(肢1参照)。申込者が宅建業者なら制度自体が適用されない(肢2参照)。業者側の申出による勤務先での契約なら解除できる(肢3参照)。","R4-39":"正解4。保証協会の社員と宅建業に関し取引をした者(非業者)は、その業者が社員でないとしたならば供託すべき営業保証金の額に相当する額の範囲内で、弁済業務保証金から弁済(還付)を受ける権利を有する。保証協会は分担金の納付を受けた日から1週間以内に弁済業務保証金を供託する(肢2関連)。新事務所設置時の分担金納付は設置日から2週間以内(肢3関連)。","R4-40":"正解2(違反しないのは二つ)。IT重説(テレビ会議等)は映像と音声の双方を相互にやり取りできる環境が必要で、電話のみによる重要事項説明は違反(ア)。重説は媒介業者の宅建士が行う必要があり、貸主側代表者が作成・説明するのは違反(イ)。重説書面に記名した宅建士と実際に説明する宅建士は同一でなくてもよい(ウは違反しない)。","R4-41":"正解2(誤りは二つ)。ア:免許取消しにより営業保証金を取り戻す場合、6か月以上の期間を定めた公告等の手続によればよく、刑の執行終了から5年間取戻しできないという制限はないので誤り。イ:還付による不足額は通知書送付を受けた日から2週間以内に供託、で正しい。ウ:保証協会からの資料提出要求は正当な理由なく拒めない、で正しい。エ:社員の地位を失った場合は「1週間以内」に営業保証金を供託しなければならない点に注意。","R4-42":"正解2。価額又は評価額について意見を述べるときは根拠を明らかにしなければならないが、その方法は口頭でも書面でもよい。専属専任媒介の業務処理状況の報告は「1週間に1回以上」(専任は2週間に1回以上)(肢1参照)。有効期間は書面による申出があっても3か月が上限(肢3参照)。指定流通機構の登録を証する書面は依頼がなくても遅滞なく引き渡す(肢4参照)。","R4-43":"正解2が誤り。宅建業者が自ら売主となる場合、種類・品質の契約不適合責任について「引渡しの日から2年以上」の通知期間とする特約を除き、民法より買主に不利な特約は無効。「引渡しから1年間に限り責任を負う」特約は無効であり、設けることはできない。損害賠償額の予定と違約金の合計は代金の2割(500万円)まで可(肢3)。割賦販売で3/10超の支払後の所有権留保等は禁止(肢4)。","R4-44":"正解4が違反。37条書面は契約成立後遅滞なく「交付」しなければならず、業者間取引でも各自作成して保管するだけでは交付義務違反。買主の代理業者への交付は差し支えない(肢1)。書面の交付自体は宅建士でない従業員が行ってもよい(肢2)。借賃以外の金銭は額・授受の時期・目的を記載(肢3)。","R4-45":"正解3。自ら売主として新築住宅を販売する業者は、基準日から3週間を経過する日までの間に、基準日前10年間に引き渡した新築住宅について住宅販売瑕疵担保保証金の供託をしていなければならない。買主が宅建業者の場合は資力確保義務の対象外(肢1参照)。保険契約は引渡しから10年以上有効で、転売等があっても任意に解除できない(肢2参照)。","R4-46":"正解1が誤り。証券化支援業務(買取型)の譲受け対象となる貸付債権には、住宅の建設・購入に必要な資金だけでなく、これに付随する土地・借地権の取得資金や住宅の改良資金も含まれる。団信は死亡のほか重度障害の場合も保険金で弁済に充当(肢2)。償還方法には元利均等・元金均等いずれもある(肢3)。","R4-47":"正解4。建築条件付土地の取引広告では、建築条件付土地である旨、条件の内容、条件が成就しなかったときの措置の内容を明示しなければならない。徒歩所要時間の端数は切り上げ(肢1参照)。掲載直前に契約済みとなった物件の広告継続はおとり広告として不当表示(肢2参照)。管理費が住戸により異なる場合は最低額・最高額の表示で可(肢3参照)。","R4-48":"この問題は出題後の国土交通省データ改訂により正解肢が存在しなくなり、公式に「全ての解答を正解として取り扱う」とされた没問です(アプリでもどれを選んでも正解扱い)。統計問題は数値が毎年変わるため、深追いせず受験年の最新統計(着工戸数・地価公示・土地白書・法人企業統計)を直前に確認しましょう。","R4-49":"正解2が最も不適当。低地は一般に洪水や地震(液状化等)に対して「弱く」、防災的見地からは住宅地として好ましくない。台地上の浅い谷の浸水リスク(肢1)、強固な護岸を備えた埋立地の利用可能性(肢3)、ハザードマップポータルサイト(肢4)は適当な記述。","R4-50":"正解4が最も不適当。真壁は柱を見せる「和風」の壁、大壁は柱を隠す「洋風」の壁であり、記述は和風と洋風が逆。在来軸組構法の構成(肢1・2)、和小屋と洋小屋(トラス構造)の説明(肢3)は適当な記述。","R5-01":"正解1が誤り。判決文のとおり、遺産分割までの間に遺産不動産から生じた賃料債権は「遺産とは別個の財産」であり、各共同相続人が相続分に応じて分割単独債権として確定的に取得する。遺産分割で不動産を取得した相続人に賃料債権まで遡って帰属するのではない(遡及効は賃料債権に及ばない)。","R5-02":"正解1。令和3年民法改正(令和5年4月施行)により、境界標の調査・測量等の目的のため必要な範囲内で隣地を「使用することができる」(209条)。越境した竹木の枝は原則として所有者に切除させるが、催告しても切除しない場合等は自ら切除できる(233条・肢2参照)。共有障壁の高さ増しは他方の承諾不要(231条・肢3参照)。","R5-03":"正解2。請負の目的物の契約不適合に基づく責任追及の通知期間は、注文者が「不適合を知った時」から1年以内(民法637条1項)。「工事終了日から1年」ではない。請負人が不適合を知りながら告げなかったときは通知期間の制限は適用されない(肢3参照)。注文者提供の材料の性質による不適合は原則請負人免責(肢4参照)。","R5-04":"正解4(エのみ相殺不可)。相殺には自働債権(相手に対する債権=甲)の弁済期到来が必要で、受働債権(乙)は期限の利益を放棄すれば足りる。弁済期の定めのない債権は成立と同時に弁済期にある。エは自働債権である甲債権の弁済期が未到来なので相殺できない。ア〜ウはいずれも相殺可能。","R5-05":"正解4。家庭裁判所選任の管理人は、保存行為・利用改良行為は当然にでき、それを超える行為(売却等)は家庭裁判所の許可を得て行える(民法28条)。不在者財産管理人の選任に生死不明7年は不要(肢1参照。7年は失踪宣告の要件)。","R5-06":"正解3(ア・イ・ウの三つとも正しい)。時効完成「前」に登場した第三者には登記なくして時効取得を対抗できる(ア)。時効完成後の第三者には登記がなければ対抗できないのが原則だが、その第三者の登記時点から更に時効期間占有を続ければ再度の時効取得を対抗できる(イ)。抵当権設定登記後に再度時効期間占有した場合も同様に消滅を主張できる(ウ・判例)。","R5-07":"正解3。配偶者居住権を取得させた居住建物の所有者Ｃは、配偶者Ｂに対し「配偶者居住権の設定の登記を備えさせる義務」を負う(民法1031条)。存続期間を定めなければ配偶者の終身の間(肢1は20年が誤り)。配偶者居住権は譲渡できない(肢2参照)。通常の必要費は配偶者Ｂの負担(肢4参照)。","R5-08":"正解3。制限行為能力を理由とする取消権は、追認できる時(成年到達)から5年・行為時から20年で消滅するが、取り消されないまま本人が成年に達した後に本人が追認すれば確定的に有効となる。Ｂが反対していても、成年に達したＡ自身が追認できる。未成年者本人も単独で取消し可能(肢1関連)。相手方が善意でも取消しは可能(肢2参照・制限行為能力による取消しに相手方保護要件はない)。","R5-09":"正解2が誤り。賃借人が修繕必要の通知をし、賃貸人が相当期間内に修繕しないときに賃借人は自ら修繕できる(607条の2)。ただちに修繕できるわけではない(急迫の事情がある場合は別・肢4)。賃借人の帰責事由による損傷は賃貸人に修繕義務なし(606条1項ただし書・肢3)。","R5-10":"正解3(400万円)。順位の「放棄」では、放棄者Ｂと受益者Ｄの間で優先弁済枠を債権額に応じて按分する。本来の配当はＢ1,000万・Ｃ1,200万・Ｄ200万。ＢとＤの合計1,200万円を債権額1,000万:2,000万=1:2で按分し、Ｂ=400万円、Ｄ=800万円となる。","R5-11":"正解4。存続期間50年・更新排除の定めのない居住用建物所有目的の借地権は普通借地権であり、期間満了時に建物があり借地権者が更新請求すれば、正当事由による異議がない限り契約は更新される。「減額しない」特約は借地借家法11条により賃借人に不利で無効(減額請求可能・肢1参照)。賃貸アパート事業用は「事業用定期借地権」にできない(居住用建物のため・肢2参照)。","R5-12":"正解3。建物賃貸人たる地位の移転(605条の2第2項):譲渡人と譲受人の合意により、賃貸人の地位を譲渡人に留保し譲受人が譲渡人に賃貸する旨を定めれば、賃借人の承諾なく地位を留保できる。期間1年未満の建物賃貸借は「期間の定めのないもの」とみなされる(肢1は「1年とみなす」が誤り)。不減額特約があっても借賃減額請求は可能(肢2参照)。","R5-13":"正解2が誤り。招集手続を省略して集会を開くには区分所有者「全員」の同意が必要(区分所有法36条)。4分の3以上ではない。集会の招集通知期間(1週間)は規約で伸縮可能(肢1参照)。共用部分の保存行為は各共有者が単独で可能(肢3)。","R5-14":"正解2が誤り。登記簿の附属書類(申請書等)の閲覧は、図面を除き「正当な理由があるとき」に、理由を明らかにして請求できる(不登法121条)。誰でも無条件に閲覧できるのではない。建物滅失は1か月以内に滅失登記申請(肢1)。区分建物の保存登記は表題部所有者から取得した者も申請可(肢4)。","R5-15":"正解4。地区計画は、用途地域が定められている区域のほか、用途地域のない区域でも一定の要件を満たせば定めることができる。市街化調整区域は「市街化を抑制すべき区域」(肢1の記述は非線引き区域等の説明)。特定用途制限地域は「用途地域が定められていない区域(市街化調整区域を除く)」に定める(肢3参照)。","R5-16":"正解1。開発許可を申請しようとする者は、あらかじめ開発行為に関係がある公共施設の管理者と「協議し、その同意を得る」ことが必要(32条)。変更の場合、軽微な変更は届出で足りる(肢2参照)。工事完了公告があるまでは原則建築物を建築できない(肢3関連)。市街化調整区域では開発区域外でも知事の許可なく建築できない(43条・肢4参照)。","R5-17":"正解3が誤り。建築物が防火地域と準防火地域にわたる場合は、原則としてその「全部」について規制の厳しい「防火地域」の規定を適用する。災害危険区域の条例指定(肢1)、大規模物販店舗の避難階段(肢2)、国土交通大臣認定の石綿添加建材(肢4)は正しい。","R5-18":"正解1。準防火地域内の準耐火建築物(耐火建築物等含む)には建蔽率が10分の1加算される緩和がある(53条3項)。擁壁は地盤面下なら道路内に設けられる(肢2参照)。袋路状道路の接道強化条例は延べ面積150㎡超ではなく「その用途・規模による」…肢3は共同住宅等が対象で一戸建て住宅は対象外の点が誤り。日影規制は対象区域「外」の建築物でも高さ10m超で冬至日に区域内に日影を生じさせるものには適用される(肢4参照)。","R5-19":"正解1が誤り(旧宅造法での出題)。宅地造成工事規制区域の指定は「関係市町村長の意見を聴く」必要はない(指定するのは知事、意見聴取の規定なし)…この問題は規制区域指定手続と造成宅地防災区域の指定要件を混同させる出題。なお現行の盛土規制法では基礎調査を踏まえ規制区域を指定する仕組みに再編されている(学習上は現行法の枠組みで理解しておけばよい)。","R5-20":"正解4が誤り。土地区画整理組合が仮換地を指定するには「総会等の同意」が必要であり、土地区画整理審議会の同意ではない(審議会は公的施行の場合に置かれる)。清算金は換地処分公告日の翌日に確定(肢1)。施行地区内での建築等は知事等の許可制で、施行者の同意ではない(肢2の論点)。","R5-21":"正解2が誤り。自己所有農地を農業用施設に転用する場合、「2アール未満」であれば4条許可不要。4アールは2アール以上なので許可が必要。相続による取得は3条許可不要(届出は必要)だが、相続人以外への特定遺贈は許可必要(肢1)。無許可の売買契約は効力を生じない(肢3)。","R5-22":"正解1。当事者の一方又は双方が国・地方公共団体の場合、事後届出は不要。国から購入した場合は面積にかかわらず届出不要。相続による取得は「契約」でないため届出不要(肢2参照)。事後届出義務者は権利取得者(買主Ｄ)のみ(肢3参照)。特別注視区域では200㎡以上の土地取引に届出が必要(肢4参照)。","R5-23":"正解1。契約書を複数通作成し、それぞれが契約の成立を証明する文書であれば、仲介人保存用を含め各通に印紙税が課される。土地譲渡と建築請負を1通に併記した場合は原則高い方の金額(請負6,000万円)が記載金額(肢2参照)。贈与契約書は記載金額のない契約書として200円(肢3参照)。増額変更契約書は増加額が記載金額(肢4参照)。","R5-24":"正解4。不動産取得税は都道府県税であり、国・都道府県・市町村・特別区などに対しては課することができない(非課税)。徴収は普通徴収の方法による(肢1参照)。使途の定めのない普通税である(肢2参照)。課税主体は不動産所在の「都道府県」(肢3参照)。","R5-25":"正解4。取引事例比較法は、近隣地域・同一需給圏内の類似地域等の取引事例から比準して価格(比準価格)を求める手法。原価法は再調達原価を求めて減価修正する手法(肢1は収益価格とあるのが誤り)。土地(更地)でも再調達原価が把握できる造成地等なら原価法を適用できる(肢2参照)。特殊事情のある事例も事情補正できれば採用可(肢3は「できない」とする点が誤りの典型)。","R5-26":"正解3(正しいのは三つ)。37条書面の電磁的提供には、相手方の書面等による事前承諾が必要(ア)。提供に係る宅建士の明示は承諾取得時の通知に記載していても、提供時に明示が必要(イが誤り)。相手方がファイルへの記録を出力して書面を作成できるものであること、改変の有無を確認できる措置を講じることが必要(ウ・エ)。","R5-27":"正解4が誤り。「建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項」を37条書面に記載するのは既存住宅の売買・交換の場合であり、貸借の37条書面には記載不要。建物状況調査の定義(構造耐力上主要な部分・雨水の浸入を防止する部分の調査、肢1)、実施者が既存住宅状況調査技術者である建築士に限られること(肢2)は正しい。","R5-28":"正解3(違反はア・イ・ウの三つ)。ア:「勧誘に来ないでほしい」と意思表示した相手への再勧誘は、担当者を変えても違反。イ:不実のことと認識しながら再開発されると告げる行為は不実告知で違反。ウ:深夜23時の電話勧誘で私生活の平穏を害し困惑させる行為は違反。エ(37条書面関連)は違反しない記述。","R5-29":"正解2。免許欠格となる罰金刑は、宅建業法違反・暴力的犯罪(傷害・暴行・脅迫・背任等)に限られる。所得税法違反の罰金は欠格事由ではない。道路交通法違反の罰金も欠格にならないが、肢1は「支店の代表者(政令で定める使用人)」…禁錮以上なら欠格。宅建業法違反の罰金(肢3)、脅迫罪の罰金(肢4)は非常勤役員でも欠格となる。","R5-30":"正解1(正しいのはイの一つ)。イ:供託した旨の届出をした後でなければ事業を開始できず正しい。ア:催告は免許日から3か月以内に届出がないときに行い、催告到達から1か月以内に届出がなければ取消し「できる」(6か月・1か月の数字が誤り)。ウ:不足額供託は不足通知を受けた日から2週間以内、供託した旨の届出も2週間以内(30日が誤り)。エ:免許失効による取戻しは公告が必要。","R5-31":"正解4。誇大広告等の禁止に違反した場合、監督処分(指示・業務停止等)の対象になるだけでなく、6か月以下の懲役・100万円以下の罰金という罰則の対象にもなる。取引態様は広告時と注文時の双方で明示が必要(肢1参照)。建物状況調査の実施の有無は広告の必須表示事項ではない(肢2参照)。建築確認申請中の建物は広告不可(肢3参照)。","R5-32":"正解4が誤り。展示会場等の届出(法50条2項)が必要なのは、そこで契約の締結や申込みの受付を行う場合。単に展示会を実施するだけの場所は届出不要…ではなく、本肢の誤りは届出先・期限:業務開始の「10日前まで」に免許権者(丁県知事)と所在地管轄知事に届け出る。支店新設は変更の届出(30日以内・肢1)。合併消滅は30日以内に代表役員だった者が届出(肢2)。専任宅建士の変更は30日以内に届出(肢3)。","R5-33":"正解1。宅建業者Ａが自ら当事者となる「交換」でも、相手方Ｂに対して乙宅地(取得する側の物件)について重要事項説明が必要。引渡しの時期は重説事項ではない(37条書面の事項・肢2参照)。所有権移転登記前に受領する金銭(手付金等)は保全措置の概要の説明対象(肢3関連)。電磁的提供の承諾は書面等によるもので口頭では不可(肢4参照)。","R5-34":"正解3(違反はア・ウ・エの三つ)。ア:居住用建物の媒介で依頼時の承諾なく借賃1.1か月分(13.2万円)を一方から受領は違反(承諾なければ0.55か月分=6.6万円まで)。イ:依頼に基づく特別の広告料金は報酬とは別に受領でき違反しない。ウ:契約書作成費など媒介業務に伴う費用を報酬と別に請求するのは違反。エ:事務所用なら双方から合計1.1か月分までのところ、Ａだけで13.2万円受領なら双方合計で超過し違反。","R5-35":"正解4。売主Ａが売却の媒介を依頼した宅建業者Ｃの事務所は「事務所等」に該当し、そこで買受けの申込みをした場合はクーリング・オフできない。仮設テント張りの案内所は土地に定着しないため「事務所等」に当たらず、申込みをしてもクーリング・オフ可能(肢1・2関連)。クーリング・オフの通知は書面(発信時に効力)であり電磁的方法は不可(肢3参照)。","R5-36":"正解3(違反はア・イ・エの三つ)。ア:申込みの撤回に際し、既に受領した預り金から諸費用を差し引いて返還することは「預り金返還の拒否」として違反。イ:手付金の分割払い提案は「手付についての信用の供与」で違反(契約締結に至らなくても提案自体が違反)。ウ:帳簿の電子媒体保存は紙面表示できる状態なら適法で違反しない。エ:勧誘目的を告げずアンケートを装う勧誘は違反。","R5-37":"正解3。従業者は、取引の関係者(買受けの申込者を含む)から請求があったときは従業者証明書を提示しなければならない。非常勤役員にも従業者証明書を携帯させる必要がある(肢1参照)。従業者名簿は取引の関係者から請求があれば閲覧させる義務がある(肢2参照)。従業者名簿の保存期間は最終記載日から10年間(肢4参照)。","R5-38":"正解2(正しいのはア・エの二つ)。ア:自ら貸借(転貸を含む)は宅建業に当たらないので正しい。イ:宅建士とは「宅建士証の交付を受けた者」をいうので誤り(登録だけでは宅建士ではない)。ウ:建設業者が業として宅地売買の媒介を行えば宅建業に該当するので誤り。エ:宅建士の知識・能力の維持向上努力義務(15条の3)は正しい。","R5-39":"正解2。保証保険契約による保全措置では、保険期間は「保証保険契約成立時から宅地建物の引渡しまで」の期間でなければならない。保全措置は手付金等の受領「前」に講じる必要がある(肢1参照)。保険証券を買主に交付することが必要(肢3関連)。保証委託契約の場合は銀行等が連帯保証する書面を買主に交付(肢4関連)。","R5-40":"正解4。専任媒介契約書面(34条の2書面)には、依頼者が他の業者の媒介・代理で契約を成立させたときの措置(違約金等)を記載しなければならない。申込みがあったときの報告は相手が業者でも省略できない(肢1参照)。建物状況調査のあっせんの有無は媒介契約書の記載事項(肢2関連)。専任媒介の指定流通機構への登録は契約日から7日以内(休業日を除く)(肢3は「休業日数を含め」が誤り)。","R5-41":"正解2。勤務先の宅建業者の商号・免許証番号は登録簿の登載事項であり、変更があったときは遅滞なく「変更の登録」を申請しなければならない(業者側の届出とは別に宅建士本人の申請が必要)。知事は管轄外の登録の宅建士にも報告を求めることができる(肢1参照)。不正手段による宅建士証取得は登録消除処分(肢3関連)。登録消除処分の公告制度はない(肢4参照)。","R5-42":"正解3(誤りはア・イ・エの三つ)。ア:重要事項説明の際は相手方の請求がなくても宅建士証を提示しなければならないので誤り。イ:重要事項説明の相手方は買主・借主など権利を取得する側であり、売主への交付・説明は不要なので誤り。ウ:買主が宅建業者なら重説書面の交付だけで足り説明は省略できるので正しい。エ:代金並びにその支払時期・方法は重説事項ではなく37条書面の記載事項なので誤り。","R5-43":"正解4。天災その他不可抗力による損害の負担(危険負担)に関する定めがあるときは、その内容を37条書面に記載しなければならない。移転登記の申請時期は必要的記載事項で、買主が業者でも省略不可(肢1参照)。37条書面は契約成立後遅滞なく交付(肢2参照)。記名する宅建士は専任である必要はない(肢3参照)。","R5-44":"正解1。保証協会の社員は、自ら取り扱った取引の苦情について、保証協会から解決のために必要な資料の提出等を求められたときは、正当な理由がある場合でなければ拒んではならない。一部事務所廃止による分担金の返還には公告不要(肢2は公告を要するとする点が誤りの典型)。苦情解決の申出は保証協会に対して行う(肢3関連)。","R5-45":"正解4。新築住宅の構造耐力上主要な部分等の瑕疵担保責任を負わない旨の特約は無効であり(品確法95条)、特約が無効である以上Ａは資力確保措置(保証金供託又は保険)を講じる義務を負う。住宅販売瑕疵担保保証金の供託先は「主たる事務所の最寄りの供託所」(肢3参照)。供託所の説明は売買契約締結までに書面で行う(肢2関連)。","R5-46":"正解2が誤り。証券化支援事業(買取型)の買取対象には、新築住宅だけでなく中古(既存)住宅の購入資金に係る貸付債権も含まれる。子育て・高齢者世帯向け賃貸住宅融資(肢1)、ZEH等への金利引下げ(肢3)、マンション共用部分改良資金融資(肢4)はいずれも機構の業務として正しい。","R5-47":"正解2。物件名に街道等の名称を使用できるのは、物件が当該街道に面しているか、直線距離50m以内に所在する場合。取引する意思のない物件の広告掲載は「おとり広告」として実在しても不当表示(肢1参照)。スーパー等は道路距離又は徒歩所要時間を明示(自転車所要時間ではない・肢3参照)。","R5-48":"正解1が誤り(誤っているものを選ぶ問題)。令和4年3月末の宅建業者数は約12万8千業者で「増加」しており、記述の減少という内容が統計と相違。※統計問題は毎年数値が変わるため、受験年の最新データ(業者数・地価・着工戸数・利益率)を直前に確認すること。","R5-49":"正解2が最も不適当。谷底低地に軟弱層が厚く堆積している所では、地震動が「増幅」されて震動が大きくなる。「凝縮されて小さくなる」は逆。自然堤防の後背湿地側の縁は液状化しやすい(肢1)、関東地震での谷底低地の被害(肢3)は適当な記述。","R5-50":"正解3が最も不適当。鉄筋とコンクリートの一体性(付着性)を高めるには、表面に突起(リブ)のある異形棒鋼の方が丸鋼より優れている。記述は丸鋼と異形棒鋼が逆。鉄筋コンクリート構造の耐火性・剛性(肢1)、自重の大きさ(肢2)、工期の長さ(肢4)は適当。","R6-01":"正解1。どんな法律行為も、行為時に意思能力がなければ無効(民法3条の2)。営業を許された未成年者であっても同じ。公序良俗違反は当事者が合意しても無効(肢2)。詐欺も強迫も効果は「取消し」(肢3)。他人物売買も契約自体は有効(肢4)。","R6-02":"正解4が誤り。肢4の記述は「請負」の定義。委任は法律行為をすることを相手方に委託する契約であり、仕事の完成を目的としない。復受任者の選任には委任者の許諾又はやむを得ない事由が必要(肢2)。本人死亡後も代理権を存続させる合意は有効(肢3・判例)。","R6-03":"正解3。賃借権など短期の利用権(土地は5年以内)の設定は共有物の「管理」に当たり、持分価格の過半数(A・B・Cで4分の3)で決定できる。形状・効用の著しい変更は共有者全員の同意が必要で過半数では不可(肢1)。不実登記の名義人への抹消請求は保存行為として各共有者が単独でできる(肢2)。","R6-04":"正解4。相続人Ｃは売主Ａの地位を包括承継するので、Ａの詐欺を理由とする取消しをＢはＣに対して主張できる。解除権も一身専属権ではなく相続される(肢2)。当事者の地位を承継した者との間では登記なくして権利を主張できる(肢3)。","R6-05":"正解2。善意の不当利得受益者は履行の請求を受けた時から遅滞となる。不法行為に基づく損害賠償債務は「損害発生(不法行為)の時」から当然に遅滞(肢1)。不確定期限付債務は「期限到来後に請求を受けた時」と「期限到来を知った時」のいずれか早い時から遅滞(肢4)。","R6-06":"正解4(消滅するものはなし)。地上権と所有権が同一人に帰属すると混同により地上権は消滅するのが原則だが、その土地に第三者Ｃの抵当権が設定・登記されている場合は、混同の例外として地上権は消滅しない(民法179条1項ただし書)。取得原因が売買・相続・代物弁済・贈与のいずれであっても同じ。","R6-07":"正解1。占有回収の訴えは占有を「侵奪」された場合に限られる。だまされて任意に占有を移転した場合は侵奪に当たらず、占有回収の訴えはできない。相続人は相続開始を知らなくても被相続人の占有を当然に承継する(肢3)。賃貸借は当事者の死亡では終了しない(肢4)。","R6-08":"正解1(条文にない)。かつての隔地者間の契約の発信主義(旧526条)は2020年民法改正で廃止され、承諾も到達主義(97条1項)による。「発した時に成立」という規定は現行民法には存在しない。肢2は121条の2、肢3は107条(代理権の濫用)、肢4は5条の条文。","R6-09":"正解2。債務者と引受人の間で併存的債務引受をした場合、債権者が引受人に承諾(受益の意思表示)をした時に効力を生ずる(民法470条3項)。免責的債務引受を債務者・引受人間で行うには債権者の承諾が必要(肢1)。転貸には賃貸人の承諾が必要(肢4)。","R6-10":"正解4。売主・買主どちらの責めにも帰さない品質の契約不適合の場合、買主は追完請求・代金減額請求・契約解除はできる(いずれも売主の帰責事由不要)が、損害賠償請求だけは債務者(売主)に帰責事由がなければできない(415条1項ただし書)。","R6-11":"正解3。借地権の存続期間を定めなかったときは30年(借地借家法3条)。30年未満の定めをしても30年になる。最初の更新後の期間は20年、2回目以降は10年(肢4参照)。事業用定期借地権は必ず公正証書で設定する(肢1参照)。","R6-12":"正解3。居住用建物の賃借人が相続人なしに死亡した場合、事実上夫婦(内縁)の同居者は賃借人の権利義務を承継する(借地借家法36条)。この規定は定期建物賃貸借にも適用される。定期建物賃貸借は公正証書に限らず書面(電磁的記録)であればよい(肢4は「公正証書に限り」が誤り)。","R6-13":"正解1が誤り。共用部分の持分は、規約に別段の定めがない限り「専有部分の床面積の割合」による(区分所有法14条)。共有者数で等分するのではない。規約・集会決議の効力は特定承継人にも及ぶ(肢2)。管理者は毎年1回集会で事務報告(肢3)。","R6-14":"正解3が誤り。相続人「以外」の者への遺贈による所有権移転登記は、原則どおり共同申請。単独申請できるのは「相続人に対する遺贈」(令和5年施行の改正)である。買戻特約は契約日から10年経過で単独抹消可(肢1)、収用は起業者単独(肢2)、住所変更は名義人単独(肢4)。","R6-15":"正解4が誤り。地区計画は、用途地域が定められている区域だけでなく、用途地域が定められていない一定の区域にも定めることができる。都市施設は特に必要があれば都市計画区域外にも定められる(肢1)。準都市計画区域には市街地開発事業を定められない(肢2)。","R6-16":"正解1。病院は開発許可が不要となる公益上必要な建築物から除外されており、市街化区域内で1,000㎡(原則基準)以上の開発行為なら知事の許可が必要。開発行為に当たらない建築物の建築自体に開発許可は不要(肢2)。都市計画事業の施行としての開発行為は許可不要(肢3)。","R6-17":"正解2が誤り。特定行政庁は、緊急の必要がある場合には、意見書提出などの事前手続によらないで、仮に使用禁止・使用制限を命ずることができる。高さ20m超の建築物には避雷設備が必要(肢1)。劇場→映画館(類似用途)への変更は建築確認不要(肢4)。","R6-18":"正解2。特定用途誘導地区内では、都市計画で高さの最高限度が定められていても、特定行政庁が用途上又は構造上やむを得ないと認めて許可した建築物は高さ制限の適用除外となる。建蔽率80%区域かつ防火地域内の耐火建築物は建蔽率制限が適用されない(肢4参照)。","R6-19":"正解3が誤り。宅地造成等工事規制区域内で宅地造成等の工事を行う場合は、工事着手「前」に都道府県知事の「許可」を受けなければならない。着手後2週間以内の届出で足りるのは、規制区域指定の際に既に工事中だった場合である。","R6-20":"正解2が誤り。換地処分は施行者が関係権利者に通知して行うが、換地処分があった旨の「公告」を行うのは都道府県知事である。市町村施行でも公告は知事が行う。保留地は換地処分公告日の翌日に施行者が取得する(肢3)。","R6-21":"正解1が誤り。農地法3条の許可があったときに所有権が移転する旨の停止条件付売買契約に基づく所有権移転請求権保全の仮登記は、許可前でも申請できる(仮登記に許可書の添付は不要)。賃貸借の法定更新(肢3)、農事調停による合意解約(肢4)は知事の許可不要。","R6-22":"正解4。監視区域内では、都道府県知事等が規則で定める面積以上の土地取引について、契約締結「前」に当事者双方が事前届出をしなければならない。事後届出制と異なり、届出義務は両当事者にある点がポイント。","R6-23":"正解2。住宅ローン控除は、居住用財産の買換え等の場合の「譲渡損失」の損益通算・繰越控除とは併用できる。一方、前年・前々年に3,000万円特別控除や軽減税率の特例(譲渡益系の特例)を使った場合は住宅ローン控除を受けられない(肢1参照)。","R6-24":"正解2。不動産取得税の免税点は、土地10万円、家屋の建築(新築・増改築)23万円、その他(売買等)12万円。課税標準は固定資産課税台帳の登録価格であり実際の売買価格ではない(肢1)。法人の合併による取得は非課税(肢3)。税率は住宅と土地が3%、住宅以外の家屋は4%(肢4)。","R6-25":"正解3が誤り。「不動産の効用が最高度に発揮される可能性に最も富む使用を前提として価格が形成される」のは「最有効使用の原則」であり、適合の原則ではない。適合の原則は不動産が環境に適合していることが必要という原則。","R6-26":"正解3(正しいのはア・ウ・エの三つ)。ア:宅地内のガス配管設備等の所有権がガス会社に留保される場合はその旨の説明が必要。イ:重説を行う宅建士も書面に記名する宅建士も「専任」である必要はないので誤り。ウ:管理受託者の氏名(商号)・住所は区分所有建物の売買で説明必要。エ:維持修繕の実施状況の記録があるときはその内容(区分所有建物の売買)。","R6-27":"正解4。従たる事務所を新設したときは、その分の営業保証金(500万円)を「主たる事務所の最寄りの供託所」に供託し、届出をした後でなければ新事務所で事業を開始できない。金銭のみで供託中に主たる事務所を移転した場合は保管替えを「請求しなければならない」(肢1参照)。交通事故の損害賠償金は宅建業の取引により生じた債権ではなく還付対象外(肢2)。","R6-28":"正解2(違反しないのはイ・ウ)。ア:居住用建物の貸借の媒介では、依頼を受けるに当たって承諾を得ていない限り、一方の依頼者から受けられる報酬は借賃0.5か月分×1.04(免税事業者)=6.24万円が上限であり、Ｂが借主から6.5万円を受けたのは違反。イ:居住用以外の建物貸借では権利金(返還されないもの)を売買代金とみなした計算が可能。ウ:双方から受ける報酬の合計が借賃1か月分(消費税調整後)以内なら適法。","R6-29":"正解4。事務所唯一の専任宅建士が資格を失った場合、2週間以内に必要な措置(後任の設置等)を執らなければならない。実務経験2年未満でも登録実務講習を修了すれば登録可能(肢1参照)。宅建士証が失効しても登録自体は消除されない(肢2参照)。","R6-30":"正解4。クーリング・オフができない「事務所等」は、業者の事務所・案内所等と、「買主が自ら申し出た場合の買主の自宅・勤務先」のみ。自ら申し出た場合でも、喫茶店(肢3)や銀行(肢4)は事務所等に当たらないため、クーリング・オフできる。肢4が「解除できる」内容で正しい。","R6-31":"正解1。指示処分に従わない業者に対しては、1年以内の期間を定めて業務停止を命ずることができる。事務所の所在地を確知できないときは公告し30日経過後に免許取消しが「できる」(任意的取消し・肢2参照)。免許取消処分には聴聞が必要(肢3参照)。","R6-32":"正解3。専任媒介契約では、申込みや問合せがなくても2週間に1回以上、業務の処理状況を依頼者に報告しなければならない。売買契約が成立したら引渡し前でも遅滞なく指定流通機構へ通知(肢1参照)。依頼者が宅建業者でも媒介契約書面の交付は必要(肢2参照)。","R6-33":"正解3が誤り。開発許可・建築確認など必要な処分があった「後」であれば、工事完了前でも広告はできる(法33条)。契約成立後にネット広告を放置して掲載を続けるのはおとり広告等として違反(肢1は正しい記述)。自ら転貸を行う行為は宅建業に当たらず広告規制の適用もない(肢2は正しい記述)。","R6-34":"正解3。建築工事完了「前」の物件では、代金の5%(4,000万円×5%=200万円)を超える手付金等を受領するには保全措置が必要。保全措置を講じずに300万円は受領できない。完了後の物件なら10%(400万円)まで保全不要(肢2参照)。買主は保全措置が講じられるまで手付金等の支払を拒める(肢4参照)。","R6-35":"正解2。37条書面の電磁的提供は、相手方が書面の状態で出力できること、改変が行われていないか確認できる措置を講じていることなどの基準を満たす必要がある。提供には相手方の事前承諾が必要で、承諾後でも撤回の申出があれば提供できない(肢3参照)。","R6-36":"正解4が誤り。一部の事務所を廃止して「営業保証金」を取り戻す場合は、還付請求権者に対する6か月以上の期間を定めた公告が必要。公告不要で取り戻せるのは保証協会の弁済業務保証金分担金の場合であり、この違いを突いた問題。保証協会加入前の分担金納付(肢1)、還付対象から宅建業者除外(肢2)は正しい。","R6-37":"正解3(正しいのはア・イ・ウの三つ)。ア:水害ハザードマップに位置が含まれるときは建物貸借の媒介でも所在地を説明。イ:実施後1年(RC造共同住宅等は2年)以内の建物状況調査の有無と結果の概要は既存住宅売買の説明事項。ウ:造成工事完了前の宅地は完了時の形状・構造、接する道路の構造・幅員を説明。エ:私道負担は「建物の貸借」では説明不要なので誤り。","R6-38":"正解4。免許権者は、免許(更新を含む)に条件を付し、これを変更することができる(法3条の2)。更新申請中に有効期間が満了しても、処分があるまで従前の免許は効力を有する(肢1参照)。名義貸しは禁止(肢2参照)。案内所の設置だけなら免許換えは不要(肢3参照)。","R6-39":"正解4が誤り。法50条2項の届出(業務を行う場所の届出)の対象となるのは、そこで「契約(予約含む)の締結又は申込みの受付」を行う案内所等。展示会等の催しを実施する場所も契約行為等を行うなら届出対象として定められている。","R6-40":"正解2(イ・ウ)。貸借の37条書面で「定めがあるときに必ず記載」すべきなのは、借賃以外の金銭(額・授受の時期・目的)や損害賠償額の予定・違約金などの定め。ア(租税その他の公課の負担)とエ(構造耐力上主要な部分等の状況)は「売買」の37条書面の記載事項であり、貸借では不要。","R6-41":"正解1(正しいのはイの一つ)。ア:契約日までに抹消予定でも、現に登記されている抵当権は説明しなければならないので誤り。イ:宅地貸借で契約終了時の建物取壊しに関する事項を定めるときはその内容の説明が必要で正しい。ウ:住宅性能評価を受けた新築住宅である旨は売買・交換の説明事項で、貸借では不要なので誤り。エ:急傾斜地崩壊危険区域内の制限は宅地売買で説明が必要なので誤り。","R6-42":"正解2が誤り。人の死の告知ガイドラインでは、①自然死・日常生活の中での不慮の死は売買・賃貸とも原則告知不要、②賃貸では特殊清掃等を伴った死でも概ね3年経過後は原則告知不要(この3年ルールは売買には適用されない)、③いずれの場合も買主・借主から問われたときは告知が必要。","R6-43":"正解4が誤り。宅地建物取引士証の氏名は、申請により旧姓を併記することができる。住所変更は宅建士証の書換え交付事由であり、登録を受けた者は宅建士証の交付を受けていなくても変更の登録申請が必要(肢1参照)。提示の際は個人情報保護の観点から住所欄を隠すシールを貼ってよい(肢3参照)。","R6-44":"正解1(違反しない)。工事完了前の建物では、建物を特定するために必要な表示として図面を用いることができる。借賃の額・支払時期・方法は貸借の必要的記載事項で省略は違反(肢2)。当事者双方が宅建業者でも37条書面の交付は必要(肢3)。自ら買主となる場合も相手方(売主)への交付義務があり、承諾があっても省略できない(肢4)。","R6-45":"正解2。新築住宅を引き渡した宅建業者は、基準日ごとに保証金の供託・保険契約締結の状況を免許権者に届け出なければならず、届出をしないと基準日の翌日から起算して50日を経過した日以後、新たに自ら売主となる新築住宅の売買契約を締結できない。供託額は基準日前10年間の引渡し戸数で算定する(肢1参照)。","R6-46":"正解1が誤り。証券化支援業務(買取型)の譲受け対象には、住宅の購入資金だけでなく、購入に付随する当該住宅の改良に必要な資金も含まれる。耐震改良資金の貸付け(肢2)、住宅融資保険(肢3)、省エネ性能に応じた金利引下げ等(肢4)はいずれも機構の業務。","R6-47":"正解4。「新築」と表示できるのは建築工事完了後1年未満で、かつ居住の用に供されたことがないもの。1年以上経過した物件は未使用でも新築と表示できない。廃屋の存在など取引の相手方に著しく不利益な事項は見れば分かる場合でも明瞭に表示しなければならない(肢2参照)。","R6-48":"正解1。令和6年地価公示では、全用途平均・住宅地・商業地のいずれも三大都市圏・地方圏ともに3年連続で上昇した。宅建士の総登録者数は約115万人で200万人には達しない(肢2参照)。令和5年の新設住宅着工戸数は約82万戸で減少しており90万戸を超えていない(肢4参照)。","R6-49":"正解2が最も不適当。擁壁の水抜き孔は高さにかかわらず必要であり、「高さ2m以下なら水抜き孔がなくても地震被害が生じることはない」とは断定できない。30度以上の急斜面を背後に控える宅地の保護対策(肢1)、重力式擁壁の説明(肢3)は適当。","R6-50":"正解3が最も不適当。ブレース構造は建物の一部の構面に用いて、ラーメン構造など他の構造と併用されることが多い。「他の構造と併用することはない」が誤り。ラーメン構造(肢1)、ブレース(筋かい)の説明(肢2)、壁式構造(肢4)は適当な記述。","R7-01":"正解3。契約の解除前に現れた第三者は民法545条1項ただし書により登記を備えていれば保護され、解除後の第三者も177条の対抗関係により登記を備えれば保護される。よってどちらの場合でも登記を備えたＣが勝つ。なお肢4の強迫による取消しは、取消し前の第三者は善意無過失でも保護されない(96条3項は詐欺のみ)点に注意。","R7-02":"正解3。個人が保証人になる根保証契約(①の「一切の債務」の連帯保証=個人根保証)は、極度額を書面で定めなければ無効(民法465条の2)。②は特定の代金債務の保証なので極度額は不要。肢1は誤り:保証契約はいずれも書面(又は電磁的記録)でしなければ無効(446条2項)。肢2:連帯保証人には催告の抗弁権がない。","R7-03":"正解3(誤りは三つ)。ア:心裡留保は相手方が悪意又は「有過失」なら無効になるので「過失があっても有効」は誤り(93条)。イ:虚偽表示の無効は「善意」の第三者に対抗できず、無過失までは不要なので誤り(94条2項)。ウ:錯誤の効果は「取消し」であり無効ではないので誤り(95条)。エ:詐欺取消し前の善意無過失の第三者には対抗できない(96条3項)で正しい。","R7-04":"正解4。悪意による不法行為に基づく損害賠償債権を「受働債権」とする相殺は禁止されるが(民法509条)、被害者の側がその債権を「自働債権」として相殺することは可能。加害者からの相殺を封じて被害者に現実の賠償を得させる趣旨だから。","R7-05":"正解4(ア、イ、ウ)。代襲相続の原因は①相続開始以前の死亡、②欠格、③廃除の3つ。遺言書の偽造は欠格事由(891条5号)にあたる(イ)。相続放棄は代襲原因にならない(エ)ことが最重要ポイント。","R7-06":"正解1が誤り。他人物売買の売主(Ｂ)が後に所有権を取得したときは、買主Ｃは当然に所有権を取得するというのが判例。改めて売買契約をやり直す必要はない。時効取得者と時効完成後の相続人(肢3)、立木の所有権留保(肢4)は登記・明認方法の対抗問題として処理される。","R7-07":"正解1。いわゆる転用物訴権の判例(最判平7.9.19)。修理業者Ｃは、賃借人Ｂが無資力で、かつ賃貸人Ａが対価関係なしに利益を受けたといえる場合に限り、Ａに対して不当利得返還請求ができる。なお不動産工事の先取特権(肢3)は工事開始前に登記しなければ効力が生じず「当然に」は成立しない。","R7-08":"正解2が誤り。共有者の一人が持分を「放棄」した場合、その持分は他の共有者に帰属する(民法255条)。国庫に帰属するのではない。不法占有する共有者に対しても、他の共有者は当然には明渡しを請求できない(持分に応じた使用権があるため)点も頻出。","R7-09":"正解1。2020年民法改正により、連帯債務者の一人に対する「履行の請求」は相対的効力にとどまる(441条)。絶対的効力が残るのは「更改・相殺・混同」の3つ。改正前後で結論が変わった超頻出ポイント。","R7-10":"正解3。種類・品質の契約不適合の通知期間を定める民法566条(不適合を知った時から1年)は任意規定であり、「引渡しから1年以内の通知」に短縮する特約も当事者間では有効。ただし売主が引渡し時に不適合を知り又は重過失で知らなかったときは、通知を怠っても責任追及できる。","R7-11":"正解3。存続期間50年以上であれば、事業用か居住用かを問わず一般定期借地権(借地借家法22条)として「更新しない」旨の特約を書面で有効に定められる。事業用定期借地権(23条)は10年以上50年未満で、必ず公正証書による(肢4は居住用建物なので事業用定期借地権にできず誤り)。","R7-12":"正解3。造作買取請求権(借地借家法33条)は任意規定であり、行使しない旨の特約は有効(37条の強行規定リストに含まれていない)。賃借人に不利な特約でも許される数少ない例として頻出。","R7-13":"正解3が誤り。集会の議事録には、議長及び集会に出席した区分所有者の2人が署名しなければならない(区分所有法42条)。議事録の作成自体は書面又は電磁的記録のいずれでもよい。","R7-14":"正解1が誤り。一筆の土地の一部が別の地目となったときは、登記官は「職権で」分筆の登記をすることが「できる」(不動産登記法39条3項)。職権分筆が認められる場面である点をひっかけている。権利に関する登記は共同申請主義(肢3)が原則。","R7-15":"正解4が誤り。肢4の記述内容は「田園住居地域」の説明。生産緑地地区は、市街化区域内の農地等を計画的に保全するために定める地域地区であり、低層住宅の良好な住居環境保護を目的とするものではない。","R7-16":"正解4。開発許可基準のうち申請者の資力・信用など主として自己用以外の開発に課される基準があり、自己の居住用住宅の開発行為には適用されない。開発行為の定義(肢2)は「建築物の建築又は特定工作物の建設の用に供する目的で行う土地の区画形質の変更」で、どちらの目的も含む。","R7-17":"正解2が誤り。令和7年4月施行の改正建築基準法により、木造2階建て住宅は「新2号建築物」として区域を問わず建築確認が必要になった。改正直後の出題であり、旧4号特例の感覚で「不要」と誤答させる問題。高さ1m以下の階段に手すり不要(肢4)は正しい。","R7-18":"正解2。床面積1,000㎡・2階建ての飲食店は、第一種・第二種低層住居専用地域及び田園住居地域では建築できない(用途規制)。第二種低層で認められる飲食店は2階以下かつ150㎡以内のものに限られる。","R7-19":"正解2が誤り。宅地造成等工事規制区域内の土地について、災害が生じないよう常時安全な状態に維持するよう努める義務を負うのは、土地の「所有者・管理者・占有者」である(盛土規制法)。工事主・工事施行者ではない点のひっかけ。","R7-20":"正解4が誤り。土地区画整理事業の施行による土地・建物の変動に係る登記は、「換地処分の公告」があった後に施行者が遅滞なく申請(嘱託)する。仮換地の指定日を基準とするのではない。換地処分公告後は、この登記がされるまで原則として他の登記はできない。","R7-21":"正解4が誤り。農地法4条・5条違反の転用について、法人の代表者が業務に関して違反した場合、行為者を罰するほか法人にも「1億円以下の罰金刑」が科される両罰規定がある(農地法67条)。","R7-22":"正解4。事後届出の要否は「権利取得者」を基準に判断し、市街化区域では合計2,000㎡以上の一団の土地を取得する場合に届出が必要。個々の契約面積が2,000㎡未満でも、一団として取得するなら合計面積で判定される。","R7-23":"正解1。土地の売買による所有権移転登記の税率軽減措置(租税特別措置法)は、地目を問わず「土地」であれば適用される。法人にも適用され(肢3)、価額・面積の制限もない(肢2・4)。","R7-24":"正解2。市町村長は、納税義務者のほか借地人・借家人など一定の者の求めに応じて、固定資産課税台帳のうち関係部分を閲覧に供しなければならない。小規模住宅用地(200㎡以下)の課税標準は価格の6分の1(肢1参照)、免税点は土地30万円・家屋20万円(肢3参照)。","R7-25":"正解1が誤り。肢1の記述は「一般的要因」の定義。個別的要因とは、不動産に個別性を生じさせ、その価格を個別的に形成する要因をいう。収益還元法が賃貸用等の不動産に特に有効(肢2)、減価修正の2方法(肢3)は正しい記述として頻出。","R7-26":"正解4(ア、イ、ウすべて誤り)。ア:居住用以外の建物貸借で権利金1,400万円を売買代金とみなすと(1,400万×3%+6万)×1.10=52万8,000円まで双方から受領でき適法。「違反する」が誤り。イ:長期空家等の貸借の報酬特例で増額できるのは「貸主」側からの報酬のみで、借主から1.1か月分超を受けるのは違反。ウ:報酬額は上限規制であり、依頼者に最低額の支払義務を課すものではない。","R7-27":"正解1。区分所有建物の売買の媒介では、一棟の建物及びその敷地の管理が委託されているときは、受託者の氏名(名称)・住所を説明しなければならない。重要事項説明は事務所で行う必要はなく(肢3)、売主自らでも買主に説明義務がある。","R7-28":"正解2(正しいのはア・エの二つ)。ア:取引態様明示義務違反は監督処分のみ・誇大広告は罰則もあり、で正しい。イ:建築確認申請前は広告も契約もできない(法33条)ので誤り。ウ:買主も宅建業者なら8種制限(手付金等保全・他人物売買制限)は適用されないので誤り。エ:専属専任媒介は契約日から5日以内(休業日除く)に指定流通機構へ登録、で正しい。","R7-29":"正解2。既存建物の売買の37条書面には「建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項」を記載しなければならない。賃貸借でも引渡し時期・借賃の支払方法等は記載事項(肢1参照)。代金に関する金銭貸借のあっせんの定めは売買の任意的記載事項(肢4参照)。","R7-30":"正解3(違反はア・ウ・エの三つ)。ア:共同売主の場合、重要事項説明書には関与する全業者(の宅建士)の記名が必要で、幹事社のみの記名は違反。イ:事務所で申込み・契約をした場合クーリング・オフの適用はなく、告知書面を交付しなくても違反ではない。ウ:規約が案の段階でも「案」の内容を重説に記載すべきで、省略は違反。エ:完成前物件で代金の5%(250万円)を超える手付金500万円を受けるには保全措置が必要で、その概要は重説の記載事項。","R7-31":"正解4(すべて禁止行為を含む)。ア:勧誘に先立ち業者名・「勧誘を行う者の氏名」・勧誘目的をすべて告げる義務があり、氏名を名乗らないのは違反。イ:申込みの撤回を妨げる威迫行為は禁止(最終的に撤回に応じても違反は成立)。ウ:従業者には一時的なアルバイトにも従業者証明書を携帯させなければならない。エ:将来の環境について誤解させるべき断定的判断の提供は禁止。","R7-32":"正解2。完成物件では代金の10%又は1,000万円を超える手付金等を受領する場合に保全措置が必要。4,000万円の10%=400万円以下ならば保全措置不要で受領できる。完成前物件は5%(200万円)基準(肢1・3参照)。損害賠償額の予定と違約金は合算して代金の2割まで(肢4参照)。","R7-33":"正解3(誤りはイ・ウ・エの三つ)。ア:引渡し時期は重説の記載事項ではないが37条書面の必要的記載事項なので正しい。イ:契約の解除に関する事項は「定めがあるとき」に限り37条書面に記載する任意的記載事項。ウ:抵当権の内容は重説事項(登記された権利)であり37条書面の記載事項ではない。エ:37条書面は交付(宅建士の記名)だけで足り、説明義務はない。","R7-34":"正解3(正しいのはア・イ・エの三つ)。ア:政令で定める使用人が禁錮以上の刑(執行猶予中)なら会社も欠格。イ:免許取消処分の聴聞公示前60日以内に役員だった者は、相当の理由なき廃業届出から5年間欠格(公示の40日前退任は60日以内に該当)。ウ:現場助勢罪(刑法206条)の罰金刑は欠格事由であり、法定代理人が欠格なら営業に関し成年者と同一の行為能力を有しない未成年者も免許を受けられないため誤り。エ:破産者は復権を得れば直ちに欠格でなくなる(5年不要)。","R7-35":"正解1。免許有効期間満了で営業保証金を取り戻す場合、還付請求権者に対する6か月以上の期間を定めた公告が必要。金銭+有価証券の併用供託は可能だが、有価証券は種類により評価額が異なる(国債100%・地方債等90%・その他80%)。支店設置時は「主たる事務所の最寄りの供託所」へ供託(肢3は誤りの典型)。","R7-36":"正解4(すべて禁止)。ア:購入しない意思を表示した相手への再勧誘の禁止。イ:「他に買い手がいる」という虚偽の事実を告げて契約を急がせる行為は禁止。ウ:長時間の勧誘等により相手方を困惑させる行為は禁止。エ:手付の貸付けによる契約締結の誘引は、契約に至らなくても行為自体が禁止。","R7-37":"正解4。既存(中古)住宅の重説では建物状況調査(インスペクション)の実施の有無と結果の概要を説明する。対象となる調査は実施後1年以内のもの、ただし鉄筋コンクリート造等の共同住宅は2年以内。肢3は借賃以外の金銭の「額と授受目的」は説明事項だが「保管方法」は不要。","R7-38":"正解3(誤りはア・ウ・エの三つ)。ア:広告時に明示していても、注文を受けたら改めて取引態様の別を明らかにしなければならない。イ:誇大広告は取引不成立・実害なしでも監督処分と罰則の対象で正しい。ウ:数回に分けた広告はそのたびごとに明示が必要。エ:報酬とは別に受領できる広告料金は「依頼者の依頼によるもの」に限る。","R7-39":"正解4。媒介契約を締結した宅建業者は、目的物についての「申込みがあったときは遅滞なく依頼者に報告」しなければならない(一般媒介含むすべての媒介契約)。専属専任媒介の指定流通機構への登録は依頼者の希望でも省略できない(肢1参照)。有効期間の自動更新特約は無効(肢2参照)。","R7-40":"正解3(正しいのはア・イ・エの三つ)。ア:媒介業者Bの事務所も「事務所等」に含まれ、そこで申込みをすればクーリング・オフ不可。イ:解除書面は8日以内に「発信」すれば足りるので、「到達」を要求する特約は買主に不利で無効。ウ:業者側の提案による買主自宅は「事務所等」に当たらず、告知もないため10日後でも解除可能なので誤り。エ:告知書面に記載するのは売主(A)の商号・住所・免許証番号で、媒介業者(B)のものは不要。","R7-41":"正解1。免許を受けてから1年以内に事業を開始しないとき、又は引き続き1年以上事業を休止したときは、免許権者は免許を「取り消さなければならない」(必要的取消し)。解散の届出は清算人が行う(肢2参照)。事務所の移転で免許権者が変わる場合は免許換えの申請(肢4参照)。","R7-42":"正解2(正しいのはウ・エの二つ)。ア:複数の試験に合格していれば、いずれの合格に基づいても登録を受けられるので誤り。イ:勤務先の変更は「変更の登録」の申請は必要だが、勤務先は宅建士証の記載事項ではないので書換え交付申請は不要で誤り。ウ:宅建士証が効力を失ったときは速やかに交付を受けた知事に返納する。エ:登録の移転は業務従事地を管轄する知事へ申請できる(任意)。","R7-43":"正解4(すべて正しい)。ア:信託受益権の売買では金商法の目論見書に重説事項がすべて記載されていれば重説を省略できる特例がある。イ:未完成建物の貸借では完了時の主要構造部・内装外装の仕上げ・設備を説明。ウ:契約終了時に精算される敷金等の精算に関する事項は貸借の重説事項。エ:津波防護施設区域内の行為制限は宅地売買の重説事項。","R7-44":"正解2。犯罪収益移転防止法上、宅建業者は宅地建物の売買契約の締結等を行った場合、直ちに取引記録を作成し7年間保存しなければならない。取引時確認では自然人につき本人特定事項(氏名・住居・生年月日)に加えて取引目的・職業の確認も必要(肢1参照)。疑わしい取引の届出を相手方に漏らしてはならない(肢3参照)。","R7-45":"正解4。住宅販売瑕疵担保責任保険では、売主業者が相当の期間を経過しても瑕疵担保責任を履行しない場合、買主は保険法人に対して直接保険金を請求できる。資力確保義務があるのは「自ら売主として非業者の買主に新築住宅を引き渡す」場合のみで、媒介の場合は不要(肢2参照)。供託額の算定は基準日前10年間の引渡し戸数による(肢1参照)。","R7-46":"正解2が誤り。機構の証券化支援事業(買取型)の対象は、自ら居住する住宅又は親族の居住用住宅の建設・購入資金の貸付債権であり、賃貸住宅の建設・購入資金は対象外。災害関連の元金据置(肢1)、高齢者向け返済特例=死亡時一括償還(肢3)、まちづくり融資(肢4)はいずれも機構の業務。","R7-47":"正解3。新設予定の駅・停留所は、当該路線の「運行主体が公表したもの」に限り、新設予定時期を明示して表示できる。団地と駅との道路距離は最も近い区画と最も遠い区画の双方を起点に表示する(肢1参照)。管理費が住戸により異なる場合は最低額と最高額を表示(肢2参照)。徒歩時間は80m=1分で端数切上げ(肢4参照)。","R7-48":"正解2。建築着工統計(令和6年計)によれば、令和6年の新設住宅着工戸数は約82万戸で前年から減少しており、90万戸を大きく下回る水準が続いている。統計問題は「着工戸数」「地価動向」「業者数・宅建士数」「法人企業統計の利益率」の直近数値を試験直前に確認するのが定石(本問の数値は出題当時のもの)。","R7-49":"正解1が最も不適当。川が運んで低地に堆積した土砂は軟弱な沖積層であり、重い構造物の支持には適さない。砂州・砂丘で地下水位が浅い場所は液状化しやすい(肢2)、台地は一般に構造物の支持力がある(肢4)は適当な記述。","R7-50":"正解1が最も不適当。鋼は炭素量が多いほど硬く引張強度は増すが、伸び(粘り)が減って脆くなる。「軟質になり強度が減る」は逆。鋼材が熱に弱く錆びやすいため耐火被覆・防錆処理が必要(肢2)、密度は木材・コンクリートより大きい(肢4)は適当。"};

const CATS = ["権利関係","法令上の制限","税・その他","宅建業法","免除科目"];
const CAT_RANGE = {"権利関係":[1,14],"法令上の制限":[15,22],"税・その他":[23,25],"宅建業法":[26,45],"免除科目":[46,50]};
const byId = Object.fromEntries(QUESTIONS.map(q=>[q.id,q]));

/* ---------- state ---------- */
const KEY="takken_pass_v1";
let S = load();
function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.stats) return s; }catch(e){}
  return {stats:{}, mocks:[]};
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function stat(id){ return S.stats[id] || (S.stats[id]={a:0,c:0,w:0,lw:false,bm:false}); }
function record(id, correct){
  const s = stat(id);
  s.a++; if(correct){s.c++; s.lw=false;} else {s.w++; s.lw=true;}
  save();
}

/* ---------- helpers ---------- */
const $ = sel => document.querySelector(sel);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function accClass(p){ return p>=70?"":(p>=50?"mid":"low"); }
function catStats(cat){
  const qs = QUESTIONS.filter(q=>q.category===cat);
  let a=0,c=0,seen=0;
  qs.forEach(q=>{ const s=S.stats[q.id]; if(s&&s.a){seen++;a+=s.a;c+=s.c;} });
  return {total:qs.length, seen, acc: a? Math.round(c/a*100): null};
}
function weakQuestions(){
  return QUESTIONS.filter(q=>{ const s=S.stats[q.id]; return s && (s.lw || s.bm || (s.a>=2 && s.c/s.a<0.6)); });
}

/* ---------- router ---------- */
let current="home";
function go(tab){
  if(mockTimer){ if(!confirm("模擬試験を中断しますか?(解答は保存されません)")) return; stopTimer(); mock=null; }
  current=tab; render();
}
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(b) go(b.dataset.tab);
});
function setTabs(){
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===current));
}
function render(){
  setTabs(); window.scrollTo(0,0);
  ({home:renderHome, genre:renderGenre, weak:renderWeak, mock:renderMockSetup})[current]();
}

/* ---------- home ---------- */
function renderHome(){
  let a=0,c=0,seen=0;
  Object.values(S.stats).forEach(s=>{ if(s.a){seen++;a+=s.a;c+=s.c;} });
  const acc = a? Math.round(c/a*100): 0;
  const catRows = CATS.map(cat=>{
    const st=catStats(cat);
    const pct = st.acc==null? 0: st.acc;
    return `<div class="catrow">
      <div class="t"><b>${cat}</b><span>学習 ${st.seen}/${st.total}問 ・ 正答率 ${st.acc==null?"−":st.acc+"%"}</span></div>
      <div class="bar"><i class="${accClass(pct)}" style="width:${st.acc==null?0:pct}%"></i></div>
    </div>`;
  }).join("");
  const hist = S.mocks.slice(-5).reverse().map(m=>
    `<div class="hist"><span>${m.date} ${m.label}</span>
     <span><b>${m.score}</b>/50 <span class="chip ${m.pass?"ok":"weak"}">${m.pass?"合格圏":"あと"+(m.need-m.score)+"問"}</span></span></div>`
  ).join("");
  $("#view").innerHTML = `
  <div class="card">
    <h2>📊 学習状況</h2>
    <div class="grid2">
      <div class="stat"><div class="v">${seen}<span style="font-size:13px">/${QUESTIONS.length}</span></div><div class="l">学習した問題</div></div>
      <div class="stat"><div class="v">${acc}<span style="font-size:13px">%</span></div><div class="l">総合正答率</div></div>
    </div>
    <p class="note">合格ラインの目安は正答率72%(50問中36問)。全分野をまんべんなく学習しましょう。</p>
  </div>
  <div class="card"><h2>🧭 分野別の到達度</h2>${catRows}</div>
  <div class="card">
    <h2>📝 模試の記録</h2>
    ${hist || '<div class="empty">まだ模試を受けていません。<br>まずは分野別演習から始めるのがおすすめ!</div>'}
  </div>
  <button class="btn" onclick="go('genre')">分野別演習を始める</button>
  <div style="height:8px"></div>
  <button class="btn warn" onclick="go('mock')">模擬試験に挑戦する</button>
  <p class="note">収録: 令和2〜7年度 本試験問題 全8回・400問(全問解説付き)。出典: 不動産適正取引推進機構 公表の試験問題・正解番号。問題の中の法令は各年度の出題時点の規定に基づきます(令和2年度以降のため現行民法に対応)。公式発表の複数解・没問3問にも対応済み。</p>`;
}

/* ---------- genre practice ---------- */
function renderGenre(){
  const cards = CATS.map(cat=>{
    const st=catStats(cat);
    const pct = st.acc==null?0:st.acc;
    return `<div class="card">
      <div class="t" style="display:flex;justify-content:space-between;align-items:center">
        <b style="font-size:15px">${cat}</b><span class="chip cat">${st.total}問</span></div>
      <div class="t" style="display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-top:4px">
        <span>学習済 ${st.seen}/${st.total}</span><span>正答率 ${st.acc==null?"−":st.acc+"%"}</span></div>
      <div class="bar"><i class="${accClass(pct)}" style="width:${st.acc==null?0:pct}%"></i></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn sm" style="flex:1" onclick="startPractice('${cat}','order')">順番に解く</button>
        <button class="btn sm ghost" style="flex:1" onclick="startPractice('${cat}','random')">ランダム</button>
        <button class="btn sm gray" style="flex:1" onclick="startPractice('${cat}','unseen')">未学習だけ</button>
      </div>
    </div>`;
  }).join("");
  $("#view").innerHTML = `<h3 class="sec">分野を選んで演習(1問ごとに正誤がわかります)</h3>${cards}`;
}

let prac=null;
function startPractice(cat, mode, pool){
  let qs = pool || QUESTIONS.filter(q=>q.category===cat);
  if(mode==="unseen") qs = qs.filter(q=>!(S.stats[q.id]&&S.stats[q.id].a));
  if(mode==="random"||mode==="review") qs = shuffle(qs);
  if(!qs.length){ alert(mode==="unseen"?"この分野は全問学習済みです!":"対象の問題がありません"); return; }
  prac={qs, i:0, cat, done:0, ok:0};
  renderPractice();
}
function renderPractice(){
  const q = prac.qs[prac.i];
  const s = S.stats[q.id];
  $("#view").innerHTML = `
  <div class="topbar">
    <button class="iconbtn" onclick="endPractice()">← 終了</button>
    <div class="sp"></div>
    <span style="font-size:13px;color:var(--sub)">${prac.i+1} / ${prac.qs.length}問 ${prac.done?`(正解${prac.ok})`:""}</span>
  </div>
  <div class="pbar"><i style="width:${(prac.i)/prac.qs.length*100}%"></i></div>
  <div class="card">
    <div class="qhead">
      <span class="chip year">${YEAR_LABEL[q.year]} 問${q.q}</span>
      <span class="chip cat">${q.category}</span>
      <div class="sp"></div>
      <button class="bmbtn ${s&&s.bm?"on":""}" id="bm" onclick="toggleBm('${q.id}')">⭐</button>
    </div>
    <div class="qtext">${esc(q.question)}</div>
    <div id="choices">${q.choices.map((c,i)=>
      `<button class="choice" onclick="answer(${i+1})"><span class="n">${i+1}</span><span>${esc(c)}</span></button>`).join("")}
    </div>
    <div id="after"></div>
  </div>`;
}
function toggleBm(id){
  const s=stat(id); s.bm=!s.bm; save();
  $("#bm").classList.toggle("on", s.bm);
}
function answer(n){
  const q = prac.qs[prac.i];
  const ok = isCorrect(q, n);
  record(q.id, ok);
  prac.done++; if(ok) prac.ok++;
  document.querySelectorAll("#choices .choice").forEach((el,i)=>{
    el.disabled=true;
    if(isCorrect(q, i+1)) el.classList.add("correct");
    else if(i+1===n) el.classList.add("wrong");
  });
  const exp = expOf(q);
  $("#after").innerHTML = `
    <div class="judge ${ok?"ok":"ng"}">${ok?"○ 正解!":"× 不正解"}</div>
    <p class="note" style="text-align:center;margin:0 0 10px">正解は「${ansText(q)}」${ok?"":" — 間違えた問題は弱点克服タブに登録されます"}</p>
    ${exp?`<div class="expbox"><b>💡 解説</b><br>${esc(exp)}</div>`:""}
    <button class="btn" onclick="nextQ()">${prac.i+1<prac.qs.length?"次の問題へ":"結果を見る"}</button>`;
  $("#after").scrollIntoView({behavior:"smooth",block:"start"});
}
function nextQ(){
  if(prac.i+1<prac.qs.length){ prac.i++; renderPractice(); }
  else endPractice(true);
}
function endPractice(finished){
  if(!finished && prac.done===0){ prac=null; render(); return; }
  const {done,ok,cat} = prac;
  const pct = done? Math.round(ok/done*100): 0;
  prac=null;
  $("#view").innerHTML = `
  <div class="card" style="text-align:center">
    <h2 style="justify-content:center">演習おつかれさま!</h2>
    <div class="score-big"><span class="n">${ok}</span><span class="d"> / ${done}問正解(${pct}%)</span></div>
    <div class="passband ${pct>=70?"pass":"fail"}">${pct>=70?"この調子!70%超え 👏":"繰り返しで必ず伸びます 💪"}</div>
    <button class="btn" onclick="go('genre')">分野別にもどる</button>
    <div style="height:8px"></div>
    <button class="btn ghost" onclick="go('weak')">間違えた問題を復習する</button>
  </div>`;
}

/* ---------- weak ---------- */
function renderWeak(){
  const weak = weakQuestions();
  const catRows = CATS.map(cat=>{
    const st=catStats(cat);
    return {cat, acc: st.acc, seen: st.seen};
  }).filter(r=>r.seen>0).sort((a,b)=>(a.acc??101)-(b.acc??101));
  const rows = catRows.map(r=>
    `<div class="catrow"><div class="t"><b>${r.cat}</b>
      <span>${r.acc==null?"−":r.acc+"%"} ${r.acc!=null&&r.acc<70?'<span class="chip weak">要強化</span>':""}</span></div>
      <div class="bar"><i class="${accClass(r.acc??0)}" style="width:${r.acc??0}%"></i></div></div>`).join("");
  const list = weak.slice(0,60).map(q=>{
    const s=S.stats[q.id];
    return `<button class="rvrow" onclick="startPractice(null,'review',[byId['${q.id}']])">
      <span class="m x">${s.bm?"⭐":"×"}</span>
      <span class="chip year" style="flex-shrink:0">${q.year} 問${q.q}</span>
      <span class="txt">${esc(q.question.slice(0,40))}</span></button>`;
  }).join("");
  $("#view").innerHTML = `
  <div class="card"><h2>📉 分野別の正答率(低い順)</h2>
    ${rows || '<div class="empty">まだデータがありません。分野別演習から始めましょう。</div>'}
    <p class="note">正答率70%未満の分野を優先的に演習するのが合格への近道です。</p></div>
  <div class="card"><h2>🔁 要復習リスト(${weak.length}問)</h2>
    <p class="note" style="margin:0 0 8px">直近で間違えた問題・⭐ブックマーク・正答率60%未満の問題です。タップで1問だけ解き直せます。</p>
    ${list || '<div class="empty">要復習の問題はありません 🎉</div>'}
  </div>
  ${weak.length? `<button class="btn" onclick="startWeakDrill()">要復習${Math.min(weak.length,20)}問をまとめて解く</button>`:""}`;
}
function startWeakDrill(){
  const qs = shuffle(weakQuestions()).slice(0,20);
  startPractice(null,"review",qs);
}

/* ---------- mock ---------- */
let mock=null, mockTimer=null, mockLeft=0;
function renderMockSetup(){
  const years = ["R7","R6","R5","R4","R3A","R3B","R2A","R2B"].map(y=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><b style="font-size:15px">${YEAR_LABEL[y]} 本試験</b>
        <div class="note" style="margin:2px 0 0">50問・合格点 ${PASS_MARK[y]}点</div></div>
        <button class="btn sm" onclick="startMock('${y}')">挑戦する</button>
      </div>
    </div>`).join("");
  $("#view").innerHTML = `
  <div class="card" style="background:linear-gradient(135deg,#fffbeb,#fef3c7)">
    <h2>🎲 ランダム模試</h2>
    <p style="font-size:13px">8回分(令和2〜7年度)の過去問から本試験と同じ出題構成(権利関係14問・法令上の制限8問・税その他3問・宅建業法20問・免除科目5問)で50問を自動編成します。</p>
    <div style="height:10px"></div>
    <button class="btn warn" onclick="startMock('MIX')">ランダム模試を開始(120分)</button>
  </div>
  <h3 class="sec">年度別 本試験にそのまま挑戦</h3>
  ${years}
  <p class="note">本番同様、途中で正解は表示されません。制限時間は2時間、時間切れで自動採点されます。</p>`;
}
function startMock(mode){
  let qs;
  if(mode==="MIX"){
    qs=[];
    for(let n=1;n<=50;n++){
      const pool = QUESTIONS.filter(q=>q.q===n);
      qs.push(pool[Math.floor(Math.random()*pool.length)]);
    }
  } else {
    qs = QUESTIONS.filter(q=>q.year===mode).sort((a,b)=>a.q-b.q);
  }
  mock={qs, mode, i:0, ans:Array(50).fill(0), flag:Array(50).fill(false),
        label: mode==="MIX"?"ランダム模試":YEAR_LABEL[mode]+"本試験",
        need: mode==="MIX"?36:PASS_MARK[mode]};
  mockLeft = 120*60;
  mockTimer = setInterval(()=>{ mockLeft--; tickTimer(); if(mockLeft<=0){ stopTimer(); scoreMock(true);} },1000);
  renderMockQ();
}
function stopTimer(){ if(mockTimer){clearInterval(mockTimer); mockTimer=null;} }
function fmtTime(s){ const h=String(Math.floor(s/3600)),m=String(Math.floor(s%3600/60)).padStart(2,"0"),ss=String(s%60).padStart(2,"0"); return `${h}:${m}:${ss}`; }
function tickTimer(){ const el=$("#mtimer"); if(el){ el.textContent=fmtTime(mockLeft); el.classList.toggle("low",mockLeft<600);} }
function renderMockQ(){
  const q = mock.qs[mock.i];
  const sel = mock.ans[mock.i];
  $("#view").innerHTML = `
  <div class="topbar">
    <button class="iconbtn" onclick="quitMock()">中断</button>
    <span class="timer" id="mtimer">${fmtTime(mockLeft)}</span>
    <div class="sp"></div>
    <button class="iconbtn" onclick="openGrid()">問題一覧</button>
  </div>
  <div class="pbar"><i style="width:${mock.ans.filter(Boolean).length/50*100}%"></i></div>
  <div class="card">
    <div class="qhead">
      <b>問${mock.i+1}</b><span class="chip cat">${q.category}</span>
      ${mock.mode==="MIX"?`<span class="chip year">${YEAR_LABEL[q.year]}</span>`:""}
      <div class="sp"></div>
      <button class="iconbtn" style="${mock.flag[mock.i]?"color:var(--accent);border-color:var(--accent)":""}" onclick="toggleFlag()">⚑ 見直し</button>
    </div>
    <div class="qtext">${esc(q.question)}</div>
    ${q.choices.map((c,i)=>
      `<button class="choice ${sel===i+1?"sel":""}" onclick="mockPick(${i+1})"><span class="n">${i+1}</span><span>${esc(c)}</span></button>`).join("")}
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn gray" style="flex:1" ${mock.i===0?"disabled":""} onclick="mockNav(-1)">← 前へ</button>
    ${mock.i<49
      ? `<button class="btn" style="flex:1" onclick="mockNav(1)">次へ →</button>`
      : `<button class="btn warn" style="flex:1" onclick="scoreMock()">採点する</button>`}
  </div>
  ${mock.i<49?`<div style="height:8px"></div><button class="btn ghost" onclick="scoreMock()">ここまでで採点する</button>`:""}`;
}
function mockPick(n){
  mock.ans[mock.i] = mock.ans[mock.i]===n? 0: n;
  if(mock.ans[mock.i] && mock.i<49){ mock.i++; renderMockQ(); } else renderMockQ();
}
function toggleFlag(){ mock.flag[mock.i]=!mock.flag[mock.i]; renderMockQ(); }
function mockNav(d){ mock.i=Math.max(0,Math.min(49,mock.i+d)); renderMockQ(); }
function quitMock(){
  if(confirm("模擬試験を中断しますか?(解答は保存されません)")){ stopTimer(); mock=null; render(); }
}
function openGrid(){
  const div=document.createElement("div");
  div.className="overlay"; div.onclick=e=>{ if(e.target===div) div.remove(); };
  div.innerHTML=`<div class="sheet"><h2 style="font-size:15px;margin-bottom:10px">問題一覧(タップで移動 / ⚑=見直し)</h2>
    <div class="qgrid">${mock.qs.map((q,i)=>
      `<button class="${mock.ans[i]?"done":""} ${i===mock.i?"now":""} ${mock.flag[i]?"flag":""}" data-i="${i}">${i+1}</button>`).join("")}
    </div>
    <p class="note">解答済 ${mock.ans.filter(Boolean).length}/50問</p></div>`;
  div.querySelectorAll(".qgrid button").forEach(b=>b.onclick=()=>{ mock.i=+b.dataset.i; div.remove(); renderMockQ(); });
  document.body.appendChild(div);
}
function scoreMock(timeup){
  const unanswered = mock.ans.filter(a=>!a).length;
  if(!timeup && unanswered && !confirm(`未解答が${unanswered}問あります。採点しますか?`)) return;
  stopTimer();
  let score=0; const catC={}, catT={};
  mock.qs.forEach((q,i)=>{
    const ok = isCorrect(q, mock.ans[i]);
    catT[q.category]=(catT[q.category]||0)+1;
    if(ok){score++; catC[q.category]=(catC[q.category]||0)+1;}
    record(q.id, ok);
  });
  const pass = score>=mock.need;
  const today = new Date();
  S.mocks.push({date:`${today.getMonth()+1}/${today.getDate()}`, label:mock.label, score, need:mock.need, pass});
  if(S.mocks.length>30) S.mocks=S.mocks.slice(-30);
  save();
  mock.result={score,pass,catC,catT,timeup};
  renderMockResult();
}
function renderMockResult(){
  const r=mock.result;
  const catRows = CATS.filter(c=>r.catT[c]).map(c=>{
    const got=r.catC[c]||0, tot=r.catT[c], pct=Math.round(got/tot*100);
    return `<div class="catrow"><div class="t"><b>${c}</b><span>${got}/${tot}問 (${pct}%)</span></div>
      <div class="bar"><i class="${accClass(pct)}" style="width:${pct}%"></i></div></div>`;
  }).join("");
  const rows = mock.qs.map((q,i)=>{
    const ok = isCorrect(q, mock.ans[i]);
    return `<button class="rvrow" onclick="reviewMockQ(${i})">
      <span class="m ${ok?"o":"x"}">${ok?"○":"×"}</span><b style="width:38px">問${i+1}</b>
      <span class="txt">${esc(q.question.slice(0,30))}</span></button>`;
  }).join("");
  $("#view").innerHTML = `
  <div class="card">
    ${r.timeup?'<p style="text-align:center;color:var(--danger);font-weight:700;font-size:13px">⏰ 時間切れのため自動採点しました</p>':""}
    <div class="score-big"><span class="n">${r.score}</span><span class="d"> / 50点</span></div>
    <div class="passband ${r.pass?"pass":"fail"}">${r.pass?`🎉 合格ライン(${mock.need}点)突破!`:`合格ライン${mock.need}点まで あと${mock.need-r.score}問`}</div>
    <h3 class="sec" style="margin-top:12px">分野別の成績</h3>${catRows}
    <p class="note">間違えた問題は「弱点克服」タブに自動登録されました。</p>
  </div>
  <div class="card"><h2>解答の確認(タップで問題を表示)</h2>${rows}</div>
  <button class="btn" onclick="mock=null;go('weak')">弱点克服へ</button>
  <div style="height:8px"></div>
  <button class="btn ghost" onclick="mock=null;go('mock')">模試メニューにもどる</button>`;
}
function reviewMockQ(i){
  const q=mock.qs[i], my=mock.ans[i];
  const div=document.createElement("div");
  div.className="overlay"; div.onclick=e=>{ if(e.target===div) div.remove(); };
  div.innerHTML=`<div class="sheet">
    <div class="qhead"><b>問${i+1}</b><span class="chip year">${YEAR_LABEL[q.year]} 問${q.q}</span><span class="chip cat">${q.category}</span></div>
    <div class="qtext" style="font-size:14px">${esc(q.question)}</div>
    ${q.choices.map((c,j)=>{
      let cls=""; if(isCorrect(q, j+1)) cls="correct"; else if(j+1===my) cls="wrong";
      return `<div class="choice ${cls}" style="cursor:default"><span class="n">${j+1}</span><span>${esc(c)}</span></div>`;
    }).join("")}
    <p class="note">あなたの解答: ${my||"未解答"} / 正解: ${ansText(q)}</p>
    ${expOf(q)?`<div class="expbox"><b>💡 解説</b><br>${esc(expOf(q))}</div>`:""}
    <button class="btn gray" onclick="this.closest('.overlay').remove()">閉じる</button></div>`;
  document.body.appendChild(div);
}

/* ---------- init ---------- */
render();
</script>
</body>
</html>
