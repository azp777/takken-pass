者名簿に登載され、当該名簿が一般の閲覧に供される。","宅地建物取引士が、刑法第204条(傷害)の罪により罰金の刑に処せられ、登録が消除された場合、当該登録が消除された日から5年を経過するまでは、新たな登録を受けることができない。","未成年者は、宅地建物取引業に係る営業に関し成年者と同一の行為能力を有していたとしても、成年に達するまでは登録を受けることができない。"],"answer":2},{"id":"R3B-38","year":"R3B","q":38,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定に違反しないものの組合せとして、正しいものはどれか。なお、この問において「建築確認」とは、建築基準法第6条第1項の確認をいうものとする。\nア 宅地建物取引業者Aは、建築確認の済んでいない建築工事完了前の賃貸住宅の貸主Bから当該住宅の貸借の媒介を依頼され、取引態様を媒介と明示して募集広告を行った。\nイ 宅地建物取引業者Cは、建築確認の済んでいない建築工事完了前の賃貸住宅の貸主Dから当該住宅の貸借の代理を依頼され、代理人として借主Eとの間で当該住宅の賃貸借契約を締結した。\nウ 宅地建物取引業者Fは、自己の所有に属しない宅地について、自ら売主として、宅地建物取引業者Gと売買契約の予約を締結した。\nエ 宅地建物取引業者Hは、農地の所有者Iと建物の敷地に供するため農地法第5条の許可を条件とする売買契約を締結したので、自ら売主として宅地建物取引業者ではない個人JとI所有の農地の売買契約を締結した。","choices":["ア、イ","ア、エ","イ、ウ","ウ、エ"],"answer":3},{"id":"R3B-39","year":"R3B","q":39,"category":"宅建業法","question":"宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["保証協会は、その名称、住所又は事務所の所在地を変更しようとするときは、あらかじめ、その旨を国土交通大臣に届け出なければならない。","保証協会は、新たに社員が加入したときは、直ちに、その旨を当該社員である宅地建物取引業者が免許を受けた国土交通大臣又は都道府県知事に報告しなければならない。","宅地建物取引業者で保証協会に加入しようとする者は、その加入した日から1週間以内に、政令で定める額の弁済業務保証金分担金を当該保証協会に納付しなければならない。","保証協会の社員は、自らが取り扱った宅地建物取引業に係る取引の相手方から当該取引に関する苦情について解決の申出が保証協会にあり、保証協会から説明を求められたときは、正当な理由がある場合でなければ、これを拒んではならない。"],"answer":3},{"id":"R3B-40","year":"R3B","q":40,"category":"宅建業法","question":"宅地建物取引業法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)についての宅地建物取引業者Aの義務に関する次の記述のうち、正しいものはどれか。","choices":["Aは、自ら売主として、宅地建物取引業者Bの媒介により、Cと宅地の売買契約を締結した。Bが宅地建物取引士をして37条書面に記名押印させている場合、Aは宅地建物取引士をして当該書面に記名押印させる必要はない。","Aは、Dを売主としEを買主とする宅地の売買契約を媒介した。当該売買契約に、当該宅地が種類又は品質に関して契約の内容に適合しない場合においてその不適合を担保すべき責任に関する特約があるときは、Aは、当該特約について記載した37条書面をD及びEに交付しなければならない。","Aは、自ら買主として、Fと宅地の売買契約を締結した。この場合、Fに対して37条書面を交付する必要はない。","Aは、自ら貸主として、Gと事業用建物の定期賃貸借契約を締結した。この場合において、借賃の支払方法についての定めがあるときは、Aはその内容を37条書面に記載しなければならず、Gに対して当該書面を交付しなければならない。"],"answer":2},{"id":"R3B-41","year":"R3B","q":41,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["宅地建物取引業者Aは、一団の宅地建物の分譲をするため設置した案内所には、契約を締結することなく、かっ、契約の申込みを受けることがないときでも、1名以上の専任の宅地建物取引士を置かなければならない。","宅地建物取引業者Bは、その主たる事務所に従事する唯一の専任の宅地建物取引士が退職したときは、2週間以内に、宅地建物取引業法第31条の3第1項の規定に適合させるため必要な措置を執らなければならない。","宅地建物取引業者Cが、20戸の一団の分譲建物の売買契約の申込みのみを受ける案内所甲を設置した場合、売買契約の締結は事務所乙で行うとしても、甲にも専任の宅地建物取引士を置かなければならない。","法人である宅地建物取引業者D社の従業者であり、宅地建物取引業に係る営業に関し成年者と同一の行為能ガを有する20歳未満の婚姻歴のない宅地建物取引士Eは、D社の役員であるときを除き、D社の専任の宅地建物取引士となることができない。"],"answer":1},{"id":"R3B-42","year":"R3B","q":42,"category":"宅建業法","question":"宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合に関する次の記述のうち、宅地建物取引業法第37条の規定により当該貸借の契約当事者に対して交付すべき書面に記載しなければならない事項はいくつあるか。\nア 借賃以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的\nイ 設計図書、点検記録その他の建物の建築及び維持保全の状況に関する書面で、国土交通省令で定めるものの保存の状況\nウ 契約の解除に関する定めがあるときは、その内容\nエ 天災その他不可抗力による損害の負担に関する定めがあるときは、その内容","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R3B-43","year":"R3B","q":43,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではない法人B又は宅地建物取引業者ではない個人Cをそれぞれ買主とする土地付建物の売買契約を締結する場合において、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、誤っているものはどれか。なお、この問において、買主は本件売買契約に係る代金の全部を支払ってはおらず、かっ、土地付建物の引渡しを受けていないものとする。","choices":["Bは、Aの仮設テント張りの案内所で買受けの申込みをし、その8日後にAの事務所で契約を締結したが、その際クーリング・オフについて書面の交付を受けずに告げられた。この場合、クーリング・オフについて告げられた日から8日後には、Bはクーリング・オフによる契約の解除をすることができない。","Bは、Aの仮設テント張りの案内所で買受けの申込みをし、その3日後にAの事務所でクーリング・オフについて書面の交付を受け、告げられた上で契約を締結した。この書面の中で、クーリング・オフによる契約の解除ができる期間を14日間としていた場合、Bは、その書面を交付された日から12日後であっても契約の解除をすることができる。","Cは、Aの仮設テント張りの案内所で買受けの申込みをし、その3日後にAの事務所でクーリング・オフについて書面の交付を受け、告げられた上で契約を締結した。Cは、その書面を受け取った日から起算して8日目に、Aに対しクーリング・オフによる契約の解除を行う旨の文書を送付し、その2日後にAに到達した。この場合、Aは契約の解除を拒むことができない。","Cは、Aの事務所で買受けの申込みをし、その翌日、喫茶店で契約を締結したが、Aはクーリング・オフについて告げる書面をCに交付しなかった。この場合、Cはクーリング・オフによる契約の解除をすることができない。"],"answer":1},{"id":"R3B-44","year":"R3B","q":44,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明についての次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア賃貸借契約において、取引対象となる宅地又は建物が、水防法施行規則第11条第1項の規定により市町村(特別区を含む。)の長が提供する図面に当該宅地又は建物の位置が表示されている場合には、当該図面における当該宅地又は建物の所在地を説明しなければならない。\nイ賃貸借契約において、対象となる建物が既存の住宅であるときは、法第34条の2第1項第4号に規定する建物状況調査を実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。\nウ建物の売買において、その建物の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任の履行に関し保証保険契約の締結などの措置を講ずるかどうか、また、講ずる場合はその措置の概要を説明しなければならない。","choices":["一つ","二つ","三つ","なし"],"answer":[2,3]},{"id":"R3B-45","year":"R3B","q":45,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではない買主Bに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。","choices":["Aは、Bの承諾を得た場合には、Bに引き渡した新築住宅について、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行わなくてもよい。","Aは、基準日に係る住宅販売瑕疵担保保証金の供託及び住宅販売瑕疵担保責任保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して1月を経過した日以後においては、新たに自ら売主となる新築住宅の売買契約を締結することができない。","Aが住宅販売瑕疵担保責任保険契約を締結する場合、保険金額は2,000万円以上でなければならないが、Bの承諾を得た場合には、保険金額を500万円以上の任意の額とすることができる。","Aが住宅販売瑕疵担保責任保険契約を締結した場合、住宅の構造耐カ上主要な部分又は雨水の浸入を防止する部分の瑕疵があり、Aが相当の期間を経過してもなお特定住宅販売瑕疵担保責任を履行しないときは、Bは住宅販売瑕疵担保責任保険契約の有効期間内であれば、その瑕疵によって生じた損害について保険金を請求することができる。"],"answer":4},{"id":"R3B-46","year":"R3B","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構(以下この問において「機構」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、子どもを育成する家庭又は高齢者の家庭に適した良好な居住性能及び居住環境を有する賃貸住宅の建設に必要な資金の貸付けを業務として行っていない。","機構は、災害により住宅が滅失した場合において、それに代わるべき建築物の建設又は購入に必要な資金の貸付けを業務として行っている。","機構が証券化支援事業(買取型)により譲り受ける貸付債権は、自ら居住する住宅又は自ら居住する住宅以外の親族の居住の用に供する住宅を建設し、又は購入する者に対する貸付けに係るものでなければならない。","機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"],"answer":1},{"id":"R3B-47","year":"R3B","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。","choices":["新築分譲マンションの販売広告において、近隣のデパートぐスーパーマーケット、商店等の商業施設は、将来確実に利用できる施設であっても、現に利用できるものでなければ表示することができない。","有名な旧跡から直線距離で1,100mの地点に所在する新築分譲マンションの名称に当該旧跡の名称を用いることができる。","土地の販売価格については、1区画当たりの価格並びに1m2当たりの価格及び1区画当たりの土地面積のいずれも表示しなければならない。","新築分譲マンションの修繕積立金が住戸により異なる場合、広告スペースの関係で全ての住戸の修繕積立金を示すことが困難であっても、修繕積立金について全住戸の平均額で表示することはできない。"],"answer":4},{"id":"R3B-48","year":"R3B","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["令和3年版国土交通白書(令和3年6月公表)によれば、宅地建物取引業者数は、令和元年度末において10万業者を下回っている。","令和3年地価公示(令和3年3月公表)によれば、令和2年1月以降の1年間の地価の変動を見ると、全国平均の用途別では、住宅地、商業地及び工業地のいずれの用途も下落に転じた。","令和3年版土地白書(令和3年6月公表)によれば、令和元年における我が国の国土面積は約3,780万haであり、このうち住宅地、工業用地等の宅地は約197万aとなっており、宅地及び農地の合計面積は、森林の面積を超えている。","建築着工統計(令和3年1月公表)によれば、令和2年1月から令和2年12月までのマンション着工戸数は、「三大都市圏計」及び「その他の地域」のいずれにおいても前年を下回っている。"],"answer":4},{"id":"R3B-49","year":"R3B","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["沿岸地域における地震時の津波を免れるためには、巨大な防波堤が必要であるが、それには限度があり、完全に津波の襲来を防ぐことはできない。","一般に凝灰岩、頁岩、花崗岩(風化してマサ土化したもの)は、崩壊しにくい。","低地は、大部分が水田や宅地として利用され、大都市の大部分もここに立地している。","平地に乏しい都市の周辺では、住宅地が丘陵や山麓に広がり、土砂崩壊等の災害を引き起こす例も多い。"],"answer":2},{"id":"R3B-50","year":"R3B","q":50,"category":"免除科目","question":"建物の構造に関する次の記述のうち、最も不適当なものはどれか。","choices":["組積式構造は、耐震性は劣るものの、熱、音などを遮断する性能が優れている。","組積式構造を耐震的な構造にするためには、大きな開口部を造ることを避け、壁厚を大きくする必要がある。","補強コンクリートプロック造は、壁式構造の一種であり、コンクリートプロック造を鉄筋コンクリートで耐震的に補強改良したものである。","補強コンクリートプロック造は、壁量を多く必要とはせず、住宅等の小規模の建物には使用されていない。"],"answer":4},{"id":"R2A-01","year":"R2A","q":1,"category":"権利関係","question":"Aが購入した甲土地が他の土地に囲まれて公道に通じない土地であった場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["甲土地が共有物の分割によって公道に通じない土地となっていた場合には、Aは公道に至るために他の分割者の所有地を、償金を支払うことなく通行することができる。","Aは公道に至るため甲土地を囲んでいる土地を通行する権利を有するところ、Aが自動車を所有していても、自動車による通行権が認められることはない。","Aが、甲土地を囲んでいる土地の一部である乙土地を公道に出るための通路にする目的で賃借した後、甲土地をBに売却した場合には、乙土地の賃借権は甲土地の所有権に従たるものとして甲土地の所有権とともにBに移転する。","Cが甲土地を囲む土地の所有権を時効により取得した場合には、AはCが時効取得した土地を公道に至るために通行することができなくなる。"],"answer":1},{"id":"R2A-02","year":"R2A","q":2,"category":"権利関係","question":"令和2年7月1日に下記ケース①及びケース②の保証契約を締結した場合に関する次の1から4までの記述のうち、民法の規定によれば、正しいものはどれか。(ケース①)個人Aが金融機関Bから事業資金として1,000万円を借り入れ、CがBとの間で当該債務に係る保証契約を締結した場合(ケース②)個人Aが建物所有者Dと居住目的の建物賃貸借契約を締結し、EがDとの間で当該賃貸借契約に基づくAの一切の債務に係る保証契約を締結した場合","choices":["ケース①の保証契約は、口頭による合意でも有効であるが、ケース②の保証契約は、書面でしなければ効力を生じない。","ケース①の保証契約は、Cが個人でも法人でも極度額を定める必要はないが、ケース②の保証契約は、Eが個人でも法人でも極度額を定めなければ効力を生じない。","ケース①及びケース②の保証契約がいずれも連帯保証契約である場合、BがCに債務の履行を請求したときはCは催告の抗弁を主張することができるが、DがEに債務の履行を請求したときはEは催告の抗弁を主張することができない。","保証人が保証契約締結の日前1箇月以内に公正証書で保証債務を履行する意思を表示していない場合、ケース①のCがAの事業に関与しない個人であるときはケース①の保証契約は効力を生じないが、ケース②の保証契約は有効である。"],"answer":4},{"id":"R2A-03","year":"R2A","q":3,"category":"権利関係","question":"次の1から4までの契約に関する記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。なお、これらの契約は令和2年4月1日以降に締結されたものとする。(判決文)法律が債務の不履行による契約の解除を認める趣意は、契約の要素をなす債務の履行がないために、該契約をなした目的を達することができない場合を救済するためであり、当事者が契約をなした主たる目的の達成に必須的でない附随的義務の履行を怠ったに過ぎないような場合には、特段の事情の存しない限り、相手方は当該契約を解除することができないものと解するのが相当である。","choices":["土地の売買契約において、売主が負担した当該土地の税金相当額を買主が償還する付随的義務が定められ、買主が売買代金を支払っただけで税金相当額を償還しなかった場合、特段の事情がない限り、売主は当該売買契約の解除をすることができない。","債務者が債務を履行しない場合であっても、債務不履行について債務者の責めに帰すべき事由がないときは付随的義務の不履行となり、特段の事情がない限り、債権者は契約の解除をすることができない。","債務不履行に対して債権者が相当の期間を定めて履行を催告してその期間内に履行がなされない場合であっても、催告期間が経過した時における債務不履行がその契約及び取引上の社会通念に照らして軽微であるときは、債権者は契約の解除をすることができない。","債務者が債務を履行しない場合であって、債務者がその債務の全部の履行を拒絶する意思を明確に表示したときは、債権者は、相当の期間を定めてその履行を催告することなく、直ちに契約の解除をすることができる。"],"answer":2},{"id":"R2A-04","year":"R2A","q":4,"category":"権利関係","question":"建物の賃貸借契約が期間満了により終了した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。なお、賃貸借契約は、令和2年7月1日付けで締結され、原状回復義務について特段の合意はないものとする。","choices":["賃借人は、賃借物を受け取った後にこれに生じた損傷がある場合、通常の使用及び収益によって生じた損耗も含めてその損傷を原状に復する義務を負う。","賃借人は、賃借物を受け取った後にこれに生じた損傷がある場合、賃借人の帰責事由の有無にかかわらず、その損傷を原状に復する義務を負う。","賃借人から敷金の返還請求を受けた賃貸人は、賃貸物の返還を受けるまでは、これを拒むことができる。","賃借人は、未払賃料債務がある場合、賃貸人に対し、敷金をその債務の弁済に充てるよう請求することができる。"],"answer":3},{"id":"R2A-05","year":"R2A","q":5,"category":"権利関係","question":"AとBとの間で令和2年7月1日に締結された委任契約において、委任者Aが受任者Bに対して報酬を支払うこととされていた場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["Aの責めに帰すべき事由によって履行の途中で委任が終了した場合、Bは報酬全額をAに対して請求することができるが、自己の債務を免れたことによって得た利益をAに償還しなければならない。","Bは、契約の本旨に従い、自己の財産に対するのと同一の注意をもって委任事務を処理しなければならない。","Bの責めに帰すべき事由によって履行の途中で委任が終了した場合、BはAに対して報酬を請求することができない。","Bが死亡した場合、Bの相続人は、急迫の事情の有無にかかわらず、受任者の地位を承継して委任事務を処理しなければならない。"],"answer":1},{"id":"R2A-06","year":"R2A","q":6,"category":"権利関係","question":"AとBとの間で令和2年7月1日に締結された売買契約に関する次の記述のうち、民法の規定によれば、売買契約締結後、AがBに対し、錯誤による取消しができるものはどれ","choices":["Aは、自己所有の自動車を100万円で売却するつもりであったが、重大な過失によりBに対し「10万円で売却する」と言ってしまい、Bが過失なく「Aは本当に10万円で売るつもりだ」と信じて購入を申し込み、AB間に売買契約が成立した場合","Aは、自己所有の時価100万円の壺を10万円程度であると思い込み、Bに対し「手元につぼお金がないので、10万円で売却したい」と言ったところ、BはAの言葉を信じ「それなら10万円で購入する」と言って、AB間に売買契約が成立した場合","Aは、自己所有の時価100万円の名匠の絵画を贋作だと思い込み、Bに対し「贋作であるので、10万円で売却する」と言ったところ、Bも同様に贋作だと思い込み「贋作なら10万円で購入する」と言って、AB間に売買契約が成立した場合","Aは、自己所有の腕時計を100万円で外国人Bに売却する際、当日の正しい為替レート(1ドル100円)を重大な過失により1ドル125円で計算して「8,000ドルで売却する」と言ってしまい、Aの錯誤について過失なく知らなかったBが「8,000ドルなら買いたい」と言って、AB間に売買契約が成立した場合"],"answer":3},{"id":"R2A-07","year":"R2A","q":7,"category":"権利関係","question":"保証に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、保証契約は令和2年4月1日以降に締結されたものとする。","choices":["特定物売買における売主の保証人は、特に反対の意思表示がない限り、売主の債務不履行により契約が解除された場合には、原状回復義務である既払代金の返還義務についても保証する責任がある。","主たる債務の目的が保証契約の締結後に加重されたときは、保証人の負担も加重され、主たる債務者が時効の利益を放棄すれば、その効力は連帯保証人に及ぶ。","委託を受けた保証人が主たる債務の弁済期前に債務の弁済をしたが、主たる債務者が当該保証人からの求償に対して、当該弁済日以前に相殺の原因を有していたことを主張するときは、保証人は、債権者に対し、その相殺によって消減すべきであった債務の履行を請求することができる。","委託を受けた保証人は、履行の請求を受けた場合だけでなく、履行の請求を受けずに自発的に債務の消減行為をする場合であっても、あらかじめ主たる債務者に通知をしなければ、同人に対する求償が制限されることがある。"],"answer":2},{"id":"R2A-08","year":"R2A","q":8,"category":"権利関係","question":"相続(令和2年7月1日に相続の開始があったもの)に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["相続回復の請求権は、相続人又はその法定代理人が相続権を侵害された事実を知った時から5年間行使しないときは、時効によって消滅する。","被相続人の子が相続開始以前に死亡したときは、その者の子がこれを代襲して相続人となるが、さらに代襲者も死亡していたときは、代襲者の子が相続人となることはない。","被相続人に相続人となる子及びその代襲相続人がおらず、被相続人の直系尊属が相続人となる場合には、被相続人の兄弟姉妹が相続人となることはない。","被相続人の兄弟姉妹が相続人となるべき場合であっても、相続開始以前に兄弟姉妹及びその子がいずれも死亡していたときは、その者の子(兄弟姉妹の孫)が相続人となることはな"],"answer":2},{"id":"R2A-09","year":"R2A","q":9,"category":"権利関係","question":"Aがその所有する甲建物について、Bとの間で、①Aを売主、Bを買主とする売買契約を締結した場合と、②Aを贈与者、Bを受贈者とする負担付贈与契約を締結した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、これらの契約は、令和2年7月1白に締結され、担保責任に関する特約はないものとする。","choices":["①の契約において、Bが手付を交付し、履行期の到来後に代金支払の準備をしてAに履行の催告をした場合、Aは、手付の倍額を現実に提供して契約の解除をすることができる。","②の契約が書面によらずになされた場合、Aは、甲建物の引渡し及び所有権移転登記の両方が終わるまでは、書面によらないことを理由に契約の解除をすることができる。","②の契約については、Aは、その負担の限度において、売主と同じく担保責任を負う。","①の契約については、Bの債務不履行を理由としてAに解除権が発生する場合があるが、②の契約については、Bの負担の不履行を理由としてAに解除権が発生することはない。"],"answer":3},{"id":"R2A-10","year":"R2A","q":10,"category":"権利関係","question":"Aが甲土地を所有している場合の時効に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["Bが甲土地を所有の意思をもって平穏かっ公然に17年間占有した後、CがBを相続し甲土地を所有の意思をもって平穏かっ公然に3年間占有した場合、Cは甲土地の所有権を時効取得することができる。","Dが、所有者と称するEから、Eが無権利者であることについて善意無過失で甲土地を買い受け、所有の意思をもって平穏かっ公然に3年間占有した後、甲土地がAの所有であることに気付いた場合、そのままさらに7年間甲土地の占有を継続したとしても、Dは、甲土地の所有権を時効取得することはできない。","Dが、所有者と称するEから、Eが無権利者であることについて善意無過失で甲土地を買い受け、所有の意思をもって平穏かっ公然に3年間占有した後、甲土地がAの所有であることを知っているFに売却し、Fが所有の意思をもって平穏かっ公然に甲土地を7年間占有した場合、Fは甲土地の所有権を時効取得することができる。","Aが甲土地を使用しないで20年以上放置していたとしても、Aの有する甲土地の所有権が消滅時効にかかることはない。"],"answer":2},{"id":"R2A-11","year":"R2A","q":11,"category":"権利関係","question":"A所有の甲土地につき、令和2年7月1日にBとの間で居住の用に供する建物の所有を目的として存続期間30年の約定で賃貸借契約(以下この問において「本件契約」という。)が締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。","choices":["Bは、借地権の登記をしていなくても、甲土地の引渡しを受けていれば、甲土地を令和2年7月2日に購入したCに対して借地権を主張することができる。","本件契約で「一定期間は借賃の額の増減を行わない」旨を定めた場合には、甲土地の借賃が近傍類似の土地の借賃と比較して不相当となったときであっても、当該期間中は、AもBも借賃の増減を請求することができない。","本件契約で「Bの債務不履行により賃貸借契約が解除された場合には、BはAに対して建物買取請求権を行使することができない」旨を定めても、この合意は無効となる。","AとBとが期間満了に当たり本件契約を最初に更新する場合、更新後の存続期間を15年と定めても、20年となる。"],"answer":4},{"id":"R2A-12","year":"R2A","q":12,"category":"権利関係","question":"AとBとの間でA所有の甲建物をBに対して、居住の用を目的として、期間2年、賃料月額10万円で賃貸する旨の賃貸借契約(以下この問において「本件契約」という。)を締結し、Bが甲建物の引渡しを受けた場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。","choices":["AがCに甲建物を売却した場合、Bは、それまでに契約期間中の賃料全額をAに前払いしていたことを、Cに対抗することができる。","本件契約が借地借家法第38条の定期建物賃貸借契約であって、賃料改定に関する特約がない場合、経済事情の変動により賃料が不相当となったときは、AはBに対し、賃料増額請求をすることができる。","本件契約が借地借家法第38条の定期建物賃貸借契約である場合、Aは、転勤、療養、親族の介護その他のやむを得ない事情があれば、Bに対し、解約を申し入れ、申入れの日から1月を経過することによって、本件契約を終了させることができる。","本件契約が借地借家法第38条の定期建物賃貸借契約であって、造作買取請求に関する特約がない場合、期間満了で本件契約が終了するときに、Bは、Aの同意を得て甲建物に付加した造作について買取請求をすることができる。"],"answer":3},{"id":"R2A-13","year":"R2A","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律に関する次の記述のうち、正しいものはどれか。","choices":["共用部分の変更(その形状又は効用の著しい変更を伴わないものを除く。)は、区分所有者及び議決権の各4分の3以上の多数による集会の決議で決するが、この区分所有者の定数は、規約で2分の1以上の多数まで減ずることができる。","共用部分の管理に係る費用については、規約に別段の定めがない限り、共有者で等分する。","共用部分の保存行為をするには、規約に別段の定めがない限り、集会の決議で決する必要があり、各共有者ですることはできない。","一部共用部分は、これを共用すべき区分所有者の共有に属するが、規約で別段の定めをすることにより、区分所有者全員の共有に属するとすることもできる。"],"answer":4},{"id":"R2A-14","year":"R2A","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、正しいものはどれか。","choices":["敷地権付き区分建物の表題部所有者から所有権を取得した者は、当該敷地権の登記名義人の承諾を得なければ、当該区分建物に係る所有権の保存の登記を申請することができない。","所有権に関する仮登記に基づく本登記は、登記上の利害関係を有する第三者がある場合であっても、その承諾を得ることなく、申請することができる。","債権者Aが債務者Bに代位して所有権の登記名義人CからBへの所有権の移転の登記を申請した場合において、当該登記を完了したときは、登記官は、Aに対し、当該登記に係る登記識別情報を通知しなければならない。","配偶者居住権は、登記することができる権利に含まれない。"],"answer":1},{"id":"R2A-15","year":"R2A","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。","choices":["地区計画については、都市計画に、地区施設及び地区整備計画を定めるよう努めるものとされている。","都市計画事業の認可の告示があった後に当該認可に係る事業地内の土地建物等を有償で譲り渡そうとする者は、施行者の許可を受けなければならない。","第二種住居地域は、中高層住宅に係る良好な住居の環境を保護するため定める地域とされている。","市街化調整区域における地区計画は、市街化区域における市街化の状況等を勘案して、地区計画の区域の周辺における市街化を促進することがない等当該都市計画区域における計画的な市街化を図る上で支障がないように定めることとされている。"],"answer":4},{"id":"R2A-16","year":"R2A","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["開発許可を申請しようとする者は、あらかじめ、開発行為又は開発行為に関する工事により設置される公共施設を管理することとなる者と協議しなければならない。","都市計画事業の施行として行う建築物の新築であっても、市街化調整区域のうち開発許可を受けた開発区域以外の区域内においては、都道府県知事の許可を受けなければ、建築物の新築をすることができない。","開発許可を受けた開発行為により公共施設が設置されたときは、その公共施設は、工事完了の公告の日の翌日において、原則としてその公共施設の存する市町村の管理に属するものとされている。","開発許可を受けた者から当該開発区域内の土地の所有権を取得した者は、都道府県知事の承認を受けて、当該開発許可を受けた者が有していた当該開発許可に基づく地位を承継することができる。"],"answer":2},{"id":"R2A-17","year":"R2A","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、正しいものはどれか。","choices":["階数が2で延べ面積が200m2の鉄骨造の共同住宅の大規模の修繕をしようとする場合、建築主は、当該工事に着手する前に、確認済証の交付を受けなければならない。","居室の天井の高さは、一室で天井の高さの異なる部分がある場合、室の床面から天井の最も低い部分までの高さを2.lm以上としなければならない。","延べ面積が1,000m2を超える準耐火建築物は、防火上有効な構造の防火壁又は防火床によって有効に区画し、かっ、各区画の床面積の合計をそれぞれ1,000m2以内としなければならない。","高さ30mの建築物には、非常用の昇降機を設けなければならない。"],"answer":1},{"id":"R2A-18","year":"R2A","q":18,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、正しいものはどれか。","choices":["公衆便所及び巡査派出所については、特定行政庁の許可を得ないで、道路に突き出して建築することができる。","近隣商業地域内において、客席の部分の床面積の合計が200m2以上の映画館は建築することができない。","建築物の容積率の算定の基礎となる延べ面積には、老人ホームの共用の廊下又は階段の用に供する部分の床面積は、算入しないものとされている。","日影による中高層の建築物の高さの制限に係る日影時間の測定は、夏至日の真太陽時の午前8時から午後4時までの間について行われる。"],"answer":3},{"id":"R2A-19","year":"R2A","q":19,"category":"法令上の制限","question":"宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["土地の占有者又は所有者は、都道府県知事又はその命じた者若しくは委任した者が、宅地造成工事規制区域の指定のために当該土地に立ち入って測量又ほ調査を行う場合、正当な理由がない限り、立入りを拒み、又は妨げてはならない。","宅地を宅地以外の土地にするために行う土地の形質の変更は、宅地造成に該当しない。","宅地造成工事規制区域内において、宅地以外の土地を宅地に転用する者は、宅地造成に関する工事を行わない場合でも、都道府県知事の許可を受けなければならない。","宅地造成に関する工事の許可を受けた者が、工事施行者を変更する場合には、遅滞なくその旨を都道府県知事に届け出ればよく、改めて許可を受ける必要はない。【問2の土地区画整理組合(以下この問において「組合」という。)に関する次の記述のうち、土地区画整理法の規定によれば、正しいものはどれか。1組合の設立認可を申請しようとする者は、施行地区となるべき区域内の宅地について借地権を有するすべての者の3分の2以上の同意を得なければならないが、未登記の借地権を有する者の同意を得る必要はない。2組合の総会の会議は、定款に特別な定めがある場合を除くほか、組合員の半数以上が出席しなければ開くことができない。3組合が賦課金を徴収する場合、賦課金の額は、組合員が施行地区内に有する宅地又は借地の地積等にかかわらず一律に定めなければならない。4組合の施行する土地区画整理事業に参加することを希望する者のうち、当該土地区画整理事業に参加するのに必要な資カ及び信用を有する者であって定款で定められたものは、参加組合員として組合員となる。"],"answer":3},{"id":"R2A-20","year":"R2A","q":20,"category":"法令上の制限","question":"土地区画整理組合(以下この問において「組合」という。)に関する次の記述のうち、土地区画整理法の規定によれば、正しいものはどれか。","choices":["組合の設立認可を申請しようとする者は、施行地区となるべき区域内の宅地について借地権を有するすべての者の3分の2以上の同意を得なければならないが、未登記の借地権を有する者の同意を得る必要はない。","組合の総会の会議は、定款に特別な定めがある場合を除くほか、組合員の半数以上が出席しなければ開くことができない。","組合が賦課金を徴収する場合、賦課金の額は、組合員が施行地区内に有する宅地又は借地の地積等にかかわらず一律に定めなければならない。","組合の施行する土地区画整理事業に参加することを希望する者のうち、当該土地区画整理事業に参加するのに必要な資力及び信用を有する者であって定款で定められたものは、参加組合員として組合員となる。"],"answer":2},{"id":"R2A-21","year":"R2A","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["法第3条第1項の許可が必要な農地の売買については、この許可を受けずに売買契約を締結しても所有権移転の効力は生じない。","市街化区域内の自己の農地を駐車場に転用する場合には、農地転用した後に農業委員会に届け出ればよい。","相続により農地を取得することとなった場合には、法第3条第1項の許可を受ける必要がある。","農地に抵当権を設定する場合には、法第3条第1項の許可を受ける必要がある。"],"answer":1},{"id":"R2A-22","year":"R2A","q":22,"category":"法令上の制限","question":"国土利用計画法第23条の届出(以下この問において「事後届出」という。)に関する次の記述のうち、正しいものはどれか。","choices":["Aが所有する市街化区域内の1,500m2の土地をBが購入した場合には、Bは事後届出を行う必要はないが、Cが所有する市街化調整区域内の6,000m2の土地についてDと売買に係る予約契約を締結した場合には、Dは事後届出を行う必要がある。","Eが所有する市街化区域内の2,000m2の土地をFが購入した場合、Fは当該土地の所有権移転登記を完了した日から起算して2週間以内に事後届出を行う必要がある。","Gが所有する都市計画区域外の15,000m2の土地をHに贈与した場合、Ⅱは事後届出を行う必要がある。","1が所有する都市計画区域外の10,000m2の土地とJが所有する市街化調整区域内の10,000m2の土地を交換した場合、I及びJは事後届出を行う必要はない。"],"answer":1},{"id":"R2A-23","year":"R2A","q":23,"category":"税・その他","question":"印紙税に関する次の記述のうち、正しいものはどれか。","choices":["「建物の電気工事に係る請負代金は1,100万円(うち消費税額及び地方消費税額100万円)とする」旨を記載した工事請負契約書について、印紙税の課税標準となる当該契約書の記載金額は1,100万円である。","「Aの所有する土地(価額5,000万円)とBの所有する土地(価額4,000万円)とを交換する」旨の土地交換契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は4,000万円である。","国を売主、株式会社Cを買主とする土地の売買契約において、共同で売買契約書を2通作成し、国とC社がそれぞれ1通ずっ保存することとした場合、C社が保存する契約書には印紙税は課されない。","「契約期間は10年間、賃料は月額10万円、権利金の額は100万円とする」旨が記載された土地の賃貸借契約書は、記載金額1,300万円の土地の賃借権の設定に関する契約書として印紙税が課される。"],"answer":3},{"id":"R2A-24","year":"R2A","q":24,"category":"税・その他","question":"不動産取得税に関する次の記述のうち、正しいものはどれか。","choices":["令和2年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅用以外の土地に係る不動産取得税の税率は4%である。","一定の面積に満たない土地の取得に対しては、狭小な不動産の取得者に対する税負担の排除の観点から、不動産取得税を課することができない。","不動産取得税は、不動産の取得に対して課される税であるので、家屋を改築したことにより、当該家屋の価格が増加したとしても、不動産取得税は課されない。","共有物の分割による不動産の取得については、当該不動産の取得者の分割前の当該共有物に係る持分の割合を超えない部分の取得であれば、不動産取得税は課されない。"],"answer":4},{"id":"R2A-25","year":"R2A","q":25,"category":"税・その他","question":"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。","choices":["不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、不動産についての現実の使用方法は当該不動産が十分な効用を発揮していない場合があることに留意すべきである。","対象建築物に関する工事が完了していない場合でも、当該工事の完了を前提として鑑定評価を行うことがある。","特殊価格とは、一般的に市場性を有しない不動産について、その利用現況等を前提とした不動産の経済価値を適正に表示する価格をいい、例としては、文化財の指定を受けた建造物について、その保存等に主眼をおいた鑑定評価を行う場合において求められる価格があげられる。","原価法は、対象不動産が建物及びその敷地である場合において、再調達原価の把握及び減価修正を適切に行うことができるときに有効な手法であるが、対象不動産が土地のみである場合には、この手法を適用することはできない。"],"answer":4},{"id":"R2A-26","year":"R2A","q":26,"category":"宅建業法","question":"宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者A社(甲県知事免許)が宅地建物取引業者ではないB社との合併により消滅した場合には、B社は、A社が消滅した日から30日以内にA社を合併した旨を甲県知事に届け出れば、A社が受けていた免許を承継することができる。","信託業法第3条の免許を受けた信託会社が宅地建物取引業を営もうとする場合には、国土交通大臣の免許を受けなければならない。","個人Cが、転売目的で競売により取得した宅地を多数の区画に分割し、宅地建物取引業者Dに販売代理を依頼して、不特定多数の者に分譲する事業を行おうとする場合には、免許を受けなければならない。","宅地建物取引業者E(乙県知事免許)は、乙県内に2以上の事務所を設置してその事業を営もうとする場合には、国土交通大臣に免許換えの申請をしなければならない。"],"answer":3},{"id":"R2A-27","year":"R2A","q":27,"category":"宅建業法","question":"宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア建物の売却について代理を依頼されて広告を行う場合、取引態様として、代理であることを明示しなければならないが、その後、当該物件の購入の注文を受けたときは、広告を行った時点と取引態様に変更がない場合を除き、遅滞なく、その注文者に対し取引態様を明らかにしなければならない。\nイ広告をするに当たり、実際のものよりも著しく優良又は有利であると人を誤認させるような表示をしてはならないが、誤認させる方法には限定がなく、宅地又は建物に係る現在又は将来の利用の制限の一部を表示しないことにより誤認させることも禁止されている。\nウ複数の区画がある宅地の売買について、数回に分けて広告をする場合は、広告の都度取引態様の別を明示しなければならない。\nエ宅地の造成又は建物の建築に関する工事の完了前においては、当該工事に必要な都市計画法に基づく開発許可、建築基準法に基づく建築確認考の他法令に基づく許可等の申請をした後でなければ、当該工事に係る宅地又ば建物の売買その他の業務に関する広告をしてはならない。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R2A-28","year":"R2A","q":28,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引士資格試験に合格した者は、合格した日から10年以内に登録の申請をしなければ、その合格は無効となる。","宅地建物取引士証の有効期間の更新の申請は、有効期間満了の90日前から30日前までにする必要がある。","宅地建物取引士は、重要事項の説明をするときは説明の相手方からの請求の有無にかかわらず宅地建物取引士証を提示しなければならず、また、取引の関係者から請求があったときにも宅地建物取引士証を提示しなければならない。","甲県知事の登録を受けている宅地建物取引士が、乙県知事に登録の移転を申請するときは、乙県知事が指定する講習を受講しなければならない。"],"answer":3},{"id":"R2A-29","year":"R2A","q":29,"category":"宅建業法","question":"宅地建物取引業者Aが、BからB所有の住宅の売却の媒介を依頼された場合における次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはいくつあるか。\nアAは、Bとの間で専任媒介契約を締結し、所定の事項を指定流通機構に登録したときは、その登録を証する書面を遅滞なくBに引き渡さなければならない。\nイAは、Bとの間で媒介契約を締結したときは、当該契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第34条の2第1項の規定に基づき交付すべき書面に記載しなければならない。\nウAは、Bとの間で専任媒介契約を締結するときは、Bの要望に基づく場合を除き、当該契約の有効期間について、有効期間満了時に自動的に更新する旨の特約をすることはできない。\nエAは、Bとの間で専属専任媒介契約を締結したときは、Bに対し、当該契約に係る業務の処理状況を1週間に1回以上報告しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R2A-30","year":"R2A","q":30,"category":"宅建業法","question":"宅地建物取引業者A及び宅地建物取引業者B(ともに消費税課税事業者)が受領する報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、借賃には消費税等相当額を含まないものとする。","choices":["Aは売主から代理の依頼を、Bは買主から媒介の依頼を、それぞれ受けて、代金5,000万円の宅地の売買契約を成立させた場合、Aは売主から343万2,000円、Bは買主から171万6,000円、合計で514万8,000円の報酬を受けることができる。","Aが単独で行う居住用建物の貸借の媒介に関して、Aが依頼者の一方から受けることができる報酬の上限額は、当該媒介の依頼者から報酬請求時までに承諾を得ている場合には、借賃の1.1か月分である。","Aが単独で貸主と借主の双方から店舗用建物の貸借の媒介の依頼を受け、1か月の借賃25万円、権利金330万円(権利設定の対価として支払われるもので、返還されないものをいい、消費税等相当額を含む。)の賃貸借契約を成立させた場合、Aが依頼者の一方から受けることができる報酬の上限額は、30万8,000円である。","Aが単独で行う事務所用建物の貸借の媒介に関し、Aが受ける報酬の合計額が借賃の1.1か月分以内であれば、Aは依頼者の双方からどのような割合で報酬を受けてもよく、また、依頼者の一方のみから報酬を受けることもできる。"],"answer":4},{"id":"R2A-31","year":"R2A","q":31,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。","choices":["建物の売買の媒介だけでなく建物の貸借の媒介を行う場合においても、損害賠償額の予定又は違約金に関する事項について、説明しなければならない。","建物の売買の媒介を行う場合、当該建物について、石綿の使用の有無の調査の結果が記録されているか照会を行ったにもかかわらず、その存在の有無が分からないときは、宅地建物取引業者自らが石綿の使用の有無の調査を実施し、その結果を説明しなければならない。","建物の売買の媒介を行う場合、当該建物が既存の住宅であるときは、建物状況調査を実施しているかどうかを説明しなければならないが、実施している場合その結果の概要を説明する必要はない。","区分所有建物の売買の媒介を行う場合、建物の区分所有等に関する法律第2条第3項に規定する専有部分の用途その他の利用の制限に関する規約の定めがあるときは、その内容を説明しなければならないが、区分所有建物の貸借の媒介を行う場合は、説明しなくてよい。"],"answer":1},{"id":"R2A-32","year":"R2A","q":32,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で建物の売買契約を締結する場合における次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["AB間の建物の売買契約において、Bが当該契約の履行に着手した後においては、Aは、契約の締結に際してBから受領した手付金の倍額をBに現実に提供したとしても、契約を解除することはできない。","AB間の建物の売買契約における「法第37条の2の規定に基づくクーリング・オフによる契約の解除の際に、当該契約の締結に際しAがBから受領した手付金は返還しない」旨の特約は有効である。","AB間の建物の割賦販売の契約において、Bからの賦払金が当初設定していた支払期日までに支払われなかった場合ゞAは直ちに賦払金の支払の遅滞を理由として当該契約を解除することができる。","AB間で工事の完了前に当該工事に係る建物(代金5,000万円)の売買契約を締結する場合、Aは、法第41条に定める手付金等の保全措置を講じた後でなければ、Bから200万円の手付金を受領してはならない。"],"answer":1},{"id":"R2A-33","year":"R2A","q":33,"category":"宅建業法","question":"宅地建物取引業者Aが宅地建物取引業法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、正しいものはどれか。","choices":["Aが媒介により建物の貸借の契約を成立させたときは、37条書面に借賃の額並びにその支払の時期及び方法を記載しなければならず、また、当該書面を契約の各当事者に交付しなければならない。","Aが媒介により宅地の貸借の契約を成立させた場合において、当該宅地の引渡しの時期について重要事項説明書に記載して説明を行ったときは、その内容を37条書面に記載する必要はない。","Aが自ら売主として宅地建物取引業者である買主と建物の売買契約を締結した場合、37条書面に宅地建物取引士をして記名押印させる必要はない。","Aが自ら売主として宅地の売買契約を締結した場合、代金についての金銭の貸借のあっせんに関する定めがある場合における当該あっせんに係る金銭の貸借が成立しないときの措置については、37条書面に記載する必要はない。"],"answer":1},{"id":"R2A-34","year":"R2A","q":34,"category":"宅建業法","question":"宅地建物取引士の登録(以下この問において「登録」という。)及び宅地建物取引士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["甲県で宅地建物取引士資格試験に合格した後1年以上登録の申請をしていなかった者が宅地建物取引業者(乙県知事免許)に勤務することとなったときは、乙県知事あてに登録の申請をしなければならない。","登録を受けている者は、住所に変更があっても、登録を受けている都道府県知事に変更の登録を申請する必要はない。","宅地建物取引士は、従事先として登録している宅地建物取引業者の事務所の所在地に変更があったときは、登録を受けている都道府県知事に変更の登録を申請しなければならない。","丙県知事の登録を受けている宅地建物取引士が、丁県知事への登録の移転の申請とともに宅地建物取引士証の交付の申請をした場合は、丁県知事から、移転前の宅地建物取引士証の有効期間が経過するまでの期間を有効期間とする新たな宅地建物取引士証が交付される。"],"answer":4},{"id":"R2A-35","year":"R2A","q":35,"category":"宅建業法","question":"宅地建物取引業者A(甲県知事免許)の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["Aから建設工事を請け負った建設業者は、Aに対する請負代金債権について、営業継続中のAが供託している営業保証金から弁済を受ける権利を有する。","Aが甲県内に新たに支店を設置したときは、本店の最寄りの供託所に政令で定める額の営業保証金を供託すれば、当該支店での事業を開始することができる。","Aは、営業保証金の還付により、営業保証金の額が政令で定める額に不足することとなったときは、甲県知事から不足額を供託すべき旨の通知書の送付を受けた日から2週間以内にその不足額を供託しなければならない。","Aが甲県内に本店及び2つの支店を設置して宅地建物取引業を営もうとする場合、供託すべき営業保証金の合計額は1,200万円である。"],"answer":3},{"id":"R2A-36","year":"R2A","q":36,"category":"宅建業法","question":"宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["保証協会の社員との宅地建物取引業に関する取引により生じた債権を有する者は、当該社員が納付した弁済業務保証金分担金の額に相当する額の範囲内で弁済を受ける権利を有する。","保証協会の社員と宅地建物取引業に関し取引をした者が、その取引により生じた債権に関し、弁済業務保証金について弁済を受ける権利を実行するときは、当該保証協会の認証を受けるとともに、当該保証協会に対し還付請求をしなければならない。","保証協会は、弁済業務保証金の還付があったときは、当該還付に係る社員又は社員であった者に対し、当該還付額に相当する額の還付充当金をその主たる事務所の最寄りの供託所に供託すべきことを通知しなければならない。","保証協会は、弁済業務保証金の還付があったときは、当該還付額に相当する額の弁済業務保証金を供託しなければならない。"],"answer":4},{"id":"R2A-37","year":"R2A","q":37,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として宅地の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定に基づき交付すべき書面をいうものとする。\nアAは、専任の宅地建物取引士をして、37条書面の内容を当該契約の買主に説明させなければならない。\nイAは、供託所等に関する事項を37条書面に記載しなければならない。\nウAは、買主が宅地建物取引業者であっても、37条書面を遅滞なく交付しなければならな\nエAは、買主が宅地建物取引業者であるときは、当該宅地の引渡しの時期及び移転登記の申請の時期を37条書面に記載しなくてもよい。","choices":["一つ","二つ","三つ","なし"],"answer":1},{"id":"R2A-38","year":"R2A","q":38,"category":"宅建業法","question":"宅地建物取引業者Aが、BからB所有の甲住宅の売却に係る媒介の依頼を受けて締結する一般媒介契約に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["Aは、法第34条の2第1項の規定に基づき交付すべき書面に、宅地建物取引士をして記名押印させなければならない。","Aは、甲住宅の価額について意見を述べる場合、Bに対してその根拠を口頭ではなく書面で明示しなければならない。","Aは、当該媒介契約を締結した場合、指定流通機構に甲住宅の所在等を登録しなければならない。","Aは、媒介契約の有効期間及び解除に関する事項を、法第34条の2第1項の規定に基づき交付すべき書面に記載しなければならない。"],"answer":4},{"id":"R2A-39","year":"R2A","q":39,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者は、従業者名簿の閲覧の請求があったときは、取引の関係者か否かを問わず、請求した者の閲覧に供しなければならない。","宅地建物取引業者は、その業務に従事させる者に従業者証明書を携帯させなければならず、その者が宅地建物取引士であり、宅地建物取引士証を携帯していても、従業者証明書を携帯させなければならない。","宅地建物取引業者は、その事務所ごとに従業者名簿を備えなければならないが、退職した従業者に関する事項は、個人情報保護の観点から従業者名簿から消去しなければならない。","宅地建物取引業者は、その業務に従事させる者に従業者証明書を携帯させなければならないが、その者が非常勤の役員や単に一時的に事務の補助をする者である場合には携帯させなくてもよい。"],"answer":2},{"id":"R2A-40","year":"R2A","q":40,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として、宅地建物取引業者ではないBとの間で宅地の売買契約を締結した場合における、宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、Bがクーリング・オフにより契約の解除を行うことができるものはいくつあるか。\nアBが喫茶店で当該宅地の買受けの申込みをした場合において、Bが、Aからクーリング・オフについて書面で告げられた日の翌日から起算して8日目にクーリング・オフによる契約の解除の書面を発送し、10日目にAに到達したとき。\nイBが喫茶店で当該宅地の買受けの申込みをした場合において、クーリング・オフによる契約の解除ができる期間内に、Aが契約の履行に着手したとき。\nウBが喫茶店で当該宅地の買受けの申込みをした場合において、AとBとの間でクーリング・オフによる契約の解除をしない旨の合意をしたとき。\nエAの事務所ではないがAが継続的に業務を行うことができる施設があり宅地建物取引業法第31条の3第1項の規定により専任の宅地建物取引士が置かれている場所で、Bが買受けの申込みをし、2日後に喫茶店で売買契約を締結したとき。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R2A-41","year":"R2A","q":41,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。","choices":["重要事項説明書には、代表者の記名押印があれば宅地建物取引士の記名押印は必要がない。","重要事項説明書に記名押印する宅地建物取引士は専任の宅地建物取引士でなければならないが、実際に重要事項の説明を行う者は専任の宅地建物取引士でなくてもよい。","宅地建物取引士証を亡失した宅地建物取引士は、その再交付を申請していても、宅地建物取引士証の再交付を受けるまでは重要事項の説明を行うことができない。","重要事項の説明は、宅地建物取引業者の事務所において行わなければならない。"],"answer":3},{"id":"R2A-42","year":"R2A","q":42,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として締結する売買契約に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)及び民法の規定によれば、誤っているものはどれか。","choices":["Aが宅地建物取引業者ではないBとの間で締結する宅地の売買契約において、当該宅地の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任を負う期間をBがその不適合を知った時から2年とする特約を定めた場合、この特約は有効である。","Aが宅地建物取引業者ではないCとの間で建築工事の完了前に締結する建物(代金5,000万円)の売買契約においては、Aは、手付金200万円を受領した後、法第41条に定める手付金等の保全措置を講じなければ、当該建物の引渡し前に中間金300万円を受領することができない。","Aが宅地建物取引業者Dとの間で造成工事の完了後に締結する宅地(代金3,000万円)の売買契約においては、Aは、法第41条の2に定める手付金等の保全措置を講じないで、当該宅地の引渡し前に手付金800万円を受領することができる。","Aが宅地建物取引業者ではないEとの間で締結する建物の売買契約において、Aは当該建物の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任を一切負わないとする特約を定めた場合、この特約は無効となり、Aが当該責任を負う期間は当該建物の引渡日から2年となる。"],"answer":[1,4]},{"id":"R2A-43","year":"R2A","q":43,"category":"宅建業法","question":"宅地建物取引業の免許(以下この問において「免許」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["免許を受けようとするA社の取締役が刑法第204条(傷害)の罪により懲役1年執行猶予2年の刑に処せられた場合、刑の執行猶予の言渡しを取り消されることなく猶予期間を満了し、その日から5年を経過しなければ、A社は免許を受けることができない。","宅地建物取引業者である個人Bが死亡した場合、その相続人Cは、Bが締結した契約に基づく取引を結了する目的の範囲内において宅地建物取引業者とみなされ、Bが売主として締結していた売買契約の目的物を買主に引き渡すことができる。","宅地建物取引業者D社について破産手続開始の決定があった場合、D社を代表する役員は廃業を届け出なければならない。また、廃業が届け出られた日にかかわらず、破産手続開始の決定の日をもって免許の効力が失われる。","免許を受けようとするE社の取締役について、破産手続開始の決定があった場合、復権を得た日から5年を経過しなければ、E社は免許を受けることができない。"],"answer":2},{"id":"R2A-44","year":"R2A","q":44,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、特に断りのない限り、説明の相手方は宅地建物取引業者ではないものとする。","choices":["昭和55年に新築の工事に着手し完成した建物の売買の媒介を行う場合、当該建物が地方公共団体による耐震診断を受けたものであるときは、その内容を説明しなければならない。","貸借の媒介を行う場合、敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項を説明しなければならない。","自らを委託者とする宅地又は建物に係る信託の受益権の売主となる場合、取引の相手方が宅地建物取引業者であっても、重要事項説明書を交付して説明をしなければならない。","区分所有建物の売買の媒介を行う場合、一棟の建物の計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容を説明しなければならないが、既に積み立てられている額について説明する必要はない。"],"answer":4},{"id":"R2A-45","year":"R2A","q":45,"category":"宅建業法","question":"宅地建物取引業者A(甲県知事免許)が、自ら売主として宅地建物取引業者ではない買主Bに新築住宅を販売する場合における・次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。","choices":["Aが媒介を依頼した宅地建物取引業者又はBが住宅販売瑕疵担保責任保険契約の締結をしていれば、Aは住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う必要はない。","Aが住宅販売瑕疵担保保証金の供託をし、その額が、基準日において、販売新築住宅の合計戸数を基礎として算定する基準額を超えることとなった場合、甲県知事の承認を受けた上で、その超過額を取り戻すことができる。","新築住宅をBに引き渡したAは、基準日ごとに基準日から50日以内に、当該基準日に係る住宅販売瑕疵担保保証金の供託及び住宅販売瑕担保責任保険契約の締結の状況について、甲県知事に届け出なげればならない。","Bが宅地建物取引業者である場合であっても、Aは、Bに引き渡した新築住宅について、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負う。"],"answer":2},{"id":"R2A-46","year":"R2A","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構(以下この問において「機構」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、証券化支援事業(買取型)において、金融機関から買い取った住宅ローン債権を担保としてMBS(資産担保証券)を発行している。","機構は、災害により住宅が滅失した場合におけるその住宅に代わるべき住宅の建設又は購入に係る貸付金については、元金据置期間を設けることができない。","機構は、証券化支援事業(買取型)において、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権については譲受けの対象としていない。","機構は、貸付けを受けた者とあらかじめ契約を締結して、その者が死亡した場合に支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当する団体信用生命保険を業務として行っている。"],"answer":2},{"id":"R2A-47","year":"R2A","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正竸争規約を含む。)の規定によれば、正しいものはどれか。","choices":["路地状部分(敷地延長部分)のみで道路に接する土地であって、その路地状部分の面積が当該土地面積のおおむね30%以上を占める場合には、路地状部分を含む旨及び路地状部分の割合又は面積を明示しなければならない。","新築住宅を販売するに当たり、当該物件から最寄駅まで実際に歩いたときの所要時間が15分であれば、物件から最寄駅までの道路距離にかかわらず、広告中に「最寄駅まで徒歩15分」と表示することができる。","新築分譲住宅を販売するに当たり、予告広告である旨及び契約又は予約の申込みには応じられない旨を明暸に表示すれば、当該物件が建築確認を受けていなくても広告表示をすることができる。","新築分譲マンションを販売するに当たり、住戸により管理費の額が異なる場合であって、すべての住戸の管理費を示すことが広告スペースの関係で困難なときは、全住戸の管理費の平均額を表示すればよい。"],"answer":1},{"id":"R2A-48","year":"R2A","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["令和2年地価公示(令和2年3月公表)によれば、平成31年1月以降の1年間の地価変動は、全国平均では、住宅地については下落であったが、商業地については上昇であった。","令和2年版土地白書(令和2年6月公表)によれば、土地取引について、売買による所有権の移転登記の件数でその動向をみると、令和元年の全国の土地取引件数は約131万件となり、前年に比べて大きく増加した。","建築着工統計(令和2年1月公表)によれば、平成31年1月から令和元年12月までの持家及び分譲住宅の新設住宅着工戸数は前年に比べて増加したが、貸家の新設住宅着工戸数は減少した。","平成30年度法人企業統計調査(令和元年9月公表)によれば、不動産業の売上高経常利益率は、平成26年度から平成30年度までの5年間は、いずれも5%以下となっている。"],"answer":3},{"id":"R2A-49","year":"R2A","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["都市の中小河川の氾濫の原因の一つは、急速な都市化、宅地化に伴い、降雨時に雨水が短時間に大量に流れ込むようになったことである。","中小河川に係る防災の観点から、宅地選定に当たっては、その地点だけでなく、周辺の地形と防災施設に十分注意することが必要である。","地盤の液状化については、宅地の地盤条件について調べるとともに、過去の地形についても古地図などで確認することが必要である。","地形や地質的な条件については、宅地に適しているか調査する必要があるが、周辺住民の意見は聴かなくてよい。"],"answer":4},{"id":"R2A-50","year":"R2A","q":50,"category":"免除科目","question":"建築物の構造に関する次の記述のうち、最も不適当なものはどれか。","choices":["建物の構成は、大きく基礎構造と上部構造からなっており、基礎構造は地業と基礎盤から構成されている。","基礎の種類には、基礎の底面が建物を支持する地盤に直接接する直接基礎と、建物を支持する地盤が深い場合に使用する杭基礎(杭地業)がある。","直接基礎の種類には、形状により、柱の下に設ける独立基礎、壁体等の下に設けるべた基礎、建物の底部全体に設ける布基礎(連続基礎)等がある。","上部構造は、重力、風力、地震力等の荷重に耐える役目を負う主要構造と、屋根、壁、床等の仕上げ部分等から構成されている。"],"answer":3},{"id":"R2B-01","year":"R2B","q":1,"category":"権利関係","question":"不法行為(令和2年4月1日以降に行われたもの)に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["建物の建築に携わる設計者や施工者は、建物としての基本的な安全性が欠ける建物を設計し又は建築した場合、設計契約や建築請負契約の当事者に対しても、また、契約関係にない当該建物の居住者に対しても損害賠償責任を負うことがある。","被用者が使用者の事業の執行について第三者に損害を与え、第三者に対してその損害を賠償した場合には、被用者は、損害の公平な分担という見地から相当と認められる額について、使用者に対して求償することができる。","責任能力がない認知症患者が線路内に立ち入り、列車に衝突して旅客鉄道事業者に損害を与えた場合、当該責任無能力者と同居する配偶者は、法定の監督義務者として損害賠償責任を負う。","人の生命又は身体を害する不法行為による損害賠償請求権は、被害者又はその法定代理人が損害及び加害者を知った時から5年間行使しない場合、時効によって消減する。"],"answer":3},{"id":"R2B-02","year":"R2B","q":2,"category":"権利関係","question":"AがBに対して、A所有の甲土地を売却する代理権を令和2年7月1日に授与した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。","choices":["Bが自己又は第三者の利益を図る目的で、Aの代理人として甲土地をDに売却した場合、Dがその目的を知り、又は知ることができたときは、Bの代理行為は無権代理とみなされる。","BがCの代理人も引き受け、AC双方の代理人として甲土地に係るAC間の売買契約を締結した場合、Aに損害が発生しなければ、Bの代理行為は無権代理とはみなされない。","AがBに授与した代理権が消減した後、BがAの代理人と称して、甲土地をEに売却した場合、AがEに対して甲土地を引き渡す責任を負うことはない。","Bが、Aから代理権を授与されていないA所有の乙土地の売却につき、Aの代理人としてFと売買契約を締結した場合、AがFに対して追認の意思表示をすれば、Bの代理行為は追認の時からAに対して効力を生ずる。"],"answer":1},{"id":"R2B-03","year":"R2B","q":3,"category":"権利関係","question":"親族に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれ","choices":["姻族関係は、離婚した場合及び夫婦の一方が死亡した場合、当然に終了する。","離婚に当たり、相手方に有責不法の行為がなければ、他の一方は、相手方に対して財産の分与を請求することができない。","未成年者に対して親権を行う者がないときは、家庭裁判所は、検察官の請求によって、親族の中から未成年後見人を選任する。","夫婦間で婚姻の届出前に別段の契約をしなかった場合、夫婦のいずれに属するか明らかでない財産は、その共有に属するものと推定される。"],"answer":4},{"id":"R2B-04","year":"R2B","q":4,"category":"権利関係","question":"債務不履行に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、債務は令和2年4月1日以降に生じたものとする。","choices":["債務の履行について不確定期限があるときは、債務者は、その期限が到来したことを知らなくても、期限到来後に履行の請求を受けた時から遅滞の責任を負う。","債務の目的が特定物の引渡しである場合、債権者が目的物の引渡しを受けることを理由なく拒否したため、その後の履行の費用が増加したときは、その増加額について、債権者と債務者はそれぞれ半額ずっ負担しなければならない。","債務者がその債務について遅滞の責任を負っている間に、当事者双方の責めに帰することができない事由によってその債務の履行が不能となったときは、その履行不能は債務者の責めに帰すべき事由によるものとみなされる。","契約に基づく債務の履行が契約の成立時に不能であったとしても、その不能が債務者の責めに帰することができない事由によるものでない限り、債権者は、履行不能によって生じた損害について、債務不履行による損害の賠償を請求することができる。"],"answer":2},{"id":"R2B-05","year":"R2B","q":5,"category":"権利関係","question":"時効に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、時効の対象となる債権の発生原因は、令和2年4月1日以降に生じたものとする。","choices":["消滅時効の援用権者である「当事者」とは、権利の消滅について正当な利益を有する者であり、債務者のほか、保証人、物上保証人、第三取得者も含まれる。","裁判上の請求をした場合、裁判が終了するまでの間は時効が完成しないが、当該請求を途中で取り下げて権利が確定することなく当該請求が終了した場合には、その終了した時から新たに時効の進行が始まる。","権利の承認があったときは、その時から新たに時効の進行が始まるが、権利の承認をするには、相手方の権利についての処分につき行為能力の制限を受けていないことを要しない。","夫婦の一方が他方に対して有する権利については、婚姻の解消の時から6箇月を経過するまでの間は、時効が完成しない。"],"answer":2},{"id":"R2B-06","year":"R2B","q":6,"category":"権利関係","question":"AはBにA所有の甲建物を令和2年7月1日に賃貸し、BはAの承諾を得てCに適法に甲建物を転貸し、Cが甲建物に居住している場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["Aは、Bとの間の賃貸借契約を合意解除した場合、解除の当時Bの債務不履行による解除権を有していたとしても、合意解除したことをもってCに対抗することはできない。","Cの用法違反によって甲建物に損害が生じた場合、AはBに対して、甲建物の返還を受けた時から1年以内に損害賠償を請求しなければならない。","AがDに甲建物を売却した場合、AD間で特段の合意をしない限り、賃貸人の地位はDに移転する。","BがAに約定の賃料を支払わない場合、Cは、Bの債務の範囲を限度として、Aに対して転貸借に基づく債務を直接履行する義務を負い、Bに賃料を前払いしたことをもってAに対抗することはできない。"],"answer":1},{"id":"R2B-07","year":"R2B","q":7,"category":"権利関係","question":"Aを売主、Bを買主として、令和2年7月1日嶂甲土地の売買契約(以下この問において「本件契約」という。)が締結された場合における次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["甲土地の実際の面積が本件契約の売買代金の基礎とした面積より少なかった場合、Bはそのことを知った時から2年以内にその旨をAに通知しなければ、代金の減額を請求することができない。","AがBに甲土地の引渡しをすることができなかった場合、その不履行がAの責めに帰することができない事由によるものであるときを除き、BはAに対して、損害賠償の請求をすることができる。","Bが売買契約で定めた売買代金の支払期日までに代金を支払わなかった場合、売買契約に特段の定めがない限り、AはBに対して、年5%の割合による遅延損害金を請求することができる。","本件契約が、Aの重大な過失による錯誤に基づくものであり、その錯誤が重要なものであるときは、Aは本件契約の無効を主張することができる。"],"answer":2},{"id":"R2B-08","year":"R2B","q":8,"category":"権利関係","question":"1億2,000万円の財産を有するAが死亡した場合の法定相続分についての次の記述のうち、民法の規定によれば、正しいものの組合せはどれか。\nアAの長男の子B及びC、Aの次男の子Dのみが相続人になる場合の法定相続分は、それぞれ4,000万円である。\nイAの長男の子B及びC、Aの次男の子Dのみが相続人になる場合の法定相続分は、B及びCがそれぞれ3,000万円、Dが6,000万円である。\nウAの父方の祖父母E及びF、Aの母方の祖母Gのみが相続人になる場合の法定相続分は、それぞれ4,000万円である。\nエAの父方の祖父母E及びF、Aの母方の祖母Gのみが相続人になる場合の法定相続分は、E及びFがそれぞれ3,000万円、Gが6,000万円である。","choices":["ア、ウ","ア、エ","イ、ウ","イ、エ"],"answer":3},{"id":"R2B-09","year":"R2B","q":9,"category":"権利関係","question":"地役権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。","choices":["地役権は、継続的に行使されるもの、又は外形上認識することができるものに限り、時効取得することができる。","地役権者は、設定行為で定めた目的に従い、承役地を要役地の便益に供する権利を有する。","設定行為又は設定後の契約により、承役地の所有者が自己の費用で地役権の行使のために工作物を設け、又はその修繕をする義務を負担したときは、承役地の所有者の特定承継人もその義務を負担する。","要役地の所有権とともに地役権を取得した者が、所有権の取得を承役地の所有者に対抗し得るときは、地役権の取得についても承役地の所有者に対抗することができる。【問1の不動産の共有に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。1共有物の各共有者の持分が不明な場合、持分は平等と推定される。2各共有者は、他の共有者の同意を得なければ、共有物に変更を加えることができない。3共有物の保存行為については、各共有者が単独ですることができる。4共有者の一人が死亡して相続人がないときは、その持分は国庫に帰属する。"],"answer":1},{"id":"R2B-10","year":"R2B","q":10,"category":"権利関係","question":"不動産の共有に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["共有物の各共有者の持分が不明な場合、持分は平等と推定される。","各共有者は、他の共有者の同意を得なければ、共有物に変更を加えることができない。","共有物の保存行為については、各共有者が単独ですることができる。","共有者の一人が死亡して相続人がないときは、その持分は国庫に帰属する。"],"answer":4},{"id":"R2B-11","year":"R2B","q":11,"category":"権利関係","question":"次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。","choices":["借地権者が借地権の登記をしておらず、当該土地上に所有権の登記がされている建物を所有しているときは、これをもって借地権を第三者に対抗することができるが、建物の表示の登記によっては対抗することができない。","借地権者が登記ある建物を火災で滅失したとしても、建物が滅失した日から2年以内に新たな建物を築造すれば、2年を経過した後においても、これをもって借地権を第三者に対抗することができる。","土地の賃借人が登記ある建物を所有している場合であっても、その賃借人から当該土地建物を賃借した転借人が対抗力を備えていなければ、当該転借人は転借権を第三者に対抗することができない。","借地権者が所有する数棟の建物が一筆の土地上にある場合は、そのうちの一棟について登己があれば、借地権の対抗力が当該土地全部に及ぶ。"],"answer":4},{"id":"R2B-12","year":"R2B","q":12,"category":"権利関係","question":"賃貸人Aと賃借人Bとの間で令和2年7月1日に締結した居住用建物の賃貸借契約に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。","choices":["当該建物の修繕が必要である場合において、BがAに修繕が必要である旨を通知したにもかかわらずAが相当の期間内に必要な修繕をしないときは、Bは自ら修繕をすることができる。","BがAに無断でCに当該建物を転貸した場合であっても、Aに対する背信行為と認めるに足りない特段の事情があるときは、Aは賃貸借契約を解除することができない。","賃貸借契約に期間を定め、賃貸借契約を書面によって行った場合には、AがBに対しあらかじめ契約の更新がない旨を説明していれば、賃貸借契約は期間満了により終了する。","Bが相続人なしに死亡した場合、Bと婚姻の届出をしていないが事実上夫婦と同様の関係にあった同居者Dは、Bが相続人なしに死亡したことを知った後1月以内にAに反対の意思表示をしない限り、賃借人としてのBの権利義務を承継する。"],"answer":3},{"id":"R2B-13","year":"R2B","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれ","choices":["規約の保管場所は、建物内の見やすい場所に掲示しなければならない。","管理者は、規約に特別の定めがあるときは、共用部分を所有することができる。","規約及び集会の決議は、区分所有者の特定承継人に対しては、その効力を生じない。","区分所有者は、規約に別段の定めがない限り集会の決議によって、管理者を解任することができる。"],"answer":3},{"id":"R2B-14","year":"R2B","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。","choices":["表題部所有者が表示に関する登記の申請人となることができる場合において、当該表題部所有者について相続があったときは、その相続人は、当該表示に関する登記を申請することができる。","所有権の登記以外の権利に関する登記がある土地については、分筆の登記をすることができない。","区分建物が属する一棟の建物が新築された場合における当該区分建物についての表題登記の申請は、当該新築された一棟の建物についての表題登記の申請と併せてしなければならな","登記の申請書の閲覧は、請求人が利害関係を有する部分に限り、することができる。"],"answer":2},{"id":"R2B-15","year":"R2B","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。","choices":["市街化区域及び区域区分が定められていない都市計画区域については、少なくとも道路、病院及び下水道を定めるものとされている。","市街化調整区域内においては、都市計画に、市街地開発事業を定めることができないこととされている。","都市計画区域は、市町村が、市町村都市計画審議会の意見を聴くとともに、都道府県知事に協議し、その同意を得て指定する。","準都市計画区域については、都市計画に、高度地区を定めることができないこととされている。"],"answer":2},{"id":"R2B-16","year":"R2B","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["市街化調整区域において、非常災害のため必要な応急措置として8,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。","市街化区域において、社会教育法に規定する公民館の建築の用に供する目的で行われる1,500m2の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。","区域区分が定められていない都市計画区域において、店舗の建築の用に供する目的で行われる2,000m2の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。","市街化調整区域において、自己の居住の用に供する住宅の建築の用に供する目的で行われる100m2の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。"],"answer":2},{"id":"R2B-17","year":"R2B","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、誤っているものはどれか。","choices":["建築物が防火地域及び準防火地域にわたる場合においては、その全部について、敷地の属する面積が大きい方の地域内の建築物に関する規定を適用する。","倉庫の用途に供する建築物で、その用途に供する3階以上の部分の床面積の合計が500m2であるものは、耐火建築物としなければならない。","高さ25mの建築物には、周囲の状況によって安全上支障がない場合を除き、有効に避雷設備を設けなければならない。","高さlm以下の階段の部分には、手すりを設けなくてもよい。"],"answer":1},{"id":"R2B-18","year":"R2B","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。","choices":["建築物の壁又はこれに代わる柱は、地盤面下の部分又は特定行政庁が建築審査会の同意を得て許可した歩廊の柱その他これに類するものを除き、壁面線を越えて建築してはならない。","特別用途地区内においては、地方公共団体は、その地区の指定の目的のために必要と認める場合は、国土交通大臣の承認を得て、条例で、法第48条第1項から第13項までの規定による用途制限を緩和することができる。","都市計画により建蔽率の限度が10分の8と定められている準工業地域においては、防火地域内にある耐火建築物については、法第53条第1項から第5項までの規定に基づく建蔽率に関する制限は適用されない。","田園住居地域内の建築物に対しては、法第56条第1項第3号の規定(北側斜線制限)は適用されない。"],"answer":4},{"id":"R2B-19","year":"R2B","q":19,"category":"法令上の制限","question":"宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。","choices":["宅地造成工事規制区域は、宅地造成に伴い災害が生ずるおそれが大きい市街地又は市街地になろうとする土地の区域であって、宅地造成に関する工事につき規制を行う必要があるものについて、国土交通大臣が指定することができる。","宅地造成工事規制区域内において宅地造成に関する工事を行う場合、宅地造成に伴う災害を防止するために行う高さが5mを超える擁壁の設置に係る工事については、政令で定める資格を有する者の設計によらなければならない。","都道府県(地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市)は、宅地造成工事規制区域の指定のために行う測量又は調査のため他人の占有する土地に立ち入ったことにより他人に損失を与えた場合においては、その損失を受けた者に対して、通常生ずべき損失を補償しなければならない。","宅地造成等規制法第8条第1項本文の許可を受けた宅地造成に関する工事が完了した場合、造成主は、都道府県知事(地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長)の検査を受けなければならない。"],"answer":1},{"id":"R2B-20","year":"R2B","q":20,"category":"法令上の制限","question":"土地区画整理法に関する次の記述のうち、正しいものはどれか。","choices":["市町村が施行する土地区画整理事業の施行後の宅地の価額の総額が土地区画整理事業の施行前の宅地の価額の総額より減少した場合においては、その差額に相当する金額を、従前の宅地に存する建築物について賃借権を有する者に対して支払わなければならない。","施行者は、仮換地を指定した時に、清算金を徴収し、又は交付しなければならない。","換地計画において換地を定める場合においては、換地及び従前の宅地の位置、地積、土質、水利、利用状況、環境等が照応するように定めなければならない。","土地区画整理組合が施行する土地区画整理事業の換地計画においては、災害を防止し、及び衛生の向上を図るために宅地の地積の規模を適正にする特別な必要があると認められる場合は、その換地計画に係る区域内の地積が小である宅地について、過小宅地とならないように換地を定めることができる。"],"answer":3},{"id":"R2B-21","year":"R2B","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["山林を開墾し、農地として耕作している土地であっても、土地登記簿上の地目が山林であれば、法の適用を受ける農地に該当しない。","親から子に対して、所有するすべての農地を一括して贈与する場合には、法第3条第1項の許可を受ける必要はない。","耕作を目的として農業者が競売により農地を取得する場合であっても、法第3条第1項の許可を受ける必要がある。","市街化区域以外の区域に存する4haを超える農地を転用する場合には、農林水産大臣の許可を受ける必要がある。"],"answer":3},{"id":"R2B-22","year":"R2B","q":22,"category":"法令上の制限","question":"国土利用計画法第23条の届出(以下この問において「事後届出」という。)に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。","choices":["都道府県知事は、事後届出に係る土地の利用目的及び対価の額について、届出をした宅地建物取引業者に対し勧告することができ、都道府県知事から勧告を受けた当該業者が勧告に従わなかった場合、その旨及びその勧告の内容を公表することができる。","事後届出が必要な土地売買等の契約により権利取得者となった者が事後届出を行わなかった場合、都道府県知事から当該届出を行うよう勧告されるが、罰則の適用はない。","国が所有する市街化区域内の一団の土地である1,500m2の土地と500m2の土地を個人Aが購入する契約を締結した場合、Aは事後届出を行う必要がある。","個人Bが所有する都市計画区域外の11,000m2の土地について、個人CがBとの間で対価を支払って地上権設定契約を締結した場合、Cは事後届出を行う必要がある。"],"answer":4},{"id":"R2B-23","year":"R2B","q":23,"category":"税・その他","question":"住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置に関する次の己述のうち、正しいものはどれか。","choices":["この税率の軽減措置の適用を受けるためには、やむを得ない事情がある場合を除き、その住宅用家屋の取得後1年以内に所有権の移転登記を受けなければならない。","この税率の軽減措置は、住宅用家屋を相続により取得した場合に受ける所有権の移転登記についても適用される。","この税率の軽減措置に係る登録免許税の課税標準となる不動産の価額は、売買契約書に記載されたその住宅用家屋の実際の取引価格である。","過去にこの税率の軽減措置の適用を受けたことがある者は、再度この措置の適用を受けることはできない。"],"answer":1},{"id":"R2B-24","year":"R2B","q":24,"category":"税・その他","question":"固定資産税に関する次の記述のうち、正しいものはどれか。","choices":["固定資産税を既に全納した者が、年度の途中において土地の譲渡を行った場合には、その譲渡後の月数に応じて税額の還付を受けることができる。","固定資産税の税率は、1.7%を超えることができない。","固定資産税の納期は、4月、7月、12月及び2月中において、当該市町村の条例で定めることとされているが、特別の事情がある場合においては、これと異なる納期を定めることができる。","200m2以下の住宅用地に対して課する固定資産税の課税標準は、課税標準となるべき価格の2分の1の額とする特例措置が講じられている。"],"answer":3},{"id":"R2B-25","year":"R2B","q":25,"category":"税・その他","question":"地価公示法に関する次の記述のうち、正しいものはどれか。","choices":["土地鑑定委員会は、その土地に地上権が存する場合であっても、標準地として選定することができる。","土地鑑定委員会は、標準地について、2人以上の不動産鑑定士の鑑定評価を求めるものとし、当該2人以上の不動産鑑定士は、土地鑑定委員会に対し、鑑定評価書を連名で提出しなければならない。","土地鑑定委員会は、標準地の正常な価格を判定したときは、標準地の単位面積当たりの価格のほか、当該標準地の価格の総額についても官報で公示しなければならない。","土地収用法その他の法律によって土地を収用することができる事業を行う者は、標準地として選定されている土地を取得する場合において、当該土地の取得価格を定めるときは、公示価格と同額としなければならない。"],"answer":1},{"id":"R2B-26","year":"R2B","q":26,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者は、建物の売買に際し、買主に対して売買代金の貸借のあっせんをすることにより、契約の締結を誘引してはならない。","宅地建物取引士は、自ら役員を務める宅地建物取引業者が宅地建物取引業に関し不正な行為をし、情状が特に重いことにより免許を取り消された場合、宅地建物取引士の登録を消除されることとなる。","宅地建物取引業者は、建築工事完了前の賃貸住宅について、借主として貸借の契約を締結してはならない。","宅地建物取引業者は、10区画以上の一団の宅地の分譲を行う案内所を設置し、当該案内所において売買の契約の締結をし、又は契約の申込みを受ける場合は、当該案内所にその業務に関する帳簿を備え付けなければならない。"],"answer":2},{"id":"R2B-27","year":"R2B","q":27,"category":"宅建業法","question":"宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["広告の表示が実際のものよりも著しく優良又は有利であると人を誤認させるようなものであっても、誤認による損害が実際に発生していなければ、監督処分の対象とならない。","宅地建物取引業者は、建築確認申請中の建物について、建築確認申請中である旨を表示すれば、自ら売主として当該建物を販売する旨の広告をすることができる。","宅地建物取引業者は、宅地の造成工事の完了前においては、当該造成工事に必要とされる許可等の処分があった後であれば、当該宅地の販売に関する広告をすることができる。","テレビやインターネットを利用して行う広告は、新聞の折込チラシや配布用のチラシと異なり、規制の対象とならない。"],"answer":3},{"id":"R2B-28","year":"R2B","q":28,"category":"宅建業法","question":"宅地建物取引業者Aが、BからB所有の宅地の売却について媒介の依頼を受けた場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「専任媒介契約」とは、専属専任媒介契約ではない専任媒介契約をいうものとする。\nアAがBとの間で専任媒介契約を締結した場合、Bの要望により当該宅地を指定流通機構に登録しない旨の特約をしているときを除き、Aは、当該契約締結日から7日以内(Aの休業日を含まない。)に、当該宅地の所在等を指定流通機構に登録しなければならない。\nイAがBとの間で専任媒介契約を締結した場合、AはBに対して、当該契約に係る業務の処理状況を1週間に1回以上報告しなければならない。\nウAがBとの間で一般媒介契約を締結し、当該契約において、Bが他の宅地建物取引業者に重ねて依頼するときは当該他の宅地建物取引業者を明示する義務がある旨を定める場合、Aは、Bが明示していない他の宅地建物取引業者の媒介又は代理によって売買の契約を成立させたときの措置を宅地建物取引業法第34条の2第1項の規定に基づき交付すべき書面に記載しなければならない。\nエAがBとの間で一般媒介契約を締結した場合、AがBに対し当該宅地の価額について意見を述べるときは、不動産鑑定士に評価を依頼して、その根拠を明らかにしなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":1},{"id":"R2B-29","year":"R2B","q":29,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者(甲県知事免許)が、乙県内に新たに事務所を設置して宅地建物取引業を営むため、国土交通大臣に免許換えの申請を行い、その免許を受けたときは、国土交通大臣から、免許換え前の免許(甲県知事)の有効期間が経過するまでの期間を有効期間とする免許証の交付を受けることとなる。","宅地建物取引士(甲県知事登録)が、乙県に所在する宅地建物取引業者の事務所の業務に従事することとなったため、乙県知事に登録の移転の申請とともに宅地建物取引士証の交付の申請をしたときは、乙県知事から、有効期間を5年とする宅地建物取引士証の交付を受けることとなる。","宅地建物取引士(甲県知事登録)が、乙県に所在する建物の売買に関する取引において宅地建物取引士として行う事務に関し不正な行為をし、乙県知事により事務禁止処分を受けたときは、宅地建物取引士証を甲県知事に提出しなければならない。","宅地建物取引業者(甲県知事免許)は、乙県内で一団の建物の分譲を行う案内所を設置し、当該案内所において建物の売買の契約を締結し、又は契約の申込みを受ける場合、国土交通大臣に免許換えの申請をしなければならない。"],"answer":3},{"id":"R2B-30","year":"R2B","q":30,"category":"宅建業法","question":"宅地建物取引業保証協会(以下この問において「保証協会」という。)に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["本店と3つの支店を有する宅地建物取引業者が保証協会に加入しようとする場合、当該保一三正1劦会に、110万円の弁済業務保証金分担金を納付しなければならない。","保証協会の社員又は社員であった者が、当該保証協会から、弁済業務保証金の還付額に相当する還付充当金を当該保証協会に納付すべき旨の通知を受けたときは、その通知を受けた日から2週間以内に、その通知された額の還付充当金を当該保協会に納付しなければならない。","保証協会に加入している宅地建物取引業者は、保証を手厚くするため、更に別の保証協会に加入することができる。","保証協会の社員(甲県知事免許)と宅地建物取引業に関し取引をした者が、その取引により生じた債権に関し、当該保証協会が供託した弁済業務保証金について弁済を受ける権利を実行しようとするときは、弁済を受けることができる額について甲県知事の認証を受ける必要がある。"],"answer":2},{"id":"R2B-31","year":"R2B","q":31,"category":"宅建業法","question":"宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者が、免許を受けてから1年以内に事業を開始せず免許が取り消され、その後5年を経過していない場合は、免許を受けることができない。","免許を受けようとしている法人の政令で定める使用人が、破産手続開始の決定を受け、復権を得てから5年を経過していない場合、当該法人は免許を受けることができない。","免許権者は、免許に条件を付することができ、免許の更新に当たっても条件を付することができる。","宅地建物取引業者の役員の住所に変更があったときは、30日以内に免許権者に変更を届け出なければならない。"],"answer":3},{"id":"R2B-32","year":"R2B","q":32,"category":"宅建業法","question":"宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。\nア宅地の売買の媒介を行う場合、当該宅地が急傾斜地の崩壊による災害の防止に関する法律第3条第1項により指定された急傾斜地崩壊危険区域にあるときは、同法第7条第1項に基づく制限の概要を説明しなければならない。\nイ建物の貸借の媒介を行う場合、当該建物が土砂災害警戒区域等における土砂災害防止対策の推進に関する法律第7条第1項により指定された土砂災害警戒区域内にあるときは、その旨を説明しなければならない。\nウ宅地の貸借の媒介を行う場合、文化財保護法第46条第1項及び第5項の規定による重要文化財の譲渡に関する制限について、その概要を説明する必要はない。\nエ宅地の売買の媒介を行う場合、当該宅地が津波防災地域づくりに関する法律第21条第1項により指定された津波防護施設区域内にあるときは、同法第23条第1項に基づく制限の概要を説明しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":4},{"id":"R2B-33","year":"R2B","q":33,"category":"宅建業法","question":"宅地建物取引業法に規定する営業保証金に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者は、事業の開始後、新たに従たる事務所を設置したときは、その従たる事務所の最寄りの供託所に政令で定める額の営業保証金を供託し、その旨を免許権者に届け出なければならない。","宅地建物取引業者は、主たる事務所を移転したためその最寄りの供託所が変更した場合、国債証券をもって営業保証金を供託しているときは、遅滞なく、従前の主たる事務所の最寄りの供託所に対し、営業保証金の保管替えを請求しなければならない。","宅地建物取引業者は、免許の有効期間満了に伴い営業保証金を取り戻す場合は、還付請求権者に対する公告をすることなく、営業保証金を取り戻すことができる。","免許権者は、宅地建物取引業者が宅地建物取引業の免許を受けた日から3月以内に営業保証金を供託した旨の届出をしないときは、その届出をすべき旨の催告をしなければならず、その催告が到達した日から1月以内に届出がないときは、当該宅地建物取引業者の免許を取り消すことができる。"],"answer":4},{"id":"R2B-34","year":"R2B","q":34,"category":"宅建業法","question":"宅地建物取引業者(消費税課税事業者)が受けることができる報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["宅地建物取引業者が受けることのできる報酬は、依頼者が承諾していたとしても、国土交通大臣の定める報酬額の上限を超えてはならない。","宅地建物取引業者は、その業務に関し、相手方に不当に高額の報酬を要求した場合、たとえ受領していなくても宅地建物取引業法違反となる。","宅地建物取引業者が、事業用建物の貸借(権利金の授受はないものとする。)の媒介に関する報酬について、依頼者の双方から受けることのできる報酬の合計額は、借賃(消費税等相当額を含まない。)1か月分の1.1倍に相当する金額が上限であり、貸主と借主の負担の割合については特段の規制はない。","宅地建物取引業者は、依頼者の依頼によらない広告の料金に相当する額を報酬額に合算する場合は、代理又は媒介に係る報酬の限度額を超える額の報酬を依頼者から受けることができる。"],"answer":4},{"id":"R2B-35","year":"R2B","q":35,"category":"宅建業法","question":"宅地建物取引業者Aが行う媒介業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37条書面」とは、同法第37条の規定により交付すべき書面をいうものとする。\nアAが建物の売買契約を成立させた場合においては、37条書面を買主に交付するに当たり、37条書面に記名押印した宅地建物取引士ではないAの従業者が当該書面を交付することができる。\nイAが建物の賃貸借契約を成立させた場合においては、契約の当事者が宅地建物取引業者であっても、37条書面には、引渡しの時期及び賃借権設定登記の申請の時期を記載しなければならない。\nウAが建物の売買契約を成立させた場合において、天災その他不可抗力による損害の負担に関する定めがあるときは、重要事項説明書にその旨記載していたとしても、その内容を37条書面に記載しなければならない。\nエAが事業用宅地の定期賃貸借契約を公正証書によって成立させた場合においては、公正証書とは別に37条書面を作成し交付するに当たり、契約の当事者が宅地建物取引業者であっても、宅地建物取引士をして37条書面に記名押印させなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R2B-36","year":"R2B","q":36,"category":"宅建業法","question":"宅地建物取引業者の守秘義務に関する次の記述のうち、宅地建物取引業法(以下この問において「法」という。)の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者は、依頼者本人の承諾があった場合でも、秘密を他に漏らしてはならな","宅地建物取引業者が、宅地建物取引業を営まなくなった後は、その業務上取り扱ったことについて知り得た秘密を他に漏らしても、法に違反しない。","宅地建物取引業者は、裁判の証人として、その取り扱った宅地建物取引に関して証言を求められた場合、秘密に係る事項を証言することができる。","宅地建物取引業者は、調査の結果判明した法第35条第1項各号に掲げる事項であっても、売主が秘密にすることを希望した場合は、買主に対して説明しなくてもよい。"],"answer":3},{"id":"R2B-37","year":"R2B","q":37,"category":"宅建業法","question":"宅地建物取引業法第37条の規定により交付すべき書面(以下この問において「37条書面」という。)に関する次の記述のうち、同法の規定によれば、正しいものはどれか。","choices":["既存の建物の構造耐カ上主要な部分等の状況について当事者の双方が確認した事項がない場合、確認した事項がない旨を37条書面に記載しなければならない。","代金又は交換差金についての金銭の貸借のあっせんに関する定めがない場合、定めがない旨を37条書面に記載しなければならない。","損害賠償額の予定又は違約金に関する定めがない場合、定めがない旨を37条書面に記載しなければならない。","宅地又は建物に係る租税その他の公課の負担に関する定めがない場合、定めがない旨を37条書面に記載しなければならない。"],"answer":1},{"id":"R2B-38","year":"R2B","q":38,"category":"宅建業法","question":"宅地建物取引士に関する次の記述のうち、宅地建物取引業法及び民法の規定によれば、正しいものはいくつあるか。\nア宅地建物取引業者は、事務所に置く唯一の専任の宅地建物取引士が退任した場合、その日から30日以内に新たな専任の宅地建物取引士を設置し、その設置の日から2週間以内に専任の宅地建物取引士の変更があった旨を免許権者に届け出なければならない。\nイ未成年者も、法定代理人の同意があれば、宅地建物取引業者の事務所に置かれる専任の宅地建物取引士となることができる。\nウ宅地建物取引士は、重要事項説明書を交付するに当たり、相手方が宅地建物取引業者である場合、相手方から宅地建物取引士証の提示を求められない限り、宅地建物取引士証を提示する必要はない。\nエ成年被後見人又は被保佐人は、宅地建物取引士として都道府県知事の登録を受けることができない。","choices":["一つ","二つ","三つ","なし"],"answer":1},{"id":"R2B-39","year":"R2B","q":39,"category":"宅建業法","question":"宅地建物取引業者Aが、自ら売主として宅地建物取引業者ではない買主Bとの間で締結した宅地の売買契約について、Bが宅地建物取引業法第37条の2の規定に基づき、いわゆるクーリング・オフによる契約の解除をする場合における次の記述のうち、誤っているものはどれか。","choices":["Bは、Aの仮設テント張りの案内所で買受けの申込みをし、2日後、Aの事務所で契約を締結した上で代金全額を支払った。その5日後、Bが、宅地の引渡しを受ける前に当該契約について解除の書面を送付した場合、Aは代金全額が支払われていることを理由に契約の解除を拒むことができる。","Bは、自らの希望により自宅近くの喫茶店において買受けの申込みをし、売買契約を締結した。当該契約に係るクーリング・オフについては、その3日後にAから書面で告げられた場合、Bは、当該契約の締結日から10日後であっても契約の解除をすることができる。","Bは、Aの仮設テント張りの案内所で買受けの申込みをし、Aの事務所でクーリング・オフについて書面で告げられ、その日に契約を締結した。この書面の中で、クーリング・オフによる契約の解除ができる期間を14日間としていた場合、Bは、当該契約の締結日から10日後であっても契約の解除をすることができる。","Bは、売買契約締結後に速やかに建物建築工事請負契約を締結したいと考え、自ら指定した宅地建物取引業者であるハウスメーカー(Aから当該宅地の売却について代理又は媒介の依頼は受けていない。)の事務所で買受けの申込み及び売買契約の締結をし、その際、クーリング・オフについて書面で告げられた。その6日後、Bが当該契約について解除の書面を送付した場合、Aは契約の解除を拒むことができない。【問4の宅地建物取引業法(以下この問において「法」という。)に規定する業務に関する禁止事項についての次の記述のうち、正しいものはどれか。1宅地建物取引業者が、マンション販売の勧誘をするに際し、相手方から購入を希望しない旨の返事があった後に、当該勧誘を継続することは法に違反しない。2宅地建物取引業者は、契約の相手方に対して資金不足を理由に手付の貸付けを行ったが、契約締結後償還された場合は法に違反しない。3宅地建物取引業者は、契約の締結の勧誘をするに際し、理由の如何を問わず、相手方に対して当該契約を締結するかどうかを判断するために必要な時間を与えることを拒んではならない、。4宅地建物取引業者は、勧誘の相手方が金銭的に不安であることを述べたため、売買代金の額を引き下げて、契約の締結を勧誘したとしても、法に違反しない。"],"answer":1},{"id":"R2B-40","year":"R2B","q":40,"category":"宅建業法","question":"宅地建物取引業法(以下この問において「法」という。)に規定する業務に関する禁止事項についての次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者が、マンション販売の勧誘をするに際し、相手方から購入を希望しない旨の返事があった後に、当該勧誘を継続することは法に違反しない。","宅地建物取引業者は、契約の相手方に対して資金不足を理由に手付の貸付けを行ったが、契約締結後償還された場合は法に違反しない。","宅地建物取引業者は、契約の締結の勧誘をするに際し、理由の如何を問わず、相手方に対して当該契約を締結するかどうかを判断するために必要な時間を与えることを拒んではならない。","宅地建物取引業者は、勧誘の相手方が金銭的に不安であることを述べたため、売買代金の額を引き下げて、契約の締結を勧誘したとしても、法に違反しない。"],"answer":4},{"id":"R2B-41","year":"R2B","q":41,"category":"宅建業法","question":"宅地建物取引業法第49条に規定する帳簿に関する次の記述のうち、正しいものはどれか。","choices":["宅地建物取引業者は、本店と複数の支店がある場合、支店には帳簿を備え付けず、本店に支店の分もまとめて備え付けておけばよい。","宅地建物取引業者は、宅地建物取引業に関し取引のあったつど、その年月日、その取引に係る宅地又は建物の所在及び面積その他国土交通省令で定める事項を帳簿に記載しなければならない。","宅地建物取引業者は、帳簿を各事業年度の末日をもって閉鎖するものとし、閉鎖後5年間当該帳簿を保存しなければならないが、自ら売主となり、又は売買の媒介をする新築住宅に係るものにあっては10年間保存しなければならない。","宅地建物取引業者は、帳簿の記載事項を、事務所のパソコンのハードディスクに記録し、必要に応じ当該事務所においてパソコンやプリンターを用いて明確に紙面に表示する場合でも、当該記録をもって帳簿への記載に代えることができない。"],"answer":2},{"id":"R2B-42","year":"R2B","q":42,"category":"宅建業法","question":"宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。","choices":["地域における歴史的風致の維持及び向上に関する法律第12条第1項により指定された歴史的風致形成建造物である建物の売買の媒介を行う場合、その増築をするときは市町村長への届出が必要である旨を説明しなくてもよい。","既存の建物の売買の媒介を行う場合、当該建物の建築確認済証がなくなっているときは、その旨を説明すればよい。","区分所有建物の売買の媒介を行う場合、一棟の建物の維持修繕の実施状況が記録されているときは、その内容を説明しなければならない。","建物の貸借の媒介を行う場合、台所、浴室、便所その他の当該建物の設備の整備の状況について、説明しなければならない。"],"answer":1},{"id":"R2B-43","year":"R2B","q":43,"category":"宅建業法","question":"宅地建物取引業法に規定する宅地建物取引士及びその登録(以下この問において「登録」という。)に関する次の記述のうち、正しいものはどれか。","choices":["登録を受けている者が精神の機能の障害により宅地建物取引士の事務を適正に行うに当たって必要な認知、判断及び意思疎通を適切に行うことができない者となった場合、本人がその旨を登録をしている都道府県知事に届け出ることはできない。","甲県知事の登録を受けている宅地建物取引士が乙県知事に登録の移転の申請を行うとともに宅地建物取引士証の交付の申請を行う場合、交付の申請前6月以内に行われる乙県知事が指定した講習を受講しなければならない。","宅地建物取引士が、事務禁止処分を受け、宅地建物取引士証をその交付を受けた都道府県知事に速やかに提出しなかったときは、50万円以下の罰金に処せられることがある。","宅地建物取引士が、刑法第222条(脅迫)の罪により、罰金の刑に処せられ、登録が消除された場合、刑の執行を終わり又は執行を受けることがなくなった日から5年を経過するまでは、新たな登録を受けることができない。"],"answer":4},{"id":"R2B-44","year":"R2B","q":44,"category":"宅建業法","question":"宅地建物取引業法に関する次の記述のうち、正しいものはいくつあるか。\nア宅地には、現に建物の敷地に供されている土地に限らず、将来的に建物の敷地に供する目的で取引の対象とされる土地も含まれる。\nイ農地は、都市計画法に規定する用途地域内に存するものであっても、宅地には該当しない。\nウ建物の敷地に供せられる土地であれば、都市計画法に規定する用途地域外に存するものであっても、宅地に該当する。\nエ道路、公園、河川等の公共施設の用に供せられている土地は、都市計画法に規定する用途地域内に存するものであれば宅地に該当する。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R2B-45","year":"R2B","q":45,"category":"宅建業法","question":"宅地建物取引業者Aが自ら売主として、宅地建物取引業者ではない買主Bに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律によれば、正しいものはどれか。","choices":["Aが、住宅販売瑕疵担保保証金を供託する場合、当該住宅の床面積が100m2以下であるかしときは、新築住宅の合計戸数の算定に当たって、2戸をもって1戸と数えることになる。","Aは、住宅瑕疵担保責任保険法人と住宅販売瑕疵担保責任保険契約の締結をした場合、Bが住宅の引渡しを受けた時から10年以内に当該住宅を転売したときは、当該住宅瑕疵担保責任保険法人にその旨を申し出て、当該保険契約の解除をしなければならない。","Aは、住宅販売瑕疵担保責任保険契約の締結をした場合、当該住宅を引き渡した時から10年間、当該住宅の構造耐カ上主要な部分、雨水の浸入を防止する部分、給水設備又はガス設備の隠れた瑕疵によって生じた損害について保険金の支払を受けることができる。","住宅販売瑕疵担保責任保険契約は、新築住宅を引き渡したAが住宅瑕疵担保責任保険法人と締結する必要があり、Bが保険料を支払うものではない。"],"answer":4},{"id":"R2B-46","year":"R2B","q":46,"category":"免除科目","question":"独立行政法人住宅金融支援機構(以下この問において「機構」という。)に関する次の記述のうち、誤っているものはどれか。","choices":["機構は、地震に対する安全性の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。","証券化支援事業(買取型)における民間金融機関の住宅ローン金利は、金融機関によって異なる場合がある。","機構は、高齢者が自ら居住する住宅に対して行うバリアフリーエ事に係る貸付けについて、貸付金の償還を高齢者の死亡時に一括して行うという制度を設けている。","証券化支援業務(買取型)において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する改良に必要な資金は含まれない。"],"answer":4},{"id":"R2B-47","year":"R2B","q":47,"category":"免除科目","question":"宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。","choices":["建築基準法第42条第2項の規定により道路とみなされる部分(セットバックを要する部分)を含む土地については、セットバックを要する旨及びその面積を必ず表示しなければならない。","取引態様については、「売主」、「貸主」、「代理」又は「媒介(イ中介)」の別を表示しなければならず、これらの用語以外の「直販」、「委託」等の用語による表示は、取引態様の表示とは認められない。","インターネット上に掲載している賃貸物件について、掲載した後に契約済みとなり実際には取引できなくなっていたとしても、当該物件について消費者からの問合せがなく、故意に掲載を継続していたものでなければ、不当表示に問われることはない。","新築分譲住宅を販売するに当たり、販売価格が確定していないため直ちに取引することができない場合、その取引開始時期をあらかじめ告知する予告広告を行うことはできない。"],"answer":2},{"id":"R2B-48","year":"R2B","q":48,"category":"免除科目","question":"次の記述のうち、正しいものはどれか。","choices":["建築着工統計(令和2年1月公表)によれば、平成31年1月から令和元年12月までの新設住宅着工戸数は約90.5万戸となり、3年ぶりに増加に転じた。","令和2年版国土交通白書(令和2年6月公表)によれば、平成31年3月末における宅地建物取引業者数は12万4,000を超えている。","令和2年版土地白書(令和2年6月公表)によれば、平成30年の住宅地、工業用地等の宅地は約196万haあるが、前年に比べて大きく減少した。","平成30年度法人企業統計調査(令和元年9月公表)によれば、不動産業について、平成30年度の売上高営業利益率及び売上高経常利益率は、いずれも10%以下となっている。"],"answer":2},{"id":"R2B-49","year":"R2B","q":49,"category":"免除科目","question":"土地に関する次の記述のうち、最も不適当なものはどれか。","choices":["山地は、地形がかなり急峻で、大部分が森林となっている。","低地は、一般に洪水や地震などに対して弱く、防災的見地からは住宅地として好ましくな","埋立地は、一般に海面に対して数mの比高を持ち、干拓地に比べ自然災害に対して危険度が高い。","台地は、一般に地盤が安定しており、低地に比べ自然災害に対して安全度が高い。【問5の建築物の構造に関する次の記述のうち、最も不適当なものはどれか。1基礎は、硬質の支持地盤に設置するとともに、上部構造とも堅固に緊結する必要がある。2木造建物を耐震、耐風的な構造にするためには、できるだけ建物の形態を単純にすることが適切である。3鉄骨造は、不燃構造であり、靭性が大きいことから、鋼材の防錆処理を行う必要はない。せい4近年、コンクリートと鉄筋の強度が向上しており、鉄筋コンクリート造の超高層共同住宅建物もみられる。"],"answer":3},{"id":"R2B-50","year":"R2B","q":50,"category":"免除科目","question":"建築物の構造に関する次の記述のうち、最も不適当なものはどれか。","choices":["基礎は、硬質の支持地盤に設置するとともに、上部構造とも堅固に緊結する必要がある。","木造建物を耐震、耐風的な構造にするためには、できるだけ建物の形態を単純にすることが適切である。","鉄骨造は、不燃構造であり、靭性が大きいことから、鋼材の防錆処理を行う必要はない。","近年、コンクリートと鉄筋の強度が向上しており、鉄筋コンクリート造の超高層共同住宅建物もみられる。"],"answer":3},{"id":"R5-01","year":"R5","q":1,"category":"権利関係","question":"次の1から4までの記述のうち、民法の規定、判例及び下記判決文によれば、誤っているものはどれか。\n（判決文）遺産は、相続人が数人あるときは、相続開始から遺産分割までの間、共同相続人の共有に属するものであるから、この間に遺産である賃貸不動産を使用管理した結果生ずる金銭債権たる賃料債権は、遺産とは別個の財産というべきであって、各共同相続人がその相続分に応じて分割単独債権として確定的に取得するものと解するのが相当である。","choices":["遺産である不動産から、相続開始から遺産分割までの間に生じた賃料債権は、遺産である不動産が遺産分割によって複数の相続人のうちの一人に帰属することとなった場合、当該不動産が帰属することになった相続人が相続開始時にさかのぼって取得する。","相続人が数人あるときは、相続財産は、その共有に属し、各共同相続人は、その相続分に応じて被相続人の権利義務を承継する。","遺産分割の効力は、相続開始の時にさかのぼって生ずる。ただし、第三者の権利を害することはできない。","遺産である不動産が遺産分割によって複数の相続人のうちの一人に帰属することとなった場合、当該不動産から遺産分割後に生じた賃料債権は、遺産分割によって当該不動産が帰属した相続人が取得する。"],"answer":1},{"id":"R5-02","year":"R5","q":2,"category":"権利関係","question":"相隣関係に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["土地の所有者は、境界標の調査又は境界に関する測量等の一定の目的のために必要な範囲内で隣地を使用することができる場合であっても、住家については、その家の居住者の承諾がなければ、当該住家に立ち入ることはできない。","土地の所有者は、隣地の竹木の枝が境界線を越える場合、その竹木の所有者にその枝を切除させることができるが、その枝を切除するよう催告したにもかかわらず相当の期間内に切除しなかったときであっても、自らその枝を切り取ることはできない。","相隣者の一人は、相隣者間で共有する障壁の高さを増すときは、他方の相隣者の承諾を得なければならない。","他の土地に囲まれて公道に通じない土地の所有者は、公道に出るためにその土地を囲んでいる他の土地を自由に選んで通行することができる。"],"answer":1},{"id":"R5-03","year":"R5","q":3,"category":"権利関係","question":"Ａを注文者、Ｂを請負人として、Ａ所有の建物に対して独立性を有さずその構成部分となる増築部分の工事請負契約を締結し、Ｂは3か月間で増築工事を終了させた。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、この問において「契約不適合」とは品質に関して契約の内容に適合しないことをいい、当該請負契約には契約不適合責任に関する特約は定められていなかったものとする。","choices":["ＡがＢに請負代金を支払っていなくても、Ａは増築部分の所有権を取得する。","Ｂが材料を提供して増築した部分に契約不適合がある場合、Ａは工事が終了した日から1年以内にその旨をＢに通知しなければ、契約不適合を理由とした修補をＢに対して請求することはできない。","Ｂが材料を提供して増築した部分に契約不適合があり、Ｂは不適合があることを知りながらそのことをＡに告げずに工事を終了し、Ａが工事終了日から3年後に契約不適合を知った場合、ＡはＢに対して、消滅時効が完成するまでは契約不適合を理由とした修補を請求することができる。","増築した部分にＡが提供した材料の性質によって契約不適合が生じ、Ｂが材料が不適当であることを知らずに工事を終了した場合、ＡはＢに対して、Ａが提供した材料によって生じた契約不適合を理由とした修補を請求することはできない。"],"answer":2},{"id":"R5-04","year":"R5","q":4,"category":"権利関係","question":"ＡがＢに対して貸金債権である甲債権を、ＢがＡに対して貸金債権である乙債権をそれぞれ有している場合において、民法の規定及び判例によれば、次のアからエまでの記述のうち、Ａが一方的な意思表示により甲債権と乙債権とを対当額にて相殺できないものを全て掲げたものは、次の1から4のうちどれか。なお、いずれの債権も相殺を禁止し又は制限する旨の意思表示はされていないものとする。\nア 弁済期の定めのない甲債権と、弁済期到来前に、ＡがＢに対して期限の利益を放棄する旨の意思表示をした乙債権\nイ 弁済期が到来している甲債権と、弁済期の定めのない乙債権\nウ 弁済期の定めのない甲債権と、弁済期が到来している乙債権\nエ 弁済期が到来していない甲債権と、弁済期が到来している乙債権","choices":["ア、イ、ウ","イ、ウ","ウ、エ","エ"],"answer":4},{"id":"R5-05","year":"R5","q":5,"category":"権利関係","question":"従来の住所又は居所を去った者（以下この問において「不在者」という。）の財産の管理に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、この問において「管理人」とは、不在者の財産の管理人をいうものとする。","choices":["不在者が管理人を置かなかったときは、当該不在者の生死が7年間明らかでない場合に限り、家庭裁判所は、利害関係人又は検察官の請求により、その財産の管理について必要な処分を命ずることができる。","不在者が管理人を置いた場合において、その不在者の生死が明らかでないときは、家庭裁判所は、利害関係人又は検察官から請求があったとしても管理人を改任することはできない。","家庭裁判所により選任された管理人は、不在者を被告とする建物収去土地明渡請求を認容した第一審判決に対して控訴を提起するには、家庭裁判所の許可が必要である。","家庭裁判所により選任された管理人は、保存行為として不在者の自宅を修理することができるほか、家庭裁判所の許可を得てこれを売却することができる。"],"answer":4},{"id":"R5-06","year":"R5","q":6,"category":"権利関係","question":"Ａ所有の甲土地について、Ｂが所有の意思をもって平穏にかつ公然と時効取得に必要な期間占有を継続した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはいくつあるか。\nア ＡがＣに対して甲土地を売却し、Ｃが所有権移転登記を備えた後にＢの取得時効が完成した場合には、Ｂは登記を備えていなくても、甲土地の所有権の時効取得をＣに対抗することができる。\nイ Ｂの取得時効が完成した後に、ＡがＤに対して甲土地を売却しＤが所有権移転登記を備え、Ｂが、Ｄの登記の日から所有の意思をもって平穏にかつ公然と時効取得に必要な期間占有を継続した場合、所有権移転登記を備えていなくても、甲土地の所有権の時効取得をＤに対抗することができる。\nウ Ｂの取得時効完成後、Ｂへの所有権移転登記がなされないままＥがＡを債務者として甲土地にＡから抵当権の設定を受けて抵当権設定登記をした場合において、Ｂがその後引き続き所有の意思をもって平穏にかつ公然と時効取得に必要な期間占有を継続した場合、特段の事情がない限り、再度の時効取得により、Ｂは甲土地の所有権を取得し、Ｅの抵当権は消滅する。","choices":["一つ","二つ","三つ","なし"],"answer":3},{"id":"R5-07","year":"R5","q":7,"category":"権利関係","question":"甲建物を所有するＡが死亡し、Ａの配偶者Ｂが甲建物の配偶者居住権を、Ａの子Ｃが甲建物の所有権をそれぞれ取得する旨の遺産分割協議が成立した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。","choices":["遺産分割協議において、Ｂの配偶者居住権の存続期間が定められなかった場合、配偶者居住権の存続期間は20年となる。","Ｂが高齢となり、バリアフリーのマンションに転居するための資金が必要になった場合、Ｂは、Ｃの承諾を得ずに甲建物を第三者Ｄに賃貸することができる。","Ｃには、Ｂに対し、配偶者居住権の設定の登記を備えさせる義務がある。","Ｃは、甲建物の通常の必要費を負担しなければならない。"],"answer":3},{"id":"R5-08","year":"R5","q":8,"category":"権利関係","question":"未成年者Ａが、法定代理人Ｂの同意を得ずに、Ｃから甲建物を買い受ける契約（以下この問において「本件売買契約」という。）を締結した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。なお、Ａに処分を許された財産はなく、Ａは、営業を許されてはいないものとする。","choices":["ＡがＢの同意を得ずに制限行為能力を理由として本件売買契約を取り消した場合、Ｂは、自己が本件売買契約の取消しに同意していないことを理由に、Ａの当該取消しの意思表示を取り消すことができる。","本件売買契約締結時にＡが未成年者であることにつきＣが善意無過失であった場合、Ｂは、Ａの制限行為能力を理由として、本件売買契約を取り消すことはできない。","本件売買契約につき、取消しがなされないままＡが成年に達した場合、本件売買契約についてＢが反対していたとしても、自らが取消権を有すると知ったＡは、本件売買契約を追認することができ、追認後は本件売買契約を取り消すことはできなくなる。","本件売買契約につき、Ｂが追認しないまま、Ａが成年に達する前にＢの同意を得ずに甲建物をＤに売却した場合、ＢがＤへの売却について追認していないときでも、Ａは制限行為能力を理由として、本件売買契約を取り消すことはできなくなる。"],"answer":3},{"id":"R5-09","year":"R5","q":9,"category":"権利関係","question":"Ａを貸主、Ｂを借主として甲建物の賃貸借契約が令和5年7月1日に締結された場合の甲建物の修繕に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。","choices":["甲建物の修繕が必要であることを、Ａが知ったにもかかわらず、Ａが相当の期間内に必要な修繕をしないときは、Ｂは甲建物の修繕をすることができる。","甲建物の修繕が必要である場合において、ＢがＡに修繕が必要である旨を通知したにもかかわらず、Ａが必要な修繕を直ちにしないときは、Ｂは甲建物の修繕をすることができる。","Ｂの責めに帰すべき事由によって甲建物の修繕が必要となった場合は、Ａは甲建物を修繕する義務を負わない。","甲建物の修繕が必要である場合において、急迫の事情があるときは、Ｂは甲建物の修繕をすることができる。"],"answer":2},{"id":"R5-10","year":"R5","q":10,"category":"権利関係","question":"債務者Ａが所有する甲土地には、債権者Ｂが一番抵当権（債権額1,000万円）、債権者Ｃが二番抵当権（債権額1,200万円）、債権者Ｄが三番抵当権（債権額2,000万円）をそれぞれ有しているが、ＢがＤの利益のため、Ａの承諾を得て抵当権の順位を放棄した。甲土地の競売に基づく売却代金が2,400万円であった場合、Ｂの受ける配当額として、民法の規定によれば、正しいものはどれか。","choices":["0円","200万円","400万円","800万円"],"answer":3},{"id":"R5-11","year":"R5","q":11,"category":"権利関係","question":"ＡがＢとの間で、Ａ所有の甲土地につき建物所有目的で期間を50年とする賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。","choices":["本件契約に、当初の10年間は地代を減額しない旨の特約を定めた場合、その期間内は、ＢはＡに対して地代の減額請求をすることはできない。","本件契約が甲土地上で専ら賃貸アパート事業用の建物を所有する目的である場合、契約の更新や建物の築造による存続期間の延長がない旨を定めるためには、公正証書で合意しなければならない。","本件契約に建物買取請求権を排除する旨の特約が定められていない場合、本件契約が終了したときは、その終了事由のいかんにかかわらず、ＢはＡに対してＢが甲土地上に所有している建物を時価で買い取るべきことを請求することができる。","本件契約がＢの居住のための建物を所有する目的であり契約の更新がない旨を定めていない契約であって、期間満了する場合において甲土地上に建物があり、Ｂが契約の更新を請求したとしても、Ａが遅滞なく異議を述べ、その異議に更新を拒絶する正当な事由があると認められる場合は、本件契約は更新されない。"],"answer":4},{"id":"R5-12","year":"R5","q":12,"category":"権利関係","question":"令和5年7月1日に締結された建物の賃貸借契約（定期建物賃貸借契約及び一時使用目的の建物の賃貸借契約を除く。）に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。","choices":["期間を1年未満とする建物の賃貸借契約は、期間を1年とするものとみなされる。","当事者間において、一定の期間は建物の賃料を減額しない旨の特約がある場合、現行賃料が不相当になったなどの事情が生じたとしても、この特約は有効である。","賃借人が建物の引渡しを受けている場合において、当該建物の賃貸人が当該建物を譲渡するに当たり、当該建物の譲渡人及び譲受人が、賃貸人たる地位を譲渡人に留保する旨及び当該建物の譲受人が譲渡人に賃貸する旨の合意をしたときは、賃貸人たる地位は譲受人に移転しない。","現行賃料が定められた時から一定の期間が経過していなければ、賃料増額請求は、認められない。"],"answer":3},{"id":"R5-13","year":"R5","q":13,"category":"権利関係","question":"建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。","choices":["集会においては、法で集会の決議につき特別の定数が定められている事項を除き、規約で別段の定めをすれば、あらかじめ通知した事項以外についても決議することができる。","集会は、区分所有者の4分の3以上の同意があるときは、招集の手続を経ないで開くことができる。","共用部分の保存行為は、規約に別段の定めがある場合を除いて、各共有者がすることができるため集会の決議を必要としない。","一部共用部分に関する事項で区分所有者全員の利害に関係しないものについての区分所有者全員の規約は、当該一部共用部分を共用すべき区分所有者が8人である場合、3人が反対したときは変更することができない。"],"answer":2},{"id":"R5-14","year":"R5","q":14,"category":"権利関係","question":"不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。","choices":["建物が滅失したときは、表題部所有者又は所有権の登記名義人は、その滅失の日から1か月以内に、当該建物の滅失の登記を申請しなければならない。","何人も、理由の有無にかかわらず、登記官に対し、手数料を納付して、登記簿の附属書類である申請書を閲覧することができる。","共有物分割禁止の定めに係る権利の変更の登記の申請は、当該権利の共有者である全ての登記名義人が共同してしなければならない。","区分建物の所有権の保存の登記は、表題部所有者から所有権を取得した者も、申請することができる。"],"answer":2},{"id":"R5-15","year":"R5","q":15,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。","choices":["市街化調整区域は、土地利用を整序し、又は環境を保全するための措置を講ずることなく放置すれば、将来における一体の都市としての整備に支障が生じるおそれがある区域とされている。","高度利用地区は、土地の合理的かつ健全な高度利用と都市機能の更新とを図るため、都市計画に、建築物の高さの最低限度を定める地区とされている。","特定用途制限地域は、用途地域が定められている土地の区域内において、都市計画に、制限すべき特定の建築物等の用途の概要を定める地域とされている。","地区計画は、用途地域が定められている土地の区域のほか、一定の場合には、用途地域が定められていない土地の区域にも定めることができる。"],"answer":4},{"id":"R5-16","year":"R5","q":16,"category":"法令上の制限","question":"都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["開発許可を申請しようとする者は、あらかじめ、開発行為に関係がある公共施設の管理者と協議し、その同意を得なければならない。","開発許可を受けた者は、当該許可を受ける際に申請書に記載した事項を変更しようとする場合においては、都道府県知事に届け出なければならないが、当該変更が国土交通省令で定める軽微な変更に当たるときは、届け出なくてよい。","開発許可を受けた者は、当該開発行為に関する工事が完了し、都道府県知事から検査済証を交付されたときは、遅滞なく、当該工事が完了した旨を公告しなければならない。","市街化調整区域のうち開発許可を受けた開発区域以外の区域内において、自己の居住用の住宅を新築しようとする全ての者は、当該建築が開発行為を伴わない場合であれば、都道府県知事の許可を受けなくてよい。"],"answer":1},{"id":"R5-17","year":"R5","q":17,"category":"法令上の制限","question":"建築基準法に関する次の記述のうち、誤っているものはどれか。","choices":["地方公共団体は、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定し、当該区域内における住居の用に供する建築物の建築を禁止することができる。","3階建て以上の建築物の避難階以外の階を、床面積の合計が1,500m2を超える物品販売業の店舗の売場とする場合には、当該階から避難階又は地上に通ずる2以上の直通階段を設けなければならない。","建築物が防火地域及び準防火地域にわたる場合、その全部について準防火地域内の建築物に関する規定を適用する。","石綿等をあらかじめ添加した建築材料は、石綿等を飛散又は発散させるおそれがないものとして国土交通大臣が定めたもの又は国土交通大臣の認定を受けたものを除き、使用してはならない。"],"answer":3},{"id":"R5-18","year":"R5","q":18,"category":"法令上の制限","question":"次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["法第53条第1項及び第2項の建率制限に係る規定の適用については、準防火地域内にある準耐火建築物であり、かつ、街区の角にある敷地又はこれに準ずる敷地で特定行政庁が指定するものの内にある建築物にあっては同条第1項各号に定める数値に10分の2を加えたものをもって当該各号に定める数値とする。","建築物又は敷地を造成するための擁壁は、道路内に、又は道路に突き出して建築し、又は築造してはならず、地盤面下に設ける建築物においても同様である。","地方公共団体は、その敷地が袋路状道路にのみ接する建築物であって、延べ面積が150m2を超えるものについては、一戸建ての住宅であっても、条例で、その敷地が接しなければならない道路の幅員、その敷地が道路に接する部分の長さその他その敷地又は建築物と道路との関係に関して必要な制限を付加することができる。","冬至日において、法第56条の2第1項の規定による日影規制の対象区域内の土地に日影を生じさせるものであっても、対象区域外にある建築物であれば一律に、同項の規定は適用されない。"],"answer":1},{"id":"R5-19","year":"R5","q":19,"category":"法令上の制限","question":"宅地造成等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。","choices":["都道府県知事は、関係市町村長の意見を聴いて、宅地造成工事規制区域内で、宅地造成に伴う災害で相当数の居住者その他の者に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって、一定の基準に該当するものを、造成宅地防災区域として指定することができる。","都道府県知事は、その地方の気候、風土又は地勢の特殊性により、宅地造成等規制法の規定のみによっては宅地造成に伴うがけ崩れ又は土砂の流出の防止の目的を達し難いと認める場合は、都道府県（地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）の規則で、宅地造成工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化し、又は付加することができる。","都道府県知事は、宅地造成工事規制区域内の宅地について、宅地造成に伴う災害を防止するために必要があると認める場合には、その宅地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。","宅地造成工事規制区域内の宅地において、雨水その他の地表水又は地下水を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となる。"],"answer":1},{"id":"R5-20","year":"R5","q":20,"category":"法令上の制限","question":"土地区画整理法に関する次の記述のうち、誤っているものはどれか。","choices":["換地計画において定められた清算金は、換地処分の公告があった日の翌日において確定する。","現に施行されている土地区画整理事業の施行地区となっている区域については、その施行者の同意を得なければ、その施行者以外の者は、土地区画整理事業を施行することができない。","施行者は、換地処分の公告があった場合において、施行地区内の土地及び建物について土地区画整理事業の施行により変動があったときは、遅滞なく、その変動に係る登記を申請し、又は嘱託しなければならない。","土地区画整理組合は、仮換地を指定しようとする場合においては、あらかじめ、その指定について、土地区画整理審議会の同意を得なければならない。"],"answer":4},{"id":"R5-21","year":"R5","q":21,"category":"法令上の制限","question":"農地に関する次の記述のうち、農地法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。","choices":["相続により農地を取得する場合は、法第3条第1項の許可を要しないが、相続人に該当しない者が特定遺贈により農地を取得する場合は、同項の許可を受ける必要がある。","自己の所有する面積4アールの農地を農作物の育成又は養畜の事業のための農業用施設に転用する場合は、法第4条第1項の許可を受ける必要はない。","法第3条第1項又は法第5条第1項の許可が必要な農地の売買について、これらの許可を受けずに売買契約を締結しても、その所有権の移転の効力は生じない。","社会福祉事業を行うことを目的として設立された法人（社会福祉法人）が、農地をその目的に係る業務の運営に必要な施設の用に供すると認められる場合、農地所有適格法人でなくても、農業委員会の許可を得て、農地の所有権を取得することができる。"],"answer":2},{"id":"R5-22","year":"R5","q":22,"category":"法令上の制限","question":"土地を取得する場合における届出に関する次の記述のうち、正しいものはどれか。なお、この問において「事後届出」とは、国土利用計画法第23条の届出をいい、「重要土地等調査法」とは、重要施設周辺及び国境離島等における土地等の利用状況の調査及び利用の規制等に関する法律をいうものとする。","choices":["都市計画区域外において、国から一団の土地である6,000m2と5,000m2の土地を購入した者は、事後届出を行う必要はない。","市街化区域を除く都市計画区域内において、Ａが所有する7,000m2の土地をＢが相続により取得した場合、Ｂは事後届出を行う必要がある。","市街化区域において、Ｃが所有する3,000m2の土地をＤが購入する契約を締結した場合、Ｃ及びＤは事後届出を行わなければならない。","重要土地等調査法の規定による特別注視区域内にある100m2の規模の土地に関する所有権又はその取得を目的とする権利の移転をする契約を締結する場合には、当事者は、一定の事項を、あらかじめ、内閣総理大臣に届け出なければならない。"],"answer":1},{"id":"R5-23","year":"R5","q":23,"category":"税・その他","question":"印紙税に関する次の記述のうち、正しいものはどれか。なお、以下の契約書はいずれも書面により作成されたものとする。","choices":["売主Ａと買主Ｂが土地の譲渡契約書を3通作成し、Ａ、Ｂ及び仲介人Ｃがそれぞれ1通ずつ保存する場合、当該契約書3通には印紙税が課される。","一の契約書に土地の譲渡契約（譲渡金額5,000万円）と建物の建築請負契約（請負金額6,000万円）をそれぞれ区分して記載した場合、印紙税の課税標準となる当該契約書の記載金額は1億1,000万円である。","「Ｄの所有する甲土地（時価2,000万円）をＥに贈与する」旨を記載した贈与契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は、2,000万円である。","当初作成の「土地を1億円で譲渡する」旨を記載した土地譲渡契約書の契約金額を変更するために作成する契約書で、「当初の契約書の契約金額を1,000万円減額し、9,000万円とする」旨を記載した変更契約書について、印紙税の課税標準となる当該変更契約書の記載金額は、1,000万円である。"],"answer":1},{"id":"R5-24","year":"R5","q":24,"category":"税・その他","question":"不動産取得税に関する次の記述のうち、正しいものはどれか。","choices":["不動産取得税の徴収については、特別徴収の方法によることができる。","不動産取得税は、目的税である。","不動産取得税は、不動産の取得に対し、当該不動産所在の市町村及び特別区において、当該不動産の取得者に課する。","不動産取得税は、市町村及び特別区に対して、課することができない。"],"answer":4},{"id":"R5-25","year":"R5","q":25,"category":"税・その他","question":"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。","choices":["原価法は、価格時点における対象不動産の収益価格を求め、この収益価格について減価修正を行って対象不動産の比準価格を求める手法である。","原価法は、対象不動産が建物又は建物及びその敷地である場合には適用することができるが、対象不動産が土地のみである場合においては、いかなる場合も適用することができない。","取引事例比較法における取引事例が、特殊事情のある事例である場合、その具体的な状況が判明し、事情補正できるものであっても採用することは許されない。","取引事例比較法は、近隣地域若しくは同一需給圏内の類似地域等において対象不動産と類似の不動産の取引が行われている場合又は同一需給圏内の代替競争不動産の取引が行われている場合に有効である。"],"answer":4},{"id":"R5-26","year":"R5","q":26,"category":"宅建業法","question":"宅地建物取引業法第37条の規定により交付すべき書面に記載すべき事項を電磁的方法により提供すること（以下この問において「37条書面の電磁的方法による提供」という。）に関する次の記述のうち、正しいものはいくつあるか。\nア 宅地建物取引業者が自ら売主として締結する売買契約において、当該契約の相手方から宅地建物取引業法施行令第3条の4第1項に規定する承諾を得なければ、37条書面の電磁的方法による提供をすることができない。\nイ 宅地建物取引業者が媒介業者として関与する売買契約について、宅地建物取引業法施行令第3条の4第1項に規定する承諾を取得するための通知の中に宅地建物取引士を明示しておけば、37条書面の電磁的方法による提供において提供に係る宅地建物取引士を明示する必要はない。\nウ 宅地建物取引業者が自ら売主として締結する売買契約において、37条書面の電磁的方法による提供を行う場合、当該提供されたファイルへの記録を取引の相手方が出力することにより書面を作成できるものでなければならない。\nエ 宅地建物取引業者が媒介業者として関与する建物賃貸借契約について、37条書面の電磁的方法による提供を行う場合、当該提供するファイルに記録された記載事項について、改変が行われていないかどうかを確認することができる措置を講じなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R5-27","year":"R5","q":27,"category":"宅建業法","question":"宅地建物取引業法第34条の2第1項第4号に規定する建物状況調査（以下この問において「建物状況調査」という。）に関する次の記述のうち、誤っているものはどれか。","choices":["建物状況調査とは、建物の構造耐力上主要な部分又は雨水の浸入を防止する部分として国土交通省令で定めるものの状況の調査であって、経年変化その他の建物に生じる事象に関する知識及び能力を有する者として国土交通省令で定める者が実施するものをいう。","宅地建物取引業者が建物状況調査を実施する者のあっせんを行う場合、建物状況調査を実施する者は建築士法第2条第1項に規定する建築士であって国土交通大臣が定める講習を修了した者でなければならない。","既存住宅の売買の媒介を行う宅地建物取引業者が売主に対して建物状況調査を実施する者のあっせんを行った場合、宅地建物取引業者は売主から報酬とは別にあっせんに係る料金を受領することはできない。","既存住宅の貸借の媒介を行う宅地建物取引業者は、宅地建物取引業法第37条の規定により交付すべき書面に建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を記載しなければならない。"],"answer":4},{"id":"R5-28","year":"R5","q":28,"category":"宅建業法","question":"宅地建物取引業者Ａの業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反するものはいくつあるか。\nア Ａの従業員Ｂが、Ｃが所有する戸建住宅の買取りを目的とした訪問勧誘をＣに対して行ったところ、Ｃから「契約の意思がないので今後勧誘に来ないでほしい」と言われたことから、後日、Ａは、別の従業員Ｄに同じ目的で訪問勧誘を行わせて、当該勧誘を継続した。\nイ Ａの従業員Ｅは、Ｆが所有する戸建住宅の買取りを目的とした電話勧誘をＦに対して行った際に、不実のことと認識しながら「今後5年以内にこの一帯は再開発されるので、急いで売却した方がよい。」と説明した。\nウ Ａの従業員Ｇは、Ｈが所有する戸建住宅の買取りを目的とした電話勧誘をＨに対して行おうと考え、23時頃にＨの自宅に電話をかけ、勧誘を行い、Ｈの私生活の平穏を害し、Ｈを困惑させた。\nエ Ａは、Ｊとの間でＪが所有する戸建住宅を買い取る売買契約を締結し、法第37条の規定に基づく書面をＪに交付したが、Ａの宅地建物取引士に、当該書面に記名のみさせ、押印させることを省略した。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R5-29","year":"R5","q":29,"category":"宅建業法","question":"宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者Ａ社の使用人であって、Ａ社の宅地建物取引業を行う支店の代表者であるものが、道路交通法の規定に違反したことにより懲役の刑に処せられたとしても、Ａ社の免許は取り消されることはない。","宅地建物取引業者Ｂ社の取締役が、所得税法の規定に違反したことにより罰金の刑に処せられたとしても、Ｂ社の免許は取り消されることはない。","宅地建物取引業者である個人Ｃが、宅地建物取引業法の規定に違反したことにより罰金の刑に処せられたとしても、Ｃの免許は取り消されることはない。","宅地建物取引業者Ｄ社の非常勤の取締役が、刑法第222条（脅迫）の罪を犯したことにより罰金の刑に処せられたとしても、Ｄ社の免許は取り消されることはない。"],"answer":2},{"id":"R5-30","year":"R5","q":30,"category":"宅建業法","question":"宅地建物取引業者Ａ（甲県知事免許）の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、Ａは宅地建物取引業保証協会の社員ではないものとする。\nア Ａが免許を受けた日から6か月以内に甲県知事に営業保証金を供託した旨の届出を行わないとき、甲県知事はその届出をすべき旨の催告をしなければならず、当該催告が到達した日から1か月以内にＡが届出を行わないときは、その免許を取り消すことができる。\nイ Ａは、営業保証金を供託したときは、その供託物受入れの記載のある供託書の写しを添付して、その旨を甲県知事に届け出なければならず、当該届出をした後でなければ、その事業を開始することができない。\nウ Ａは、営業保証金が還付され、甲県知事から営業保証金が政令で定める額に不足が生じた旨の通知を受け、その不足額を供託したときは、30日以内に甲県知事にその旨を届け出なければならない。\nエ Ａが免許失効に伴い営業保証金を取り戻す際、供託した営業保証金につき還付を受ける権利を有する者に対し、3か月を下らない一定期間内に申し出るべき旨を公告し、期間内にその申出がなかった場合でなければ、取り戻すことができない。","choices":["一つ","二つ","三つ","四つ"],"answer":1},{"id":"R5-31","year":"R5","q":31,"category":"宅建業法","question":"宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「建築確認」とは、建築基準法第6条第1項の確認をいうものとする。","choices":["宅地又は建物の売買に関する注文を受けたときは、遅滞なくその注文をした者に対して取引態様の別を明らかにしなければならないが、当該注文者が事前に取引態様の別を明示した広告を見てから注文してきた場合においては、取引態様の別を遅滞なく明らかにする必要はない。","既存の住宅に関する広告を行うときは、法第34条の2第1項第4号に規定する建物状況調査を実施しているかどうかを明示しなければならない。","これから建築工事を行う予定である建築確認申請中の建物については、当該建物の売買の媒介に関する広告をしてはならないが、貸借の媒介に関する広告はすることができる。","販売する宅地又は建物の広告に関し、著しく事実に相違する表示をした場合、監督処分の対象となるだけでなく、懲役若しくは罰金に処せられ、又はこれを併科されることもある。"],"answer":4},{"id":"R5-32","year":"R5","q":32,"category":"宅建業法","question":"宅地建物取引業者が行う届出に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。","choices":["宅地建物取引業者Ａ（甲県知事免許）が、新たに宅地建物取引業を営む支店を甲県内に設置した場合、Ａはその日から30日以内にその旨を甲県知事に届け出なければならない。","宅地建物取引業者Ｂ（乙県知事免許）が、宅地建物取引業者ではないＣとの合併により消滅した場合、Ｂを代表する役員であった者は、その日から30日以内にその旨を乙県知事に届け出なければならない。","宅地建物取引業者Ｄ（丙県知事免許）が、本店における専任の宅地建物取引士Ｅの退職に伴い、新たに専任の宅地建物取引士Ｆを本店に置いた場合、Ｄはその日から30日以内にその旨を丙県知事に届け出なければならない。","宅地建物取引業者Ｇ（丁県知事免許）が、その業務に関し展示会を丁県内で実施する場合、展示会を実施する場所において売買契約の締結（予約を含む。）又は売買契約の申込みの受付を行うときは、Ｇは展示会での業務を開始する日の5日前までに展示会を実施する場所について丁県知事に届け出なければならない。"],"answer":4},{"id":"R5-33","year":"R5","q":33,"category":"宅建業法","question":"宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。","choices":["甲宅地を所有する宅地建物取引業者Ａが、乙宅地を所有する宅地建物取引業者ではない個人Ｂと、甲宅地と乙宅地の交換契約を締結するに当たって、Ｂに対して、甲宅地に関する重要事項の説明を行う義務はあるが、乙宅地に関する重要事項の説明を行う義務はない。","宅地の売買における当該宅地の引渡しの時期について、重要事項説明において説明しなければならない。","宅地建物取引業者が売主となる宅地の売買に関し、売主が買主から受領しようとする金銭のうち、買主への所有権移転の登記以後に受領するものに対して、宅地建物取引業法施行規則第16条の4に定める保全措置を講ずるかどうかについて、重要事項説明書に記載する必要がある。","重要事項説明書の電磁的方法による提供については、重要事項説明を受ける者から電磁的方法でよいと口頭で依頼があった場合、改めて電磁的方法で提供することについて承諾を得る必要はない。"],"answer":1},{"id":"R5-34","year":"R5","q":34,"category":"宅建業法","question":"宅地建物取引業者Ａ（消費税課税事業者）は貸主Ｂから建物の貸借の媒介の依頼を受け、宅地建物取引業者Ｃ（消費税課税事業者）は借主Ｄから建物の貸借の媒介の依頼を受け、ＢとＤとの間で、1か月分の借賃を12万円（消費税等相当額を含まない。）とする賃貸借契約（以下この問において「本件契約」という。）を成立させた場合における次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。\nア 本件契約が建物を住居として貸借する契約である場合に、Ｃは、媒介の依頼を受けるに当たってＤから承諾を得ないまま、132,000円の報酬を受領した。\nイ ＡはＢから事前に特別な広告の依頼があったので、依頼に基づく大手新聞掲載広告料金に相当する額をＢに請求し、受領した。\nウ ＣはＤに対し、賃貸借契約書の作成費を、Ｄから限度額まで受領した媒介報酬の他に請求して受領した。\nエ 本件契約が建物を事務所として貸借する契約である場合に、報酬として、ＡはＢから132,000円を、ＣはＤから132,000円をそれぞれ受領した。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R5-35","year":"R5","q":35,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない買主Ｂから宅地の買受けの申込みを受けた場合における宅地建物取引業法第37条の2の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはどれか。","choices":["Ａは、仮設テント張りの案内所でＢから買受けの申込みを受けた際、以後の取引について、その取引に係る書類に関してＢから電磁的方法で提供をすることについての承諾を得た場合、クーリング・オフについて電磁的方法で告げることができる。","Ａが、仮設テント張りの案内所でＢから買受けの申込みを受けた場合、Ｂは、クーリング・オフについて告げられた日から8日以内に電磁的方法により当該申込みの撤回を申し出れば、申込みの撤回を行うことができる。","Ａが、Ａの事務所でＢから買受けの申込みを受けた場合、Ｂは、申込みの日から8日以内に電磁的方法により当該申込みの撤回を申し出れば、申込みの撤回を行うことができる。","Ａが、売却の媒介を依頼している宅地建物取引業者Ｃの事務所でＢから買受けの申込みを受けた場合、Ｂは、申込みの日から8日以内に書面により当該申込みの撤回を申し出ても、申込みの撤回を行うことができない。"],"answer":4},{"id":"R5-36","year":"R5","q":36,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業者Ａが行う業務に関して宅地建物取引業法の規定に違反するものはいくつあるか。\nア 建物の貸借の媒介に際して、賃借の申込みをした者がその撤回を申し出たので、Ａはかかった諸費用を差し引いて預り金を返還した。\nイ Ａは、売主としてマンションの売買契約を締結するに際して、買主が手付として必要な額を今すぐには用意できないと申し出たので、手付金の分割払いを買主に提案した。\nウ Ａは取引のあったつど、その年月日やその取引に係る宅地又は建物の所在及び面積その他必要な記載事項を帳簿に漏らさず記載し、必要に応じて紙面にその内容を表示できる状態で、電子媒体により帳簿の保存を行っている。\nエ Ａはアンケート調査を装ってその目的がマンションの売買の勧誘であることを告げずに個人宅を訪問し、マンションの売買の勧誘をした。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R5-37","year":"R5","q":37,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["宅地建物取引業者は、非常勤役員には従業者であることを証する証明書を携帯させる必要はない。","宅地建物取引業者は、その事務所ごとに従業者名簿を備えなければならないが、取引の関係者から閲覧の請求があった場合であっても、宅地建物取引業法第45条に規定する秘密を守る義務を理由に、閲覧を拒むことができる。","宅地建物取引業者の従業者は、宅地の買受けの申込みをした者から請求があった場合には、その者が宅地建物取引業者であっても、その者に従業者であることを証する証明書を提示する必要がある。","宅地建物取引業者は、従業者名簿を最終の記載をした日から5年間保存しなければならない。"],"answer":3},{"id":"R5-38","year":"R5","q":38,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。\nア 宅地建物取引業者Ａが、自ら所有する複数の建物について、複数人に対し、反復継続して賃貸する行為は、宅地建物取引業に該当しない。\nイ 宅地建物取引士とは、宅地建物取引士資格試験に合格し、都道府県知事の登録を受けた者をいう。\nウ 建設業者Ｂが、建築請負工事の受注を目的として、業として宅地の売買の媒介を行う行為は、宅地建物取引業に該当しない。\nエ 宅地建物取引士は、宅地又は建物の取引に係る事務に必要な知識及び能力の維持向上に努めなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":2},{"id":"R5-39","year":"R5","q":39,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない個人Ｂとの間で宅地の売買契約を締結する場合における手付金の保全措置に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、当該契約に係る手付金は保全措置が必要なものとする。","choices":["Ａは、Ｂから手付金を受領した後に、速やかに手付金の保全措置を講じなければならない。","Ａは、手付金の保全措置を保証保険契約を締結することにより講ずる場合、保険期間は保証保険契約が成立した時から宅地建物取引業者が受領した手付金に係る宅地の引渡しまでの期間とすればよい。","Ａは、手付金の保全措置を保証保険契約を締結することにより講ずる場合、保険事業者との間において保証保険契約を締結すればよく、保険証券をＢに交付する必要はない。","Ａは、手付金の保全措置を保証委託契約を締結することにより講ずるときは、保証委託契約に基づいて銀行等が手付金の返還債務を連帯して保証することを約する書面のＢへの交付に代えて、Ｂの承諾を得ることなく電磁的方法により講ずることができる。"],"answer":2},{"id":"R5-40","year":"R5","q":40,"category":"宅建業法","question":"宅地建物取引業者Ａが、ＢからＢ所有の中古住宅の売却の依頼を受け、専任媒介契約（専属専任媒介契約ではないものとする。）を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。","choices":["Ａは、当該中古住宅について購入の申込みがあったときは、遅滞なく、その旨をＢに報告しなければならないが、Ｂの希望条件を満たさない申込みだとＡが判断した場合については報告する必要はない。","Ａは、法第34条の2第1項の規定に基づく書面の交付後、速やかに、Ｂに対し、法第34条の2第1項第4号に規定する建物状況調査を実施する者のあっせんの有無について確認しなければならない。","Ａは、当該中古住宅について法で規定されている事項を、契約締結の日から休業日数を含め7日以内に指定流通機構へ登録する義務がある。","Ａは、Ｂが他の宅地建物取引業者の媒介又は代理によって売買の契約を成立させたときの措置を法第34条の2第1項の規定に基づく書面に記載しなければならない。"],"answer":4},{"id":"R5-41","year":"R5","q":41,"category":"宅建業法","question":"次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["甲県知事は、宅地建物取引士に対して必要な報告を求めることができるが、その対象は、甲県知事登録の宅地建物取引士であって、適正な事務の遂行を確保するために必要な場合に限られる。","宅地建物取引業者Ａ（甲県知事免許）で専任の宅地建物取引士として従事しているＢ（甲県知事登録）が、勤務実態のない宅地建物取引業者Ｃ（乙県知事免許）において、自らが専任の宅地建物取引士である旨の表示がされていることを許した場合には、乙県知事は、Ｂに対し、必要な指示をすることができる。","宅地建物取引士が不正の手段により宅地建物取引士証の交付を受けた場合においては、その登録をしている都道府県知事は、情状が特に重いときは、当該宅地建物取引士の登録を消除することができる。","都道府県知事は、宅地建物取引士に対して登録消除処分を行ったときは、適切な方法で公告しなければならない。"],"answer":2},{"id":"R5-42","year":"R5","q":42,"category":"宅建業法","question":"宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、誤っているものはいくつあるか。\nア 宅地建物取引士は、重要事項説明をする場合、取引の相手方から請求されなければ、宅地建物取引士証を相手方に提示する必要はない。\nイ 売主及び買主が宅地建物取引業者ではない場合、当該取引の媒介業者は、売主及び買主に重要事項説明書を交付し、説明を行わなければならない。\nウ 宅地の売買について売主となる宅地建物取引業者は、買主が宅地建物取引業者である場合、重要事項説明書を交付しなければならないが、説明を省略することはできる。\nエ 宅地建物取引業者である売主は、宅地建物取引業者ではない買主に対して、重要事項として代金並びにその支払時期及び方法を説明しなければならない。","choices":["一つ","二つ","三つ","四つ"],"answer":3},{"id":"R5-43","year":"R5","q":43,"category":"宅建業法","question":"宅地建物取引業者Ａが媒介により宅地の売買契約を成立させた場合における宅地建物取引業法第37条の規定により交付すべき書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。","choices":["Ａは、買主が宅地建物取引業者であるときは、37条書面に移転登記の申請時期を記載しなくてもよい。","Ａは、37条書面を売買契約成立前に、各当事者に交付しなければならない。","Ａは、37条書面を作成したときは、専任の宅地建物取引士をして37条書面に記名させる必要がある。","Ａは、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容を37条書面に記載しなければならない。"],"answer":4},{"id":"R5-44","year":"R5","q":44,"category":"宅建業法","question":"宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。","choices":["保証協会の社員は、自らが取り扱った宅地建物取引業に係る取引の相手方から当該取引に関する苦情について解決の申出が保証協会にあり、保証協会から関係する資料の提出を求められたときは、正当な理由がある場合でなければ、これを拒んではならない。","保証協会は、社員がその一部の事務所を廃止したことに伴って弁済業務保証金分担金を当該社員に返還しようとするときは、弁済業務保証金の還付請求権者に対し、一定期間内に認証を受けるため申し出るべき旨の公告を行わなければならない。","保証協会は、宅地建物取引業者の相手方から、社員である宅地建物取引業者の取り扱った宅地建物取引業に係る取引に関する損害の還付請求を受けたときは、直ちに弁済業務保証金から返還しなければならない。","保証協会は、手付金等保管事業について国土交通大臣の承認を受けた場合、社員が自ら売主となって行う宅地又は建物の売買で、宅地の造成又は建築に関する工事の完了前における買主からの手付金等の受領について、当該事業の対象とすることができる。"],"answer":1},{"id":"R5-45","year":"R5","q":45,"category":"宅建業法","question":"宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない買主Ｂに新築住宅を販売する場合に関する次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。","choices":["Ａが信託会社又は金融機関の信託業務の兼営等に関する法律第1条第1項の認可を受けた金融機関であって、宅地建物取引業を営むものである場合、住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結を行う義務を負わない。","Ａは、住宅販売瑕疵担保保証金の供託をする場合、当該住宅の売買契約を締結するまでに、Ｂに対し供託所の所在地等について、必ず書面を交付して説明しなければならず、買主の承諾を得ても書面の交付に
